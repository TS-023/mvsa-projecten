<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>MVSA — Wereldbol</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #efe9da;
    --bg-2: #f5f0e3;
    --ink: #141414;
    --ink-2: #4a4742;
    --muted: #94907f;
    --line: #d9d2c1;
    --line-2: #e6dfcf;
    --white: #ffffff;

    --globe-fill: #fbf8ee;
    --globe-land: #ebe4d0;
    --globe-line: #b7ae96;
    --atmosphere: #cfc5a9;

    --pin: oklch(72% 0.18 65);          /* warm amber */
    --pin-glow: oklch(78% 0.20 70);
    --office: oklch(58% 0.22 25);       /* coral / red */
    --office-glow: oklch(68% 0.24 30);
    --green: oklch(72% 0.18 152);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .app {
    display: grid;
    grid-template-rows: 56px 1fr;
    grid-template-columns: 320px 1fr;
    height: 100vh;
  }

  /* ---------- Top nav ---------- */
  .top {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--line-2);
    position: relative;
    z-index: 20;
  }
  .logo {
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.06em;
    margin-right: 16px;
  }
  .nav { display: flex; gap: 2px; flex: 1; }
  .nav button {
    background: transparent;
    border: 0;
    padding: 8px 14px;
    border-radius: 999px;
    font: 700 11px/1 Inter, sans-serif;
    color: var(--ink-2);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: background 120ms, color 120ms;
  }
  .nav button:hover { background: var(--bg-2); }
  .nav button.active { background: var(--ink); color: var(--white); }
  .nav button svg { width: 14px; height: 14px; }

  .top-right { display: flex; gap: 8px; align-items: center; }
  .btn-pill {
    border-radius: 999px;
    padding: 9px 16px;
    font: 700 10px/1 Inter, sans-serif;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid var(--line);
    background: var(--bg-2);
    color: var(--ink);
    display: inline-flex;
    gap: 8px;
    align-items: center;
  }
  .btn-pill.dark {
    background: var(--ink);
    color: var(--white);
    border-color: var(--ink);
  }
  .lock {
    width: 14px; height: 14px;
    border-radius: 3px;
    background: oklch(85% 0.15 90);
    display: inline-grid;
    place-items: center;
    font-size: 9px;
  }

  /* ---------- Sidebar ---------- */
  .side {
    background: var(--bg);
    border-right: 1px solid var(--line-2);
    padding: 28px 22px;
    z-index: 10;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .side h1 {
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 6px 0;
    letter-spacing: -0.01em;
  }
  .side .sub {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 18px;
    line-height: 1.45;
  }
  .search {
    width: 100%;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--white);
    padding: 12px 18px;
    font: 400 13px/1 Inter, sans-serif;
    outline: none;
    margin-bottom: 22px;
    color: var(--ink);
  }
  .search:focus { border-color: var(--ink); }
  .search::placeholder { color: var(--muted); }

  .legend {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--line-2);
    font-size: 11px;
    color: var(--muted);
    display: grid;
    gap: 10px;
  }
  .legend-row { display: flex; align-items: center; gap: 10px; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--pin);
    box-shadow: 0 0 8px var(--pin-glow);
  }
  .legend-dot.office { background: var(--office); box-shadow: 0 0 8px var(--office-glow); }
  .legend strong { color: var(--ink); font-weight: 600; }

  .hint {
    margin-top: 12px;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }
  .hint kbd {
    display: inline-block;
    border: 1px solid var(--line);
    background: var(--white);
    padding: 1px 5px;
    border-radius: 3px;
    font: 600 10px/1.4 Inter;
    color: var(--ink);
  }

  /* ---------- Globe stage ---------- */
  .stage {
    position: relative;
    background:
      radial-gradient(ellipse at 50% 55%, #f3eeda 0%, var(--bg) 60%);
    overflow: hidden;
  }
  #globeViz { position: absolute; inset: 0; }
  #globeViz canvas { display: block; }

  /* Make globe.gl html element layer accept pointer events on the pins */
  .scene-tooltip { pointer-events: none; }

  /* ---------- Pins ---------- */
  .pin {
    position: relative;
    width: 14px; height: 14px;
    margin: -7px 0 0 -7px;
    pointer-events: auto;
    cursor: pointer;
    z-index: 1;
  }
  .pin .dot {
    position: absolute;
    inset: 5px;
    background: var(--pin);
    border-radius: 50%;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.7),
      0 0 6px var(--pin-glow),
      0 0 14px var(--pin-glow);
    z-index: 2;
  }
  .pin .halo {
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--pin-glow) 0%, transparent 70%);
    opacity: 0.6;
    animation: halo 2.4s cubic-bezier(0.2, 0.6, 0.4, 1) infinite;
  }
  .pin .halo.b { animation-delay: 1.2s; }
  @keyframes halo {
    0%   { transform: scale(0.5); opacity: 0.55; }
    70%  { opacity: 0; }
    100% { transform: scale(3.2); opacity: 0; }
  }
  .pin:hover .dot { transform: scale(1.25); }
  .pin .dot { transition: transform 150ms ease-out; }
  .pin.active .dot {
    background: var(--ink);
    box-shadow:
      0 0 0 2px var(--white),
      0 0 0 4px var(--ink),
      0 0 18px var(--pin-glow);
    transform: scale(1.3);
  }

  /* Office pin */
  .pin.office { width: 20px; height: 20px; margin: -10px 0 0 -10px; z-index: 5; }
  .pin.office .dot {
    inset: 6px;
    background: var(--office);
    box-shadow:
      0 0 0 2px var(--white),
      0 0 0 3px var(--office),
      0 0 10px var(--office-glow),
      0 0 22px var(--office-glow);
  }
  .pin.office .halo {
    background: radial-gradient(circle, var(--office-glow) 0%, transparent 70%);
    opacity: 0.7;
  }
  .pin.office::after {
    content: 'MVSA · KANTOOR';
    position: absolute;
    left: 26px;
    top: 50%;
    transform: translateY(-50%);
    font: 800 9.5px/1 Inter, sans-serif;
    letter-spacing: 0.18em;
    background: var(--ink);
    color: var(--white);
    padding: 6px 9px;
    border-radius: 4px;
    white-space: nowrap;
    box-shadow: 0 4px 14px -4px rgba(0,0,0,0.4);
  }
  .pin.office::before {
    content: '';
    position: absolute;
    left: 17px;
    top: 50%;
    transform: translateY(-50%);
    width: 9px; height: 1px;
    background: var(--ink);
  }

  /* ---------- Tooltip ---------- */
  .tooltip {
    position: fixed;
    background: var(--ink);
    color: var(--white);
    padding: 9px 12px;
    border-radius: 6px;
    font-size: 12px;
    pointer-events: none;
    transform: translate(12px, -50%);
    white-space: nowrap;
    z-index: 1000;
    opacity: 0;
    transition: opacity 150ms;
    box-shadow: 0 8px 20px -6px rgba(0,0,0,0.4);
  }
  .tooltip.show { opacity: 1; }
  .tooltip .ttl { font-weight: 600; font-size: 12px; }
  .tooltip .meta { font-size: 10.5px; color: rgba(255,255,255,0.6); margin-top: 3px; letter-spacing: 0.04em; }

  /* ---------- Bottom toggle ---------- */
  .toggle {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    border-radius: 999px;
    padding: 5px;
    display: flex;
    gap: 3px;
    z-index: 15;
    box-shadow: 0 14px 30px -10px rgba(0,0,0,0.35);
  }
  .toggle button {
    background: transparent;
    border: 0;
    color: rgba(255,255,255,0.55);
    padding: 9px 18px;
    font: 700 10px/1 Inter, sans-serif;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border-radius: 999px;
    cursor: pointer;
    display: inline-flex;
    gap: 8px;
    align-items: center;
    transition: color 150ms, background 150ms;
  }
  .toggle button:hover { color: var(--white); }
  .toggle button.active {
    background: rgba(255,255,255,0.12);
    color: var(--white);
  }
  .dot-green {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }

  /* ---------- HUD ---------- */
  .stats {
    position: absolute;
    top: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
    z-index: 5;
  }
  .stat {
    background: rgba(255,255,255,0.78);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 14px;
    min-width: 78px;
  }
  .stat .n { font: 700 22px/1 Inter; letter-spacing: -0.02em; }
  .stat .l { font: 600 9.5px/1.4 Inter; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em; margin-top: 5px; }

  .hud-br {
    position: absolute;
    right: 20px;
    bottom: 28px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    z-index: 15;
  }
  .hud-type {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 7px 12px;
    font: 700 10px/1 Inter;
    letter-spacing: 0.18em;
    color: var(--muted);
  }
  .hud-zoom {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
  }
  .hud-zoom button {
    width: 30px; height: 30px;
    background: transparent;
    border: 0;
    font: 600 16px/1 Inter;
    cursor: pointer;
    color: var(--ink);
  }
  .hud-zoom button:hover { background: var(--bg-2); }
  .hud-zoom button + button { border-top: 1px solid var(--line-2); }

  /* Loading state */
  .loading {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    color: var(--muted);
    font: 600 11px/1 Inter;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    pointer-events: none;
    transition: opacity 400ms;
  }
  .loading.hidden { opacity: 0; }

  /* Reset focus button */
  .reset-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 8px 14px;
    font: 700 10px/1 Inter;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    z-index: 5;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--ink);
  }
  .reset-btn:hover { background: var(--bg-2); }
  .reset-btn svg { width: 12px; height: 12px; }
</style>
</head>
<body>

<div class="app">

  <header class="top">
    <div class="logo">MVSA</div>
    <nav class="nav">
      <button>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6l6-2 6 2 6-2v14l-6 2-6-2-6 2zM9 4v16M15 6v16"/></svg>
        KAART
      </button>
      <button>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h4l3-8 4 16 3-8h4"/></svg>
        DASHBOARD
      </button>
      <button>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18"/></svg>
        PROJECTEN
      </button>
      <button>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2.5"/><path d="M3 19c0-3 3-5 6-5s6 2 6 5M14 19c0-2 2-4 4.5-4s2.5 2 2.5 4"/></svg>
        TEAM
      </button>
      <button>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 4h12a2 2 0 0 1 2 2v14H7a2 2 0 0 1-2-2V4z"/><path d="M5 4v14"/></svg>
        ADRESSENBOEK
      </button>
      <button>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><circle cx="12" cy="18" r="3"/><path d="M6 9l6 6M18 9l-6 6"/></svg>
        NETWERK
      </button>
    </nav>
    <div class="top-right">
      <button class="btn-pill"><span class="lock">🔒</span> INLOGGEN</button>
      <button class="btn-pill dark">+ NIEUW PROJECT</button>
    </div>
  </header>

  <aside class="side">
    <h1>Projecten op kaart</h1>
    <div class="sub">Alle projecten met een ingevuld adres.</div>
    <input id="search" class="search" placeholder="Zoek project of stad…">

    <div class="legend">
      <div class="legend-row"><span class="legend-dot office"></span> <span><strong>MVSA Kantoor</strong>, Amsterdam</span></div>
      <div class="legend-row"><span class="legend-dot"></span> <span><strong id="project-count">100</strong> projecten</span></div>
      <div class="hint">
        <kbd>sleep</kbd> om te draaien · <kbd>scroll</kbd> om te zoomen · <kbd>klik</kbd> op een punt om er naartoe te vliegen
      </div>
    </div>
  </aside>

  <main class="stage">
    <div id="globeViz"></div>
    <div class="loading" id="loading">WERELD LADEN…</div>

    <div class="stats">
      <div class="stat"><div class="n" id="stat-total">100</div><div class="l">Projecten</div></div>
      <div class="stat"><div class="n" id="stat-cities">26</div><div class="l">Steden</div></div>
      <div class="stat"><div class="n" id="stat-countries">7</div><div class="l">Landen</div></div>
    </div>

    <button class="reset-btn" id="reset">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5"/></svg>
      TERUG NAAR NL
    </button>

    <div class="toggle">
      <button onclick="window.location.href='projects_map.html'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6l6-2 6 2 6-2v14l-6 2-6-2-6 2zM9 4v16M15 6v16"/></svg>
        2D KAART
      </button>
      <button class="active"><span class="dot-green"></span> WERELDBOL</button>
    </div>

    <div class="hud-br">
      <div class="hud-type">3D</div>
      <div class="hud-zoom">
        <button id="zoom-in">+</button>
        <button id="zoom-out">−</button>
      </div>
    </div>

    <div class="tooltip" id="tooltip"></div>
  </main>
</div>

<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<script src="https://unpkg.com/globe.gl@2.32.0"></script>
<script src="projects-data.js"></script>
<script src="globe-app.js"></script>

</body>
</html>
