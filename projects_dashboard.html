        'duurzaamheid-score','daktuin','zonnepanelen','labels',
        'autoparkeren','fietsparkeren','ratio-wonen','ratio-kantoor',
        'tevredenheid','awards'],
    },
  ];
  const DEFAULT_ACTIVE = PRESETS[0].widgets;

  // ── Widget formaat: sizeKey (S/M/L/XL) per widget ──
  const [sizeMap, setSizeMap] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('mvsa.sizes') || '{}'); } catch(e) { return {}; }
  });
  const saveSizes = (next) => { setSizeMap(next); localStorage.setItem('mvsa.sizes', JSON.stringify(next)); };
  const getSizeKey = (id) => sizeMap[id] || DEFAULT_SIZE[id] || 'M';
  const setSize    = (id, key) => saveSizes({ ...sizeMap, [id]: key });

  // Drag-to-swap: wissel posities van twee widgets
  const dragSrcId = React.useRef(null);
  const swapWidgets = (fromId, toId) => {
    if (fromId === toId) return;
    const next = [...activeWidgets];
    const fi = next.indexOf(fromId);
    const ti = next.indexOf(toId);
    if (fi < 0 || ti < 0) return;
    [next[fi], next[ti]] = [next[ti], next[fi]];
    setActiveWidgets(next);
    localStorage.setItem('mvsa.widgets', JSON.stringify(next));
  };

  const [editMode, setEditMode] = React.useState(false);
  const [activeTab, setActiveTab] = React.useState(() => {
    const saved = localStorage.getItem('mvsa.tab');
    // migreer oude 'opdrachtgevers' waarde naar 'portfolio'
    if (saved === 'opdrachtgevers') return 'portfolio';
    return saved || 'algemeen';
  });
  const [activePreset, setActivePreset] = React.useState(() => localStorage.getItem('mvsa.preset') || 'custom');
  const [activeWidgets, setActiveWidgets] = React.useState(() => {
    try {
      const s = JSON.parse(localStorage.getItem('mvsa.widgets') || 'null');
      if (s && Array.isArray(s)) return s;
    } catch(e) {}
    return DEFAULT_ACTIVE;
  });

  const saveWidgets = (next, presetId = 'custom') => {
    setActiveWidgets(next);
    setActivePreset(presetId);
    localStorage.setItem('mvsa.widgets', JSON.stringify(next));
    localStorage.setItem('mvsa.preset', presetId);
  };

  const applyPreset = (preset) => {
    saveWidgets(preset.widgets, preset.id);
    saveSizes({});  // reset naar DEFAULT_SIZE per widget
  };
  const removeWidget  = (id) => saveWidgets(activeWidgets.filter(w => w !== id));
  const addWidget     = (id) => saveWidgets([...activeWidgets, id]);
  const inactiveWidgets = ALL_WIDGETS.filter(w => !activeWidgets.includes(w.id));

  const onDragStart = (id) => { dragSrcId.current = id; };
  const onDragOver  = (e) => { e.preventDefault(); };
  const onDrop      = (toId) => { if (dragSrcId.current) swapWidgets(dragSrcId.current, toId); dragSrcId.current = null; };
  const onDragEnd   = () => { dragSrcId.current = null; };
  // ────────────────────────────────────────────────────────────
  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : '');
    localStorage.setItem('mvsa.dark', darkMode ? '1' : '0');
  }, [darkMode]);

  // Activiteitenlog — sla op in localStorage
  const logActivity = (action, project) => {
    try {
      const log = JSON.parse(localStorage.getItem('mvsa.log') || '[]');
      log.unshift({ action, project, time: new Date().toISOString() });
      localStorage.setItem('mvsa.log', JSON.stringify(log.slice(0, 50)));
    } catch(e) {}
  };
  const [activityLog] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('mvsa.log') || '[]'); } catch(e) { return []; }
  });

  /* ── exportCSV: downloadt alle projecten als CSV bestand ── */
  const exportCSV = async () => {
    const projects = await Projects.getAll();
    if (!projects.length) { alert('Geen projecten om te exporteren.'); return; }
    const cols = Object.keys(projects[0]).filter(k => k !== 'id');
    const header = cols.join(';');
    const rows = projects.map(p =>
      cols.map(c => {
        const v = p[c] == null ? '' : String(p[c]);
        return v.includes(';') || v.includes('"') || v.includes('\n')
          ? `"${v.replace(/"/g, '""')}"` : v;
      }).join(';')
    );
    const csv = [header, ...rows].join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `mvsa-projecten-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };
  return (
    <>
      <header className="topbar">
        <div style={{display:'flex', alignItems:'center', gap:16, flex:1}}>
          <div className="crumbs">Projecten · <strong>Statistieken</strong></div>

          {/* ZOEKBALK — links naast de titel */}
          <div style={{position:'relative', flex:'0 1 280px'}} ref={searchRef}>
            <input
              type="search"
              placeholder="Zoek project…"
              value={searchQ}
              onChange={e => { setSearchQ(e.target.value); setSearchOpen(true); }}
              onFocus={() => searchQ.length >= 2 && setSearchOpen(true)}
              autoComplete="off"
              style={{
                width:'100%', fontFamily:'inherit', fontSize:'12px',
                padding:'8px 32px 8px 14px',
                background:'rgba(255,255,255,.85)', backdropFilter:'blur(10px)',
                border:'1px solid rgba(17,20,24,.08)', borderRadius:'999px',
                color:'var(--ink)', outline:'none',
                boxShadow:'0 4px 16px -4px rgba(20,30,45,.12)',
                transition:'border-color .2s, box-shadow .2s',
              }}
              onFocus={e=>{e.target.style.borderColor='var(--accent)';e.target.style.boxShadow='0 4px 20px -4px rgba(78,125,156,.2)';}}
              onBlur={e=>{e.target.style.borderColor='rgba(17,20,24,.08)';e.target.style.boxShadow='0 4px 16px -4px rgba(20,30,45,.12)';}}
            />
            {searchQ && (
              <button onClick={() => { setSearchQ(''); setSearchOpen(false); }}
                style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',
                  background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:14,padding:0}}>×</button>
            )}
            {searchOpen && searchQ.length >= 2 && (
              <div style={{
                position:'absolute', top:'calc(100% + 8px)', left:0, right:0, zIndex:500,
                background:'#fff', borderRadius:14, border:'1px solid rgba(17,20,24,.08)',
                boxShadow:'0 16px 40px -8px rgba(20,30,45,.2)', overflow:'hidden',
                minWidth:'340px',
              }}>
                {searchResults.length === 0 ? (
                  <div style={{padding:'24px',textAlign:'center',color:'var(--muted)',fontSize:13}}>Geen resultaten voor "{searchQ}"</div>
                ) : (
                  <>
                    <div style={{padding:'8px 14px',fontSize:'10px',letterSpacing:'.12em',textTransform:'uppercase',color:'var(--muted)',fontWeight:600,borderBottom:'1px solid var(--line)',background:'#fafbfc'}}>
                      {searchResults.length} resultaat{searchResults.length!==1?'en':''}
                    </div>
                    {searchResults.map(p => {
                      getThumb(p);
                      const thumb = p.projectnummer ? thumbCache[p.projectnummer] : null;
                      return (
                        <a key={p.id}
                          href={`project_page.html?nr=${encodeURIComponent(p.projectnummer||'')}&p=${encodeURIComponent(p.projectnaam||'')}`}
                          onClick={() => setSearchOpen(false)}
                          style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',
                            textDecoration:'none',color:'inherit',transition:'background .1s',
                            borderBottom:'1px solid var(--line)'}}
                          onMouseOver={e=>e.currentTarget.style.background='#f5f8fa'}
                          onMouseOut={e=>e.currentTarget.style.background=''}>
                          {thumb
                            ? <img src={thumb} alt="" style={{width:36,height:36,borderRadius:8,objectFit:'cover',flex:'none'}}/>
                            : <div style={{width:36,height:36,borderRadius:8,background:'var(--line)',flex:'none',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🏗</div>}
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontWeight:700,fontSize:12,letterSpacing:'.03em',textTransform:'uppercase',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.projectnaam}</div>
                            <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{[p.stad,p.land].filter(Boolean).join(' · ')||'—'}</div>
                          </div>
                          {p.fase && <span style={{fontSize:'9px',letterSpacing:'.12em',fontWeight:700,textTransform:'uppercase',padding:'2px 8px',borderRadius:'999px',background:'rgba(78,125,156,.1)',color:'var(--accent)',flex:'none'}}>{p.fase}</span>}
                        </a>
                      );
                    })}
                  </>
                )}
              </div>
            )}
          </div>
        </div>

        {/* NAVIGATIE KNOPPEN — rechts */}
        <div className="meta">
        </div>
      </header>


      {/* ── TABBLADEN ── */}
      {(() => {
        const TABS = [
          { id: 'algemeen',  label: 'Algemeen',  icon: '📊' },
          { id: 'meters',    label: 'Meters',    icon: '📐' },
          { id: 'portfolio', label: 'Portfolio', icon: '🏆' },
        ];

        const d  = liveData         || MOCK.data;
        const a  = liveAlgemeen     || MOCK.algemeen;
        const l  = liveLocatie      || MOCK.locatie;
        const m  = liveMetrage      || MOCK.metrage;
        const mo = liveMobiliteit   || MOCK.mobiliteit;
        const du = liveDuurzaamheid || MOCK.duurzaamheid;
        const b  = liveBouw         || MOCK.bouwOverig;
        const rp = randomProject    || d.randomProject;
        const recent = d.recent     || [];

        // ── Widget renderer ──
        const renderWidget = (id) => {
          switch(id) {
            case 'aantal-projecten':  return <AantalProjecten projectsFilled={d.projectsFilled} allProjects={allProjects} />;
            case 'random-project':    return <RandomProject project={rp} onShuffle={() => {
              const projects = window._allProjects || [];
              if (!projects.length) return;
              const pick = projects[Math.floor(Math.random() * projects.length)];
              setRandomProject({ name: pick.projectnaam, city: pick.stad || pick.land || '', tags: [pick.project_type, pick.fase, pick.opgave].filter(Boolean).slice(0,3) });
            }} />;
            case 'leaderboard':       return <Leaderboard leaderboard={d.leaderboard} leaderPhoto={liveLeaderPhoto} />;
            case 'recent-1':          return recent[0] ? <RecentCard project={recent[0]} position={0} /> : null;
            case 'recent-2':          return recent[1] ? <RecentCard project={recent[1]} position={1} /> : null;
            case 'projecttype':       return <ProjecttypeChart data={a.projecttype} />;
            case 'functie':           return <FunctieDonut data={a.functie} />;
            case 'verkregen':         return <VerkregenChart data={a.verkregen} />;
            case 'ontwerp-opgeleverd':return <VeldenDezeWeek allProjects={allProjects} />;
            case 'fases':             return <FasesChart fases={a.fases} onBarClick={(barData) => {
              const filtered = allProjects.filter(p => {
                if (!p.fase) return false;
                const f = p.fase.trim().toUpperCase();
                return f === barData.label || f.startsWith(barData.label+' ') || f.includes('('+barData.label+')') || f.startsWith(barData.full ? barData.full.toUpperCase() : '____');
              });
              setFaseModal({ label: barData.label, fullName: barData.full || FASE_NAMES[barData.label] || barData.label, projects: filtered });
            }} />;
            case 'binnen-buiten':     return <BinnenBuitenland binnenland={l.binnenland} buitenland={l.buitenland} />;
            case 'top-provincies':    return <TopProvincies provincies={l.provincies} />;
            case 'top-steden':        return <TopSteden steden={l.steden} />;
            case 'type-programma':    return <TypeProgrammaDonut data={m.typeProgramma} />;
            case 'totaal-bvo':        return <TotaalGerealiseerd waarde={m.totaalGerealiseerd} />;
            case 'grootste-gebouw':   return <GrootsteGebouw data={m.grootsteGebouw} />;
            case 'bvo-lijst':         return <BvoLijst lijst={m.bvoLijst} />;
            case 'autoparkeren':      return <AutoParkeren items={mo.auto} />;
            case 'fietsparkeren':     return <FietsParkeren items={mo.fiets} />;
            case 'ratio-wonen':       return <RatioWonen items={MOCK.ratio.wonen} />;
            case 'ratio-kantoor':     return <RatioKantoor items={MOCK.ratio.kantoor} />;
            case 'duurzaamheid-score':return <DuurzaamheidsScore items={du.score} />;
            case 'daktuin':           return <DaktuinWidget items={du.daktuin} />;
            case 'zonnepanelen':      return <ZonnepanelenWidget items={du.zonnepanelen} />;
            case 'hoogste-gebouw':    return <HoogsteGebouw items={b.hoogsteGebouw} />;
            case 'tevredenheid':      return <TevredenheidStat waarde={b.tevredenheid} />;
            case 'awards':            return <TotaalAwardsStat waarde={b.totaalAwards} />;
            case 'labels':            return <LabelsList items={b.labels} />;
            case 'meeste-awards':     return <MeesteAwards items={b.awards} />;
            default: return null;
          }
        };

        // ── Vaste hoogte per widget: 'half' = 160px, 'full' = 340px ──
        const WIDGET_HEIGHT = {
          'aantal-projecten':   'small',
          'random-project':     'small',
          'leaderboard':        'xlarge',
          'recent-1':           'medium',
          'recent-2':           'medium',
          'projecttype':        'xlarge',
          'functie':            'xlarge',
          'verkregen':          'medium',
          'ontwerp-opgeleverd': 'small',
          'fases':              'xlarge',
          'binnen-buiten':      'medium',
          'top-provincies':     'medium',
          'top-steden':         'medium',
          'type-programma':     'large',
          'totaal-bvo':         'small',
          'grootste-gebouw':    'medium',
          'bvo-lijst':          'large',
          'autoparkeren':       'small',
          'fietsparkeren':      'small',
          'ratio-wonen':        'medium',
          'ratio-kantoor':      'medium',
          'duurzaamheid-score': 'medium',
          'daktuin':            'medium',
          'zonnepanelen':       'medium',
          'hoogste-gebouw':     'large',
          'tevredenheid':       'small',
          'awards':             'small',
          'labels':             'medium',
          'meeste-awards':      'medium',
        };
        const H = { half: 160, full: 247, large: 508, xlarge: 508 };

        // Helper: render widget-rijen als gestructureerde layout
        // Leaderboard (full = 2 rijen) staat altijd rechts en de
        // twee half-widgets links ervan vullen samen exact die 2 rijen.
        const renderSection = (ids, colOverrides = {}) => {
          // 3-tier systeem: small=1 rij (160px), medium=2 rijen (334px), large=3 rijen (508px)
          const rowsMap = { small: 1, medium: 2, large: 3, xlarge: 4 };
          const heightMap = { small: H.half, medium: H.full, large: H.large, xlarge: H.xlarge };
          return ids.map((id, idx) => {
            const widget = renderWidget(id);
            if (!widget) return null;
            const tier = WIDGET_HEIGHT[id] || 'medium';
            const h = heightMap[tier];
            const colOverride = colOverrides[id] ? { gridColumn: colOverrides[id] } : {};
            return (
              <div key={id} style={{
                ...colOverride,
                borderRadius: 16,
                overflow: 'hidden',
                height: h,
                display: 'flex', flexDirection: 'column',
                animation: `cardIn .45s cubic-bezier(.22,.68,0,1.2) ${idx * 60}ms both`,
              }}>
                <div style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column' }}>
                  {widget}
                </div>
              </div>
            );
          });
        };

        const TAB_SECTIONS = {
          algemeen: [
            { title: 'Overzicht',  ids: ['aantal-projecten', 'ontwerp-opgeleverd', 'random-project', 'recent-1', 'recent-2', 'leaderboard'], colLayout: [[0,1,2],[3,4],[5]] },
            { title: 'Projecten',  ids: ['fases', 'projecttype', 'functie'] },
            { title: 'Activiteit', ids: ['ontwerp-opgeleverd', 'verkregen'] },
            { title: 'Locatie',    ids: ['binnen-buiten', 'top-provincies', 'top-steden'] },
          ],
          meters: [
            { title: 'Schaal',       ids: ['totaal-bvo', 'leaderboard', 'type-programma'] },
            { title: 'Gebouwen',     ids: ['grootste-gebouw', 'hoogste-gebouw', 'bvo-lijst'] },
            { title: 'Mobiliteit',   ids: ['autoparkeren', 'fietsparkeren', 'ratio-wonen', 'ratio-kantoor'] },
            { title: 'Duurzaamheid', ids: ['duurzaamheid-score', 'daktuin', 'zonnepanelen'] },
          ],
          portfolio: [
            { title: 'Reputatie',   ids: ['awards', 'tevredenheid', 'leaderboard'] },
            { title: 'Kwaliteit',   ids: ['labels', 'meeste-awards', 'duurzaamheid-score'] },
            { title: 'Acquisitie',  ids: ['verkregen', 'fases', 'ontwerp-opgeleverd'] },
            { title: 'Projecten',   ids: ['recent-1', 'recent-2', 'random-project'] },
          ],
        };

        const sections = TAB_SECTIONS[activeTab] || TAB_SECTIONS.algemeen;

        return (
          <div>
            {/* Tab-balk */}
            <div className="dash-tabs">
              {TABS.map(tab => (
                <button
                  key={tab.id}
                  className={`dash-tab${activeTab === tab.id ? ' active' : ''}`}
                  onClick={() => {
                    setActiveTab(tab.id);
                    localStorage.setItem('mvsa.tab', tab.id);
                  }}>
                  <span className="tab-icon">{tab.icon}</span>
                  {tab.label}
                </button>
              ))}
            </div>

            {/* Widget secties van actief tabblad */}
            {sections.map(section => (
              <div key={section.title}>
                <SectionTitle>{section.title}</SectionTitle>
                {section.colLayout ? (
                  // Kolom-gebaseerde layout: elk array = één kolom
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14, marginBottom: 14, alignItems: 'start' }}>
                    {section.colLayout.map((colIds, ci) => (
                      <div key={ci} style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                        {colIds.map((idx, localIdx) => {
                          const id = section.ids[idx];
                          const widget = renderWidget(id);
                          if (!widget) return null;
                          const tier = WIDGET_HEIGHT[id] || 'medium';
                          const heightMap = { small: H.half, medium: H.full, large: H.large, xlarge: H.xlarge };
                          const h = heightMap[tier];
                          const globalIdx = ci * 3 + localIdx;
                          return (
                            <div key={id} style={{ borderRadius: 16, overflow: 'hidden', height: h, display: 'flex', flexDirection: 'column', flexShrink: 0,
                              animation: `cardIn .45s cubic-bezier(.22,.68,0,1.2) ${globalIdx * 70}ms both` }}>
                              <div style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column' }}>{widget}</div>
                            </div>
                          );
                        })}
                      </div>
                    ))}
                  </div>
                ) : (
                  <div style={{
                    display: 'grid',
                    gridTemplateColumns: 'repeat(3, 1fr)',
                    gridAutoRows: 'auto',
                    gap: 14,
                    marginBottom: 14,
                  }}>
                    {renderSection(section.ids, section.colOverrides || {})}
                  </div>
                )}
              </div>
            ))}
          </div>
        );
      })()}


      {/* FASE MODAL — via portal buiten root div zodat fixed positioning altijd werkt */}
      {faseModal && ReactDOM.createPortal(
        <>
          <div className="fase-backdrop" onClick={() => setFaseModal(null)} />
          <div className="fase-modal">
            <div className="fase-modal-header">
              <div>
                <div className="fase-modal-label">{faseModal.label}</div>
                <h2>{faseModal.fullName}</h2>
                <div className="count">
                  {faseModal.projects.length} project{faseModal.projects.length !== 1 ? 'en' : ''}
                  {faseModal.projects.length > 0 && faseModal.projects[0].totaal_bvo
                    ? ` · ${Math.round(faseModal.projects.reduce((s,p)=>s+(parseFloat(p.totaal_bvo)||0),0)).toLocaleString('nl-NL')} m² totaal BVO`
                    : ''}
                </div>
              </div>
              <button className="fase-modal-close" onClick={() => setFaseModal(null)}>×</button>
            </div>

            {/* Fase filter tabs */}
            <div className="fase-tabs">
              {['AQ','SO','VO','DO','TO','UO','UV','OP'].map(code => {
                const full = {AQ:'Acquisitie',SO:'Schets Ontwerp',VO:'Voorlopig Ontwerp',DO:'Definitief Ontwerp',TO:'Technisch Ontwerp',UO:'Uitvoerings Ontwerp',UV:'Uitvoering',OP:'Opgeleverd'}[code];
                const count = allProjects.filter(p => p.fase && p.fase.trim().toUpperCase() === code).length;
                const isActive = faseModal.label === code;
                return (
                  <button key={code}
                    className={`fase-tab ${isActive ? 'active' : ''}`}
                    onClick={() => {
                      const filtered = allProjects.filter(p => p.fase && p.fase.trim().toUpperCase() === code);
                      setFaseModal({ label: code, fullName: full, projects: filtered });
                    }}>
                    <span className="fase-tab-code">{code}</span>
                    <span className="fase-tab-count">{count}</span>
                  </button>
                );
              })}
            </div>

            <div className="fase-modal-body">
              {faseModal.projects.length === 0 ? (
                <div className="fase-empty">
                  <div className="fase-empty-icon">📭</div>
                  Geen projecten gevonden in fase {faseModal.label}.
                </div>
              ) : (
                faseModal.projects
                  .sort((a,b) => (b.totaal_bvo||0) - (a.totaal_bvo||0))
                  .map((p, i) => {
                    const thumb = p.projectnummer ? thumbCache[p.projectnummer] : null;
                    if (p.projectnummer && thumbCache[p.projectnummer] === undefined) {
                      setThumbCache(c => ({ ...c, [p.projectnummer]: null }));
                      Images.getForProject(p.projectnummer).then(imgs =>
                        setThumbCache(c => ({ ...c, [p.projectnummer]: imgs[0]||null }))
                      ).catch(()=>{});
                    }
                    return (
                      <a key={p.id} className="fase-project-row"
                        href={`project_page.html?nr=${encodeURIComponent(p.projectnummer||'')}&p=${encodeURIComponent(p.projectnaam||'')}`}>
                        <span className="fpr-rank">{i+1}</span>
                        {thumb
                          ? <img className="fpr-thumb" src={thumb} alt="" />
                          : <div className="fpr-thumb-ph">🏗</div>}
                        <div className="fpr-info">
                          <div className="fpr-name">{p.projectnaam || '—'}</div>
                          <div className="fpr-meta">
                            {[p.stad, p.provincie, p.land].filter(Boolean).join(' · ') || '—'}
                            {p.opdrachtgever ? ` — ${p.opdrachtgever}` : ''}
                          </div>
                        </div>
                        <div className="fpr-right">
                          {p.totaal_bvo
                            ? <span className="fpr-bvo">{Number(p.totaal_bvo).toLocaleString('nl-NL')} m²</span>
                            : null}
                          {p.projectnummer
                            ? <span className="fpr-num">{p.projectnummer}</span>
                            : null}
                        </div>
                        <span className="fpr-arrow">→</span>
                      </a>
                    );
                  })
              )}
            </div>
          </div>
        </>,
        document.body
      )}

      {/* NETWERK OVERLAY */}
      {networkOpen && ReactDOM.createPortal(
        <div style={{position:'fixed',inset:0,zIndex:9999,background:'#07080b',display:'flex',flexDirection:'column'}}>
          <div style={{position:'absolute',top:16,right:20,zIndex:10}}>
            <button onClick={() => setNetworkOpen(false)}
              style={{background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'999px',color:'#e8eef7',fontFamily:'inherit',fontSize:'11px',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:700,padding:'8px 16px',cursor:'pointer',backdropFilter:'blur(8px)'}}>
              ✕ Sluiten
            </button>
          </div>
          <iframe
            src="network_nodes.html"
            style={{flex:1,border:'none',width:'100%',height:'100%'}}
            title="Netwerk – Wie werkt waaraan"
          />
        </div>,
        document.body
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script src="transitions.js"></script>

<script>
/* ── Shimmer: volg muispositie per card voor radial-gradient glow ── */
document.addEventListener('mousemove', (e) => {
  const card = e.target.closest('.card');
  if (!card) return;
  const rect = card.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width  * 100).toFixed(1);
  const y = ((e.clientY - rect.top)  / rect.height * 100).toFixed(1);
  card.style.setProperty('--mx', x + '%');
  card.style.setProperty('--my', y + '%');
});
</script>

<script>
(async function() {
  try {
    const { data: { user } } = await db.auth.getUser();
    const inline = document.getElementById('auth-bar-inline');
    if (!user) {
      if (inline) inline.innerHTML = '<a href="login.html" style="background:#fff;color:#1a2332;text-decoration:none;padding:8px 16px;border-radius:999px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;border:1px solid rgba(26,35,50,.12);">🔒 Inloggen</a>';
      return;
    }
    const { data: profile } = await db.from('profiles').select('naam,status,is_admin').eq('id', user.id).maybeSingle();
    if (profile?.status === 'approved') {
      if (inline) inline.innerHTML =
        `<a href="profile.html" style="font-weight:700;font-size:12px;color:var(--ink);text-decoration:none;padding:8px 14px;border-radius:999px;border:1px solid rgba(17,20,24,.12);background:#fff;">${profile.naam}</a>`
        + (profile.is_admin ? `<a href="admin.html" style="font-size:11px;color:var(--ink);text-decoration:none;padding:8px 14px;border-radius:999px;border:1px solid rgba(17,20,24,.12);background:#fff;letter-spacing:.1em;text-transform:uppercase;font-weight:700;">⚙️ Beheer</a>` : '')
        + `<button onclick="Auth.logout().then(()=>location.reload())" style="background:none;border:1px solid rgba(17,20,24,.12);border-radius:999px;cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--muted);padding:8px 14px;">Uitloggen</button>`;
    } else {
      if (inline) inline.innerHTML = '<a href="login.html" style="background:#fff;color:#1a2332;text-decoration:none;padding:8px 16px;border-radius:999px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;border:1px solid rgba(26,35,50,.12);">🔒 Inloggen</a>';
    }
  } catch(e) {}
})();
</script>

<div class="auth-bar" id="auth-bar"></div>
<script src="auth-bar.js"></script>
<script src="dark-mode.js"></script>
</body>
