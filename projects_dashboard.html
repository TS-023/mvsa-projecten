<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Projecten · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg: #eef0f3;
    --card: #ffffff;
    --ink: #1a2332;
    --ink-2: #2d3a4a;
    --muted: #7f8fa0;
    --line: #dde3ea;
    --accent: #4e7d9c;
    --shadow: 0 1px 3px rgba(26,35,50,.06), 0 8px 24px -8px rgba(26,35,50,.12);
    --radius: 14px;
    --h-s: 160px;    /* klein  — 1 rij */
    --h-m: 247px;    /* middel — 2 rijen */
    --h-l: 508px;    /* groot  — 3 rijen = 2× middel = 3× klein */
  }
  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; background: var(--bg); color: var(--ink); font-family: 'Inter', Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }


  /* ═══════════════════════════════════════════════
     LAYOUT
     ═══════════════════════════════════════════════ */
  .page{
    max-width: 1280px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }


  /* ── Topbar ── */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 28px;
  }
  .crumbs{ font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }
  .crumbs strong{ color: var(--ink); font-weight:600; }
  .topbar .meta{ font-size:12px; color:var(--muted); display:flex; gap:18px; align-items:center; }
  .dot{ width:6px; height:6px; border-radius:50%; background:#4e7d9c; display:inline-block; margin-right:6px; vertical-align:middle; }


  /* ── Sectietitels ── */
  .section-title{
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ink);
    margin: 28px 0 12px 4px;
    display:flex; align-items:center; gap:10px;
  }
  .section-title .rule{ flex:1; height:1px; background: rgba(17,20,24,.12); }


  /* ── Grid systeem ── */
  .grid{ display:grid; gap: 14px; }


  /* ═══════════════════════════════════════════════
     WIDGET STIJLEN
     ═══════════════════════════════════════════════ */

  /* ── Data sectie (grote nummers bovenaan) ── */
  .grid-data{
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: var(--h-s) var(--h-s) var(--h-s) var(--h-s);
    grid-auto-flow: column;
  }
  .grid-data .left-1{ grid-column: 1; grid-row: 1 / span 2; }
  .grid-data .left-3{ grid-column: 1; grid-row: 3 / span 2; }
  .grid-data .middle{ grid-column: 2; grid-row: 1 / -1; }
  .card.middle{ transition: transform .15s ease, box-shadow .15s ease; }
  .card.middle:hover{ transform: translateY(-2px); box-shadow: 0 1px 0 rgba(20,30,45,.04), 0 16px 32px -12px rgba(20,30,45,.28); }
  .card.middle:hover h3::after{ content: " →"; color: var(--accent); }
  .grid-data .right-1{ grid-column: 3; grid-row: 1 / span 2; }
  .grid-data .right-2{ grid-column: 3; grid-row: 3 / span 2; }
  .grid-data > .card{ display:flex; flex-direction: column; min-height: 0; }

  .card{
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px 20px;
    border: 1px solid rgba(255,255,255,.6);
    transition: transform .2s ease, box-shadow .2s ease;
    overflow: hidden;
    height: 100%;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }
  .card:hover{
    transform: translateY(-2px);
    box-shadow: 0 2px 8px rgba(26,35,50,.06), 0 16px 40px -8px rgba(26,35,50,.16);
  }
  .card h3{
    margin:0 0 10px;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-2);
    letter-spacing: .01em;
    text-align: center;
  }

  .stat .num{
    font-size: 56px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--ink);
  }
  .stat .delta{
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .04em;
  }
  .stat .delta b{ color: var(--ink); font-weight:600; }

  .random-project{
    text-align: center;
    padding: 14px 18px 0;
    justify-content: center;
  }
  .random-project h3{ text-align:center; margin-bottom:6px; }
  .random-project .rp-img{
    width: 100%; flex: 1; min-height: 0; border-radius: 12px; overflow:hidden; position:relative;
    background:#8aaec4;
    margin-bottom: 12px;
  }
  .random-project .rp-img::before{
    content:""; position:absolute; inset:0;
    background-image: repeating-linear-gradient(180deg, rgba(0,0,0,.18) 0 1px, transparent 1px 8px);
  }
  .random-project .rp-img::after{
    content:""; position:absolute; inset:0;
    background-image: repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0 1px, transparent 1px 24px);
  }
  .random-project .rp-img .label{
    position:absolute; left:14px; top:14px; font-family:'JetBrains Mono', ui-monospace, monospace;
    font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:#fff; mix-blend-mode: difference;
  }
  .random-project .name{ font-size:16px; font-weight:700; letter-spacing:-.01em; line-height:1.2; }
  .random-project .meta{ font-size:12px; color: var(--muted); margin-top:2px; }
  .rp-tags{ display:flex; gap:5px; justify-content:center; margin-top: 8px; flex-wrap:wrap; }
  .tag{ font-size:10px; letter-spacing:.1em; text-transform:uppercase; padding: 4px 8px; border:1px solid rgba(78,125,156,.25); border-radius: 999px; color: var(--accent); background: rgba(78,125,156,.08); }


  /* ── Leaderboard / RankList ── */
  .lead-photo{
    width:100%; aspect-ratio: 16/10; background: #111; border-radius: 12px; overflow:hidden; position:relative;
    display:flex; align-items:flex-end; padding: 14px;
  }
  .lead-photo .ph{
    position:absolute; inset:0;
    background:
      radial-gradient(120% 80% at 30% 30%, #2d4a62 0%, #1a2e3e 60%, #0d1820 100%);
  }
  .lead-photo .ph::after{
    content:""; position:absolute; inset:0;
    background-image:
      linear-gradient(transparent 0 50%, rgba(255,255,255,.04) 50% 51%, transparent 51%),
      linear-gradient(90deg, transparent 0 50%, rgba(255,255,255,.04) 50% 51%, transparent 51%);
    background-size: 24px 24px;
    mix-blend-mode: overlay;
  }
  .lead-photo .cap{
    position:relative; color:#fff; font-size:11px; letter-spacing:.14em; text-transform:uppercase; opacity:.85;
  }

  .ranklist{ list-style:none; padding:0; margin: 14px 0 0; }
  .ranklist li{
    display:grid; grid-template-columns: 18px 1fr auto; align-items:center; gap: 10px;
    padding: 9px 0; border-top: 1px solid var(--line); font-size: 13px;
  }
  .ranklist li:first-child{ border-top: 0; }
  .ranklist .rk{ color: var(--muted); font-variant-numeric: tabular-nums; }
  .ranklist .nm{ font-weight:600; letter-spacing:.02em; text-transform:uppercase; font-size: 12px; }
  .ranklist .nm a, .ranklist .nm.link{ color: var(--ink); text-decoration: none; cursor: pointer; transition: color .15s ease; }
  .ranklist .nm a:hover, .ranklist .nm.link:hover{ color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  .ranklist .sc{ color: var(--ink); font-variant-numeric: tabular-nums; font-weight:600; }


  /* ── Breakdown balk (hover) ── */
  .ranklist.with-breakdown li{ grid-template-columns: 18px 1fr auto; row-gap: 0; }
  .ranklist.with-breakdown li .sc{ cursor: help; position: relative; padding: 2px 4px; border-radius: 4px; transition: background .15s ease; }
  .ranklist.with-breakdown li .sc:hover{ background: rgba(17,20,24,.06); }
  .ranklist.with-breakdown li .breakdown{
    grid-column: 1 / -1;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height .25s ease, opacity .2s ease, margin .25s ease, padding .25s ease;
  }
  .ranklist.with-breakdown li.open .breakdown{
    max-height: 120px; opacity: 1;
    margin: 6px 0 4px; padding-top: 4px;
  }
  .breakdown-bar{
    width: 100%; height: 8px; border-radius: 4px; overflow: hidden;
    display: flex; background: rgba(17,20,24,.06);
  }
  .breakdown-bar .seg{ height: 100%; transition: opacity .15s ease; }
  .breakdown-bar .seg:hover{ opacity: .8; }
  .breakdown-legend{
    display: flex; flex-wrap: wrap; gap: 4px 12px; margin-top: 6px;
    font-size: 10px; color: var(--muted); letter-spacing: .04em;
  }
  .breakdown-legend .item{ display: inline-flex; align-items: center; gap: 5px; }
  .breakdown-legend .sw{ width: 8px; height: 8px; border-radius: 2px; display: inline-block; }
  .breakdown-legend .lb{ text-transform: capitalize; color: var(--ink-2); font-weight: 500; }
  .breakdown-legend .vl{ font-variant-numeric: tabular-nums; }


  /* ── Recente kaarten / thumbnails ── */
  .recent-card{ padding: 0; overflow:hidden; }
  .recent-card .img{
    flex: 1; min-height: 0; background:#8aaec4; position:relative; overflow:hidden;
    display: block;
  }
  a.img{ cursor: pointer; transition: filter .15s ease; }
  a.img:hover{ filter: brightness(1.05); }
  .rp-img{ display: block; }
  a.rp-img{ cursor: pointer; transition: transform .2s ease, box-shadow .2s ease; }
  a.rp-img:hover{ transform: translateY(-2px); box-shadow: 0 12px 24px -10px rgba(20,30,45,.3); }
  .recent-card .img.alt{ background:#8aaec4; }
  .recent-card .img::before{
    content:""; position:absolute; inset:0;
    background-image: repeating-linear-gradient(180deg, rgba(0,0,0,.18) 0 1px, transparent 1px 8px);
  }
  .recent-card .img::after{
    content:""; position:absolute; inset:0;
    background-image: repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0 1px, transparent 1px 24px);
  }
  .recent-card .img .label{
    position:absolute; left:14px; top:14px; font-family:'JetBrains Mono', ui-monospace, monospace;
    font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:#fff; mix-blend-mode: difference;
  }
  .recent-card .meta{
    padding: 12px 16px 14px;
    display:flex; align-items:baseline; justify-content:space-between;
  }
  .recent-card .meta .ttl{ font-weight:600; font-size: 13px; letter-spacing:-.005em; }
  .recent-card .meta .dt{ font-size: 11px; color: var(--muted); letter-spacing:.06em; text-transform:uppercase; }


  /* ── Algemeen sectie ── */
  .grid-alg-1{
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: var(--h-m);
  }
  .grid-alg-2{
    grid-template-columns: 1fr 2fr;
    grid-template-rows: var(--h-m);
  }
  .grid-alg-2 .card{
    height: 100%;
  }
  .chart-card .chart-title{
    text-align:center; font-size:14px; font-weight:600; color:var(--ink-2); margin-bottom: 10px;
  }
  .chart-svg{ width: 100%; height: 100%; display:block; }
  .chart-card{ display: flex; flex-direction: column; }
  .axis-label{ font-size: 10px; fill: var(--muted); letter-spacing:.04em; font-family:'Inter', Helvetica, Arial, sans-serif; font-weight: 500; }
  .bar{ fill: #5b8fa8; transition: fill .15s ease; }
  .bar:hover{ fill: #3d6e8a; }
  .bar-bg{ fill: #dde8ef; }

  .duo-stat{ display:flex; flex-direction: column; gap: 2px; }
  .duo-stat .row{
    display:flex; align-items:baseline; justify-content:space-between;
    padding: 8px 4px; border-top: 1px solid var(--line);
  }
  .duo-stat .row:first-of-type{ border-top: 0; padding-top: 4px; }
  .duo-stat .row .lbl{ font-size: 11px; letter-spacing:.16em; text-transform:uppercase; color: var(--muted); }
  .duo-stat .row .num{ font-size: 32px; font-weight: 700; letter-spacing:-.03em; }

  .phase-legend{
    list-style: none; padding: 0; margin: 0;
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px 20px;
    border-top: 1px solid var(--line); padding-top: 10px;
    flex-shrink: 0;
    min-height: 130px;
  }
  .phase-legend li{
    display:flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted);
    font-family: 'Inter', sans-serif;
  }
  .phase-legend li b{
    font-family: 'Inter', sans-serif; font-weight: 700; color: var(--ink);
    font-size: 10px; letter-spacing: .06em; min-width: 22px; flex-shrink: 0;
  }
  .phase-legend li span{ font-family: 'Inter', sans-serif; letter-spacing: 0; font-size: 11px; }

  /* chart-card: vaste verdeling — grafiek neemt resterende ruimte, legenda altijd onderaan */
  .chart-card{ display: flex; flex-direction: column; }
  .chart-card .chart-svg-wrap{
    flex: 1; min-height: 0;
    display: flex; align-items: stretch;
  }
  .chart-card .chart-svg-wrap svg{ width: 100%; height: 100%; }


  /* ── Locatie sectie ── */
  .grid-loc{ grid-template-columns: 1fr 1fr 1fr; grid-template-rows: var(--h-m); }

  .loc-split{ display:grid; grid-template-rows: 1fr 1fr; gap: 6px; }
  .loc-split .cell{ padding: 10px 4px; }
  .loc-split .cell + .cell{ border-top: 1px solid var(--line); }
  .loc-split .lbl{ font-size: 11px; letter-spacing:.16em; text-transform:uppercase; color: var(--muted); }
  .loc-split .num{ font-size: 56px; font-weight:700; letter-spacing:-.03em; line-height:1.05; }

  .footer{ margin-top: 36px; display:flex; justify-content:space-between; align-items:center; font-size:11px; color: var(--muted); letter-spacing:.06em; }


  /* ── Metrage sectie ── */
  .grid-metrage{
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: var(--h-s) var(--h-s);
    align-items: stretch;
  }
  .grid-metrage .type-prog{ grid-column: 1; grid-row: 1 / span 2; display:flex; flex-direction:column; }
  .grid-metrage .stat{ padding: 18px 22px; }
  .grid-metrage .stat .num{ font-size: 40px; line-height: 1.05; letter-spacing: -.02em; }
  .grid-metrage > .card:not(.type-prog){ display: flex; flex-direction: column; justify-content: space-between; }
  .type-prog .chart-title{ text-align:center; font-size:12px; font-weight:600; color:var(--ink-2); margin-bottom: 6px; }
  .type-prog .chart-svg{ flex:1; min-height: 200px; }


  /* ── Grootste gebouw + BVO lijst ── */
  .grid-bvo{
    grid-template-columns: 1fr 2fr;
  }
  .bvo-list{
    display:grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  }
  .bvo-card{
    background: var(--card); border-radius: 14px; box-shadow: var(--shadow);
    border: 1px solid rgba(255,255,255,.6);
    padding: 14px 14px 12px;
    display: flex; flex-direction: column;
  }
  .bvo-card .ftn{ font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
  .bvo-card .ttl{ font-size: 14px; font-weight: 600; margin-top: 2px; }
  .bvo-card .tot{
    font-size: 22px; font-weight: 700; letter-spacing: -.02em; margin-top: 8px;
    border-bottom: 1px solid var(--line); padding-bottom: 10px;
  }
  .bvo-card .top3{
    list-style: none; padding: 0; margin: 8px 0 0; display: flex; flex-direction: column; gap: 4px;
  }
  .bvo-card .top3 li{
    display: grid; grid-template-columns: 16px 1fr auto; align-items: baseline; gap: 6px;
    font-size: 11px;
  }
  .bvo-card .top3 .rk{ color: var(--muted); font-variant-numeric: tabular-nums; }
  .bvo-card .top3 .nm{ font-weight: 600; letter-spacing: .03em; text-transform: uppercase; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bvo-card .top3 .nm a{ color: var(--ink); text-decoration: none; transition: color .15s ease; }
  .bvo-card .top3 .nm a:hover{ color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
  .recent-card .meta .ttl a{ color: inherit; text-decoration: none; transition: color .15s ease; }
  .recent-card .meta .ttl a:hover{ color: var(--accent); }
  .bvo-card .top3 .v{ font-variant-numeric: tabular-nums; font-size: 10px; color: var(--ink); }

  .grootste-gebouw .bg-img{
    width:100%; aspect-ratio: 16/10; border-radius: 12px; overflow:hidden; position:relative;
    background:#8aaec4; margin-bottom: 12px;
    display: block; cursor: pointer;
    transition: transform .2s ease, box-shadow .2s ease;
  }
  .grootste-gebouw a.bg-img:hover{ transform: translateY(-2px); box-shadow: 0 12px 24px -10px rgba(20,30,45,.3); }
  .grootste-gebouw .bg-img::before{
    content:""; position:absolute; inset:0;
    background-image: repeating-linear-gradient(180deg, rgba(0,0,0,.18) 0 1px, transparent 1px 8px);
  }
  .grootste-gebouw .bg-img::after{
    content:""; position:absolute; inset:0;
    background-image: repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0 1px, transparent 1px 24px);
  }
  .grootste-gebouw .bg-img .label{
    position:absolute; left:14px; top:14px; font-family:'JetBrains Mono', ui-monospace, monospace;
    font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:#fff; mix-blend-mode: difference;
  }


  /* ── Mobiliteit & ratio ── */
  .grid-mob-ratio{
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: var(--h-m);
  }
  .grid-mob-ratio .mob-col{ display:grid; gap: 14px; grid-auto-rows: 1fr; }

  @media (max-width: 980px){
    .grid-data, .grid-alg-1, .grid-loc, .grid-metrage, .grid-mob-ratio{ grid-template-columns: 1fr 1fr; }
    .grid-alg-2, .grid-bvo{ grid-template-columns: 1fr; }
    .grid-metrage .type-prog{ grid-column: 1 / -1; grid-row: auto; }
  }
  @media (max-width: 620px){
    .grid-data, .grid-alg-1, .grid-loc, .grid-metrage, .grid-mob-ratio{ grid-template-columns: 1fr; }
    .page{ padding: 24px 16px 64px; }
    .stat .num, .loc-split .num{ font-size: 44px; }
    .bvo-list{ grid-template-columns: repeat(2, 1fr); }
  }

  /* ── Fase modal ── */
  .fase-backdrop{
    position:fixed; inset:0; background:rgba(26,35,50,.35); z-index:200;
    backdrop-filter:blur(6px); animation:fadeIn .2s ease;
  }
  .fase-modal{
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:201; background:var(--card); border-radius:var(--radius);
    box-shadow:0 24px 64px -12px rgba(26,35,50,.22), 0 1px 3px rgba(26,35,50,.08);
    border:1px solid rgba(255,255,255,.6);
    width:min(680px, 94vw); height:min(600px, 90vh);
    display:flex; flex-direction:column; overflow:hidden;
    animation:slideUp .25s ease;
  }
  @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
  @keyframes slideUp{ from{opacity:0;transform:translate(-50%,-46%)} to{opacity:1;transform:translate(-50%,-50%)} }
  .fase-modal-header{
    padding:20px 24px 16px; border-bottom:1px solid var(--line);
    display:flex; align-items:flex-start; justify-content:space-between; flex-shrink:0;
    background:var(--card);
  }
  .fase-modal-label{
    font-size:9px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--accent); font-weight:700; margin-bottom:3px;
  }
  .fase-modal-header h2{ font-size:20px; font-weight:700; letter-spacing:-.02em; margin:0 0 3px; color:var(--ink); }
  .fase-modal-header .count{ font-size:12px; color:var(--muted); }
  .fase-modal-close{
    background:none; border:1px solid var(--line); border-radius:999px;
    width:28px; height:28px; font-size:16px; cursor:pointer; color:var(--muted);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    transition:all .15s ease; font-family:inherit;
  }
  .fase-modal-close:hover{ background:var(--line); color:var(--ink); }
  .fase-modal-body{ overflow-y:auto; padding:4px 0; flex:1; min-height:0; }
  .fase-empty{ padding:48px; text-align:center; color:var(--muted); font-size:14px; }
  .fase-empty-icon{ font-size:32px; margin-bottom:12px; }

  /* ── Projecten-overzicht modal ── */
  .pov-modal{
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:201; background:var(--card); border-radius:20px;
    box-shadow:0 24px 64px -12px rgba(17,20,24,.3);
    width:min(740px, 96vw); max-height:85vh;
    display:flex; flex-direction:column; overflow:hidden;
    animation:slideUp .25s ease;
  }
  .pov-header{
    padding:24px 28px 16px; border-bottom:1px solid var(--line);
    display:flex; align-items:flex-start; justify-content:space-between; flex-shrink:0;
  }
  .pov-header h2{ font-size:20px; font-weight:700; letter-spacing:-.02em; margin:0 0 2px; }
  .pov-header .sub{ font-size:12px; color:var(--muted); }
  .pov-body{ overflow-y:auto; padding:0 0 12px; }
  .pov-week{
    padding:14px 28px 6px; font-size:10px; letter-spacing:.18em; text-transform:uppercase;
    font-weight:700; color:var(--muted); display:flex; align-items:center; gap:10px;
    position:sticky; top:0; background:var(--card); z-index:1; border-bottom:1px solid var(--line);
  }
  .pov-week-badge{
    display:inline-flex; align-items:center; gap:4px;
    padding:2px 9px; border-radius:999px; font-size:10px; font-weight:700;
    letter-spacing:.06em;

/* ============================================================
   📁 widgets/charts/BarChart.js
   ============================================================ */

/* ============================================================
   BarChart — staafdiagram (SVG, monochroom)
   Props:
     data          [{ label, v }]
     height        number (px, default 180)
     gap           number (px tussen balken, default 10)
     showLabels    boolean (x-as labels, default true)
     padTop        number (ruimte boven, default 14)
     hoverPalette  [string] (kleuren bij hover, optioneel)
     onBarClick    fn(d) (klik op balk, optioneel)
   ============================================================ */
function BarChart({ data, height = 180, gap = 10, showLabels = true, padTop = 14, hoverPalette, onBarClick }) {
  const w = 320;
  const h = height;
  const padBottom = showLabels ? 24 : 8;
  const innerW = w - 16;
  const max = Math.max(...data.map(d => d.v));
  const bw = (innerW - gap * (data.length - 1)) / data.length;
  const chartH = h - padBottom - padTop;
  const [hov, setHov] = React.useState(null);
  const [mounted, setMounted] = React.useState(false);
  React.useEffect(() => { const t = requestAnimationFrame(() => setMounted(true)); return () => cancelAnimationFrame(t); }, []);

  return (
    <svg className="chart-svg" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="xMidYMax meet"
         style={{ width: '100%', height: '100%', display: 'block' }}
         onMouseLeave={() => setHov(null)}>
      {data.map((d, i) => {
        const bh = (d.v / max) * chartH;
        const x = 8 + i * (bw + gap);
        const y = padTop + (chartH - bh);
        const baseY = padTop + chartH;
        const isHov = hov === i;
        const hoverFill = hoverPalette ? hoverPalette[i % hoverPalette.length] : '#7aaec6';
        const fill = isHov ? hoverFill : '#5b8fa8';
        // Animate bar growing from bottom using clipPath trick via transform origin
        const animStyle = {
          fill,
          transition: `fill .15s ease, transform .55s cubic-bezier(.22,.68,0,1.2) ${i * 50}ms`,
          transformOrigin: `${x + bw / 2}px ${baseY}px`,
          transform: mounted ? 'scaleY(1)' : 'scaleY(0)',
        };
        return (
          <g key={i} onMouseEnter={() => setHov(i)}
             onClick={() => onBarClick && onBarClick(d)}
             style={{ cursor: onBarClick ? 'pointer' : 'default' }}>
            <rect className="bar-bg" x={x} y={padTop} width={bw} height={chartH} rx="2" />
            <rect x={x} y={y} width={bw} height={bh} rx="2" style={animStyle} />
            {d.v > 0 && bh > 16 && (
              <text x={x + bw / 2} y={y + bh / 2 + 4} textAnchor="middle"
                    style={{ fontSize: 10, fontWeight: 700, fill: '#fff', fontFamily: "'Inter',sans-serif", pointerEvents: 'none',
                             opacity: mounted ? 1 : 0, transition: `opacity .3s ease ${i * 50 + 400}ms` }}>
                {d.v}
              </text>
            )}
            {d.v > 0 && bh <= 16 && (
              <text x={x + bw / 2} y={y - 4} textAnchor="middle"
                    style={{ fontSize: 10, fontWeight: 700, fill: 'var(--ink)', fontFamily: "'Inter',sans-serif", pointerEvents: 'none',
                             opacity: mounted ? 1 : 0, transition: `opacity .3s ease ${i * 50 + 400}ms` }}>
                {d.v}
              </text>
            )}
            {showLabels && (
              <text className="axis-label" x={x + bw / 2} y={h - 8} textAnchor="middle">{d.label}</text>
            )}
          </g>
        );
      })}
    </svg>
  );
}

/* ============================================================
   📁 widgets/charts/Donut.js
   ============================================================ */

/* ============================================================
   Donut — taartdiagram (SVG, monochroom)
   Props:
     data    [{ label, v }]
     height  number (px, default 180)
   ============================================================ */
function Donut({ data, height = 180 }) {
  const w = 320, h = height;
  const cx = w / 2, cy = h / 2;
  const baseR = Math.min(w, h) / 2 - 22;
  const hoverR = baseR + 8;
  const total = data.reduce((s, d) => s + d.v, 0);
  const [hovered, setHovered] = React.useState(null);
  const shades = ['#3a6b87', '#5b8fa8', '#7aaec6', '#a0c8dc', '#ccdfe9'];

  let acc = 0;
  const slices = data.map((d, i) => {
    const start = (acc / total) * Math.PI * 2 - Math.PI / 2;
    acc += d.v;
    const end = (acc / total) * Math.PI * 2 - Math.PI / 2;
    const mid = (start + end) / 2;
    const pct = Math.round((d.v / total) * 100);
    return { d, i, start, end, mid, pct };
  });

  const arcPath = (start, end, r) => {
    const large = (end - start) > Math.PI ? 1 : 0;
    const x1 = cx + Math.cos(start) * r;
    const y1 = cy + Math.sin(start) * r;
    const x2 = cx + Math.cos(end) * r;
    const y2 = cy + Math.sin(end) * r;
    return `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
  };

  const hov = hovered != null ? slices[hovered] : null;

  return (
    <svg className="chart-svg" viewBox={`0 0 ${w} ${h}`}
         onMouseLeave={() => setHovered(null)}>
      {slices.map((s) => {
        const r = hovered === s.i ? hoverR : baseR;
        return (
          <path key={s.i} d={arcPath(s.start, s.end, r)}
                fill={shades[s.i % shades.length]}
                style={{ transition: 'd .18s ease', cursor: 'pointer' }}
                onMouseEnter={() => setHovered(s.i)} />
        );
      })}
      <circle cx={cx} cy={cy} r={baseR * 0.55} fill="#ffffff" pointerEvents="none" />
      {!hov && (
        <g pointerEvents="none">
          <text x={cx} y={cy - 2} textAnchor="middle" className="axis-label" style={{ fontSize: 9, fill: '#6b7480' }}>TOTAAL</text>
          <text x={cx} y={cy + 16} textAnchor="middle" style={{ fontSize: 18, fontWeight: 700, fill: '#1a2332' }}>{total}</text>
        </g>
      )}
      {hov && (
        <g pointerEvents="none">
          <text x={cx} y={cy - 4} textAnchor="middle" style={{ fontSize: 11, fontWeight: 600, fill: '#2a2f36' }}>
            {hov.d.label}
          </text>
          <text x={cx} y={cy + 18} textAnchor="middle" style={{ fontSize: 22, fontWeight: 700, fill: '#1a2332', letterSpacing: '-0.02em' }}>
            {hov.pct}%
          </text>
        </g>
      )}
    </svg>
  );
}

/* ============================================================
   📁 widgets/charts/RankList.js
   ============================================================ */

/* ============================================================
   RankList — genummerde ranglijst met optionele breakdown-balk
   Props:
     items           [{ name, score, breakdown? }]
     suffix          string (bijv. " m²")
     breakdown       boolean (hover-balk tonen)
     scoreFormatter  fn(v) → string
     linkProjects    boolean (links naar project_page)
     linkEmployees   boolean (links naar employees)
     onItemClick     fn(name)
   ============================================================ */
function RankList({ items, suffix, breakdown, scoreFormatter, linkProjects = false, linkEmployees = false, onItemClick }) {
  const [open, setOpen] = React.useState(null);
  const FUNC_COLORS = {
    wonen:       '#3a6b87',
    kantoor:     '#5b8fa8',
    shortstay:   '#8a7a3d',
    commercieel: '#3d8a6e',
    publiek:     '#6e3d8a',
    zorg:        '#8a4a4a',
    onderwijs:   '#5a4a8a',
  };
  const fmt = scoreFormatter || ((v) => v);

  return (
    <ol className={`ranklist ${breakdown ? 'with-breakdown' : ''}`}>
      {items.map((it, i) => {
        const score = it.score ?? it.v;
        const bd = breakdown && it.breakdown
          ? Object.entries(it.breakdown).filter(([_, v]) => v && v > 0)
          : null;
        const total = bd ? bd.reduce((s, [, v]) => s + v, 0) : 0;
        const isOpen = open === i;
        return (
          <li key={i} className={isOpen ? 'open' : ''}
              onMouseEnter={() => { bd && setOpen(i); }}
              onMouseLeave={() => bd && setOpen(null)}
              onClick={() => onItemClick && onItemClick(it.name)}
              style={onItemClick ? { cursor: 'pointer' } : {}}>
            <span className="rk">{i + 1}.</span>
            <span className="nm" style={onItemClick ? { color: 'var(--accent)', textDecoration: 'underline', textDecorationStyle: 'dotted' } : {}}>
              {linkProjects
                ? <a href={projectHref(it.name)}>{it.name}</a>
                : linkEmployees
                  ? <a href={`employees.html?e=${encodeURIComponent(it.name)}`}>{it.name}</a>
                  : it.name}
            </span>
            <span className="sc">{fmt(score)}{suffix || ''}</span>
            {bd && (
              <div className="breakdown">
                <div className="breakdown-bar">
                  {bd.map(([k, v]) => (
                    <div key={k} className="seg"
                         style={{ width: `${(v / total) * 100}%`, background: FUNC_COLORS[k] || '#535a63' }} />
                  ))}
                </div>
                <div className="breakdown-legend">
                  {bd.map(([k, v]) => (
                    <span key={k} className="item">
                      <span className="sw" style={{ background: FUNC_COLORS[k] || '#535a63' }}></span>
                      <span className="lb">{k}</span>
                      <span className="vl">{fmt(v)}</span>
                    </span>
                  ))}
                </div>
              </div>
            )}
          </li>
        );
      })}
    </ol>
  );
}

/* ── ProjectenOverzichtModal: alle projecten gesorteerd per week ── */
function ProjectenOverzichtModal({ onClose }) {
  const [projects, setProjects] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [profileMap, setProfileMap] = React.useState({});
  const [q, setQ] = React.useState('');

  React.useEffect(() => {
    // Sluit op Escape
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onClose]);

  React.useEffect(() => {
    (async () => {
      try {
        const { data } = await db.from('projects')
          .select('id, projectnummer, projectnaam, stad, fase, created_at, created_by')
          .order('created_at', { ascending: false });
        setProjects(data || []);

        // Haal alle profielen op voor naam-lookup
        const { data: profiles } = await db.from('profiles').select('id, naam');
        const map = {};
        (profiles || []).forEach(p => { map[p.id] = p.naam; });
        setProfileMap(map);
      } catch(e) {}
      setLoading(false);
    })();
  }, []);

  // Groepeer per week (maandag = start)
  const getWeekStart = (dateStr) => {
    const d = new Date(dateStr);
    const day = d.getDay(); // 0=zo, 1=ma, ...
    const diff = (day === 0) ? -6 : 1 - day;
    const mon = new Date(d);
    mon.setDate(d.getDate() + diff);
    mon.setHours(0,0,0,0);
    return mon;
  };

  const filtered = q.trim().length >= 2
    ? projects.filter(p =>
        (p.projectnaam||'').toLowerCase().includes(q.toLowerCase()) ||
        (p.projectnummer||'').toLowerCase().includes(q.toLowerCase()) ||
        (p.stad||'').toLowerCase().includes(q.toLowerCase()) ||
        (profileMap[p.created_by]||'').toLowerCase().includes(q.toLowerCase())
      )
    : projects;

  // Groepeer per week
  const weeks = [];
  const weekMap = {};
  filtered.forEach(p => {
    const ws = getWeekStart(p.created_at);
    const key = ws.toISOString();
    if (!weekMap[key]) {
      weekMap[key] = { start: ws, projects: [] };
      weeks.push(weekMap[key]);
    }
    weekMap[key].projects.push(p);
  });

  // Trend-badge per week t.o.v. vorige week
  const formatWeekLabel = (ws) => {
    const now = new Date();
    const thisWeekStart = getWeekStart(now.toISOString());
    const diff = Math.round((thisWeekStart - ws) / (7 * 24 * 3600 * 1000));
    if (diff === 0) return 'Deze week';
    if (diff === 1) return 'Vorige week';
    const end = new Date(ws); end.setDate(ws.getDate() + 6);
    const fmt = (d) => d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
    return `${fmt(ws)} – ${fmt(end)}`;
  };

  const totalThisWeek = weeks[0]?.projects.length || 0;
  const totalLastWeek = weeks[1]?.projects.length || 0;

  return ReactDOM.createPortal(
    <>
      <div className="fase-backdrop" onClick={onClose} />
      <div className="pov-modal">
        <div className="pov-header">
          <div>
            <div className="fase-modal-label">Overzicht</div>
            <h2>Ingevulde projecten</h2>
            <div className="sub">
              {projects.length} projecten totaal
              {totalThisWeek > 0 && (
                <span style={{marginLeft:10}}>
                  · deze week: <b>{totalThisWeek}</b>
                  {totalLastWeek > 0 && (
                    <span style={{
                      marginLeft:6, fontSize:11, fontWeight:700, padding:'1px 7px',
                      borderRadius:999, display:'inline-block',
                      background: totalThisWeek > totalLastWeek ? 'rgba(34,139,84,.12)' : totalThisWeek < totalLastWeek ? 'rgba(180,60,60,.12)' : 'rgba(100,110,130,.1)',
                      color: totalThisWeek > totalLastWeek ? '#1a7a4a' : totalThisWeek < totalLastWeek ? '#b43c3c' : 'var(--muted)',
                    }}>
                      {totalThisWeek > totalLastWeek ? '▲' : totalThisWeek < totalLastWeek ? '▼' : '='}
                      {' '}{Math.abs(totalThisWeek - totalLastWeek)} t.o.v. vorige week
                    </span>
                  )}
                </span>
              )}
            </div>
          </div>
          <button className="fase-modal-close" onClick={onClose}>×</button>
        </div>

        <div className="pov-search">
          <input
            type="search"
            placeholder="Zoek op naam, nummer, stad of persoon…"
            value={q}
            onChange={e => setQ(e.target.value)}
            autoComplete="off"
          />
        </div>

        <div className="pov-body">
          {loading && (
            <div style={{padding:48, textAlign:'center', color:'var(--muted)', fontSize:13}}>Laden…</div>
          )}
          {!loading && weeks.length === 0 && (
            <div style={{padding:48, textAlign:'center', color:'var(--muted)', fontSize:13}}>Geen projecten gevonden.</div>
          )}
          {!loading && weeks.map((week, wi) => {
            const prevCount = weeks[wi + 1]?.projects.length;
            const thisCount = week.projects.length;
            const badge = prevCount == null ? 'neutral'
              : thisCount > prevCount ? 'up'
              : thisCount < prevCount ? 'down'
              : 'neutral';
            const badgeIcon = badge === 'up' ? '▲' : badge === 'down' ? '▼' : '=';
            const badgeLabel = prevCount != null
              ? `${badgeIcon} ${Math.abs(thisCount - prevCount)} t.o.v. week ervoor`
              : `${thisCount} project${thisCount !== 1 ? 'en' : ''}`;

            return (
              <div key={week.start.toISOString()}>
                <div className="pov-week">
                  {formatWeekLabel(week.start)}
                  <span style={{marginLeft:4, color:'var(--ink)', fontWeight:800}}>{thisCount}</span>
                  <span className={`pov-week-badge ${badge}`}>{badgeLabel}</span>
                </div>
                {week.projects.map(p => (
                  <a key={p.id}
                     className="pov-row"
                     href={`project_page.html?nr=${encodeURIComponent(p.projectnummer||'')}&p=${encodeURIComponent(p.projectnaam||'')}`}>
                    <span className="pov-num">{p.projectnummer || '—'}</span>
                    <span className="pov-name">{p.projectnaam}</span>
                    <span className="pov-meta">{p.stad || ''}</span>
                    <span className="pov-by">{profileMap[p.created_by] ? '👤 ' + profileMap[p.created_by] : ''}</span>
                    <span className="pov-fase">{p.fase || ''}</span>
                  </a>
                ))}
              </div>
            );
          })}
        </div>
      </div>
    </>,
    document.body
  );
}

/* ── useCountUp: telt een getal op van 0 naar target ── */
function useCountUp(target, duration = 900) {
  const [val, setVal] = React.useState(0);
  const prev = React.useRef(0);
  React.useEffect(() => {
    if (target === 0 || target == null) { setVal(0); return; }
    const start = prev.current;
    const end = typeof target === 'number' ? target : parseInt(String(target).replace(/\D/g,'')) || 0;
    if (start === end) return;
    const startTime = performance.now();
    const tick = (now) => {
      const p = Math.min((now - startTime) / duration, 1);
      const ease = 1 - Math.pow(1 - p, 3); // cubic ease-out
      setVal(Math.round(start + (end - start) * ease));
      if (p < 1) requestAnimationFrame(tick);
      else { prev.current = end; setVal(end); }
    };
    requestAnimationFrame(tick);
  }, [target]);
  return val;
}

/* ── AantalProjecten: grote teller bovenlinks (klikbaar) ── */

  const twoWeeksAgo = new Date(now); twoWeeksAgo.setDate(now.getDate() - 14);

  const lastWeek = allProjects.filter(p => {

  const deltaColor = delta > 0 ? '#1a7a4a' : delta < 0 ? '#b43c3c' : 'var(--muted)';

  return (
    <>

/* ── ClickableDonut: donut waarbij segmenten klikbaar zijn ── */
function ClickableDonut({ data, shades, selected, onSegmentClick, onSegmentHover }) {
  const w = 320, h = 280;
  const cx = w / 2, cy = h / 2;
  const baseR = Math.min(w, h) / 2 - 18;
  const hoverR = baseR + 8;
  const total = data.reduce((s, d) => s + d.v, 0);
  const [hovered, setHovered] = React.useState(null);

  const handleEnter = (label) => { setHovered(label); onSegmentHover && onSegmentHover(label); };
  const handleLeave = () => { setHovered(null); onSegmentHover && onSegmentHover(null); };

  let acc = 0;
  const slices = data.map((d, i) => {
    const start = (acc / total) * Math.PI * 2 - Math.PI / 2;
    acc += d.v;
    const end = (acc / total) * Math.PI * 2 - Math.PI / 2;
    const mid = (start + end) / 2;
    const pct = Math.round((d.v / total) * 100);
    return { d, i, start, end, mid, pct };
  });

  const arcPath = (start, end, r) => {
    const large = (end - start) > Math.PI ? 1 : 0;
    const x1 = cx + Math.cos(start) * r;
    const y1 = cy + Math.sin(start) * r;
    const x2 = cx + Math.cos(end) * r;
    const y2 = cy + Math.sin(end) * r;
    return `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
  };

  return (
    <svg className="chart-svg" viewBox={`0 0 ${w} ${h}`} onMouseLeave={handleLeave}>
      {slices.map((s) => {
        const isSelected = selected === s.d.label;
        const isHov = hovered === s.d.label;
        const r = (isHov || isSelected) ? hoverR : baseR;
        return (
          <path key={s.i} d={arcPath(s.start, s.end, r)}
                fill={shades[s.i % shades.length]}
                opacity={selected && !isSelected ? 0.35 : 1}
                style={{ transition: 'opacity .2s, d .18s ease', cursor: 'pointer' }}
                onMouseEnter={() => handleEnter(s.d.label)}
                onClick={() => onSegmentClick(s.d.label)} />
        );
      })}
      <circle cx={cx} cy={cy} r={baseR * 0.55} fill="#ffffff" pointerEvents="none" />
      <g pointerEvents="none">
        {hovered ? (
          <>
            <text x={cx} y={cy - 4} textAnchor="middle" style={{ fontSize: 11, fontWeight: 600, fill: '#2a2f36' }}>{hovered}</text>
            <text x={cx} y={cy + 18} textAnchor="middle" style={{ fontSize: 22, fontWeight: 700, fill: '#1a2332', letterSpacing: '-0.02em' }}>
              {Math.round((data.find(d => d.label === hovered)?.v || 0) / total * 100)}%
            </text>
          </>
        ) : (
          <>
            <text x={cx} y={cy - 2} textAnchor="middle" className="axis-label" style={{ fontSize: 9, fill: '#6b7480' }}>TOTAAL</text>
            <text x={cx} y={cy + 16} textAnchor="middle" style={{ fontSize: 18, fontWeight: 700, fill: '#1a2332' }}>{total}</text>
          </>
        )}
      </g>
    </svg>
  );
}

/* ── VeldenDezeWeek: ingevulde velden deze week vs vorige week ── */
function VeldenDezeWeek({ allProjects }) {
  // Alle velden die meetellen (alles behalve metadata)
  const VELDEN = [
    'projectnummer','projectnaam','alternatieve_naam',
    'opgave','project_type','functie','verkregen_dmv','fase','projectmap',
    'land','provincie','stad','straat','huisnummer','postcode',
    'opdrachtgever','gedelegeerd_opdrachtgever','contactpersoon','telefoon','email',
    'totaal_bvo','m_wonen','m_kantoor','m_commercieel','m_shortstay','m_publiek','m_onderwijs',
    'autoparkeren','fietsparkeren','ratio_wonen',
    'npg_score','daktuin','zonnepanelen','duurzaamheidslabel',
    'bouwhoogte','tevredenheid','awards','opleverdatum',
  ];

  const now = new Date();
  const weekAgo     = new Date(now); weekAgo.setDate(now.getDate() - 7);
  const twoWeeksAgo = new Date(now); twoWeeksAgo.setDate(now.getDate() - 14);

  const countFields = (projects) =>
    projects.reduce((sum, p) =>
      sum + VELDEN.filter(k => p[k] != null && p[k] !== '').length, 0);

  const thisWeekProjects = allProjects.filter(p => new Date(p.created_at) >= weekAgo);
  const lastWeekProjects = allProjects.filter(p => {
    const d = new Date(p.created_at);
    return d >= twoWeeksAgo && d < weekAgo;
  });

  const thisCount = countFields(thisWeekProjects);
  const lastCount = countFields(lastWeekProjects);
  const delta = thisCount - lastCount;
  const deltaColor = delta > 0 ? '#1a7a4a' : delta < 0 ? '#b43c3c' : 'var(--muted)';
  const deltaSign  = delta > 0 ? '+' : '';

  const animThis = useCountUp(thisCount);
  const animLast = useCountUp(lastCount);

  return (
    <div className="card duo-stat">
      <h3>Ingevulde velden</h3>
      <div className="row">
        <span className="lbl">Deze week</span>
        <span className="num num-animate" style={{ fontSize: thisCount > 999 ? 26 : 32 }}>{animThis}</span>
      </div>
      <div className="row">
        <span className="lbl">Vorige week</span>
        <span style={{ display:'flex', alignItems:'baseline', gap:8 }}>
          <span className="num num-animate" style={{ fontSize: lastCount > 999 ? 26 : 32 }}>{animLast}</span>
          {delta !== 0 && lastCount > 0 && (
            <span style={{ fontSize:11, fontWeight:700, color:deltaColor }}>
              {deltaSign}{delta}
            </span>
          )}
        </span>
      </div>
    </div>
  );
}

/* ── MetraagStat: herbruikbare metrage kaart met icoon en accentbalk ── */
function MetraagStat({ titel, waarde, icoon, kleur, sublabel }) {
  return (
    <div className="card stat" style={{ position: 'relative', overflow: 'hidden', padding: '20px 22px 16px' }}>
      {/* Kleuraccent linksboven */}
      <div style={{
        position: 'absolute', top: 0, left: 0, width: 4, height: '100%',
        background: kleur, borderRadius: '16px 0 0 16px',
      }} />
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 10 }}>
        <h3 style={{ textAlign: 'left', margin: 0 }}>{titel}</h3>
        <span style={{
          fontSize: 22, lineHeight: 1,
          background: kleur + '18', borderRadius: 10, padding: '6px 8px',
        }}>{icoon}</span>
      </div>
      <div style={{ fontSize: 36, fontWeight: 700, letterSpacing: '-.03em', lineHeight: 1.1, color: 'var(--ink)' }}>
        {fmtM2(waarde)}
      </div>
      {sublabel && (
        <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 6, letterSpacing: '.04em' }}>{sublabel}</div>
      )}
    </div>
  );
}

function TotaalGerealiseerd({ waarde }) {

function BvoKaartje({ row }) {

      <div className="tot">{row.totaal}</div>

/* ============================================================

   S = 1 kolom × 160px   (kleine stat)
   M = 2 kolommen × 300px (standaard)

   XL = 3 kolommen × 480px (kaart / ranglijst)

   ============================================================ */
const SIZES = {
  S:  { col: 1, h: 160,  label: 'S',  desc: 'Klein'   },
  M:  { col: 2, h: 247,  label: 'M',  desc: 'Middel'  },
  L:  { col: 3, h: 508,  label: 'L',  desc: 'Groot'   },
  XL: { col: 3, h: 508,  label: 'XL', desc: 'Groot'   },
};

// Default grootte per widget-type
const DEFAULT_SIZE = {
  'aantal-projecten': 'S', 'random-project': 'M', 'leaderboard': 'M',
  'recent-1': 'M', 'recent-2': 'M', 'projecttype': 'M', 'functie': 'M',
  'verkregen': 'M', 'ontwerp-opgeleverd': 'S', 'fases': 'L',
  'binnen-buiten': 'S', 'top-provincies': 'M', 'top-steden': 'M',
  'type-programma': 'M', 'totaal-bvo': 'S', 'grootste-gebouw': 'M',
  'bvo-lijst': 'L', 'autoparkeren': 'M', 'fietsparkeren': 'M',

function getSize(sizeKey) { return SIZES[sizeKey] || SIZES.M; }

/* ── SizePicker: kies S / M / L / XL ── */
function SizePicker({ id, current, onSetSize, onClose }) {
  return (
    <div onClick={e => e.stopPropagation()} style={{
      position:'absolute', top:42, right:0, zIndex:300,
      background:'#fff', borderRadius:14, padding:'12px 14px',
      boxShadow:'0 12px 40px -8px rgba(20,30,45,.28)',
      border:'1px solid rgba(17,20,24,.08)', minWidth:200,
    }}>
      <div style={{fontSize:9,fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',
        color:'var(--muted)',marginBottom:8}}>Formaat</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
        {Object.entries(SIZES).map(([key, sz]) => (
          <button key={key} onClick={() => { onSetSize(id, key); onClose(); }} style={{
            padding:'8px 10px', borderRadius:10, border:'1.5px solid',
            borderColor: current===key ? 'var(--ink)' : 'var(--line)',
            background: current===key ? 'var(--ink)' : '#fafafa',
            color: current===key ? '#fff' : 'var(--ink)',
            cursor:'pointer', fontFamily:'inherit', textAlign:'left',
            transition:'all .12s',
          }}>
            <div style={{fontSize:13,fontWeight:800}}>{sz.label}</div>
            <div style={{fontSize:10,opacity: current===key ? .7 : .5, marginTop:1}}>{sz.desc}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

/* ── WidgetCell — top-level component, stabiele hooks ── */
function WidgetCell({ id, sizeKey, editMode, onDragStart, onDragOver, onDrop, onDragEnd, onRemove, onSetSize, renderWidget }) {
  const [pickerOpen, setPickerOpen] = React.useState(false);
  const [dragOver, setDragOver]     = React.useState(false);
  const cellRef = React.useRef(null);

  React.useEffect(() => {
    if (!pickerOpen) return;
    const handler = (e) => {
      if (cellRef.current && !cellRef.current.contains(e.target)) setPickerOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [pickerOpen]);

  const sz = getSize(sizeKey);

  return (
    <div
      ref={cellRef}
      draggable={editMode}
      onDragStart={(e) => { e.dataTransfer.effectAllowed = 'move'; onDragStart(id); }}
      onDragOver={(e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; if (editMode) setDragOver(true); }}
      onDragLeave={() => setDragOver(false)}
      onDrop={(e) => { e.preventDefault(); setDragOver(false); onDrop(id); }}
      onDragEnd={() => { setDragOver(false); onDragEnd(); }}
      style={{
        gridColumn: `span ${sz.col}`,
        height: sz.h,
        position: 'relative',
        borderRadius: 16,
        transition: 'height .25s ease',
        // Geen stippellijnen — subtiele ring alleen bij dragover
        boxShadow: dragOver
          ? '0 0 0 2px var(--accent), 0 8px 32px -8px rgba(78,125,156,.25)'
          : editMode
            ? '0 0 0 1.5px rgba(78,125,156,.18)'
            : 'none',
      }}>

      {/* Widget inhoud */}
      <div style={{ height:'100%', overflow:'hidden', borderRadius:16,
        pointerEvents: editMode ? 'none' : 'auto' }}>
        {renderWidget(id)}
      </div>

      {/* Edit overlay — alleen in editMode */}
      {editMode && (
        <div style={{ position:'absolute', inset:0, zIndex:10, borderRadius:16,
          background:'rgba(17,20,24,.04)', cursor:'grab' }}>

          {/* Knoppen rechtsboven */}
          <div style={{ position:'absolute', top:8, right:8, display:'flex', gap:4 }}>
            <button
              onMouseDown={e => e.stopPropagation()}
              onClick={(e) => { e.stopPropagation(); setPickerOpen(v => !v); }}
              title="Formaat"
              style={{
                height:26, padding:'0 10px', borderRadius:999,
                background:'rgba(255,255,255,.95)', border:'1px solid rgba(17,20,24,.12)',
                cursor:'pointer', display:'flex', alignItems:'center', gap:4,
                fontSize:10, fontWeight:700, color:'var(--ink)',
                boxShadow:'0 1px 4px rgba(0,0,0,.08)', fontFamily:'inherit',
                letterSpacing:'.04em',
              }}>
              <span style={{fontSize:12}}>⤡</span> {sz.label}
            </button>
            <button
              onMouseDown={e => e.stopPropagation()}
              onClick={() => onRemove(id)}
              title="Verbergen"
              style={{
                width:26, height:26, borderRadius:999,
                background:'rgba(180,60,60,.88)', border:'none', color:'#fff',
                cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:15, boxShadow:'0 1px 4px rgba(180,60,60,.3)',
              }}>×</button>
          </div>

          {/* Formaat picker */}
          {pickerOpen && (
            <SizePicker id={id} current={sizeKey} onSetSize={onSetSize} onClose={() => setPickerOpen(false)} />
          )}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   APP — HOOFDCOMPONENT
   Beheert alle state en laadt data uit Supabase.
   Rendert alle sectiecomponenten hierboven.
   ═══════════════════════════════════════════════ */
function App(){
  /* ── State: live data uit Supabase ── */
  const [liveData, setLiveData] = React.useState(null);
  const [randomProject, setRandomProject] = React.useState(null);
  /* ── State: alle ruwe projecten (voor zoeken en fase-modal) ── */
  const [allProjects, setAllProjects] = React.useState([]);
  /* ── State: fase-modal (null = gesloten, object = welke fase) ── */
  const [faseModal, setFaseModal] = React.useState(null); // { label, fullName, projects }
  /* ── State: geselecteerde periode voor filtering ── */
  const [period, setPeriod] = React.useState('all');
  /* ── State: zoekbalk ── */
  const [searchQ, setSearchQ] = React.useState('');
  const [searchOpen, setSearchOpen] = React.useState(false);
  const [networkOpen, setNetworkOpen] = React.useState(false);
  const [thumbCache, setThumbCache] = React.useState({});
  const [recentProjects, setRecentProjects] = React.useState([]);
  const searchRef = React.useRef(null);

  // Sluit dropdown als je buiten klikt
  React.useEffect(() => {
    const handler = (e) => {
      if (searchRef.current && !searchRef.current.contains(e.target)) setSearchOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  // Zoekresultaten — filter op naam, stad, fase, projectnummer
  const searchResults = React.useMemo(() => {
    const q = searchQ.toLowerCase().trim();
    if (!q || q.length < 2) return [];
    return allProjects.filter(p =>
      (p.projectnaam || '').toLowerCase().includes(q) ||
      (p.stad || '').toLowerCase().includes(q) ||
      (p.fase || '').toLowerCase().includes(q) ||
      (p.projectnummer || '').toLowerCase().includes(q) ||
      (p.project_type || '').toLowerCase().includes(q)
    ).slice(0, 8);
  }, [searchQ, allProjects]);

  // Laad thumbnail lazy voor zoekresultaat
  const getThumb = async (p) => {
    if (!p.projectnummer || thumbCache[p.projectnummer] !== undefined) return;
    setThumbCache(c => ({ ...c, [p.projectnummer]: null }));
    try {
      const imgs = await Images.getForProject(p.projectnummer);
      setThumbCache(c => ({ ...c, [p.projectnummer]: imgs[0] || null }));
    } catch(e) {}
  }; // 'all' | 'year' | 'month'

  // Filter projecten op basis van periode
  /* ── filterByPeriod: filtert projecten op opleverdatum of created_at ── */
  const filterByPeriod = (projects, p) => {
    if (p === 'all') return projects;
    const now = new Date();
    return projects.filter(proj => {
      // Gebruik opleverdatum als primair, anders created_at
      const raw = proj.opleverdatum || proj.created_at;
      if (!raw) return p === 'all';
      const d = new Date(raw);
      if (p === 'month') {
        return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
      }
      if (p === 'year') {
        return d.getFullYear() === now.getFullYear();
      }
      return true;
    });
  };

  const FASE_NAMES = {
    AQ: 'Acquisitie', SO: 'Schets Ontwerp', VO: 'Voorlopig Ontwerp',
    DO: 'Definitief Ontwerp', TO: 'Technisch Ontwerp', UO: 'Uitvoerings Ontwerp',
    UV: 'Uitvoering', OP: 'Opgeleverd',
  };
  const [liveAlgemeen, setLiveAlgemeen] = React.useState(null);
  const [liveLocatie, setLiveLocatie] = React.useState(null);
  const [liveMetrage, setLiveMetrage] = React.useState(null);
  const [liveMobiliteit, setLiveMobiliteit] = React.useState(null);
  const [liveDuurzaamheid, setLiveDuurzaamheid] = React.useState(null);
  const [liveBouw, setLiveBouw] = React.useState(null);

  // Herbereken stats als periode verandert
  React.useEffect(() => {
    if (!allProjects.length) return;
    computeStats(allProjects, period).catch(()=>{});
  }, [period, allProjects]);

  /* ── computeStats: berekent alle widgetdata uit gefilterde projecten ── */
  const computeStats = async (rawProjects, p) => {
    const projects = filterByPeriod(rawProjects, p);
    if (!projects.length) {
      setLiveData(d => d ? {...d, projectsFilled: 0, totalBvo:'0', avgBvo:'—'} : null);
      setLiveAlgemeen(null); setLiveLocatie(null); setLiveMetrage(null);
      setLiveMobiliteit(null); setLiveDuurzaamheid(null); setLiveBouw(null);
      return;
    }
    const n = projects.length;

      // Helper: tel projecten met een waarde
      const count = (key) => projects.filter(p => p[key] != null && p[key] !== '').length;
      // Helper: som van numeriek veld
      const sum = (key) => projects.reduce((a, p) => a + (parseFloat(p[key]) || 0), 0);
      // Helper: meest voorkomende waarde
      const mode = (key) => {
        const freq = {};
        projects.forEach(p => { if (p[key]) freq[p[key]] = (freq[p[key]] || 0) + 1; });
        return Object.entries(freq).sort((a,b) => b[1]-a[1])[0]?.[0] || '—';
      };

      // Leaderboard uit employees tabel (heeft echte score kolom)
      const { data: employeeRows } = await db.from('employees')
        .select('id, naam, score, projecten')
        .order('score', { ascending: false })
        .limit(10);
      const liveLeaderboard = (employeeRows || [])
        .map(p => ({ name: p.naam, score: p.score || 0, id: p.id }));

      setLiveData({
        ...MOCK.data,
        projectsFilled: n,
        totalBvo: Math.round(sum('totaal_bvo')).toLocaleString('nl-NL'),
        avgBvo: n > 0 ? Math.round(sum('totaal_bvo') / n).toLocaleString('nl-NL') : '—',
        leaderboard: liveLeaderboard.length ? liveLeaderboard : MOCK.data.leaderboard,
        recent: [...rawProjects]
          .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))

            title: p.projectnaam,
            projectnummer: p.projectnummer,
            created_at: p.created_at,
          })),
      });

      // ALGEMEEN
      // Bereken live fase-verdeling voor de balkengrafiek
      const FASE_ORDER = ['AQ','SO','VO','DO','TO','UO','UV','OP'];
      const faseCounts = {};
      projects.forEach(p => { if (p.fase) faseCounts[p.fase] = (faseCounts[p.fase]||0)+1; });
      const liveFases = FASE_ORDER.map(f => ({
        label: f,
        full: {AQ:'Acquisitie',SO:'Schets Ontwerp',VO:'Voorlopig Ontwerp',DO:'Definitief Ontwerp',
               TO:'Technisch Ontwerp',UO:'Uitvoerings Ontwerp',UV:'Uitvoering',OP:'Opgeleverd'}[f],
        v: faseCounts[f] || 0,
      }));

      setLiveAlgemeen({
        ...MOCK.algemeen,
        fases: liveFases,
        projecten: n,
        meesteFase: mode('fase'),
        meesteFunctie: mode('functie'),
        meesteType: mode('project_type'),
        meesteVerkrijging: mode('verkregen_dmv'),
        metFase: count('fase'),
        metType: count('project_type'),
      });

      // LOCATIE
      const steden = {};
      projects.forEach(p => { if (p.stad) steden[p.stad] = (steden[p.stad]||0)+1; });
      setLiveLocatie({
        ...MOCK.locatie,
        aantalSteden: Object.keys(steden).length,
        topStad: Object.entries(steden).sort((a,b)=>b[1]-a[1])[0]?.[0] || '—',
        metLocatie: count('stad'),
      });

      // METRAGE
      setLiveMetrage({
        ...MOCK.metrage,
        totaalBvo: Math.round(sum('totaal_bvo')).toLocaleString('nl-NL'),
        totaalWonen: Math.round(sum('m_wonen')).toLocaleString('nl-NL'),
        totaalKantoor: Math.round(sum('m_kantoor')).toLocaleString('nl-NL'),

        gemBvo: n > 0 ? Math.round(sum('totaal_bvo')/n).toLocaleString('nl-NL') : '—',
      });

      // MOBILITEIT
      setLiveMobiliteit({
        ...MOCK.mobiliteit,
        totaalAuto: Math.round(sum('autoparkeren')).toLocaleString('nl-NL'),
        totaalFiets: Math.round(sum('fietsparkeren')).toLocaleString('nl-NL'),
      });

      // DUURZAAMHEID
      setLiveDuurzaamheid({
        ...MOCK.duurzaamheid,
        totaalDaktuin: Math.round(sum('daktuin')).toLocaleString('nl-NL'),
        totaalZonnepanelen: Math.round(sum('zonnepanelen')).toLocaleString('nl-NL'),
        meesteLabel: mode('duurzaamheidslabel'),
      });

      // BOUW & OVERIG
      setLiveBouw({
        ...MOCK.bouwOverig,
        gemHoogte: n > 0 ? Math.round(sum('bouwhoogte')/count('bouwhoogte')||0) : '—',
        totaalAwards: Math.round(sum('awards')),
      });
  };

  React.useEffect(() => {
    Projects.getAll().then(rawProjects => {
