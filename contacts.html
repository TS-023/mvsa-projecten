<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Adressenboek · MVSA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="auth-check.js"></script>
<script src="nav.js" defer></script>
<style>
  :root{
    --bg:#eef0f3; --card:#ffffff; --ink:#1a2332; --ink-2:#2d3a4a;
    --muted:#7f8fa0; --line:#dde3ea;
    --accent:#4e7d9c; --accent-light:rgba(78,125,156,.08);
    --good:#2d8a5e; --danger:#c44040;
    --shadow:0 1px 3px rgba(26,35,50,.06),0 8px 24px -8px rgba(26,35,50,.12);
    --radius:14px;
  }
  [data-theme="dark"]{
    --bg:#111315; --card:#1e2024; --ink:#e8ecf0; --ink-2:#c8cdd4;
    --muted:#6b7078; --line:#2a2d32; --accent:#5a9ab8;
    --shadow:0 1px 3px rgba(0,0,0,.2),0 6px 16px -4px rgba(0,0,0,.3);
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--ink); font-family:'Inter',Helvetica,Arial,sans-serif; -webkit-font-smoothing:antialiased; }

  /* ── Layout ── */
  .layout{ display:grid; grid-template-columns:260px 1fr; min-height:100vh; }

  /* ── Sidebar ── */
  .sidebar{
    background:var(--card); border-right:1px solid var(--line);
    display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow:hidden;
  }
  .sidebar-head{
    padding:20px 18px 14px; border-bottom:1px solid var(--line); flex-shrink:0;
  }
  .sidebar-head h1{ margin:0; font-size:15px; font-weight:800; letter-spacing:-.01em; }
  .sidebar-head .sub{ font-size:11px; color:var(--muted); margin-top:2px; }

  /* Sector-sectie in sidebar */
  .sidebar-section{ padding:10px 12px 4px; flex-shrink:0; }
  .sidebar-label{
    font-size:10px; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
    color:var(--muted); padding:0 6px 6px;
  }
  .sector-btn{
    display:flex; align-items:center; gap:10px; width:100%;
    padding:7px 8px; border-radius:8px; border:none; background:none;
    cursor:pointer; font-family:inherit; text-align:left;
    transition:background .12s; color:var(--ink);
  }
  .sector-btn:hover{ background:var(--accent-light); }
  .sector-btn.active{ background:var(--accent-light); }
  .sector-dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .sector-name{ font-size:12px; font-weight:600; flex:1; }
  .sector-count{ font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums; }

  /* Bedrijvenlijst in sidebar */
  .sidebar-bedrijven{ flex:1; overflow-y:auto; padding:4px 12px 20px; }
  .bedrijf-btn{
    display:flex; align-items:center; gap:10px; width:100%;
    padding:8px 8px; border-radius:8px; border:none; background:none;
    cursor:pointer; font-family:inherit; text-align:left;
    transition:background .12s; color:var(--ink);
  }
  .bedrijf-btn:hover{ background:var(--accent-light); }
  .bedrijf-btn.active{ background:var(--accent-light); font-weight:700; }
  .bedrijf-logo{
    width:28px; height:28px; border-radius:6px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:800; color:#fff;
  }
  .bedrijf-info{ flex:1; min-width:0; }
  .bedrijf-naam{ font-size:12px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .bedrijf-sector{ font-size:10px; color:var(--muted); margin-top:1px; }
  .bedrijf-n{ font-size:11px; color:var(--muted); flex-shrink:0; }

  /* ── Hoofdpaneel ── */
  .main{ padding:24px 28px 80px; min-width:0; }

  /* Topbar */
  .topbar{ display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
  .crumbs{ font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); flex:1; }
  .crumbs a{ color:var(--muted); text-decoration:none; }
  .crumbs a:hover{ color:var(--ink); }
  .new-btn{
    background:var(--ink); color:#fff; border:none; border-radius:999px;
    padding:9px 18px; font-size:11px; font-weight:700; letter-spacing:.12em;
    text-transform:uppercase; cursor:pointer; transition:opacity .12s;
  }
  .new-btn:hover{ opacity:.8; }

  /* Zoekbalk + filter */
  .toolbar{ display:flex; gap:10px; align-items:center; margin-bottom:18px; flex-wrap:wrap; }
  .ab-search{
    flex:1; min-width:200px; border:1px solid var(--line); border-radius:999px;
    padding:9px 18px; font-size:13px; background:var(--card); color:var(--ink);
    outline:none; transition:border-color .15s;
  }
  .ab-search:focus{ border-color:var(--accent); box-shadow:0 0 0 3px rgba(78,125,156,.1); }
  .view-toggle{
    display:flex; gap:3px; border:1px solid var(--line); border-radius:999px;
    padding:3px; background:var(--card);
  }
  .vtoggle-btn{
    padding:5px 12px; border-radius:999px; border:none; cursor:pointer;
    font-size:12px; font-weight:600; background:none; color:var(--muted); transition:all .12s;
  }
  .vtoggle-btn.active{ background:var(--ink); color:#fff; }

  /* Actieve filter badge */
  .active-filter-bar{ display:flex; align-items:center; gap:8px; margin-bottom:14px; }
  .filter-badge{
    display:inline-flex; align-items:center; gap:6px;
    padding:4px 12px; border-radius:999px; font-size:11px; font-weight:700;
    background:var(--accent-light); border:1px solid rgba(78,125,156,.2); color:var(--accent);
  }
  .filter-badge button{ background:none; border:none; cursor:pointer; color:var(--accent); font-size:13px; line-height:1; padding:0; }

  /* Grid */
  .cards-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; }

  /* Visitekaartje */
  .vcard{
    background:var(--card); border-radius:var(--radius); padding:18px;
    border:1px solid rgba(255,255,255,.6); box-shadow:var(--shadow);
    cursor:pointer; transition:box-shadow .15s,transform .15s;
    display:flex; flex-direction:column; gap:12px;
  }
  .vcard:hover{ box-shadow:0 4px 20px rgba(26,35,50,.14); transform:translateY(-2px); }
  .vcard-top{ display:flex; align-items:center; gap:12px; }
  .vcard-avatar{
    width:44px; height:44px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:800; color:#fff;
  }
  .vcard-avatar img{ width:100%; height:100%; border-radius:50%; object-fit:cover; }
  .vcard-naam{ font-weight:700; font-size:14px; letter-spacing:-.01em; }
  .vcard-bedrijf{ font-size:11px; color:var(--muted); margin-top:2px; }
  .vcard-rol{
    display:inline-block; padding:3px 10px; border-radius:999px;
    font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    background:var(--accent-light); border:1px solid rgba(78,125,156,.2); color:var(--accent);
  }
  .vcard-contact{ display:flex; flex-direction:column; gap:3px; }
  .vcard-contact a{
    font-size:11px; color:var(--muted); text-decoration:none;
    display:flex; align-items:center; gap:5px; transition:color .12s;
  }
  .vcard-contact a:hover{ color:var(--ink); }
  .vcard-tags{ display:flex; flex-wrap:wrap; gap:4px; }
  .vtag{
    padding:2px 8px; border-radius:999px; font-size:10px; font-weight:600;
    background:var(--bg); color:var(--muted); border:1px solid var(--line);
  }
  .vcard-projects{
    font-size:11px; color:var(--muted); border-top:1px solid var(--line);
    padding-top:10px; margin-top:2px;
  }
  .vcard-projects strong{ color:var(--ink); }

  /* Lijstweergave */
  .contacts-list{
    display:flex; flex-direction:column; gap:0;
    border:1px solid rgba(255,255,255,.6); border-radius:var(--radius);
    overflow:hidden; background:var(--card); box-shadow:var(--shadow);
  }
  .list-row{
    display:flex; align-items:center; gap:14px; padding:11px 18px;
    border-bottom:1px solid var(--line); cursor:pointer; transition:background .1s;
  }
  .list-row:last-child{ border-bottom:none; }
  .list-row:hover{ background:var(--accent-light); }
  .list-avatar{
    width:32px; height:32px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:800; color:#fff;
  }
  .list-naam{ font-weight:700; font-size:13px; min-width:150px; flex-shrink:0; }
  .list-bedrijf{ font-size:12px; color:var(--muted); min-width:140px; flex-shrink:0; }
  .list-rol{ min-width:110px; flex-shrink:0; }
  .list-rol span{
    padding:2px 8px; border-radius:999px; font-size:10px; font-weight:700;
    letter-spacing:.06em; text-transform:uppercase;
    background:var(--accent-light); border:1px solid rgba(78,125,156,.2); color:var(--accent);
  }
  .list-email{ font-size:12px; color:var(--muted); flex:1; }
  .list-tags{ display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; }

  /* Detail modal */
  .modal-overlay{
    position:fixed; inset:0; z-index:800; background:rgba(26,35,50,.4);
    backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .2s;
  }
  .modal-overlay.open{ opacity:1; pointer-events:all; }
  .modal{
    background:var(--card); border-radius:18px; width:480px; max-width:92vw; max-height:85vh;
    overflow-y:auto; padding:28px; box-shadow:0 20px 60px rgba(0,0,0,.2);
    transform:scale(.97) translateY(8px); transition:transform .2s;
    border:1px solid rgba(255,255,255,.6);
  }
  .modal-overlay.open .modal{ transform:scale(1) translateY(0); }
  .modal-head{ display:flex; align-items:flex-start; gap:16px; margin-bottom:22px; }
  .modal-avatar{
    width:56px; height:56px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; font-weight:800; color:#fff;
  }
  .modal-avatar img{ width:100%; height:100%; border-radius:50%; object-fit:cover; }
  .modal-title{ flex:1; }
  .modal-naam{ font-size:18px; font-weight:800; letter-spacing:-.02em; }
  .modal-sub{ font-size:12px; color:var(--muted); margin-top:4px; }
  .modal-close{
    background:none; border:1px solid var(--line); border-radius:999px;
    padding:5px 12px; cursor:pointer; font-size:11px; font-weight:600; color:var(--muted);
  }
  .modal-section{ margin-bottom:18px; }
  .modal-label{
    font-size:10px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
    color:var(--muted); margin-bottom:8px;
  }
  .modal-row{
    display:flex; align-items:center; gap:10px; padding:8px 0;
    border-bottom:1px solid var(--line); font-size:13px;
  }
  .modal-row:last-child{ border-bottom:none; }
  .modal-row a{ color:var(--ink); text-decoration:none; }
  .modal-row a:hover{ text-decoration:underline; }
  .proj-chip{
    display:inline-block; padding:4px 10px; border-radius:999px; font-size:11px; font-weight:600;
    background:var(--bg); border:1px solid var(--line); color:var(--ink-2); margin:2px;
    text-decoration:none; transition:background .12s;
  }
  .proj-chip:hover{ background:var(--accent-light); }

  /* Nieuw contact */
  .new-modal{ width:520px; }
  .new-modal .field{ display:flex; flex-direction:column; gap:4px; margin-bottom:12px; }
  .new-modal label{ font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); }
  .new-modal input, .new-modal textarea, .new-modal select{
    border:1px solid var(--line); border-radius:8px; padding:8px 12px;
    font-size:13px; background:var(--bg); color:var(--ink); outline:none;
    font-family:inherit; transition:border-color .15s;
  }
  .new-modal input:focus, .new-modal textarea:focus, .new-modal select:focus{
    border-color:var(--accent); background:var(--card);
    box-shadow:0 0 0 3px rgba(78,125,156,.1);
  }
  .new-modal .tags-input{ display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
  .new-modal .tag-pill{
    padding:4px 10px; border-radius:999px; font-size:11px; font-weight:600;
    border:1px solid var(--line); cursor:pointer; background:var(--card);
    color:var(--muted); transition:all .12s;
  }
  .new-modal .tag-pill.on{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .form-actions{ display:flex; gap:10px; justify-content:flex-end; margin-top:18px; }
  .btn-secondary{
    background:none; border:1px solid var(--line); border-radius:999px;
    padding:9px 18px; font-size:11px; font-weight:600; cursor:pointer; color:var(--muted);
  }
  .btn-primary{
    background:var(--ink); color:#fff; border:none; border-radius:999px;
    padding:9px 20px; font-size:11px; font-weight:700; cursor:pointer;
    letter-spacing:.1em; text-transform:uppercase;
  }

  /* Stemmen */
  .vote-row{ display:flex; gap:10px; margin-top:8px; }
  .vote-btn{
    flex:1; display:flex; align-items:center; gap:8px;
    padding:10px 14px; border-radius:10px; border:1px solid var(--line);
    background:var(--bg); cursor:pointer; font-family:inherit; font-size:13px;
    transition:all .15s; text-align:left;
  }
  .vote-btn:hover{ border-color:var(--accent); background:var(--accent-light); }
  .vote-btn.up.active{ background:rgba(45,138,94,.1); border-color:rgba(45,138,94,.4); color:#1a6e3a; }
  .vote-btn.down.active{ background:rgba(196,64,64,.08); border-color:rgba(196,64,64,.3); color:#9b2a2a; }
  .vote-btn strong{ font-size:15px; font-weight:800; }
  .vote-names{ font-size:11px; color:var(--muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* Project rijen in modal */
  .proj-row{
    display:flex; align-items:center; gap:10px; padding:9px 12px;
    border-radius:8px; border:1px solid var(--line); text-decoration:none; color:var(--ink);
    background:var(--bg); transition:background .12s;
  }
  .proj-row:hover{ background:var(--accent-light); border-color:rgba(78,125,156,.3); }
  .proj-row-num{ font-size:10px; font-weight:700; color:var(--muted); min-width:40px; }
  .proj-row-naam{ flex:1; font-size:13px; font-weight:600; }

  /* Edit velden */
  .edit-field{ display:flex; flex-direction:column; gap:4px; }
  .edit-label{ font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); }
  .edit-input{
    border:1px solid var(--line); border-radius:8px; padding:8px 12px;
    font-size:13px; background:var(--bg); color:var(--ink); outline:none;
    font-family:inherit; transition:border-color .15s;
  }
  .edit-input:focus{ border-color:var(--accent); background:var(--card); box-shadow:0 0 0 3px rgba(78,125,156,.1); }

  /* Modal row icon */
  .mrow-icon{ width:22px; flex-shrink:0; text-align:center; }

  /* Empty */
  .empty{ text-align:center; padding:60px 20px; color:var(--muted); }
  .empty h3{ font-size:16px; font-weight:700; margin-bottom:6px; color:var(--ink); }

  .vcard-functie{
    display:inline-block; padding:3px 9px; border-radius:999px;
    font-size:10px; font-weight:600; letter-spacing:.06em;
    background:var(--bg); border:1px solid var(--line); color:var(--muted);
  }

  /* Scrollbar sidebar */
  .sidebar-bedrijven::-webkit-scrollbar{ width:4px; }
  .sidebar-bedrijven::-webkit-scrollbar-track{ background:transparent; }
  .sidebar-bedrijven::-webkit-scrollbar-thumb{ background:var(--line); border-radius:2px; }

  @media(max-width:800px){
    .layout{ grid-template-columns:1fr; }
    .sidebar{ display:none; }
  }
</style>
</head>
<body>
<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <h1>📇 Adressenboek</h1>
      <div class="sub" id="count-label">— contacten</div>
    </div>

    <!-- Sectoren -->
    <div class="sidebar-section">
      <div class="sidebar-label">Sectoren</div>
      <div id="sector-list"></div>
    </div>

    <!-- Functies -->
    <div id="functie-section" style="display:none">
      <div style="height:1px;background:var(--line);margin:6px 12px;"></div>
      <div class="sidebar-section" style="padding-bottom:4px;">
        <div class="sidebar-label">Functies</div>
      </div>
      <div id="functie-list" style="padding:0 12px 4px;"></div>
    </div>

    <!-- Scheidingslijn -->
    <div style="height:1px;background:var(--line);margin:6px 12px;flex-shrink:0;"></div>

    <!-- Bedrijven -->
    <div class="sidebar-section" style="padding-bottom:6px;">
      <div class="sidebar-label">Bedrijven</div>
    </div>
    <div class="sidebar-bedrijven">
      <div id="bedrijf-list"></div>
      <div id="bedrijven-toggle" style="padding:0 0 8px;"></div>
    </div>
  </aside>

  <!-- ── Hoofdpaneel ── -->
  <main class="main">
    <div class="topbar">
      <div class="crumbs">
        <a href="projects_dashboard.html">Dashboard</a>
        · Adressenboek
      </div>
      <button class="new-btn" id="open-new-btn" style="display:none">+ Nieuw contact</button>
    </div>

    <div class="toolbar">
      <input class="ab-search" id="ab-search" type="search" placeholder="Zoek naam, bedrijf of rol…" />
      <div class="view-toggle">
        <button class="vtoggle-btn active" id="view-grid-btn" title="Grid">⊞</button>
        <button class="vtoggle-btn" id="view-list-btn" title="Lijst">☰</button>
      </div>
    </div>

    <div class="active-filter-bar" id="filter-bar" style="display:none;"></div>

    <div class="cards-grid" id="cards-grid"></div>
  </main>
</div>

<!-- Detail modal -->
<div class="modal-overlay" id="detail-overlay">
  <div class="modal" id="detail-modal"></div>
</div>

<!-- Nieuw contact modal -->
<div class="modal-overlay" id="new-overlay">
  <div class="modal new-modal">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
      <h2 style="flex:1;font-size:16px;font-weight:800;margin:0;letter-spacing:-.01em;">Nieuw visitekaartje</h2>
      <button class="modal-close" id="close-new-btn">✕</button>
    </div>
    <div class="field"><label>Naam *</label><input id="nc-naam" placeholder="Voor- en achternaam" /></div>
    <div class="field"><label>Bedrijf</label><input id="nc-bedrijf" placeholder="Bedrijfsnaam" /></div>
    <div class="field" style="position:relative;">
      <label>Type bedrijf</label>
      <input id="nc-rol" autocomplete="off" placeholder="Bijv. Architectenbureau, Aannemersbedrijf…" />
      <div id="nc-rol-suggestions" style="display:none;position:absolute;left:0;right:0;top:100%;background:var(--card);border:1px solid var(--line);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:999;max-height:180px;overflow-y:auto;margin-top:2px;"></div>
    </div>
    <div class="field" style="position:relative;">
      <label>Functie</label>
      <input id="nc-functie" autocomplete="off" placeholder="Bijv. Projectmanager, Directeur, BIM-coördinator…" />
      <div id="nc-functie-suggestions" style="display:none;position:absolute;left:0;right:0;background:var(--card);border:1px solid var(--line);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:999;max-height:150px;overflow-y:auto;margin-top:2px;"></div>
    </div>
    <div class="field"><label>E-mail</label><input id="nc-email" type="email" placeholder="naam@bedrijf.nl" /></div>
    <div class="field"><label>Telefoon</label><input id="nc-telefoon" type="tel" placeholder="+31 6 …" /></div>
    <div class="field"><label>Website</label><input id="nc-website" placeholder="https://…" /></div>
    <div class="field"><label>LinkedIn</label><input id="nc-linkedin" placeholder="https://linkedin.com/in/…" /></div>
    <div class="field"><label>Tags</label>
      <div class="tags-input" id="nc-tags">
      </div>
    </div>
    <div class="field"><label>Notities</label><textarea id="nc-notities" rows="3" placeholder="Optionele notitie…"></textarea></div>
    <div class="form-actions">
      <button class="btn-secondary" id="cancel-new-btn">Annuleren</button>
      <button class="btn-primary" id="save-new-btn">Opslaan →</button>
    </div>
  </div>
</div>

<script>
// ── Sector normalisatie: meerdere labels → één hoofdsector ──
const SECTOR_ALIAS = {
  // vergunning → overig
  'vergunning': 'overig',
  // uitvoerder + projectleider → aannemer
  'uitvoerder': 'aannemer',
  'projectleider': 'aannemer',
  // overheid → gemeente
  'overheid': 'gemeente',
  // civiel ingenieur → civiel
  'civiel ingenieur': 'civiel',
};

// Vaste volgorde + kleuren voor sectoren
const SECTOR_CONFIG = [
  { key: 'opdrachtgever', label: 'Opdrachtgever', dot: '#3498db', bg: 'rgba(52,152,219,.12)',  text: '#1a6fa3' },
  { key: 'architect',     label: 'Architect',     dot: '#4e7d9c', bg: 'rgba(78,125,156,.12)',  text: '#2d5a75' },
  { key: 'adviseur',      label: 'Adviseur',      dot: '#3a6eaf', bg: 'rgba(58,110,175,.12)',  text: '#1e4d8c' },
  { key: 'aannemer',      label: 'Aannemer',      dot: '#2980b9', bg: 'rgba(41,128,185,.12)',  text: '#1a5f8a' },
  { key: 'constructeur',  label: 'Constructeur',  dot: '#34495e', bg: 'rgba(52,73,94,.12)',    text: '#1e2d3d' },
  { key: 'installateur',  label: 'Installateur',  dot: '#16a085', bg: 'rgba(22,160,133,.12)',  text: '#0d6b59' },
  { key: 'financieel',    label: 'Financieel',    dot: '#27ae60', bg: 'rgba(39,174,96,.12)',   text: '#1a7a42' },
  { key: 'gemeente',      label: 'Gemeente',      dot: '#1abc9c', bg: 'rgba(26,188,156,.12)',  text: '#0e8a72' },
  { key: 'civiel',        label: 'Civiel',        dot: '#2ecc71', bg: 'rgba(46,204,113,.12)',  text: '#1a8a4a' },
  { key: 'overig',        label: 'Overig',        dot: '#95a5a6', bg: 'rgba(149,165,166,.12)', text: '#5d7274' },
];

const SECTOR_MAP = Object.fromEntries(SECTOR_CONFIG.map(s => [s.key, s]));
const DEFAULT_SECTOR = { dot: '#7f8fa0', bg: 'rgba(127,143,160,.12)', text: '#4a5e70' };

function normalizeSector(val) {
  if (!val) return 'overig';
  const v = val.toLowerCase().trim();
  return SECTOR_ALIAS[v] || v;
}

function getSectorForContact(c) {
  // Rol eerst, dan tags
  const candidates = [c.rol, ...(c.tags || [])].filter(Boolean);
  for (const cand of candidates) {
    const norm = normalizeSector(cand);
    if (SECTOR_MAP[norm]) return SECTOR_MAP[norm];
  }
  return SECTOR_MAP['overig'] || DEFAULT_SECTOR;
}

function avatarColor(naam) {
  const blues = ['#4e7d9c','#3a6eaf','#2980b9','#3498db','#2471a3','#1a5276','#34495e','#2c3e50'];
  let h = 0;
  for (let i = 0; i < (naam||'').length; i++) h = (h * 31 + naam.charCodeAt(i)) & 0xffffff;
  return blues[Math.abs(h) % blues.length];
}

let contacts = [];
let projects = {};
let activeFilter = '';
let filterType = '';   // 'sector' | 'bedrijf' | 'functie'
let searchQ = '';
let currentView = 'grid';
let bedrijvenExpanded = false;
let functies = [];     // unieke functies uit contacts.functie

// ── Laad data ──────────────────────────────────────────
async function loadContacts() {
  try {
    const { data, error } = await db.from('contacts').select('*').order('naam');
    if (error) throw error;
    contacts = data || [];

    const { data: pc } = await db.from('project_contacts')
      .select('contact_id, projects(projectnaam, projectnummer, id)');
    (pc || []).forEach(row => {
      if (!projects[row.contact_id]) projects[row.contact_id] = [];
      if (row.projects) projects[row.contact_id].push(row.projects);
    });

    // Unieke functies verzamelen
    functies = [...new Set(contacts.map(c => c.functie).filter(Boolean))].sort();

    renderSidebar();
    renderAll();
  } catch(e) {
    console.error(e);
    document.getElementById('cards-grid').innerHTML =
      '<div class="empty"><h3>Kon contacten niet laden</h3></div>';
  }
}

// ── Sidebar ────────────────────────────────────────────
function renderSidebar() {
  // Tel per sector (genormaliseerd)
  const sectorCounts = {};
  contacts.forEach(c => {
    const sec = getSectorForContact(c);
    sectorCounts[sec.key] = (sectorCounts[sec.key] || 0) + 1;
  });

  // Sectoren in vaste volgorde, alleen die met > 0 contacten
  const sectorEl = document.getElementById('sector-list');
  const alleActive = !activeFilter ? 'active' : '';
  let html = `<button class="sector-btn ${alleActive}" onclick="setFilter('','')">
    <div class="sector-dot" style="background:var(--muted)"></div>
    <span class="sector-name">Alle</span>
    <span class="sector-count">${contacts.length}</span>
  </button>`;

  SECTOR_CONFIG.forEach(sec => {
    const n = sectorCounts[sec.key] || 0;
    if (!n) return;
    const isActive = activeFilter === sec.key && filterType === 'sector';
    html += `<button class="sector-btn ${isActive ? 'active' : ''}" onclick="setFilter('${sec.key}','sector')">
      <div class="sector-dot" style="background:${sec.dot}"></div>
      <span class="sector-name" style="color:${sec.text}">${sec.label}</span>
      <span class="sector-count">${n}</span>
    </button>`;
  });
  sectorEl.innerHTML = html;

  // Functies (alleen als er functies zijn)
  const functieEl = document.getElementById('functie-list');
  const functieSection = document.getElementById('functie-section');
  if (functies.length) {
    functieSection.style.display = '';
    functieEl.innerHTML = functies.map(fn => {
      const isActive = activeFilter === fn && filterType === 'functie';
      return `<button class="sector-btn ${isActive ? 'active' : ''}" onclick="setFilter('${fn.replace(/'/g,"\\'")}','functie')">
        <div class="sector-dot" style="background:var(--muted);border-radius:3px"></div>
        <span class="sector-name">${fn}</span>
        <span class="sector-count">${contacts.filter(c => c.functie === fn).length}</span>
      </button>`;
    }).join('');
  } else {
    functieSection.style.display = 'none';
  }

  // Bedrijven
  const bedrijfMap = {};
  contacts.forEach(c => {
    const b = c.bedrijf || '— Onbekend —';
    if (!bedrijfMap[b]) bedrijfMap[b] = { count: 0, color: avatarColor(b) };
    bedrijfMap[b].count++;
  });

  const sorted = Object.entries(bedrijfMap).sort((a,b) => a[0].localeCompare(b[0]));
  const SHOW = 5;
  const visible = bedrijvenExpanded ? sorted : sorted.slice(0, SHOW);
  const rest = sorted.length - SHOW;

  const bedrijfEl = document.getElementById('bedrijf-list');
  bedrijfEl.innerHTML = visible.map(([naam, info]) => {
    const initials = naam.split(' ').filter(w => w[0]).map(w => w[0]).slice(0,2).join('').toUpperCase();
    const isActive = activeFilter === naam && filterType === 'bedrijf';
    return `<button class="bedrijf-btn ${isActive ? 'active' : ''}" onclick="setFilter('${naam.replace(/'/g,"\\'")}','bedrijf')">
      <div class="bedrijf-logo" style="background:${info.color}">${initials}</div>
      <div class="bedrijf-info"><div class="bedrijf-naam">${naam}</div></div>
      <span class="bedrijf-n">${info.count}</span>
    </button>`;
  }).join('');

  // Plus/min knop
  const toggleEl = document.getElementById('bedrijven-toggle');
  if (sorted.length > SHOW) {
    toggleEl.style.display = '';
    if (bedrijvenExpanded) {
      toggleEl.innerHTML = `<button onclick="toggleBedrijven()" class="sector-btn" style="color:var(--muted);font-size:11px;">
        <span style="font-size:14px;font-weight:700;margin-right:4px">−</span> Minder tonen
      </button>`;
    } else {
      toggleEl.innerHTML = `<button onclick="toggleBedrijven()" class="sector-btn" style="color:var(--muted);font-size:11px;">
        <span style="font-size:14px;font-weight:700;margin-right:4px">+</span> ${rest} meer tonen
      </button>`;
    }
  } else {
    toggleEl.style.display = 'none';
  }
}

function toggleBedrijven() {
  bedrijvenExpanded = !bedrijvenExpanded;
  renderSidebar();
}

function setFilter(val, type) {
  if (activeFilter === val && filterType === type) {
    activeFilter = ''; filterType = '';
  } else {
    activeFilter = val; filterType = type;
  }
  renderSidebar();
  renderFilterBar();
  renderAll();
}

function renderFilterBar() {
  const bar = document.getElementById('filter-bar');
  if (!activeFilter) { bar.style.display = 'none'; return; }

  let label = activeFilter;
  let icon = '●';
  let col = { bg: 'var(--accent-light)', text: 'var(--accent)' };

  if (filterType === 'sector') {
    const sec = SECTOR_MAP[activeFilter];
    if (sec) { label = sec.label; col = { bg: sec.bg, text: sec.text }; }
    icon = '●';
  } else if (filterType === 'bedrijf') {
    icon = '🏢';
  } else if (filterType === 'functie') {
    icon = '👤';
  }

  bar.style.display = 'flex';
  bar.innerHTML = `<span class="filter-badge" style="background:${col.bg};color:${col.text}">
    ${icon} ${label}
    <button onclick="setFilter('','')">✕</button>
  </span>
  <span style="font-size:12px;color:var(--muted)">gefilterd</span>`;
}

// ── Filter contacten ───────────────────────────────────
function getFiltered() {
  const q = searchQ.toLowerCase();
  return contacts.filter(c => {
    const mQ = !q || c.naam?.toLowerCase().includes(q)
      || c.bedrijf?.toLowerCase().includes(q)
      || c.rol?.toLowerCase().includes(q)
      || c.functie?.toLowerCase().includes(q);
    let mF = true;
    if (activeFilter && filterType === 'sector') {
      mF = getSectorForContact(c).key === activeFilter;
    } else if (activeFilter && filterType === 'bedrijf') {
      mF = (c.bedrijf || '— Onbekend —') === activeFilter;
    } else if (activeFilter && filterType === 'functie') {
      mF = c.functie === activeFilter;
    }
    return mQ && mF;
  });
}

function renderAll() {
  const filtered = getFiltered();
  document.getElementById('count-label').textContent = `${filtered.length} contact${filtered.length !== 1 ? 'en' : ''}`;

  if (currentView === 'list') { renderListView(filtered); return; }

  const grid = document.getElementById('cards-grid');
  grid.className = 'cards-grid';

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty"><h3>Geen contacten gevonden</h3><p>Pas de zoekopdracht of filters aan.</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(c => {
    const initials = (c.naam||'?').split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();
    const col = getSectorForContact(c);
    const avatarBg = avatarColor(c.naam);
    const projs = projects[c.id] || [];
    const avatarHTML = c.foto_url ? `<img src="${c.foto_url}" alt="${c.naam}" />` : initials;
    return `
      <div class="vcard" onclick="openDetail('${c.id}')">
        <div class="vcard-top">
          <div class="vcard-avatar" style="background:${avatarBg}">${avatarHTML}</div>
          <div style="min-width:0">
            <div class="vcard-naam">${c.naam}</div>
            <div class="vcard-bedrijf">${c.bedrijf || '—'}</div>
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          ${c.rol ? `<span class="vcard-rol" style="background:${col.bg};color:${col.text};border-color:${col.dot}33">${c.rol}</span>` : ''}
          ${c.functie ? `<span class="vcard-functie">${c.functie}</span>` : ''}
        </div>
        <div class="vcard-contact">
          ${c.email ? `<a href="mailto:${c.email}" onclick="event.stopPropagation()">✉ ${c.email}</a>` : ''}
          ${c.telefoon ? `<a href="tel:${c.telefoon}" onclick="event.stopPropagation()">📞 ${c.telefoon}</a>` : ''}
        </div>
        ${(c.tags||[]).length ? `<div class="vcard-tags">${c.tags.map(t=>`<span class="vtag">${t}</span>`).join('')}</div>` : ''}
        ${projs.length ? `<div class="vcard-projects">${projs.length} project${projs.length!==1?'en':''}: <strong>${projs.map(p=>p.projectnaam).slice(0,2).join(', ')}${projs.length>2?` +${projs.length-2}`:''}</strong></div>` : ''}
      </div>`;
  }).join('');
}

function renderListView(filtered) {
  const grid = document.getElementById('cards-grid');
  if (!filtered.length) {
    grid.className = '';
    grid.innerHTML = '<div class="empty"><h3>Geen contacten gevonden</h3></div>';
    return;
  }
  grid.className = 'contacts-list';
  grid.innerHTML = filtered.map(c => {
    const initials = (c.naam||'?').split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();
    const avatarBg = avatarColor(c.naam);
    const col = getSectorForContact(c);
    const avatarHTML = c.foto_url ? `<img src="${c.foto_url}" alt="" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : initials;
    return `
      <div class="list-row" onclick="openDetail('${c.id}')">
        <div class="list-avatar" style="background:${avatarBg}">${avatarHTML}</div>
        <div class="list-naam">${c.naam}</div>
        <div class="list-bedrijf">${c.bedrijf || '—'}</div>
        <div class="list-rol">${c.rol ? `<span style="background:${col.bg};color:${col.text};border-color:${col.dot}33">${c.rol}</span>` : ''}</div>
        <div class="list-functie" style="font-size:12px;color:var(--muted);min-width:120px;flex-shrink:0">${c.functie || '—'}</div>
        <div class="list-email">${c.email ? `<a href="mailto:${c.email}" onclick="event.stopPropagation()">${c.email}</a>` : '—'}</div>
        <div class="list-tags">${(c.tags||[]).slice(0,2).map(t=>`<span class="vtag">${t}</span>`).join('')}</div>
      </div>`;
  }).join('');
}

// ── Detail modal ───────────────────────────────────────
// ── Detail modal state ─────────────────────────────────
let currentDetailId = null;
let editMode = false;
let votes = {};
let currentUserId = null;
let currentUserNaam = null;

db.auth.getUser().then(({ data: { user } }) => {
  if (!user) return;
  currentUserId = user.id;
  // Toon "Nieuw contact" knop voor ingelogde gebruikers
  const newBtn = document.getElementById('open-new-btn');
  if (newBtn) newBtn.style.display = '';
  db.from('profiles').select('naam, status').eq('id', user.id).maybeSingle()
    .then(({ data }) => {
      if (data?.naam) currentUserNaam = data.naam;
      // Alleen goedgekeurde gebruikers mogen toevoegen/bewerken
      if (data?.status !== 'approved') {
        if (newBtn) newBtn.style.display = 'none';
      }
    });
});

function openDetail(id) {
  currentDetailId = id;
  editMode = false;
  renderDetail();
  document.getElementById('detail-overlay').classList.add('open');
  if (!votes[id]) loadVotes(id);
}

async function loadVotes(id) {
  try {
    const { data } = await db.from('contact_votes')
      .select('user_id, stem, profiles(naam)')
      .eq('contact_id', id);
    if (!data) return;
    votes[id] = {
      up:   data.filter(v => v.stem === 'up')  .map(v => ({ userId: v.user_id, naam: v.profiles?.naam || '?' })),
      down: data.filter(v => v.stem === 'down').map(v => ({ userId: v.user_id, naam: v.profiles?.naam || '?' })),
    };
    if (currentDetailId === id) renderDetail();
  } catch(e) {}
}

async function castVote(stem) {
  if (!currentUserId || !currentDetailId) return;
  const id = currentDetailId;
  const v = votes[id] || { up: [], down: [] };
  const alreadyUp   = v.up.some(x => x.userId === currentUserId);
  const alreadyDown = v.down.some(x => x.userId === currentUserId);
  try {
    if ((stem === 'up' && alreadyUp) || (stem === 'down' && alreadyDown)) {
      await db.from('contact_votes').delete().eq('contact_id', id).eq('user_id', currentUserId);
      votes[id] = { up: v.up.filter(x => x.userId !== currentUserId), down: v.down.filter(x => x.userId !== currentUserId) };
    } else {
      await db.from('contact_votes').upsert({ contact_id: id, user_id: currentUserId, stem }, { onConflict: 'contact_id,user_id' });
      votes[id] = {
        up:   stem === 'up'   ? [...v.up.filter(x=>x.userId!==currentUserId),   {userId:currentUserId,naam:currentUserNaam||'?'}] : v.up.filter(x=>x.userId!==currentUserId),
        down: stem === 'down' ? [...v.down.filter(x=>x.userId!==currentUserId), {userId:currentUserId,naam:currentUserNaam||'?'}] : v.down.filter(x=>x.userId!==currentUserId),
      };
    }
    renderDetail();
  } catch(e) { console.warn('Stem mislukt:', e); }
}

async function saveDetailEdit() {
  const id = currentDetailId;
  const c = contacts.find(x => x.id === id);
  if (!c) return;
  const updates = {
    naam:     document.getElementById('edit-naam').value.trim() || c.naam,
    functie:  document.getElementById('edit-functie').value.trim() || null,
    telefoon: document.getElementById('edit-telefoon').value.trim() || null,
    notities: document.getElementById('edit-notities').value.trim() || null,
  };
  try {
    const { data, error } = await db.from('contacts').update(updates).eq('id', id).select().single();
    if (error) throw error;
    Object.assign(c, data);
    functies = [...new Set(contacts.map(c => c.functie).filter(Boolean))].sort();
    editMode = false;
    renderDetail();
    renderSidebar();
    renderAll();
  } catch(e) { alert('Opslaan mislukt: ' + e.message); }
}

function renderDetail() {
  const id = currentDetailId;
  const c = contacts.find(x => x.id === id);
  if (!c) return;
  const projs = projects[c.id] || [];
  const initials = (c.naam||'?').split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();
  const avatarBg = avatarColor(c.naam);
  const avatarHTML = c.foto_url ? `<img src="${c.foto_url}" alt="" />` : initials;
  const col = getSectorForContact(c);
  const v = votes[id] || { up: [], down: [] };
  const myUp   = v.up.some(x => x.userId === currentUserId);
  const myDown = v.down.some(x => x.userId === currentUserId);

        <div class="edit-field"><label class="edit-label">Telefoon</label><input id="edit-telefoon" class="edit-input" value="${c.telefoon||''}" placeholder="+31 6 …" /></div>
        <div class="edit-field"><label class="edit-label">Notities</label><textarea id="edit-notities" class="edit-input" rows="3" placeholder="Optionele notitie…">${c.notities||''}</textarea></div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px;">
        <button onclick="editMode=false;renderDetail()" class="btn-secondary">Annuleren</button>
        <button onclick="saveDetailEdit()" class="btn-primary">Opslaan →</button>
      </div>`;
    return;
  }

  document.getElementById('detail-modal').innerHTML = `
    <div class="modal-head">
      <div class="modal-avatar" style="background:${avatarBg}">${avatarHTML}</div>
      <div class="modal-title">
        <div class="modal-naam">${c.naam}</div>
        <div class="modal-sub">${[c.functie, c.rol, c.bedrijf].filter(Boolean).join(' · ')}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        ${currentUserId ? `<button class="modal-close" onclick="editMode=true;renderDetail()" title="Bewerken" style="font-size:15px">✏️</button>` : ''}
        <button class="modal-close" onclick="closeDetail()">✕</button>

    </div>
    <div class="modal-section">
      <div class="modal-label">Contact</div>
      ${c.naam     ? `<div class="modal-row"><span class="mrow-icon">👤</span>${c.naam}</div>` : ''}
      ${c.functie  ? `<div class="modal-row"><span class="mrow-icon">💼</span>${c.functie}</div>` : ''}
      ${c.telefoon ? `<div class="modal-row"><span class="mrow-icon">📞</span><a href="tel:${c.telefoon}">${c.telefoon}</a></div>` : ''}
      ${c.email    ? `<div class="modal-row"><span class="mrow-icon">✉</span><a href="mailto:${c.email}">${c.email}</a></div>` : ''}
      ${c.website  ? `<div class="modal-row"><span class="mrow-icon">🌐</span><a href="${c.website}" target="_blank">${c.website}</a></div>` : ''}
      ${c.linkedin ? `<div class="modal-row"><span class="mrow-icon">🔗</span><a href="${c.linkedin}" target="_blank">LinkedIn</a></div>` : ''}
    </div>
    <div class="modal-section">
      <div class="modal-label">Beoordeling</div>
      <div class="vote-row">
        <button class="vote-btn up ${myUp?'active':''}" onclick="castVote('up')">
          👍 <strong>${v.up.length}</strong>
          ${v.up.length ? `<span class="vote-names">${v.up.map(x=>x.naam).join(', ')}</span>` : ''}
        </button>
        <button class="vote-btn down ${myDown?'active':''}" onclick="castVote('down')">
          👎 <strong>${v.down.length}</strong>
          ${v.down.length ? `<span class="vote-names">${v.down.map(x=>x.naam).join(', ')}</span>` : ''}
        </button>
      </div>
    </div>
    ${projs.length ? `
    <div class="modal-section">
      <div class="modal-label">Projecten (${projs.length})</div>

          <a class="proj-row" href="project_page.html?nr=${encodeURIComponent(p.projectnummer||'')}&p=${encodeURIComponent(p.projectnaam||'')}">

        return `<span class="vtag" style="background:${tc.bg};color:${tc.text}">${t}</span>`;
      }).join('')}</div>
    </div>` : ''}
    ${c.notities ? `
    <div class="modal-section">
      <div class="modal-label">Notities</div>
      <p style="font-size:13px;color:var(--muted);margin:8px 0 0;line-height:1.6">${c.notities}</p>
    </div>` : ''}
    ${c.email ? `<a href="mailto:${c.email}" style="display:block;text-align:center;background:var(--ink);color:#fff;text-decoration:none;padding:10px;border-radius:999px;font-size:12px;font-weight:700;margin-top:8px;">✉ Stuur e-mail</a>` : ''}`;
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  currentDetailId = null;
  editMode = false;
}

// ── Nieuw contact ──────────────────────────────────────
let selectedTags = [];

// Type bedrijf → functies + tags mapping
const BEDRIJFSTYPE_CONFIG = {
  'architectenbureau':     { functies: ['Architect','Projectarchitect','BIM-coördinator','Interieurarchitect','Stagiair','Directeur','Projectmanager'], tags: ['architect','extern'] },
  'aannemersbedrijf':      { functies: ['Uitvoerder','Projectleider','Calculator','Werkvoorbereider','Directeur','Projectmanager','Zzp-er'], tags: ['aannemer','extern'] },
  'ingenieursbureau':      { functies: ['Constructeur','Adviseur','Projectleider','BIM-engineer','Directeur','Senior engineer'], tags: ['adviseur','constructeur','extern'] },
  'installatiebedrijf':    { functies: ['Installateur','Projectleider','Calculator','Monteur','Directeur','Werkvoorbereider'], tags: ['installateur','extern'] },
  'gemeente':              { functies: ['Ambtenaar','Projectleider','Wethouder','Beleidsmedewerker','Vergunningverlener'], tags: ['overheid','gemeente'] },
  'ontwikkelaar':          { functies: ['Projectontwikkelaar','Directeur','Projectmanager','Commercieel manager'], tags: ['opdrachtgever','extern'] },
  'woningcorporatie':      { functies: ['Vastgoedmanager','Projectleider','Directeur','Beleidsmedewerker'], tags: ['opdrachtgever','overheid'] },
  'adviesbureau':          { functies: ['Adviseur','Senior adviseur','Directeur','Projectmanager','Consultant'], tags: ['adviseur','extern'] },
  'financieel adviseur':   { functies: ['Financieel adviseur','Accountant','Directeur','Controller'], tags: ['financieel','extern'] },
  'civiel ingenieursbureau':{ functies: ['Civiel ingenieur','Projectleider','Adviseur','Directeur'], tags: ['civiel','adviseur','extern'] },
};

function normalizeBedrijfstype(val) {
  if (!val) return null;
  const v = val.toLowerCase().trim();
  for (const key of Object.keys(BEDRIJFSTYPE_CONFIG)) {
    if (v.includes(key) || key.includes(v)) return key;
  }
  return null;
}

function renderTagsForType(type) {
  const container = document.getElementById('nc-tags');
  const config = BEDRIJFSTYPE_CONFIG[type];
  const tagList = config ? config.tags : ['architect','adviseur','aannemer','opdrachtgever','overheid','installateur','financieel','civiel','extern'];
  // Always show a base set + type-specific ones, deduplicated
  const baseTags = ['extern','overheid','financieel'];
  const allTags = [...new Set([...(config ? config.tags : []), ...baseTags, 'architect','adviseur','aannemer','opdrachtgever','installateur','civiel'])];
  container.innerHTML = allTags.map(t =>
    `<span class="tag-pill${selectedTags.includes(t) ? ' on' : ''}" data-tag="${t}">${t}</span>`
  ).join('');
  container.querySelectorAll('.tag-pill').forEach(p => {
    p.addEventListener('click', () => {
      p.classList.toggle('on');
      const t = p.dataset.tag;
      selectedTags = p.classList.contains('on') ? [...selectedTags, t] : selectedTags.filter(x => x !== t);
    });
  });
  // Auto-select tags voor dit type
  if (config) {
    config.tags.forEach(t => {
      if (!selectedTags.includes(t)) selectedTags.push(t);
      const pill = container.querySelector(`[data-tag="${t}"]`);
      if (pill) pill.classList.add('on');
    });
  }
}

// Autocomplete helper
function makeAutocomplete(inputId, suggestId, getOptions, onSelect) {
  const input = document.getElementById(inputId);
  const box   = document.getElementById(suggestId);
  if (!input || !box) return;
  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    box.innerHTML = '';
    if (!q) { box.style.display = 'none'; return; }
    const opts = getOptions().filter(o => o.toLowerCase().includes(q));
    if (!opts.length) { box.style.display = 'none'; return; }
    opts.forEach(o => {
      const item = document.createElement('div');
      item.textContent = o;
      item.style.cssText = 'padding:9px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--line);';
      item.addEventListener('mousedown', e => { e.preventDefault(); input.value = o; box.style.display='none'; onSelect(o); });
      item.addEventListener('mouseover', () => item.style.background = 'var(--hover)');
      item.addEventListener('mouseout',  () => item.style.background = '');
      box.appendChild(item);
    });
    box.style.display = 'block';
  });
  input.addEventListener('blur', () => setTimeout(() => box.style.display='none', 150));
}

function getBestaandeBedrijfstypes() {
  // Haal unieke rollen op uit bestaande contacten + vaste lijst
  const fromContacts = [...new Set(contacts.map(c => c.rol).filter(Boolean))];
  const vaste = ['Architectenbureau','Aannemersbedrijf','Ingenieursbureau','Installatiebedrijf','Gemeente','Ontwikkelaar','Woningcorporatie','Adviesbureau','Financieel adviseur','Civiel ingenieursbureau'];
  return [...new Set([...fromContacts, ...vaste])].sort();
}

function getFunctiesVoorType(type) {
  const norm = normalizeBedrijfstype(type);
  if (norm && BEDRIJFSTYPE_CONFIG[norm]) return BEDRIJFSTYPE_CONFIG[norm].functies;
  // Fallback: functies van contacten met zelfde rol
  const rolLower = (type || '').toLowerCase();
  const fromContacts = [...new Set(
    contacts.filter(c => (c.rol || '').toLowerCase().includes(rolLower)).map(c => c.functie).filter(Boolean)
  )];
  return fromContacts.length ? fromContacts : [...new Set(contacts.map(c => c.functie).filter(Boolean))].slice(0,8);
}

document.getElementById('open-new-btn').addEventListener('click', () => {
  selectedTags = [];
  ['nc-naam','nc-bedrijf','nc-email','nc-telefoon','nc-website','nc-linkedin','nc-notities','nc-functie','nc-rol'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  renderTagsForType(null);
  document.getElementById('new-overlay').classList.add('open');
  // Setup autocompletes (after overlay open so elements are visible)
  makeAutocomplete('nc-rol', 'nc-rol-suggestions', getBestaandeBedrijfstypes, (val) => {
    const norm = normalizeBedrijfstype(val);
    selectedTags = [];
    renderTagsForType(norm);
  });
  makeAutocomplete('nc-functie', 'nc-functie-suggestions',
    () => getFunctiesVoorType(document.getElementById('nc-rol').value),
    () => {}
  );
});

// Trigger tag/functie update wanneer rol-veld verandert (handmatig typen of selectie)
function onRolChange() {
  const val = document.getElementById('nc-rol').value;
  const norm = normalizeBedrijfstype(val);
  if (norm) { selectedTags = []; renderTagsForType(norm); }
}
document.getElementById('nc-rol').addEventListener('change', onRolChange);
document.getElementById('nc-rol').addEventListener('input', onRolChange);

document.getElementById('close-new-btn').addEventListener('click', () => document.getElementById('new-overlay').classList.remove('open'));
document.getElementById('cancel-new-btn').addEventListener('click', () => document.getElementById('new-overlay').classList.remove('open'));

document.getElementById('save-new-btn').addEventListener('click', async () => {
  const naam = document.getElementById('nc-naam').value.trim();
  if (!naam) { alert('Naam is verplicht'); return; }
  const btn = document.getElementById('save-new-btn');
  btn.textContent = 'Opslaan…'; btn.disabled = true;
  try {
    const { data, error } = await db.from('contacts').insert([{
      naam,
      bedrijf: document.getElementById('nc-bedrijf').value.trim() || null,
      rol: document.getElementById('nc-rol').value || null,
      email: document.getElementById('nc-email').value.trim() || null,
      telefoon: document.getElementById('nc-telefoon').value.trim() || null,
      functie: document.getElementById('nc-functie').value.trim() || null,
      website: document.getElementById('nc-website').value.trim() || null,
      linkedin: document.getElementById('nc-linkedin').value.trim() || null,
      notities: document.getElementById('nc-notities').value.trim() || null,
      tags: selectedTags.length ? selectedTags : null,
    }]).select().single();
    if (error) throw error;
    contacts.unshift(data);
    document.getElementById('new-overlay').classList.remove('open');
    renderSidebar();
    renderAll();
  } catch(e) {
    alert('Opslaan mislukt: ' + e.message);
  } finally {
    btn.textContent = 'Opslaan →'; btn.disabled = false;
  }
});

// Klik buiten modal
document.getElementById('detail-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });
document.getElementById('new-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) document.getElementById('new-overlay').classList.remove('open'); });

// Zoekbalk
document.getElementById('ab-search').addEventListener('input', e => { searchQ = e.target.value; renderAll(); });

// View toggle
document.getElementById('view-grid-btn').addEventListener('click', () => {
  currentView = 'grid';
  document.getElementById('view-grid-btn').classList.add('active');
  document.getElementById('view-list-btn').classList.remove('active');
  renderAll();
});
document.getElementById('view-list-btn').addEventListener('click', () => {
  currentView = 'list';
  document.getElementById('view-list-btn').classList.add('active');
  document.getElementById('view-grid-btn').classList.remove('active');
  renderAll();
});

loadContacts();
</script>
