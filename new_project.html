<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nieuw project · MVSA</title>
<meta name="version" content="20260531-132540" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  /* ── Zelfde palet als dashboard ── */
  :root{
    --bg:     #eef0f3;
    --card:   #ffffff;
    --ink:    #1a2332;
    --ink-2:  #2d3a4a;
    --muted:  #7f8fa0;
    --line:   #dde3ea;
    --accent: #4e7d9c;
    --accent-light: rgba(78,125,156,.08);
    --good:   #2d8a5e;
    --danger: #c44040;
    --shadow: 0 1px 3px rgba(26,35,50,.06), 0 8px 24px -8px rgba(26,35,50,.12);
    --radius: 14px;
  }
  [data-theme="dark"]{
    --bg:    #111315;
    --card:  #1e2024;
    --ink:   #e8ecf0;
    --ink-2: #c8cdd4;
    --muted: #6b7078;
    --line:  #2a2d32;
    --accent:#5a9ab8;
    --shadow:0 1px 3px rgba(0,0,0,.2), 0 6px 16px -4px rgba(0,0,0,.3);
  }

  *{ box-sizing: border-box; }
  html, body{
    margin:0; padding:0; background: var(--bg); color: var(--ink);
    font-family: 'Inter', Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased;
  }
  .page{ max-width: 960px; margin: 0 auto; padding: 32px 32px 120px; }

  /* ── Topbar (zelfde als dashboard) ── */
  .topbar{
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .crumbs{
    font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted);
  }
  .crumbs a{ color: var(--muted); text-decoration: none; }
  .crumbs a:hover{ color: var(--ink); }
  .crumbs strong{ color: var(--ink); font-weight: 600; }

  /* ── Progress card (sticky, card-stijl) ── */
  .progress-card{
    position: sticky; top: 60px; z-index: 50;
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,.6);
    padding: 14px 20px; margin-bottom: 14px;
    display: grid; grid-template-columns: 1fr auto auto; gap: 20px; align-items: center;
  }
  .progress-card .meta-line{
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px; font-weight: 600;
  }
  .progress-card .bar{
    height: 6px; background: rgba(26,35,50,.07); border-radius: 3px; overflow: hidden;
  }
  .progress-card .bar > span{
    display: block; height: 100%;
    background: linear-gradient(90deg, var(--accent), #7ab0cc);
    border-radius: 3px; transition: width .35s ease;
  }
  .progress-card .stat{ text-align: right; }
  .progress-card .stat .num{
    font-size: 24px; font-weight: 700; line-height: 1;
    font-variant-numeric: tabular-nums; color: var(--ink);
  }
  .progress-card .stat .lbl{
    font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted); margin-top: 3px;
  }

  /* ── Knoppen ── */
  .save-btn{
    background: var(--ink); color: #fff; border: 0;
    padding: 11px 22px; border-radius: 999px;
    font-family: inherit; font-size: 11px; letter-spacing: .14em;
    text-transform: uppercase; font-weight: 700;
    cursor: pointer; transition: opacity .15s ease, transform .15s ease;
  }
  .save-btn:hover{ opacity: .85; transform: translateY(-1px); }
  .save-btn:disabled{ background: var(--line); color: var(--muted); cursor: not-allowed; transform: none; }
  .secondary-btn{
    background: transparent; color: var(--ink);
    border: 1px solid rgba(26,35,50,.15);
    padding: 11px 20px; border-radius: 999px;
    font-family: inherit; font-size: 11px; letter-spacing: .14em;
    text-transform: uppercase; font-weight: 600;
    cursor: pointer; transition: background .15s ease;
  }
  .secondary-btn:hover{ background: rgba(255,255,255,.7); }

  /* ── Sectie-header (zelfde stijl als dashboard section-title) ── */
  .section-title{
    font-size: 11px; font-weight: 700; letter-spacing: .22em;
    text-transform: uppercase; color: var(--ink);
    margin: 22px 0 10px 2px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title .rule{ flex: 1; height: 1px; background: var(--line); }
  .section-title .count{
    font-size: 10px; color: var(--muted); letter-spacing: .12em; font-weight: 600;
  }
  .section-title .count.done{ color: var(--good); }

  /* ── Section card ── */
  .section{
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,.6);
    padding: 0; margin-bottom: 12px; overflow: hidden;
  }
  .section h2{
    margin: 0; padding: 14px 22px;
    font-size: 11px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase;
    color: var(--accent);
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--line);
  }
  .section h2 .count{
    margin-left: auto; font-size: 10px; color: var(--muted); letter-spacing: .14em; font-weight: 600;
  }
  .section h2 .count.done{ color: var(--good); }

  /* ── Veld rij ── */
  .field{
    display: grid; grid-template-columns: 200px 1fr;
    gap: 0; padding: 0; border-bottom: 1px solid var(--line);
    align-items: stretch; position: relative;
  }
  .field:last-child{ border-bottom: 0; }
  .field > label{
    font-size: 12px; color: var(--muted); font-weight: 600;
    letter-spacing: .04em; padding: 13px 22px;
    border-right: 1px solid var(--line);
    display: flex; align-items: center;
    background: rgba(26,35,50,.015);
  }
  .field > label .req{ color: var(--danger); margin-left: 3px; }

  /* Input wrapper padding wordt inline gezet per veld */

  .field input, .field select, .field textarea{
    width: 100%; font-family: inherit; font-size: 13px;
    background: transparent; border: 1px solid transparent; border-radius: 8px;
    padding: 7px 10px; color: var(--ink);
    transition: background .15s, border-color .15s, box-shadow .15s;
  }
  .field input:hover, .field select:hover{
    background: rgba(26,35,50,.03);
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    outline: none; background: #fff; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(78,125,156,.12);
  }
  .field input.filled, .field select.filled, .field textarea.filled{
    color: var(--ink);
  }
  .field input.filled:not(:focus), .field select.filled:not(:focus){
    border-color: rgba(78,125,156,.4); background: rgba(78,125,156,.05);
  }
  .field .row-2{ display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
  .field .row-3{ display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%; }

  /* ── Toast ── */
  .toast-stack{
    position: fixed; bottom: 24px; right: 24px; z-index: 9000;
    display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
  }
  .toast{
    background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 999px;
    font-size: 12px; letter-spacing: .04em; font-weight: 600;
    box-shadow: 0 8px 24px -6px rgba(0,0,0,.28);
    display: flex; align-items: center; gap: 10px;
    animation: slideIn .2s ease, slideOut .3s ease 1.7s forwards;
  }
  .toast.point{ background: var(--good); }
  .toast.save { background: var(--accent); }
  .toast.streak{ background: linear-gradient(135deg, #c8900a, #f5a623); }
  .toast.badge-new{ background: linear-gradient(135deg, #5b21b6, #9b59b6); }
  .toast .pts{
    background: rgba(255,255,255,.2); padding: 2px 8px; border-radius: 999px;
    font-variant-numeric: tabular-nums; font-weight: 700;
  }
  @keyframes slideIn{ from{ opacity:0; transform:translateX(16px); } to{ opacity:1; transform:translateX(0); } }
  @keyframes slideOut{ to{ opacity:0; transform:translateX(16px); } }

  /* ── Confetti ── */
  .confetti-particle{
    position: fixed; top: -10px; z-index: 9999; pointer-events: none;
    border-radius: 3px; animation: confettiFall linear forwards;
  }
  @keyframes confettiFall{ to{ transform: translateY(110vh) rotate(720deg); opacity:0; } }

  /* ── Suggesties dropdown ── */
  .suggestions-dropdown{
    position: absolute; top: 100%; left: 0; right: 0; z-index: 400;
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    box-shadow: 0 8px 24px -4px rgba(26,35,50,.16); margin-top: 2px; overflow: hidden;
  }
  .suggestions-dropdown button{
    display: block; width: 100%; text-align: left;
    padding: 9px 14px; font-family: inherit; font-size: 13px; font-weight: 500;
    background: none; border: none; border-bottom: 1px solid var(--line);
    cursor: pointer; color: var(--ink); transition: background .1s;
  }
  .suggestions-dropdown button:last-child{ border-bottom: none; }
  .suggestions-dropdown button:hover{ background: var(--accent-light); }
  .postcode-loading{ font-size: 11px; color: var(--muted); padding: 4px 0; }

  /* ── Save actions ── */
  .save-actions{
    display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px;
  }

  /* ── Responsive ── */
  @media(max-width: 720px){
    .field{ grid-template-columns: 1fr; }
    .field > label{ border-right: none; border-bottom: 1px solid var(--line); padding: 10px 16px 8px; }
    .field > div:not(.suggestions-dropdown){ padding: 8px 16px 10px; }
    .suggestions-dropdown{ left: 0; }
    .progress-card{ grid-template-columns: 1fr; gap: 12px; }
    .progress-card .stat{ text-align: left; }
  }

  .contact-overlay{ position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.15);backdrop-filter:blur(1px);opacity:0;pointer-events:none;transition:opacity .2s; }
  .contact-overlay.open{ opacity:1;pointer-events:all; }
  .contact-panel{
    position:fixed; z-index:901;
    width:380px; max-width:calc(100vw - 32px);
    max-height:70vh;
    background:var(--card); border:1px solid var(--line);
    border-radius:16px;
    box-shadow: 0 8px 40px -8px rgba(26,35,50,.24), 0 2px 8px rgba(26,35,50,.08);
    display:flex; flex-direction:column;
    opacity:0; pointer-events:none;
    transform:translateY(8px) scale(.97);
    transition:opacity .18s ease, transform .18s ease;
  }
  .contact-panel.open{ opacity:1; pointer-events:all; transform:translateY(0) scale(1); }
  .cp-head{ padding:20px 20px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;flex-shrink:0; }
  .cp-head h3{ flex:1;font-size:15px;font-weight:700;margin:0; }
  .cp-close{ background:none;border:1px solid var(--line);border-radius:999px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted); }
  .cp-search{ width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:999px;padding:9px 16px;font-size:13px;background:var(--bg);color:var(--ink);outline:none; }
  .cp-filters{ display:flex;flex-wrap:wrap;gap:6px;padding:10px 20px 0; }
  .cp-filter{ padding:4px 12px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid var(--line);cursor:pointer;background:transparent;color:var(--muted);transition:all .12s; }
  .cp-filter.active{ background:var(--ink);color:#fff;border-color:var(--ink); }
  .cp-cards{ flex:1;overflow-y:auto;padding:14px 20px;display:flex;flex-direction:column;gap:10px; }
  .vcard{ border:1px solid var(--line);border-radius:12px;padding:14px 16px;cursor:pointer;transition:border-color .12s,box-shadow .12s;display:flex;align-items:center;gap:12px; }
  .vcard:hover{ border-color:var(--ink);box-shadow:0 2px 12px rgba(0,0,0,.08); }
  .vcard.selected{ border-color:var(--ink);background:var(--ink);color:#fff; }
  .vcard-avatar{ width:38px;height:38px;border-radius:50%;background:#e6ecf2;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--muted);flex-shrink:0; }
  .vcard.selected .vcard-avatar{ background:rgba(255,255,255,.2);color:#fff; }
  .vcard-info{ flex:1;min-width:0; }
  .vcard-naam{ font-weight:700;font-size:13px; }
  .vcard-sub{ font-size:11px;color:var(--muted);margin-top:2px; }
  .vcard.selected .vcard-sub{ color:rgba(255,255,255,.7); }
  .vcard-check{ font-size:18px; }
  .cp-new-btn{ margin:0 20px 20px;padding:12px;border-radius:10px;border:2px dashed var(--line);background:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted); }
  .cp-new-btn:hover{ border-color:var(--ink);color:var(--ink); }
  .cp-new-form{ margin:0 20px 20px;padding:16px;border-radius:12px;border:1px solid var(--line);display:flex;flex-direction:column;gap:10px; }
  .cp-new-form input{ width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;background:var(--bg);color:var(--ink);outline:none; }
  .cp-add-btn{ background:var(--ink);color:#fff;border:none;border-radius:999px;padding:10px 20px;font-size:12px;font-weight:700;cursor:pointer;align-self:flex-end; }
  .linked-contacts{ display:flex;flex-direction:column;gap:8px;margin-top:8px; }
  .linked-card{ display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--line);border-radius:10px; }
  .lc-remove{ margin-left:auto;background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;line-height:1;padding:2px 4px; }
  .lc-remove:hover{ color:#b43c3c; }
</style>
</head>
<body>
<div class="page" id="root"></div>
<div class="toast-stack" id="toasts"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="auth-check.js"></script>
<script type="text/babel" data-presets="env,react">
/* ----------------------------------------------------------------------------
   FORM SCHEMA — definitive list of sections + fields.
   Add/remove fields here; everything (form, progress, payload) follows.
---------------------------------------------------------------------------- */
const SCHEMA = [
  {
    id: 'naam', title: 'Naam',
    fields: [
      { id: 'projectnummer',     label: 'Projectnummer',         type: 'text', required: true,  placeholder: 'Bijv. 24375' },
      { id: 'projectnaam',       label: 'Projectnaam',           type: 'text', required: true,  placeholder: 'Bijv. Galgenwaard' },
      { id: 'alternatieveNaam',  label: 'Alternatieve projectnaam', type: 'text', placeholder: 'n.v.t.' },
    ],
  },
  {
    id: 'algemeen', title: 'Algemeen',
    fields: [
      { id: 'opgave',         label: 'Opgave',           type: 'select', options: ['', 'Stedenbouw', 'Architectuur', 'Interieur', 'Renovatie', 'Onderzoek'] },
      { id: 'projectType',    label: 'Project type',     type: 'select', options: ['', 'Wonen', 'Kantoor', 'Mixed-Use', 'Commercieel', 'Publiek', 'Onderwijs'] },
      { id: 'functie',        label: 'Functie',          type: 'select', options: ['', 'Wonen', 'Kantoor', 'Mixed-Use', 'Commercieel', 'Publiek', 'Onderwijs'] },
      { id: 'verkregenDmv',   label: 'Verkregen d.m.v.', type: 'select', options: ['', 'Tender', 'Directe Opdracht', 'Selectie', 'Prijsvraag'] },
      { id: 'fase',           label: 'Fase / status',    type: 'select', options: ['', 'SO', 'VO', 'DO', 'TO', 'In uitvoering', 'Opgeleverd'] },
    ],
  },
  {
    id: 'link', title: 'Link',
    fields: [
      { id: 'projectmap',     label: 'Projectmap',       type: 'text', placeholder: 'R:\\…' },
    ],
  },
  {
    id: 'locatie', title: 'Locatie',
    fields: [
      { id: 'land',           label: 'Land',             type: 'text', placeholder: 'Nederland' },
      { id: 'provincie',      label: 'Provincie',        type: 'select', options: ['', 'Drenthe','Flevoland','Friesland','Gelderland','Groningen','Limburg','Noord-Brabant','Noord-Holland','Overijssel','Utrecht','Zeeland','Zuid-Holland'] },
      { id: 'stad',           label: 'Stad',             type: 'text' },
      { id: 'straat',         label: 'Straat',           type: 'text' },
      { id: 'huisnummer',     label: 'Nummer',           type: 'text' },
      { id: 'postcode',       label: 'Postcode',         type: 'text', placeholder: '0000 AA' },
    ],
  },

  {
    id: 'metrage', title: 'Metrage',
    fields: [
      { id: 'totaalBvo',      label: 'Totaal BVO (m²)',  type: 'number', placeholder: '80000' },
      { id: 'mWonen',         label: 'Wonen (m²)',       type: 'number' },
      { id: 'mKantoor',       label: 'Kantoor (m²)',     type: 'number' },
      { id: 'mCommercieel',   label: 'Commercieel (m²)', type: 'number' },
      { id: 'mShortstay',     label: 'Shortstay (m²)',   type: 'number' },
      { id: 'mPubliek',       label: 'Publiek (m²)',     type: 'number' },
      { id: 'mOnderwijs',     label: 'Onderwijs (m²)',   type: 'number' },
    ],
  },
  {
    id: 'mobiliteit', title: 'Mobiliteit',
    fields: [
      { id: 'autoparkeren',   label: 'Autoparkeerplekken',  type: 'number' },
      { id: 'fietsparkeren',  label: 'Fietsparkeerplekken', type: 'number' },
      { id: 'ratioWonen',     label: 'Parkeerratio wonen',  type: 'text', placeholder: '0.8 / unit' },
    ],
  },
  {
    id: 'duurzaamheid', title: 'Duurzaamheid',
    fields: [
      { id: 'npgScore',       label: 'NPG score',         type: 'select', options: ['', 'A+', 'A', 'B', 'C'] },
      { id: 'daktuin',        label: 'Daktuin (m²)',      type: 'number' },
      { id: 'zonnepanelen',   label: 'Zonnepanelen (st)', type: 'number' },
      { id: 'label',          label: 'Duurzaamheidslabel', type: 'select', options: ['', 'BREEAM Pass', 'BREEAM Good', 'BREEAM Very Good', 'BREEAM Excellent', 'BREEAM Outstanding', 'LEED Silver', 'LEED Gold', 'LEED Platinum'] },
    ],
  },
  {
    id: 'bouw', title: 'Bouw & erkenning',
    fields: [
      { id: 'opleverdatum',   label: 'Opleverdatum',      type: 'date' },
      { id: 'bouwhoogte',     label: 'Bouwhoogte (m)',    type: 'number' },
      { id: 'tevredenheid',   label: 'Tevredenheid (1–50)', type: 'number' },
      { id: 'awards',         label: 'Aantal awards',     type: 'number' },
    ],
  },
];

/* All field ids — for progress calc */
const ALL_FIELDS = SCHEMA.flatMap(s => s.fields.map(f => ({ section: s.id, ...f })));
const TOTAL_FIELDS = ALL_FIELDS.length;
const REQUIRED_FIELDS = ALL_FIELDS.filter(f => f.required);

/* Storage via Supabase (zie supabase.js) — Projects.upsert / Projects.getByNumber */
// Kolom-naam mapping: camelCase → snake_case voor Supabase
/* ═══════════════════════════════════════
   NIEUW PROJECT — new_project.html
   ═══════════════════════════════════════ */

/* ── toSnake: vertaalt camelCase formuliervelden naar Supabase kolomnamen ── */
function toSnake(obj) {
  const map = {
    projectnummer:'projectnummer', projectnaam:'projectnaam', alternatieveNaam:'alternatieve_naam',
    opgave:'opgave', projectType:'project_type', functie:'functie', verkregenDmv:'verkregen_dmv', fase:'fase',
    projectmap:'projectmap', land:'land', provincie:'provincie', stad:'stad', straat:'straat',
    huisnummer:'huisnummer', postcode:'postcode', opdrachtgever:'opdrachtgever',
    gedelegeerdOpdrachtgever:'gedelegeerd_opdrachtgever', contactpersoon:'contactpersoon',
    telefoon:'telefoon', email:'email', totaalBvo:'totaal_bvo',
    mWonen:'m_wonen', mKantoor:'m_kantoor', mCommercieel:'m_commercieel',
    mShortstay:'m_shortstay', mPubliek:'m_publiek', mOnderwijs:'m_onderwijs',
    autoparkeren:'autoparkeren', fietsparkeren:'fietsparkeren', ratioWonen:'ratio_wonen',
    npgScore:'npg_score', daktuin:'daktuin', zonnepanelen:'zonnepanelen', label:'duurzaamheidslabel',
    bouwhoogte:'bouwhoogte', tevredenheid:'tevredenheid', awards:'awards', opleverdatum:'opleverdatum',
    lat:'lat', lng:'lng',
  };
  const out = {};
  for (const [k, v] of Object.entries(obj)) {
    if (map[k]) out[map[k]] = v;
  }
  return out;
}
/* ── fromSnake: vertaalt Supabase kolomnamen terug naar camelCase voor het formulier ── */
function fromSnake(obj) {
  if (!obj) return {};
  const map = {
    alternatieve_naam:'alternatieveNaam', project_type:'projectType', verkregen_dmv:'verkregenDmv',
    gedelegeerd_opdrachtgever:'gedelegeerdOpdrachtgever', totaal_bvo:'totaalBvo',
    m_wonen:'mWonen', m_kantoor:'mKantoor', m_commercieel:'mCommercieel',
    m_shortstay:'mShortstay', m_publiek:'mPubliek', m_onderwijs:'mOnderwijs',
    ratio_wonen:'ratioWonen', npg_score:'npgScore', duurzaamheidslabel:'label',
  };
  const out = { ...obj };
  for (const [k, v] of Object.entries(map)) {
    if (obj[k] !== undefined) { out[v] = obj[k]; delete out[k]; }
  }
  return out;
}

/* ---------------------------------------------------------------------------
   Confetti
--------------------------------------------------------------------------- */
function launchConfetti() {
  const colors = ['#4e7d9c','#2d8a5e','#c8900a','#9b59b6','#e07b00','#3d6e8a','#f5a623'];
  const shapes = ['■','▲','●','◆'];
  for (let i = 0; i < 90; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-particle';
      el.textContent = shapes[Math.floor(Math.random() * shapes.length)];
      el.style.cssText = [
        `left: ${Math.random() * 100}vw`,
        `font-size: ${8 + Math.random() * 10}px`,
        `color: ${colors[Math.floor(Math.random() * colors.length)]}`,
        `animation-duration: ${1.2 + Math.random() * 1.5}s`,
        `animation-delay: ${Math.random() * 0.6}s`,
        `opacity: ${0.7 + Math.random() * 0.3}`,
      ].join(';');
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }, i * 18);
  }
}

/* ---------------------------------------------------------------------------
   Postcode auto-aanvullen (openpostcode.nl — gratis, geen API key)
--------------------------------------------------------------------------- */
async function lookupPostcode(postcode, huisnummer) {
  const pc = (postcode || '').replace(/\s/g, '').toUpperCase();
  if (!/^[1-9]\d{3}[A-Z]{2}$/.test(pc)) return null;
  try {
    const url = huisnummer
      ? `https://openpostcode.nl/api/v2/address?postcode=${pc}&huisnummer=${encodeURIComponent(huisnummer)}`
      : `https://openpostcode.nl/api/v2/address?postcode=${pc}`;
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    // Single result
    if (data.straat && data.plaats) return { straat: data.straat, stad: data.plaats, provincie: data.provincie || '' };
    // Multiple suggestions → pick first
    if (data.suggestions && data.suggestions.length) {
      const s = data.suggestions[0];
      return { straat: s.straat, stad: s.plaats, provincie: s.provincie || '' };
    }
  } catch(e) {}
  return null;
}

/* ---------------------------------------------------------------------------
   Toast helpers
--------------------------------------------------------------------------- */
function toast(text, kind = 'point', pts){
  const stack = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${kind}`;
  el.innerHTML = pts != null
    ? `<span class="pts">+${pts}</span><span>${text}</span>`
    : `<span>${text}</span>`;
  stack.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

   Pas hieronder de rollen per fase aan als de lijst bekend is.
   'fallback' wordt gebruikt voor fases zonder eigen lijst.
--------------------------------------------------------------------------- */
const SAMENWERKING_ROLLEN = {
  // ── Acquisitie & Schets Ontwerp ──────────────────────────────
  AQ: [
    { id: 'opdrachtgever',          label: 'Opdrachtgever' },
    { id: 'projectmanagement',      label: 'Projectmanagement' },
    { id: 'aannemer',               label: 'Aannemer' },
    { id: 'constructeur',           label: 'Constructeur' },
    { id: 'installateur',           label: 'Installateur' },
    { id: 'bouwfysica',             label: 'Bouwfysica Adviseur' },
    { id: 'brandveiligheid',        label: 'Brandveiligheidsadviseur' },
    { id: 'anders',                 label: 'Anders' },
  ],
  SO: 'AQ', // zelfde als AQ
  // ── Overige fases: zelfde lijst als fallback totdat je ze invult ──
  VO: 'AQ',
  DO: 'AQ',
  TO: 'AQ',
  UV: 'AQ',
  OP: 'AQ',
};

// Resolve alias-verwijzingen
function getRollenVoorFase(fase) {
  if (!fase) return SAMENWERKING_ROLLEN.AQ;
  const key = Object.keys(SAMENWERKING_ROLLEN).find(k =>
    fase.toUpperCase().startsWith(k)
  ) || 'AQ';
  let val = SAMENWERKING_ROLLEN[key];
  // Volg aliassen
  while (typeof val === 'string') val = SAMENWERKING_ROLLEN[val];
  return val || SAMENWERKING_ROLLEN.AQ;
}

/* ---------------------------------------------------------------------------
   ContactZoekPopup — zwevend zoekpaneel per rol
--------------------------------------------------------------------------- */
function ContactZoekPopup({ rolId, rolLabel, allContacts, setAllContacts, geselecteerd, onSelect, onClose, anchorRef }) {
  const [q, setQ] = React.useState('');
  const [openBedrijf, setOpenBedrijf] = React.useState(null); // bedrijfsnaam
  const [nieuwForm, setNieuwForm] = React.useState(false);
  const [nieuw, setNieuw] = React.useState({ naam:'', bedrijf:'', rol: rolLabel, email:'', telefoon:'' });
  const [pos, setPos] = React.useState({ top: 0, left: 0 });
  const panelRef = React.useRef(null);

  // Bereken positie naast de anchor knop
  React.useEffect(() => {
    if (!anchorRef?.current) return;
    const rect = anchorRef.current.getBoundingClientRect();
    const pw = 360, margin = 10;
    let left = rect.right + margin;
    if (left + pw > window.innerWidth - margin) left = rect.left - pw - margin;
    if (left < margin) left = margin;
    let top = rect.top;
    const ph = Math.min(window.innerHeight * 0.72, 520);
    if (top + ph > window.innerHeight - margin) top = window.innerHeight - ph - margin;
    setPos({ top: Math.max(margin, top), left });
  }, [anchorRef]);

  // Sluit bij klik buiten
  React.useEffect(() => {
    const handler = (e) => {
      if (panelRef.current && !panelRef.current.contains(e.target) &&
          anchorRef?.current && !anchorRef.current.contains(e.target)) onClose();
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  // Filter contacten op rol + zoekterm
  const qLow = q.toLowerCase();
  const rolFilter = rolLabel.toLowerCase().replace('adviseur','').replace('advisor','').trim();
  const gefilterd = allContacts.filter(c => {
    const matchRol = !c.rol || c.rol.toLowerCase().includes(rolFilter) ||
      (c.tags||[]).some(t => t.toLowerCase().includes(rolFilter));
    const matchQ = !qLow || c.naam?.toLowerCase().includes(qLow) ||
      c.bedrijf?.toLowerCase().includes(qLow);
    return matchRol && matchQ;
  });

  // Groepeer op bedrijf
  const bedrijven = {};
  gefilterd.forEach(c => {
    const b = c.bedrijf || '— Onbekend bedrijf —';
    if (!bedrijven[b]) bedrijven[b] = [];
    bedrijven[b].push(c);
  });

  // Direct op naam zoeken (alle contacten, niet gefilterd op rol)
  const naamResults = qLow.length > 1
    ? allContacts.filter(c =>
        c.naam?.toLowerCase().includes(qLow) &&
        !gefilterd.find(g => g.id === c.id)
      ).slice(0, 4)
    : [];

  const isGeselecteerd = (c) => geselecteerd.some(g => g.id === c.id);

  const togglePersoon = (c) => {
    if (isGeselecteerd(c)) onSelect(geselecteerd.filter(g => g.id !== c.id));
    else onSelect([...geselecteerd, c]);
  };

  const slaOpNieuw = async () => {
    if (!nieuw.naam.trim()) return;
    try {
      const { data, error } = await db.from('contacts').insert([{
        naam: nieuw.naam.trim(), bedrijf: nieuw.bedrijf.trim(),
        rol: nieuw.rol, email: nieuw.email, telefoon: nieuw.telefoon,
        tags: [rolLabel.toLowerCase()],
      }]).select().single();
      if (!error && data) {
        setAllContacts(prev => [...prev, data]);
        onSelect([...geselecteerd, data]);
        setNieuwForm(false);
        setNieuw({ naam:'', bedrijf:'', rol: rolLabel, email:'', telefoon:'' });
      }
    } catch(e) {}
  };

  return (
    <div ref={panelRef} style={{
      position:'fixed', top: pos.top, left: pos.left, zIndex:1000,
      width:'360px', maxHeight:'72vh',
      background:'var(--card)', border:'1px solid var(--line)', borderRadius:'16px',
      boxShadow:'0 8px 40px -8px rgba(26,35,50,.24)',
      display:'flex', flexDirection:'column',
      animation:'fadeUp .15s ease',
    }}>
      <style>{`@keyframes fadeUp{ from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }`}</style>

      {/* Header */}
      <div style={{padding:'14px 16px 10px', borderBottom:'1px solid var(--line)', flexShrink:0}}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'10px'}}>
          <span style={{fontSize:'12px', fontWeight:700, letterSpacing:'.1em', textTransform:'uppercase', color:'var(--accent)'}}>{rolLabel}</span>
          <button onClick={onClose} style={{background:'none',border:'1px solid var(--line)',borderRadius:'999px',padding:'4px 10px',fontSize:'11px',cursor:'pointer',color:'var(--muted)'}}>✕</button>
        </div>
        <input
          autoFocus
          value={q} onChange={e => setQ(e.target.value)}
          placeholder={`Zoek bedrijf of naam…`}
          style={{width:'100%', border:'1px solid var(--line)', borderRadius:'999px', padding:'8px 14px', fontSize:'13px', fontFamily:'inherit', background:'var(--bg)', color:'var(--ink)', outline:'none'}}
        />
      </div>

      {/* Resultaten */}
      <div style={{flex:1, overflowY:'auto', padding:'10px 12px'}}>

        {/* Directe naamtreffers (andere rollen) */}
        {naamResults.length > 0 && (
          <div style={{marginBottom:'10px'}}>
            <div style={{fontSize:'10px', fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--muted)', padding:'0 4px 6px'}}>Op naam gevonden</div>
            {naamResults.map(c => (
              <ContactRij key={c.id} contact={c} geselecteerd={isGeselecteerd(c)} onToggle={() => togglePersoon(c)} />
            ))}
          </div>
        )}

        {/* Bedrijfsgroepen */}
        {Object.keys(bedrijven).length === 0 && !naamResults.length && (
          <div style={{color:'var(--muted)', fontSize:'13px', textAlign:'center', padding:'24px 0'}}>Geen resultaten</div>
        )}
        {Object.entries(bedrijven).map(([bedrijf, personen]) => (
          <div key={bedrijf} style={{marginBottom:'6px', border:'1px solid var(--line)', borderRadius:'10px', overflow:'hidden'}}>
            {/* Bedrijfsrij */}
            <button onClick={() => setOpenBedrijf(openBedrijf === bedrijf ? null : bedrijf)}
              style={{width:'100%', display:'flex', alignItems:'center', gap:'10px', padding:'10px 12px',
                background: openBedrijf === bedrijf ? 'rgba(78,125,156,.07)' : 'none',
                border:'none', cursor:'pointer', fontFamily:'inherit', textAlign:'left'}}>
              <div style={{width:'32px',height:'32px',borderRadius:'8px',background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:800,color:'#fff',flexShrink:0}}>
                {bedrijf.slice(0,2).toUpperCase()}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700, fontSize:'13px', color:'var(--ink)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{bedrijf}</div>
                <div style={{fontSize:'11px', color:'var(--muted)'}}>
                  {personen.length} persoon{personen.length !== 1 ? 'en' : ''}
                  {personen.filter(p => isGeselecteerd(p)).length > 0 &&
                    <span style={{color:'var(--good)', marginLeft:'6px', fontWeight:700}}>✓ {personen.filter(p=>isGeselecteerd(p)).length} geselecteerd</span>}
                </div>
              </div>
              <span style={{color:'var(--muted)', fontSize:'12px'}}>{openBedrijf === bedrijf ? '▲' : '▼'}</span>
            </button>
            {/* Personen onder bedrijf */}
            {openBedrijf === bedrijf && (
              <div style={{borderTop:'1px solid var(--line)'}}>
                {personen.map(c => (
                  <ContactRij key={c.id} contact={c} geselecteerd={isGeselecteerd(c)} onToggle={() => togglePersoon(c)} indent />
                ))}
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Nieuw contact */}
      <div style={{borderTop:'1px solid var(--line)', padding:'10px 12px', flexShrink:0}}>
        {!nieuwForm ? (
          <button onClick={() => setNieuwForm(true)}

              background:'none', cursor:'pointer', fontSize:'12px', fontWeight:600, color:'var(--muted)', fontFamily:'inherit'}}>
            + Nieuw contact aanmaken
          </button>
        ) : (
          <div style={{display:'flex', flexDirection:'column', gap:'7px'}}>
            <div style={{fontSize:'11px', fontWeight:700, letterSpacing:'.1em', textTransform:'uppercase', color:'var(--muted)'}}>Nieuw contact</div>
            {['naam','bedrijf','email','telefoon'].map(veld => (
              <input key={veld} placeholder={veld.charAt(0).toUpperCase()+veld.slice(1)+(veld==='naam'?' *':'')}
                value={nieuw[veld]} onChange={e => setNieuw(p=>({...p,[veld]:e.target.value}))}
                style={{border:'1px solid var(--line)',borderRadius:'7px',padding:'7px 10px',fontSize:'12px',fontFamily:'inherit',background:'var(--bg)',color:'var(--ink)',outline:'none'}} />
            ))}

            </div>

        )}
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------------------
   SamenwerkingSection — de kaart met rollen per fase
--------------------------------------------------------------------------- */
function SamenwerkingSection({ fase, allContacts, setAllContacts, samenwerkingen, setSamenwerkingen }) {
  const rollen = getRollenVoorFase(fase);
  const [openPopup, setOpenPopup] = React.useState(null); // rolId
  const btnRefs = React.useRef({});

  const getState = (rolId) => samenwerkingen[rolId] || { nvt: false, personen: [] };
  const setState = (rolId, patch) => setSamenwerkingen(prev => ({
    ...prev, [rolId]: { ...getState(rolId), ...patch }
  }));

  const toggleNvt = (rolId) => setState(rolId, { nvt: !getState(rolId).nvt });
  const setPersonen = (rolId, personen) => setState(rolId, { personen });

  const totaalGekoppeld = Object.values(samenwerkingen).reduce((n, s) => n + (s.personen||[]).length, 0);

  return (
    <section className="section">
      <h2>
        Samenwerkingen
        <span className="count">{totaalGekoppeld > 0 ? `${totaalGekoppeld} gekoppeld` : fase ? '' : 'Kies eerst een fase'}</span>
      </h2>
      {!fase && (
        <div style={{padding:'20px 22px', color:'var(--muted)', fontSize:'13px'}}>
          Vul eerst de <strong style={{color:'var(--ink)'}}>Fase / status</strong> in om de juiste samenwerkingsrollen te zien.
        </div>
      )}
      {rollen.map(rol => {
        const st = getState(rol.id);
        const isNvt = st.nvt;
        const personen = st.personen || [];
        if (!btnRefs.current[rol.id]) btnRefs.current[rol.id] = React.createRef();

        return (
          <div key={rol.id} className="field" style={{ opacity: isNvt ? 0.45 : 1, transition:'opacity .2s' }}>
            {/* Label kolom */}
            <label style={{ display:'flex', alignItems:'center', justifyContent:'space-between', paddingRight:'12px' }}>
              <span style={{ textDecoration: isNvt ? 'line-through' : 'none', color: isNvt ? 'var(--muted)' : 'var(--ink-2)' }}>
                {rol.label}
              </span>
              <button
                onClick={() => toggleNvt(rol.id)}
                title={isNvt ? 'Markeer als relevant' : 'Markeer als n.v.t.'}
                style={{
                  background: isNvt ? 'var(--line)' : 'none',
                  border:'1px solid var(--line)', borderRadius:'999px',
                  padding:'2px 8px', fontSize:'10px', fontWeight:700,
                  cursor:'pointer', color: isNvt ? 'var(--muted)' : 'var(--muted)',
                  letterSpacing:'.06em', fontFamily:'inherit', flexShrink:0,
                }}>
                n.v.t.
              </button>
            </label>

            {/* Rechterkolom: geselecteerde personen + zoekknop */}
            <div style={{ display:'flex', flexDirection:'column', gap:'6px', padding:'10px 16px' }}>
              {/* Geselecteerde personen */}
              {personen.map(p => (
                <div key={p.id} style={{
                  display:'flex', alignItems:'center', gap:'8px',
                  padding:'6px 10px', borderRadius:'8px',
                  background:'rgba(45,138,94,.07)', border:'1px solid rgba(45,138,94,.2)',
                }}>
                  <div style={{width:'24px',height:'24px',borderRadius:'50%',background:'var(--good)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'9px',fontWeight:800,color:'#fff',flexShrink:0}}>
                    {(p.naam||'?').split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase()}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:'12px',color:'var(--ink)'}}>{p.naam}</div>
                    {p.bedrijf && <div style={{fontSize:'11px',color:'var(--muted)'}}>{p.bedrijf}</div>}
                  </div>
                  <button onClick={() => setPersonen(rol.id, personen.filter(x=>x.id!==p.id))}
                    style={{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:'14px',padding:'0 2px',lineHeight:1}}>×</button>
                </div>
              ))}

              {/* Zoekknop */}
              {!isNvt && (
                <div style={{position:'relative'}}>
                  <button
                    ref={btnRefs.current[rol.id]}
                    onClick={() => setOpenPopup(openPopup === rol.id ? null : rol.id)}
                    style={{
                      display:'inline-flex', alignItems:'center', gap:'6px',
                      background:'none', border:'1px dashed var(--line)', borderRadius:'999px',
                      padding:'6px 14px', fontSize:'12px', fontWeight:600,
                      color:'var(--muted)', cursor:'pointer', fontFamily:'inherit',
                      transition:'border-color .12s, color .12s',
                    }}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--accent)';e.currentTarget.style.color='var(--accent)';}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--line)';e.currentTarget.style.color='var(--muted)';}}

                      anchorRef={btnRefs.current[rol.id]}
                    />
                  )}
                </div>
              )}
            </div>
          </div>
        );
      })}
    </section>
  );
}

function Field({ field, value, onChange, prevFilled, suggestions, onPostcodeLookup, postcodeLoading }){
  const filled = value != null && value !== '';
  const cls = filled ? 'filled' : '';
  const [showSugg, setShowSugg] = React.useState(false);
  const handle = (v) => {
    onChange(field.id, v);
    if (!prevFilled && v !== '' && v != null){
      toast(`Veld ingevuld · ${field.label}`, 'point', 1);
    }
    // Postcode trigger
    if (field.id === 'postcode' && onPostcodeLookup) {
      onPostcodeLookup(v, null);
    }
  };

  if (field.type === 'select'){
    return (
      <select className={cls} value={value || ''} onChange={(e) => handle(e.target.value)}>
        {field.options.map(o => <option key={o} value={o}>{o || '— Kies —'}</option>)}
      </select>
    );
  }

  // Tekstveld met suggesties
  const hasSugg = suggestions && suggestions.length > 0 && !filled;
  return (
    <div style={{position:'relative'}}>
      <input type={field.type} className={cls} value={value || ''}
             placeholder={field.placeholder || ''}
             onChange={(e) => handle(e.target.value)}
             onFocus={() => hasSugg && setShowSugg(true)}
             onBlur={() => setTimeout(() => setShowSugg(false), 150)} />
      {field.id === 'postcode' && postcodeLoading && (
        <span className="postcode-loading"> ⏳ adres ophalen…</span>
      )}
      {hasSugg && showSugg && (
        <div className="suggestions-dropdown">
          {suggestions.map(s => (
            <button key={s} onMouseDown={() => { handle(s); setShowSugg(false); }}>{s}</button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── App: het invulformulier
   - SECTIONS definieert alle velden gegroepeerd per onderwerp
   - sla op naar Supabase via Projects.upsert()
   - ondersteunt bewerken via ?edit=projectnummer in de URL
   - afbeeldingen uploaden via Images.upload() naar Supabase Storage ── */
/* ── geocodeAddress: zet adres om naar lat/lng via Nominatim ── */
async function geocodeAddress(stad, straat, huisnummer, postcode, land) {
  const parts = [straat, huisnummer, postcode, stad, land || 'Nederland'].filter(Boolean);
  if (!parts.length) return null;
  const query = parts.join(' ');
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`,
      { headers: { 'Accept-Language': 'nl', 'User-Agent': 'MVSA-Projecten/1.0' } }
    );
    const data = await res.json();
    if (data && data[0]) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
  } catch(e) { console.warn('Geocode mislukt:', e); }
  // Fallback: alleen stad proberen
  if (stad) {
    try {
      const res2 = await fetch(
        `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(stad + ', Nederland')}`,
        { headers: { 'Accept-Language': 'nl', 'User-Agent': 'MVSA-Projecten/1.0' } }
      );
      const data2 = await res2.json();
      if (data2 && data2[0]) return { lat: parseFloat(data2[0].lat), lng: parseFloat(data2[0].lon) };
    } catch(e) {}
  }
  return null;
}

function App(){
  const editKey = new URLSearchParams(window.location.search).get('edit');
  const isEdit = !!editKey;
  const [data, setData] = React.useState({});
  const safeData = data || {};
  const [loading, setLoading] = React.useState(!!editKey);
  React.useEffect(() => {
    if (!editKey) return;
    Projects.getByNumber(editKey).then(found => {
      if (found) setData(fromSnake(found) || {});
      setLoading(false);
    }).catch(() => setLoading(false));
  }, []);
  const filledMap = React.useRef(
    Object.fromEntries(Object.entries(data).map(([k, v]) => [k, v !== '' && v != null]))
  );

  const setField = (id, v) => {
    setData(d => ({ ...d, [id]: v }));
    filledMap.current[id] = (v !== '' && v != null);
  };

  const filledCount = ALL_FIELDS.filter(f => f && ((safeData[f.id] != null && safeData[f.id] !== '') || nvtFields[f.id])).length;
  const requiredOk = REQUIRED_FIELDS.every(f => f && safeData[f.id] != null && safeData[f.id] !== '');
  const pct = (filledCount / TOTAL_FIELDS) * 100;

  const sectionFilledCount = (sec) =>
    (sec?.fields || []).filter(f => f && ((safeData[f.id] != null && safeData[f.id] !== '') || nvtFields[f.id])).length;

  const onSave = async () => {
    if (!requiredOk){
      toast('Vul eerst de verplichte velden in', 'save');
      return;
    }
    try {
      // Geocode het adres als lat/lng nog niet aanwezig of adres gewijzigd
      const saveData = { ...data };
      const hasCoords = saveData.lat && saveData.lng;
      const hasAddress = saveData.stad || saveData.straat || saveData.postcode;
      if (!hasCoords && hasAddress) {
        try {
          const coords = await geocodeAddress(saveData.stad, saveData.straat, saveData.huisnummer, saveData.postcode, saveData.land);
          if (coords) { saveData.lat = coords.lat; saveData.lng = coords.lng; }
        } catch(e) { console.warn('Geocoding overgeslagen:', e); }
      }
      const savedProject = await Projects.upsert({ ...toSnake(saveData), created_by: (await db.auth.getUser()).data?.user?.id || null });
      // Samenwerkingen opslaan
      if (savedProject?.id) {
        try {
          const contactIds = Object.values(samenwerkingen)
            .filter(s => !s.nvt)
            .flatMap(s => s.personen || [])
            .map(p => ({ project_id: savedProject.id, contact_id: p.id }));
          if (contactIds.length) {
            await db.from('project_contacts').upsert(contactIds, { onConflict:'project_id,contact_id' });
          }
        } catch(e) { console.warn('Samenwerkingen koppelen mislukt:', e); }
      }

      // Punten toekennen: 1 punt per ingevuld veld
      const filledFields = Object.values(toSnake(data)).filter(v => v !== null && v !== '' && v !== undefined).length;
      await Employees.addPoints(filledFields);

      // Eerste keer opslaan → projectenteller ophogen
      if (!isEdit) {
        await Employees.incrementProjects();
      }

      // ── Streak bijhouden ──
      const streakResult = Employees.updateStreak();
      if (streakResult.broken) {
        toast(`Streak verbroken 😢 — nieuwe streak gestart!`, 'streak');
      } else if (streakResult.isNew && streakResult.streak > 1) {
        toast(`🔥 ${streakResult.streak} dagen op rij! Streak gaande`, 'streak');
      }

      // ── Badges controleren ──
      try {
        const { data: { user } } = await db.auth.getUser();
        if (user) {
          const { data: profile } = await db.from('profiles')
            .select('score, projecten').eq('id', user.id).maybeSingle();
          const prevBadges = JSON.parse(localStorage.getItem('mvsa.badges') || '[]');
          const newBadges  = Employees.getBadges(profile);
          const unlocked   = newBadges.filter(b => !prevBadges.includes(b.id));
          if (unlocked.length) {
            localStorage.setItem('mvsa.badges', JSON.stringify(newBadges.map(b => b.id)));
            unlocked.forEach((b, i) => {
              setTimeout(() => toast(`${b.icon} Badge verdiend: ${b.label}!`, 'badge-new'), i * 600);
            });
          }
        }
      } catch(e) {}

      // Log activiteit
      try {
        const log = JSON.parse(localStorage.getItem('mvsa.log') || '[]');
        log.unshift({ action: 'save', project: data.projectnaam || data.projectnummer || 'Naamloos', time: new Date().toISOString() });
        localStorage.setItem('mvsa.log', JSON.stringify(log.slice(0,50)));
      } catch(e) {}

      // ── Confetti + toast ──
      launchConfetti();
      toast(`Project opgeslagen · ${filledFields} velden = ${filledFields} punten`, 'save', filledFields);
      setTimeout(() => { window.location.href = `project_page.html?nr=${encodeURIComponent(data.projectnummer || '')}&p=${encodeURIComponent(data.projectnaam || '')}`; }, 1800);
    } catch(e) {
      toast('Opslaan mislukt: ' + e.message, 'save');
      console.error('Supabase fout:', e);
    }
  };

  const onReset = () => {
    if (confirm('Formulier leegmaken?')) { setData({}); filledMap.current = {}; }
  };

  // ── Postcode auto-aanvullen ──
  const [postcodeLoading, setPostcodeLoading] = React.useState(false);
  const postcodeTimer = React.useRef(null);
  const doPostcodeLookup = React.useCallback(async (postcode, huisnummer) => {
    clearTimeout(postcodeTimer.current);
    postcodeTimer.current = setTimeout(async () => {
      setPostcodeLoading(true);
      const result = await lookupPostcode(postcode, huisnummer);
      setPostcodeLoading(false);
      if (result) {
        setData(d => ({
          ...d,
          ...(result.straat && !d.straat ? { straat: result.straat } : {}),
          ...(result.stad   && !d.stad   ? { stad:   result.stad   } : {}),
          ...(result.provincie && !d.provincie ? { provincie: result.provincie } : {}),
        }));
        if (result.straat || result.stad) toast('📍 Adres aangevuld via postcode', 'point');
      }
    }, 600);
  }, []);

  // ── Veld-suggesties: haal unieke waarden op uit bestaande projecten ──
  const [suggestions, setSuggestions] = React.useState({});
  React.useEffect(() => {
    Projects.getAll().then(projects => {
      const SUGGEST_FIELDS = ['project_type','functie','verkregen_dmv','fase','land','provincie','duurzaamheidslabel','npg_score'];
      const map = {};
      SUGGEST_FIELDS.forEach(f => {
        const vals = [...new Set(projects.map(p => p[f]).filter(Boolean))].slice(0, 8);
        if (vals.length) map[f] = vals;
      });
      setSuggestions(map);
    }).catch(() => {});
  }, []);

  // Afbeeldingen
  const [images, setImages] = React.useState([]);
  const [uploading, setUploading] = React.useState(false);
  const [uploadErr, setUploadErr] = React.useState(null);

  // Adressenboek
  const [allContacts, setAllContacts] = React.useState([]);
  const [samenwerkingen, setSamenwerkingen] = React.useState({}); // { rolId: { nvt: bool, personen: [{...contact}] } }
  // n.v.t. per veld
  const [nvtFields, setNvtFields] = React.useState({});
  const toggleNvtField = (id) => setNvtFields(prev => ({ ...prev, [id]: !prev[id] }));
  React.useEffect(() => {
    db.from('contacts').select('id,naam,bedrijf,rol,email,telefoon,tags').order('naam')
      .then(({ data }) => setAllContacts(data || [])).catch(() => {});
  }, []);

  React.useEffect(() => {
    if (!data.projectnummer) return;
    Images.getForProject(data.projectnummer).then(setImages).catch(() => {});
  }, [data.projectnummer]);

  const handleImageUpload = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    if (!data.projectnummer) { setUploadErr('Vul eerst het projectnummer in.'); return; }
    setUploading(true); setUploadErr(null);
    try {
      const urls = await Promise.all(files.map(f => Images.upload(data.projectnummer, f)));
      setImages(prev => [...prev, ...urls]);
    } catch(err) {
      setUploadErr('Upload mislukt: ' + err.message);
    }
    setUploading(false);
    e.target.value = '';
  };

  const handleRemoveImage = async (url) => {
    if (!confirm('Afbeelding verwijderen?')) return;
    await Images.remove(url);
    setImages(prev => prev.filter(u => u !== url));
  };

  return (
    <>
      <header className="topbar">
        <div className="crumbs">
          <a href="projects_dashboard.html">Dashboard</a>
          {' · '}
          <a href="projects_list.html">Projecten</a>
          {' · '}
          <strong>{isEdit ? 'Bewerken' : 'Nieuw project'}</strong>
        </div>
        <div style={{fontSize:'12px', color:'var(--muted)'}}>
          Per veld <strong style={{color:'var(--ink)'}}>+1 punt</strong> voor het leaderboard
        </div>
      </header>

      <div className="progress-card">
        <div>
          <div className="meta-line">Voortgang · {filledCount} van {TOTAL_FIELDS} velden</div>
          <div className="bar"><span style={{ width: `${pct}%` }}></span></div>
        </div>
        <div className="stat">
          <div className="num">{filledCount}</div>
          <div className="lbl">Punten</div>
        </div>
        <button className="save-btn" onClick={onSave} disabled={!requiredOk}>
          Opslaan →
        </button>
      </div>

      {SCHEMA.map(sec => {
        const afterLocatie = sec.id === 'locatie';
        const filled = sectionFilledCount(sec);
        const allDone = filled === sec.fields.length;
        return (
          <React.Fragment key={sec.id}>
          <section className="section">
            <h2>
              {sec.title}
              <span className={`count ${allDone ? 'done' : ''}`}>
                {filled} / {sec.fields.length}
              </span>
            </h2>
            {sec.fields.map(f => {
                const isNvt = !!nvtFields[f.id];
                return (
              <div key={f.id} className="field" style={{ opacity: isNvt ? 0.45 : 1, transition:'opacity .2s' }}>
                <label style={{ textDecoration: isNvt ? 'line-through' : 'none' }}>
                  {f.label}
                  {f.required && <span className="req">*</span>}
                </label>
                <div style={{ display:'flex', alignItems:'center', gap:'8px', padding:'9px 16px' }}>
                  {!isNvt ? (
                    <div style={{ flex:1, position:'relative' }}>
                      <Field
                        field={f}
                        value={safeData[f.id]}
                        prevFilled={filledMap.current[f.id]}
                        onChange={setField}
                        suggestions={suggestions[{
                          projectType:'project_type', functie:'functie', verkregenDmv:'verkregen_dmv',
                          fase:'fase', land:'land', provincie:'provincie', label:'duurzaamheidslabel', npgScore:'npg_score'
                        }[f.id]]}
                        onPostcodeLookup={(pc, nr) => doPostcodeLookup(pc, data.huisnummer || nr)}
                        postcodeLoading={postcodeLoading && f.id === 'postcode'}
                      />
                    </div>
                  ) : (
                    <span style={{ flex:1, fontSize:'12px', color:'var(--muted)', fontStyle:'italic' }}>n.v.t.</span>
                  )}
                  {!f.required && (
                    <button
                      onClick={() => toggleNvtField(f.id)}
                      style={{
                        flexShrink: 0,
                        background: isNvt ? 'var(--line)' : 'none',
                        border: '1px solid var(--line)', borderRadius:'999px',
                        padding:'3px 9px', fontSize:'10px', fontWeight:700,
                        cursor:'pointer', color:'var(--muted)',
                        letterSpacing:'.06em', fontFamily:'inherit',
                        transition:'background .12s',
                      }}>
                      n.v.t.
                    </button>
                  )}
                </div>
              </div>
                );
              })}
          </section>
          {afterLocatie && (
      <React.Fragment>
      <SamenwerkingSection
        fase={data.fase}
        allContacts={allContacts}
        setAllContacts={setAllContacts}
        samenwerkingen={samenwerkingen}
        setSamenwerkingen={setSamenwerkingen}
      />
      </React.Fragment>
          )}
          </React.Fragment>
        );
      })}

      {/* AFBEELDINGEN SECTIE */}
      <section className="section">
        <h2 style={{color:'#3d6e8a', fontSize:'11px', fontWeight:700, letterSpacing:'.22em', textTransform:'uppercase', margin:'0 0 18px', display:'flex', alignItems:'center', gap:'12px'}}>
          Afbeeldingen
          <span style={{marginLeft:'auto', fontSize:'10px', color:'#6b7480', fontWeight:600}}>{images.length} bestand{images.length !== 1 ? 'en' : ''}</span>
        </h2>

        {/* Uploadknop */}
        <div style={{padding:'12px 0', borderBottom:'1px solid #e6ecf2'}}>
          <label style={{
            display:'inline-flex', alignItems:'center', gap:'8px',
            background:'#111418', color:'#fff', padding:'10px 18px', borderRadius:'999px',
            fontSize:'11px', letterSpacing:'.14em', textTransform:'uppercase', fontWeight:700,
            cursor: data.projectnummer ? 'pointer' : 'not-allowed',
            opacity: data.projectnummer ? 1 : 0.5,
          }}>
            {uploading ? '⏳ Uploaden…' : '+ Afbeeldingen toevoegen'}
            <input type="file" accept="image/*" multiple onChange={handleImageUpload}
              disabled={!data.projectnummer || uploading}
              style={{display:'none'}} />
          </label>
          {!data.projectnummer && <span style={{marginLeft:'12px', fontSize:'12px', color:'#6b7480'}}>Vul eerst het projectnummer in</span>}
          {uploadErr && <span style={{marginLeft:'12px', fontSize:'12px', color:'#b43c3c'}}>{uploadErr}</span>}
        </div>

        {/* Preview grid */}
        {images.length > 0 && (
          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(160px, 1fr))', gap:'10px', marginTop:'16px'}}>
            {images.map((url, i) => (
              <div key={url} style={{position:'relative', borderRadius:'10px', overflow:'hidden', aspectRatio:'4/3', background:'#e6ecf2'}}>
                {i === 0 && <span style={{position:'absolute', top:'8px', left:'8px', background:'#111418', color:'#fff', fontSize:'9px', letterSpacing:'.12em', textTransform:'uppercase', fontWeight:700, padding:'3px 8px', borderRadius:'999px', zIndex:2}}>Cover</span>}
                <img src={url} alt="" style={{width:'100%', height:'100%', objectFit:'cover', display:'block'}} />
                <button onClick={() => handleRemoveImage(url)} style={{
                  position:'absolute', top:'6px', right:'6px', background:'rgba(180,60,60,.9)',
                  color:'#fff', border:'none', borderRadius:'50%', width:'24px', height:'24px',
                  cursor:'pointer', fontSize:'12px', display:'flex', alignItems:'center', justifyContent:'center', zIndex:2
                }}>×</button>
              </div>
            ))}
          </div>
        )}
      </section>

      <div className="save-actions">
        <button className="secondary-btn" onClick={onReset}>Leegmaken</button>
        <button className="save-btn" onClick={onSave} disabled={!requiredOk}>
          Project opslaan →
        </button>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script src="dark-mode.js"></script>
<script src="transitions.js"></script>

<style>

[data-theme="dark"] 

</style>
<div class="auth-bar" id="auth-bar" style="display:none;"></div>
<script>
(async function(){
  const bar = document.getElementById('auth-bar');
  if (!bar || typeof db === 'undefined') return;
  try {
    const { data: { user } } = await db.auth.getUser();
    if (!user) {
      bar.innerHTML = '<a class="ab-login" href="login.html">Inloggen →</a>';
      bar.style.display = 'flex';
      return;
    }
    const { data: profile } = await db.from('profiles').select('naam,status,employee_id').eq('id', user.id).maybeSingle();
    if (!profile || profile.status !== 'approved') {
      bar.innerHTML = '<a class="ab-login" href="login.html">Inloggen →</a>';
      bar.style.display = 'flex';
      return;
    }
    const initials = (profile.naam||'?').split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();
    // Probeer foto te laden
    let photoHtml = initials;
    if (profile.employee_id) {
      try {
        const url = await EmployeeImages.getForEmployee(profile.employee_id);
        if (url) photoHtml = '<img src="' + url + '" alt="">';
      } catch(e) {}
    }
    bar.innerHTML = '<a href="profile.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;" title="Mijn profiel"><div class="ab-avatar">' + photoHtml + '</div>'
      + '<span class="ab-name">' + profile.naam + '</span></a>'
      + '<button class="ab-logout" onclick="Auth.logout().then(()=>location.reload())">Uitloggen</button>';
    bar.style.display = 'flex';
  } catch(e) {
    bar.style.display = 'flex';
  }
})();
</script>

<div class="auth-bar" id="auth-bar"></div>
<script src="auth-bar.js"></script>
</body>
