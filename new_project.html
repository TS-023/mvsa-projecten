<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nieuw project · MVSA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  :root{
    --bg: #f4f1ec;
    --card: #ffffff;
    --ink: #111418;
    --ink-2: #2a2f36;
    --muted: #8a8d93;
    --line: #e8e4dd;
    --shadow: 0 1px 0 rgba(20,30,45,.04), 0 8px 24px -12px rgba(20,30,45,.18);
    --radius: 16px;
    --accent: #3d6e8a;
    --good: #1c8c50;
  }
  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; background: var(--bg); color: var(--ink); font-family: 'Inter', Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
  .page{ max-width: 920px; margin: 0 auto; padding: 32px 32px 120px; }

  /* Floating back button */
  .back{
    position: fixed; top: 24px; left: 24px; z-index: 100;
    display:inline-flex; align-items:center; gap:8px; color: var(--ink); text-decoration:none;
    font-size: 12px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600;
    padding: 10px 16px; border-radius: 999px;
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border:1px solid rgba(17,20,24,.08);
    box-shadow: 0 4px 16px -4px rgba(20,30,45,.18);
    transition: background .15s ease, transform .15s ease;
  }
  .back:hover{ background: #fff; transform: translateY(-1px); }

  /* Header */
  .header{
    display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: end;
    margin-bottom: 24px; padding-top: 4px;
  }
  .header h1{
    margin: 0; font-size: clamp(36px, 5vw, 56px);
    font-weight: 800; letter-spacing: -.035em; line-height: 1;
  }
  .header .sub{ font-size: 13px; color: var(--muted); margin-top: 8px; max-width: 520px; line-height: 1.6; }

  /* Progress card (sticky) */
  .progress-card{
    position: sticky; top: 16px; z-index: 50;
    background: var(--card); border-radius: 16px; box-shadow: var(--shadow);
    padding: 16px 20px; margin-bottom: 18px;
    display: grid; grid-template-columns: 1fr auto auto; gap: 20px; align-items: center;
  }
  .progress-card .meta-line{
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  }
  .progress-card .bar{
    height: 8px; background: rgba(17,20,24,.06); border-radius: 4px; overflow: hidden;
  }
  .progress-card .bar > span{
    display: block; height: 100%;
    background: linear-gradient(90deg, var(--accent), #5a8eaa);
    border-radius: 4px; transition: width .3s ease;
  }
  .progress-card .stat{ text-align: right; }
  .progress-card .stat .num{ font-size: 22px; font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums; }
  .progress-card .stat .lbl{ font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

  .save-btn{
    background: var(--ink); color: #fff; border: 0; padding: 12px 22px; border-radius: 999px;
    font-family: inherit; font-size: 12px; letter-spacing: .14em; text-transform: uppercase; font-weight: 700;
    cursor: pointer; transition: background .15s ease, transform .15s ease;
  }
  .save-btn:hover{ background: var(--accent); transform: translateY(-1px); }
  .save-btn:disabled{ background: #c4cbd3; cursor: not-allowed; transform: none; }

  /* Section */
  .section{
    background: var(--card); border-radius: 16px; box-shadow: var(--shadow);
    padding: 24px 28px; margin-bottom: 14px;
  }
  .section h2{
    margin: 0 0 18px; font-size: 11px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase;
    color: var(--accent);
    display: flex; align-items: center; gap: 12px;
  }
  .section h2 .count{
    margin-left: auto; font-size: 10px; color: var(--muted); letter-spacing: .14em; font-weight: 600;
  }
  .section h2 .count.done{ color: var(--good); }

  /* Field row */
  .field{
    display: grid; grid-template-columns: 220px 1fr;
    gap: 20px; padding: 12px 0; border-bottom: 1px solid var(--line);
    align-items: center;
  }
  .field:last-child{ border-bottom: 0; padding-bottom: 0; }
  .field label{
    font-size: 13px; color: var(--ink-2); font-weight: 500;
  }
  .field label .req{ color: #b43c3c; margin-left: 2px; }
  .field input, .field select, .field textarea{
    width: 100%; font-family: inherit; font-size: 13px;
    background: #fafbfc; border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 12px; color: var(--ink);
    transition: background .15s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    outline: none; background: #fff; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(61,110,138,.12);
  }
  .field input.filled, .field select.filled, .field textarea.filled{
    background: #fff; border-color: rgba(28,140,80,.3);
  }
  .field .row-2{ display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field .row-3{ display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  /* Toast */
  .toast-stack{
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast{
    background: var(--ink); color: #fff; padding: 10px 16px; border-radius: 999px;
    font-size: 12px; letter-spacing: .04em; font-weight: 600;
    box-shadow: 0 12px 28px -8px rgba(0,0,0,.3);
    display: flex; align-items: center; gap: 10px;
    animation: slideIn .25s ease, slideOut .3s ease 1.6s forwards;
  }
  .toast.point{ background: var(--good); }
  .toast.save{ background: var(--accent); }
  .toast .pts{
    background: rgba(255,255,255,.2); padding: 2px 8px; border-radius: 999px;
    font-variant-numeric: tabular-nums; font-weight: 700;
  }
  @keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
  @keyframes slideOut { to { opacity:0; transform: translateX(20px); } }

  /* Save bar at bottom */
  .save-actions{
    display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px;
  }
  .secondary-btn{
    background: transparent; color: var(--ink); border: 1px solid rgba(17,20,24,.15);
    padding: 12px 22px; border-radius: 999px;
    font-family: inherit; font-size: 12px; letter-spacing: .14em; text-transform: uppercase; font-weight: 600;
    cursor: pointer; transition: background .15s ease;
  }
  .secondary-btn:hover{ background: rgba(255,255,255,.6); }

  @media (max-width: 720px){
    .field{ grid-template-columns: 1fr; gap: 6px; }
    .header{ grid-template-columns: 1fr; }
    .progress-card{ grid-template-columns: 1fr; }
    .progress-card .stat{ text-align: left; }
  }

  .contact-overlay{ position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.35);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .25s; }
  .contact-overlay.open{ opacity:1;pointer-events:all; }
  .contact-panel{ position:fixed;top:0;right:0;bottom:0;z-index:901;width:420px;max-width:96vw;background:var(--bg);border-left:1px solid var(--line);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 32px rgba(0,0,0,.12); }
  .contact-panel.open{ transform:translateX(0); }
  .cp-head{ padding:20px 20px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;flex-shrink:0; }
  .cp-head h3{ flex:1;font-size:15px;font-weight:700;margin:0; }
  .cp-close{ background:none;border:1px solid var(--line);border-radius:999px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted); }
  .cp-search{ width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:999px;padding:9px 16px;font-size:13px;background:var(--bg);color:var(--ink);outline:none; }
  .cp-filters{ display:flex;flex-wrap:wrap;gap:6px;padding:10px 20px 0; }
  .cp-filter{ padding:4px 12px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid var(--line);cursor:pointer;background:transparent;color:var(--muted);transition:all .12s; }
  .cp-filter.active{ background:var(--ink);color:#fff;border-color:var(--ink); }
  .cp-cards{ flex:1;overflow-y:auto;padding:14px 20px;display:flex;flex-direction:column;gap:10px; }
  .vcard{ border:1px solid var(--line);border-radius:12px;padding:14px 16px;cursor:pointer;transition:border-color .12s,box-shadow .12s;display:flex;align-items:center;gap:12px; }
  .vcard:hover{ border-color:var(--ink);box-shadow:0 2px 12px rgba(0,0,0,.08); }
  .vcard.selected{ border-color:var(--ink);background:var(--ink);color:#fff; }
  .vcard-avatar{ width:38px;height:38px;border-radius:50%;background:#e6ecf2;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--muted);flex-shrink:0; }
  .vcard.selected .vcard-avatar{ background:rgba(255,255,255,.2);color:#fff; }
  .vcard-info{ flex:1;min-width:0; }
  .vcard-naam{ font-weight:700;font-size:13px; }
  .vcard-sub{ font-size:11px;color:var(--muted);margin-top:2px; }
  .vcard.selected .vcard-sub{ color:rgba(255,255,255,.7); }
  .vcard-check{ font-size:18px; }
  .cp-new-btn{ margin:0 20px 20px;padding:12px;border-radius:10px;border:2px dashed var(--line);background:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted); }
  .cp-new-btn:hover{ border-color:var(--ink);color:var(--ink); }
  .cp-new-form{ margin:0 20px 20px;padding:16px;border-radius:12px;border:1px solid var(--line);display:flex;flex-direction:column;gap:10px; }
  .cp-new-form input{ width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;background:var(--bg);color:var(--ink);outline:none; }
  .cp-add-btn{ background:var(--ink);color:#fff;border:none;border-radius:999px;padding:10px 20px;font-size:12px;font-weight:700;cursor:pointer;align-self:flex-end; }
  .linked-contacts{ display:flex;flex-direction:column;gap:8px;margin-top:8px; }
  .linked-card{ display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--line);border-radius:10px; }
  .lc-remove{ margin-left:auto;background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;line-height:1;padding:2px 4px; }
  .lc-remove:hover{ color:#b43c3c; }
</style>
</head>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="env,react">
/* ----------------------------------------------------------------------------
   FORM SCHEMA — definitive list of sections + fields.
   Add/remove fields here; everything (form, progress, payload) follows.
---------------------------------------------------------------------------- */
const SCHEMA = [
  {
    id: 'naam', title: 'Naam',
    fields: [
      { id: 'projectnummer',     label: 'Projectnummer',         type: 'text', required: true,  placeholder: 'Bijv. 24375' },
      { id: 'projectnaam',       label: 'Projectnaam',           type: 'text', required: true,  placeholder: 'Bijv. Galgenwaard' },
      { id: 'alternatieveNaam',  label: 'Alternatieve projectnaam', type: 'text', placeholder: 'n.v.t.' },
    ],
  },
  {
    id: 'algemeen', title: 'Algemeen',
    fields: [
      { id: 'opgave',         label: 'Opgave',           type: 'select', options: ['', 'Stedenbouw', 'Architectuur', 'Interieur', 'Renovatie', 'Onderzoek'] },
      { id: 'projectType',    label: 'Project type',     type: 'select', options: ['', 'Wonen', 'Kantoor', 'Mixed-Use', 'Commercieel', 'Publiek', 'Onderwijs'] },
      { id: 'functie',        label: 'Functie',          type: 'select', options: ['', 'Wonen', 'Kantoor', 'Mixed-Use', 'Commercieel', 'Publiek', 'Onderwijs'] },
      { id: 'verkregenDmv',   label: 'Verkregen d.m.v.', type: 'select', options: ['', 'Tender', 'Directe Opdracht', 'Selectie', 'Prijsvraag'] },
      { id: 'fase',           label: 'Fase / status',    type: 'select', options: ['', 'SO', 'VO', 'DO', 'TO', 'In uitvoering', 'Opgeleverd'] },
    ],
  },
  {
    id: 'link', title: 'Link',
    fields: [
      { id: 'projectmap',     label: 'Projectmap',       type: 'text', placeholder: 'R:\\…' },
    ],
  },
  {
    id: 'locatie', title: 'Locatie',
    fields: [
      { id: 'land',           label: 'Land',             type: 'text', placeholder: 'Nederland' },
      { id: 'provincie',      label: 'Provincie',        type: 'select', options: ['', 'Drenthe','Flevoland','Friesland','Gelderland','Groningen','Limburg','Noord-Brabant','Noord-Holland','Overijssel','Utrecht','Zeeland','Zuid-Holland'] },
      { id: 'stad',           label: 'Stad',             type: 'text' },
      { id: 'straat',         label: 'Straat',           type: 'text' },
      { id: 'huisnummer',     label: 'Nummer',           type: 'text' },
      { id: 'postcode',       label: 'Postcode',         type: 'text', placeholder: '0000 AA' },
    ],
  },

  {
    id: 'metrage', title: 'Metrage',
    fields: [
      { id: 'totaalBvo',      label: 'Totaal BVO (m²)',  type: 'number', placeholder: '80000' },
      { id: 'mWonen',         label: 'Wonen (m²)',       type: 'number' },
      { id: 'mKantoor',       label: 'Kantoor (m²)',     type: 'number' },
      { id: 'mCommercieel',   label: 'Commercieel (m²)', type: 'number' },
      { id: 'mShortstay',     label: 'Shortstay (m²)',   type: 'number' },
      { id: 'mPubliek',       label: 'Publiek (m²)',     type: 'number' },
      { id: 'mOnderwijs',     label: 'Onderwijs (m²)',   type: 'number' },
    ],
  },
  {
    id: 'mobiliteit', title: 'Mobiliteit',
    fields: [
      { id: 'autoparkeren',   label: 'Autoparkeerplekken',  type: 'number' },
      { id: 'fietsparkeren',  label: 'Fietsparkeerplekken', type: 'number' },
      { id: 'ratioWonen',     label: 'Parkeerratio wonen',  type: 'text', placeholder: '0.8 / unit' },
    ],
  },
  {
    id: 'duurzaamheid', title: 'Duurzaamheid',
    fields: [
      { id: 'npgScore',       label: 'NPG score',         type: 'select', options: ['', 'A+', 'A', 'B', 'C'] },
      { id: 'daktuin',        label: 'Daktuin (m²)',      type: 'number' },
      { id: 'zonnepanelen',   label: 'Zonnepanelen (st)', type: 'number' },
      { id: 'label',          label: 'Duurzaamheidslabel', type: 'select', options: ['', 'BREEAM Pass', 'BREEAM Good', 'BREEAM Very Good', 'BREEAM Excellent', 'BREEAM Outstanding', 'LEED Silver', 'LEED Gold', 'LEED Platinum'] },
    ],
  },
  {
    id: 'bouw', title: 'Bouw & erkenning',
    fields: [
      { id: 'opleverdatum',   label: 'Opleverdatum',      type: 'date' },
      { id: 'bouwhoogte',     label: 'Bouwhoogte (m)',    type: 'number' },
      { id: 'tevredenheid',   label: 'Tevredenheid (1–50)', type: 'number' },
      { id: 'awards',         label: 'Aantal awards',     type: 'number' },
    ],
  },
];

/* All field ids — for progress calc */
const ALL_FIELDS = SCHEMA.flatMap(s => s.fields.map(f => ({ section: s.id, ...f })));
const TOTAL_FIELDS = ALL_FIELDS.length;
const REQUIRED_FIELDS = ALL_FIELDS.filter(f => f.required);

/* Storage via Supabase (zie supabase.js) — Projects.upsert / Projects.getByNumber */
// Kolom-naam mapping: camelCase → snake_case voor Supabase
/* ═══════════════════════════════════════
   NIEUW PROJECT — new_project.html
   ═══════════════════════════════════════ */

/* ── toSnake: vertaalt camelCase formuliervelden naar Supabase kolomnamen ── */
function toSnake(obj) {
  const map = {
    projectnummer:'projectnummer', projectnaam:'projectnaam', alternatieveNaam:'alternatieve_naam',
    opgave:'opgave', projectType:'project_type', functie:'functie', verkregenDmv:'verkregen_dmv', fase:'fase',
    projectmap:'projectmap', land:'land', provincie:'provincie', stad:'stad', straat:'straat',
    huisnummer:'huisnummer', postcode:'postcode', opdrachtgever:'opdrachtgever',
    gedelegeerdOpdrachtgever:'gedelegeerd_opdrachtgever', contactpersoon:'contactpersoon',
    telefoon:'telefoon', email:'email', totaalBvo:'totaal_bvo',
    mWonen:'m_wonen', mKantoor:'m_kantoor', mCommercieel:'m_commercieel',
    mShortstay:'m_shortstay', mPubliek:'m_publiek', mOnderwijs:'m_onderwijs',
    autoparkeren:'autoparkeren', fietsparkeren:'fietsparkeren', ratioWonen:'ratio_wonen',
    npgScore:'npg_score', daktuin:'daktuin', zonnepanelen:'zonnepanelen', label:'duurzaamheidslabel',
    bouwhoogte:'bouwhoogte', tevredenheid:'tevredenheid', awards:'awards', opleverdatum:'opleverdatum',
  };
  const out = {};
  for (const [k, v] of Object.entries(obj)) {
    if (map[k]) out[map[k]] = v;
  }
  return out;
}
/* ── fromSnake: vertaalt Supabase kolomnamen terug naar camelCase voor het formulier ── */
function fromSnake(obj) {
  if (!obj) return {};
  const map = {
    alternatieve_naam:'alternatieveNaam', project_type:'projectType', verkregen_dmv:'verkregenDmv',
    gedelegeerd_opdrachtgever:'gedelegeerdOpdrachtgever', totaal_bvo:'totaalBvo',
    m_wonen:'mWonen', m_kantoor:'mKantoor', m_commercieel:'mCommercieel',
    m_shortstay:'mShortstay', m_publiek:'mPubliek', m_onderwijs:'mOnderwijs',
    ratio_wonen:'ratioWonen', npg_score:'npgScore', duurzaamheidslabel:'label',
  };
  const out = { ...obj };
  for (const [k, v] of Object.entries(map)) {
    if (obj[k] !== undefined) { out[v] = obj[k]; delete out[k]; }
  }
  return out;
}

/* ---------------------------------------------------------------------------
   Toast helpers
--------------------------------------------------------------------------- */
function toast(text, kind = 'point', pts){
  const stack = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${kind}`;
  el.innerHTML = pts != null
    ? `<span class="pts">+${pts}</span><span>${text}</span>`
    : `<span>${text}</span>`;
  stack.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

/* ---------------------------------------------------------------------------
   App
--------------------------------------------------------------------------- */
function Field({ field, value, onChange, prevFilled }){
  const filled = value != null && value !== '';
  const cls = filled ? 'filled' : '';
  const handle = (v) => {
    onChange(field.id, v);
    // Award point only on filled→empty→filled transition? Just on becoming filled.
    if (!prevFilled && v !== '' && v != null){
      toast(`Veld ingevuld · ${field.label}`, 'point', 1);
    }
  };
  if (field.type === 'select'){
    return (
      <select className={cls} value={value || ''} onChange={(e) => handle(e.target.value)}>
        {field.options.map(o => <option key={o} value={o}>{o || '— Kies —'}</option>)}
      </select>
    );
  }
  return (
    <input type={field.type} className={cls} value={value || ''}
           placeholder={field.placeholder || ''}
           onChange={(e) => handle(e.target.value)} />
  );
}

/* ── App: het invulformulier
   - SECTIONS definieert alle velden gegroepeerd per onderwerp
   - sla op naar Supabase via Projects.upsert()
   - ondersteunt bewerken via ?edit=projectnummer in de URL
   - afbeeldingen uploaden via Images.upload() naar Supabase Storage ── */
function App(){
  const editKey = new URLSearchParams(window.location.search).get('edit');
  const isEdit = !!editKey;
  const [data, setData] = React.useState({});
  const [loading, setLoading] = React.useState(!!editKey);
  React.useEffect(() => {
    if (!editKey) return;
    Projects.getByNumber(editKey).then(found => {
      if (found) setData(fromSnake(found));
      setLoading(false);
    });
  }, []);
  const filledMap = React.useRef(
    Object.fromEntries(Object.entries(data).map(([k, v]) => [k, v !== '' && v != null]))
  );

  const setField = (id, v) => {
    setData(d => ({ ...d, [id]: v }));
    filledMap.current[id] = (v !== '' && v != null);
  };

  const filledCount = ALL_FIELDS.filter(f => data[f.id] != null && data[f.id] !== '').length;
  const requiredOk = REQUIRED_FIELDS.every(f => data[f.id] != null && data[f.id] !== '');
  const pct = (filledCount / TOTAL_FIELDS) * 100;

  const sectionFilledCount = (sec) =>
    sec.fields.filter(f => data[f.id] != null && data[f.id] !== '').length;

  const onSave = async () => {
    if (!requiredOk){
      toast('Vul eerst de verplichte velden in', 'save');
      return;
    }
    try {
      const savedProject = await Projects.upsert(toSnake(data));
      if (linkedContacts.length && savedProject?.id) {
        try {
          await db.from('project_contacts').upsert(
            linkedContacts.map(ct=>({project_id:savedProject.id,contact_id:ct.id})),
            {onConflict:'project_id,contact_id'}
          );
        } catch(e) { console.warn('Contacten koppelen mislukt:',e); }
      }

      // Punten toekennen: 1 punt per ingevuld veld
      const filledFields = Object.values(toSnake(data)).filter(v => v !== null && v !== '' && v !== undefined).length;
      await Employees.addPoints(filledFields);

      // Eerste keer opslaan → projectenteller ophogen
      if (!isEdit) {
        await Employees.incrementProjects();
      }

      // Log activiteit
      try {
        const log = JSON.parse(localStorage.getItem('mvsa.log') || '[]');
        log.unshift({ action: 'save', project: data.projectnaam || data.projectnummer || 'Naamloos', time: new Date().toISOString() });
        localStorage.setItem('mvsa.log', JSON.stringify(log.slice(0,50)));
      } catch(e) {}
      toast(`Project opgeslagen · ${filledFields} velden = ${filledFields} punten`, 'save', filledFields);
      setTimeout(() => { window.location.href = `project_page.html?nr=${encodeURIComponent(data.projectnummer || '')}&p=${encodeURIComponent(data.projectnaam || '')}`; }, 1200);
    } catch(e) {
      toast('Opslaan mislukt: ' + e.message, 'save');
      console.error('Supabase fout:', e);
    }
  };

  const onReset = () => {
    if (confirm('Formulier leegmaken?')) { setData({}); filledMap.current = {}; }
  };

  // Afbeeldingen
  const [images, setImages] = React.useState([]);
  const [uploading, setUploading] = React.useState(false);
  const [uploadErr, setUploadErr] = React.useState(null);

  // Adressenboek
  const [contactPanelOpen, setContactPanelOpen] = React.useState(false);
  const [allContacts, setAllContacts] = React.useState([]);
  const [linkedContacts, setLinkedContacts] = React.useState([]);
  const [contactSearch, setContactSearch] = React.useState('');
  const [contactFilter, setContactFilter] = React.useState('');
  const [showNewForm, setShowNewForm] = React.useState(false);
  const [newContact, setNewContact] = React.useState({ naam:'', bedrijf:'', rol:'', email:'', telefoon:'' });
  const CONTACT_FILTERS = ['architect','adviseur','aannemer','opdrachtgever','overheid','installateur','financieel'];
  const SECTOR_COLORS = {
    architect:    { bg:'#dbeafe', text:'#1e40af', border:'#bfdbfe' },
    adviseur:     { bg:'#d1fae5', text:'#065f46', border:'#a7f3d0' },
    aannemer:     { bg:'#fef3c7', text:'#92400e', border:'#fde68a' },
    opdrachtgever:{ bg:'#ede9fe', text:'#5b21b6', border:'#ddd6fe' },
    overheid:     { bg:'#fee2e2', text:'#991b1b', border:'#fecaca' },
    installateur: { bg:'#ffedd5', text:'#9a3412', border:'#fed7aa' },
    financieel:   { bg:'#fce7f3', text:'#9d174d', border:'#fbcfe8' },
    constructeur: { bg:'#e0f2fe', text:'#0c4a6e', border:'#bae6fd' },
    civiel:       { bg:'#f0fdf4', text:'#166534', border:'#bbf7d0' },
    projectleider:{ bg:'#f5f3ff', text:'#4c1d95', border:'#ede9fe' },
    uitvoerder:   { bg:'#fdf4ff', text:'#6b21a8', border:'#f5d0fe' },
    default:      { bg:'#f3f4f6', text:'#374151', border:'#e5e7eb' },
  };
  const getSectorColor = (rol) => {
    if (!rol) return SECTOR_COLORS.default;
    const key = Object.keys(SECTOR_COLORS).find(k => rol.toLowerCase().includes(k));
    return SECTOR_COLORS[key] || SECTOR_COLORS.default;
  };
  const openContactPanel = async () => {
    setContactPanelOpen(true);
    if (allContacts.length) return;
    try { const { data } = await db.from('contacts').select('id,naam,bedrijf,rol,email,tags').order('naam'); setAllContacts(data||[]); } catch(e) {}
  };
  const toggleContact = (contact) => setLinkedContacts(prev =>
    prev.find(c=>c.id===contact.id) ? prev.filter(c=>c.id!==contact.id) : [...prev,contact]
  );
  const [editingContact, setEditingContact] = React.useState(null); // contact being edited
  const updateLinkedContact = (updated) => {
    setAllContacts(prev => prev.map(c => c.id === updated.id ? updated : c));
    setLinkedContacts(prev => prev.map(c => c.id === updated.id ? updated : c));
    setEditingContact(null);
  };
  const saveEditContact = async () => {
    if (!editingContact) return;
    try {
      const { data, error } = await db.from('contacts').update({
        naam: editingContact.naam, bedrijf: editingContact.bedrijf,
        rol: editingContact.rol, email: editingContact.email, telefoon: editingContact.telefoon,
      }).eq('id', editingContact.id).select().single();
      if (!error && data) updateLinkedContact(data);
    } catch(e) {}
  };
  const saveNewContact = async () => {
    if (!newContact.naam) return;
    try {
      const { data, error } = await db.from('contacts').insert([newContact]).select().single();
      if (!error && data) { setAllContacts(p=>[...p,data]); setLinkedContacts(p=>[...p,data]); setNewContact({naam:'',bedrijf:'',rol:'',email:'',telefoon:''}); setShowNewForm(false); }
    } catch(e) {}
  };
  const filteredContacts = allContacts.filter(c => {
    const q = contactSearch.toLowerCase();
    return (!q || c.naam?.toLowerCase().includes(q) || c.bedrijf?.toLowerCase().includes(q) || c.rol?.toLowerCase().includes(q))
      && (!contactFilter || (c.tags||[]).includes(contactFilter) || c.rol?.toLowerCase().includes(contactFilter.toLowerCase()));
  });

  React.useEffect(() => {
    if (!data.projectnummer) return;
    Images.getForProject(data.projectnummer).then(setImages).catch(() => {});
  }, [data.projectnummer]);

  const handleImageUpload = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    if (!data.projectnummer) { setUploadErr('Vul eerst het projectnummer in.'); return; }
    setUploading(true); setUploadErr(null);
    try {
      const urls = await Promise.all(files.map(f => Images.upload(data.projectnummer, f)));
      setImages(prev => [...prev, ...urls]);
    } catch(err) {
      setUploadErr('Upload mislukt: ' + err.message);
    }
    setUploading(false);
    e.target.value = '';
  };

  const handleRemoveImage = async (url) => {
    if (!confirm('Afbeelding verwijderen?')) return;
    await Images.remove(url);
    setImages(prev => prev.filter(u => u !== url));
  };

  return (
    <>
      <header className="header">
        <div>
          <h1>{isEdit ? 'Project bewerken' : 'Nieuw project'}</h1>
          <div className="sub">
            Vul de projectinformatie in. Per ingevuld veld verdien je <strong>1 punt</strong> voor het leaderboard.
          </div>
        </div>
      </header>

      <div className="progress-card">
        <div>
          <div className="meta-line">Voortgang · {filledCount} van {TOTAL_FIELDS} velden</div>
          <div className="bar"><span style={{ width: `${pct}%` }}></span></div>
        </div>
        <div className="stat">
          <div className="num">{filledCount}</div>
          <div className="lbl">Punten</div>
        </div>
        <button className="save-btn" onClick={onSave} disabled={!requiredOk}>
          Opslaan →
        </button>
      </div>

      {SCHEMA.map(sec => {
        const afterLocatie = sec.id === 'locatie';
        const filled = sectionFilledCount(sec);
        const allDone = filled === sec.fields.length;
        return (
          <React.Fragment key={sec.id}>
          <section className="section">
            <h2>
              {sec.title}
              <span className={`count ${allDone ? 'done' : ''}`}>
                {filled} / {sec.fields.length}
              </span>
            </h2>
            {sec.fields.map(f => (
              <div key={f.id} className="field">
                <label>
                  {f.label}
                  {f.required && <span className="req">*</span>}
                </label>
                <Field
                  field={f}
                  value={data[f.id]}
                  prevFilled={filledMap.current[f.id]}
                  onChange={setField}
                />
              </div>
            ))}
          </section>
          {afterLocatie && (
      <section className="section">
        <h2 style={{fontSize:'11px',fontWeight:700,letterSpacing:'.22em',textTransform:'uppercase',margin:'0 0 18px',display:'flex',alignItems:'center',gap:'12px'}}>
          Samenwerkingen
          <span style={{marginLeft:'auto',fontSize:'10px',color:'#6b7480',fontWeight:600}}>{linkedContacts.length} gekoppeld</span>
        </h2>
        <div className="linked-contacts">
          {linkedContacts.map(ct=>{
            const sc = getSectorColor(ct.rol);
            return editingContact?.id === ct.id ? (
              <div key={ct.id} style={{border:`1px solid ${sc.border}`,borderRadius:'10px',padding:'12px 14px',background:sc.bg,display:'flex',flexDirection:'column',gap:'8px'}}>
                <input style={{border:'1px solid #ddd',borderRadius:'7px',padding:'6px 10px',fontSize:'12px',fontFamily:'inherit'}} value={editingContact.naam} onChange={e=>setEditingContact(p=>({...p,naam:e.target.value}))} placeholder="Naam" />
                <input style={{border:'1px solid #ddd',borderRadius:'7px',padding:'6px 10px',fontSize:'12px',fontFamily:'inherit'}} value={editingContact.bedrijf||''} onChange={e=>setEditingContact(p=>({...p,bedrijf:e.target.value}))} placeholder="Bedrijf" />
                <input style={{border:'1px solid #ddd',borderRadius:'7px',padding:'6px 10px',fontSize:'12px',fontFamily:'inherit'}} value={editingContact.rol||''} onChange={e=>setEditingContact(p=>({...p,rol:e.target.value}))} placeholder="Rol" />
                <div style={{display:'flex',gap:'6px',justifyContent:'flex-end'}}>
                  <button onClick={()=>setEditingContact(null)} style={{background:'none',border:'1px solid #ddd',borderRadius:'999px',padding:'5px 12px',fontSize:'11px',cursor:'pointer'}}>Annuleer</button>
                  <button onClick={saveEditContact} style={{background:'#111418',color:'#fff',border:'none',borderRadius:'999px',padding:'5px 14px',fontSize:'11px',fontWeight:700,cursor:'pointer'}}>Opslaan</button>
                </div>
              </div>
            ) : (
              <div key={ct.id} style={{border:`1px solid ${sc.border}`,borderRadius:'10px',padding:'10px 14px',background:sc.bg,display:'flex',alignItems:'center',gap:'10px'}}>
                <div style={{width:'36px',height:'36px',borderRadius:'50%',background:sc.text,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:800,color:'#fff',flexShrink:0}}>
                  {(ct.naam||'?').split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase()}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:'13px',color:sc.text}}>{ct.naam}</div>
                  <div style={{fontSize:'11px',color:sc.text,opacity:.75,marginTop:'2px',fontWeight:600}}>{ct.bedrijf||'—'}</div>
                  {ct.rol && <div style={{display:'inline-block',marginTop:'4px',padding:'1px 8px',borderRadius:'999px',fontSize:'9px',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',background:'rgba(255,255,255,.6)',color:sc.text,border:`1px solid ${sc.border}`}}>{ct.rol}</div>}
                </div>
                <div style={{display:'flex',gap:'4px',flexShrink:0}}>
                  <button onClick={()=>setEditingContact({...ct})} title="Bewerk" style={{background:'rgba(255,255,255,.7)',border:`1px solid ${sc.border}`,borderRadius:'7px',padding:'5px 8px',cursor:'pointer',fontSize:'12px'}}>✏️</button>
                  <button onClick={()=>setEditingContact({...ct,bedrijf:''})} title="Ander bedrijf" style={{background:'rgba(255,255,255,.7)',border:`1px solid ${sc.border}`,borderRadius:'7px',padding:'5px 8px',cursor:'pointer',fontSize:'12px'}}>🏢</button>
                  <button onClick={()=>toggleContact(ct)} title="Verwijder" style={{background:'rgba(255,255,255,.7)',border:`1px solid ${sc.border}`,borderRadius:'7px',padding:'5px 8px',cursor:'pointer',fontSize:'12px',color:'#b43c3c'}}>×</button>
                </div>
              </div>
            );
          })}
        </div>
        <button onClick={openContactPanel} style={{marginTop:linkedContacts.length?'10px':'0',display:'flex',alignItems:'center',gap:'8px',background:'none',border:'1px dashed #c8d0dc',borderRadius:'999px',padding:'9px 18px',cursor:'pointer',fontSize:'12px',fontWeight:700,color:'#6b7480'}}>
          + Voeg samenwerking toe
        </button>
      </section>

      <div className={`contact-overlay ${contactPanelOpen?'open':''}`} onClick={()=>setContactPanelOpen(false)} />
      <div className={`contact-panel ${contactPanelOpen?'open':''}`}>
        <div className="cp-head"><h3>📇 Adressenboek</h3><button className="cp-close" onClick={()=>setContactPanelOpen(false)}>✕ Sluiten</button></div>
        <div style={{padding:'14px 20px 0'}}><input className="cp-search" placeholder="Zoek naam, bedrijf of rol…" value={contactSearch} onChange={e=>setContactSearch(e.target.value)} /></div>
        <div className="cp-filters">{CONTACT_FILTERS.map(f=>(<button key={f} className={`cp-filter ${contactFilter===f?'active':''}`} onClick={()=>setContactFilter(contactFilter===f?'':f)}>{f}</button>))}</div>
        <div className="cp-cards">
          {filteredContacts.map(contact=>{
            const isSel=linkedContacts.some(c=>c.id===contact.id);
            const sc=getSectorColor(contact.rol);
            return(
              <div key={contact.id} style={{border:`1px solid ${isSel?sc.text:sc.border}`,borderRadius:'12px',padding:'12px 14px',cursor:'pointer',background:isSel?sc.bg:'#fff',display:'flex',alignItems:'center',gap:'12px',transition:'all .12s'}} onClick={()=>toggleContact(contact)}>
                <div style={{width:'38px',height:'38px',borderRadius:'50%',background:sc.text,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',fontWeight:800,color:'#fff',flexShrink:0}}>
                  {(contact.naam||'?').split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase()}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:'13px'}}>{contact.naam}</div>
                  <div style={{fontSize:'11px',fontWeight:600,color:sc.text,marginTop:'2px'}}>{contact.bedrijf||'—'}</div>
                  {contact.rol&&<div style={{fontSize:'10px',color:'#888',marginTop:'1px'}}>{contact.rol}</div>}
                </div>
                {isSel&&<span style={{color:sc.text,fontSize:'18px',fontWeight:700}}>✓</span>}
              </div>
            );})}
          {filteredContacts.length===0&&<div style={{color:'var(--muted)',fontSize:'13px',textAlign:'center',padding:'20px 0'}}>Geen contacten gevonden</div>}
        </div>
        {!showNewForm?(
          <button className="cp-new-btn" onClick={()=>setShowNewForm(true)}>+ Nieuw visitekaartje aanmaken</button>
        ):(
          <div className="cp-new-form">
            <div style={{fontWeight:700,fontSize:'13px',marginBottom:'4px'}}>Nieuw contact</div>
            <input placeholder="Naam *" value={newContact.naam} onChange={e=>setNewContact(p=>({...p,naam:e.target.value}))} />
            <input placeholder="Bedrijf" value={newContact.bedrijf} onChange={e=>setNewContact(p=>({...p,bedrijf:e.target.value}))} />
            <input placeholder="Rol" value={newContact.rol} onChange={e=>setNewContact(p=>({...p,rol:e.target.value}))} />
            <input placeholder="E-mail" value={newContact.email} onChange={e=>setNewContact(p=>({...p,email:e.target.value}))} />
            <input placeholder="Telefoon" value={newContact.telefoon} onChange={e=>setNewContact(p=>({...p,telefoon:e.target.value}))} />
            <div style={{display:'flex',gap:'8px',justifyContent:'flex-end'}}>
              <button onClick={()=>setShowNewForm(false)} style={{background:'none',border:'1px solid var(--line)',borderRadius:'999px',padding:'8px 16px',cursor:'pointer',fontSize:'12px'}}>Annuleren</button>
              <button className="cp-add-btn" onClick={saveNewContact}>Opslaan</button>
            </div>
          </div>
        )}
      </div>
          )}
          </React.Fragment>
        );
      })}

      {/* AFBEELDINGEN SECTIE */}
      <section className="section">
        <h2 style={{color:'#3d6e8a', fontSize:'11px', fontWeight:700, letterSpacing:'.22em', textTransform:'uppercase', margin:'0 0 18px', display:'flex', alignItems:'center', gap:'12px'}}>
          Afbeeldingen
          <span style={{marginLeft:'auto', fontSize:'10px', color:'#6b7480', fontWeight:600}}>{images.length} bestand{images.length !== 1 ? 'en' : ''}</span>
        </h2>

        {/* Uploadknop */}
        <div style={{padding:'12px 0', borderBottom:'1px solid #e6ecf2'}}>
          <label style={{
            display:'inline-flex', alignItems:'center', gap:'8px',
            background:'#111418', color:'#fff', padding:'10px 18px', borderRadius:'999px',
            fontSize:'11px', letterSpacing:'.14em', textTransform:'uppercase', fontWeight:700,
            cursor: data.projectnummer ? 'pointer' : 'not-allowed',
            opacity: data.projectnummer ? 1 : 0.5,
          }}>
            {uploading ? '⏳ Uploaden…' : '+ Afbeeldingen toevoegen'}
            <input type="file" accept="image/*" multiple onChange={handleImageUpload}
              disabled={!data.projectnummer || uploading}
              style={{display:'none'}} />
          </label>
          {!data.projectnummer && <span style={{marginLeft:'12px', fontSize:'12px', color:'#6b7480'}}>Vul eerst het projectnummer in</span>}
          {uploadErr && <span style={{marginLeft:'12px', fontSize:'12px', color:'#b43c3c'}}>{uploadErr}</span>}
        </div>

        {/* Preview grid */}
        {images.length > 0 && (
          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(160px, 1fr))', gap:'10px', marginTop:'16px'}}>
            {images.map((url, i) => (
              <div key={url} style={{position:'relative', borderRadius:'10px', overflow:'hidden', aspectRatio:'4/3', background:'#e6ecf2'}}>
                {i === 0 && <span style={{position:'absolute', top:'8px', left:'8px', background:'#111418', color:'#fff', fontSize:'9px', letterSpacing:'.12em', textTransform:'uppercase', fontWeight:700, padding:'3px 8px', borderRadius:'999px', zIndex:2}}>Cover</span>}
                <img src={url} alt="" style={{width:'100%', height:'100%', objectFit:'cover', display:'block'}} />
                <button onClick={() => handleRemoveImage(url)} style={{
                  position:'absolute', top:'6px', right:'6px', background:'rgba(180,60,60,.9)',
                  color:'#fff', border:'none', borderRadius:'50%', width:'24px', height:'24px',
                  cursor:'pointer', fontSize:'12px', display:'flex', alignItems:'center', justifyContent:'center', zIndex:2
                }}>×</button>
              </div>
            ))}
          </div>
        )}
      </section>

      <div className="save-actions">
        <button className="secondary-btn" onClick={onReset}>Leegmaken</button>
        <button className="save-btn" onClick={onSave} disabled={!requiredOk}>
          Project opslaan →
        </button>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script src="dark-mode.js"></script>
<script src="transitions.js"></script>

<style>

[data-theme="dark"] 

</style>
<div class="auth-bar" id="auth-bar" style="display:none;"></div>
<script>
(async function(){
  const bar = document.getElementById('auth-bar');
  if (!bar || typeof db === 'undefined') return;
  try {
    const { data: { user } } = await db.auth.getUser();
    if (!user) {
      bar.innerHTML = '<a class="ab-login" href="login.html">Inloggen →</a>';
      bar.style.display = 'flex';
      return;
    }
    const { data: profile } = await db.from('profiles').select('naam,status,employee_id').eq('id', user.id).maybeSingle();
    if (!profile || profile.status !== 'approved') {
      bar.innerHTML = '<a class="ab-login" href="login.html">Inloggen →</a>';
      bar.style.display = 'flex';
      return;
    }
    const initials = (profile.naam||'?').split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();
    // Probeer foto te laden
    let photoHtml = initials;
    if (profile.employee_id) {
      try {
        const url = await EmployeeImages.getForEmployee(profile.employee_id);
        if (url) photoHtml = '<img src="' + url + '" alt="">';
      } catch(e) {}
    }
    bar.innerHTML = '<a href="profile.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;" title="Mijn profiel"><div class="ab-avatar">' + photoHtml + '</div>'
      + '<span class="ab-name">' + profile.naam + '</span></a>'
      + '<button class="ab-logout" onclick="Auth.logout().then(()=>location.reload())">Uitloggen</button>';
    bar.style.display = 'flex';
  } catch(e) {
    bar.style.display = 'flex';
  }
})();
</script>

<div class="auth-bar" id="auth-bar"></div>
<script src="auth-bar.js"></script>
</body>
</html>
