<!doctype html>
<html lang="en">
<head>

<title>Network Nodes — Projects & People</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; padding: 0; height: 100%; background: #07080b; overflow: hidden; }
  body { font-family: 'Space Grotesk', system-ui, sans-serif; color: #d8dee9; }
  #scene { position: fixed; inset: 0; }
  canvas { display: block; width: 100%; height: 100%; cursor: grab; }

  .hud {
    position: fixed; top: 58px; left: 16px; z-index: 5;
    display: flex; flex-direction: column; gap: 3px;
    pointer-events: none;
    background: rgba(12,14,18,0.42); backdrop-filter: blur(16px);
    border: 1px solid rgba(216,222,233,0.08);
    border-radius: 10px; padding: 10px 14px;
  }
  .hud .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(216, 222, 233, 0.4);
  }
  .hud .title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600; font-size: 16px; letter-spacing: -0.01em;
    color: rgba(232, 238, 247, 0.92);
  }
  .hud .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(216, 222, 233, 0.35);
    margin-top: 1px;
  }

  .legend {
    position: fixed; top: 58px; right: 16px; z-index: 5;
    display: flex; gap: 16px; align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(216, 222, 233, 0.55);
    pointer-events: none;
    background: rgba(12,14,18,0.42); backdrop-filter: blur(16px);
    border: 1px solid rgba(216,222,233,0.08);
    border-radius: 999px; padding: 8px 16px;
  }
  .legend .swatch { display: inline-flex; align-items: center; gap: 6px; }
  .legend .dot { width: 8px; height: 8px; border-radius: 50%; background: #e5e7eb; }
  .legend .dot.proj { width: 10px; height: 10px; background: #94a3b8; }

  .readout {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 5;
    display: flex; gap: 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(216, 222, 233, 0.45);
    pointer-events: none;
    background: rgba(12,14,18,0.4); backdrop-filter: blur(12px);
    border: 1px solid rgba(216,222,233,0.08);
    border-radius: 999px; padding: 8px 22px;
  }
  .readout b { font-weight: 500; color: rgba(232, 238, 247, 0.85); margin-left: 6px; }

  .corner {
    position: fixed; width: 18px; height: 18px; opacity: 0.35;
    border-color: rgba(216, 222, 233, 0.5);
    pointer-events: none;
  }
  .corner.tl { top: 14px; left: 14px; border-top: 1px solid; border-left: 1px solid; }
  .corner.tr { top: 14px; right: 14px; border-top: 1px solid; border-right: 1px solid; }
  .corner.bl { bottom: 14px; left: 14px; border-bottom: 1px solid; border-left: 1px solid; }
  .corner.br { bottom: 14px; right: 14px; border-bottom: 1px solid; border-right: 1px solid; }

  .selected-info {
    position: fixed; top: 112px; left: 28px; z-index: 5;
    min-width: 240px; max-width: 340px;
    padding: 18px 20px;
    border: 1px solid rgba(216, 222, 233, 0.25);
    background: rgba(10, 12, 16, 0.88);
    backdrop-filter: blur(12px);
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.07em;
    color: rgba(216, 222, 233, 0.85);
    pointer-events: none;
    opacity: 0;
    transform: translateY(-6px);
    transition: opacity .22s ease, transform .22s ease;
  }
  .selected-info.visible { opacity: 1; transform: translateY(0); }
  .selected-info .who {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px; font-weight: 600; letter-spacing: -0.01em;
    color: rgba(232, 238, 247, 1);
    margin-bottom: 10px; text-transform: none;
  }
  .selected-info .kind { text-transform: uppercase; color: rgba(216,222,233,0.55); font-size: 9.5px; letter-spacing: 0.2em; }
  .selected-info ul { list-style: none; margin: 8px 0 0 0; padding: 0; display: flex; flex-direction: column; gap: 5px; }
  .selected-info li { color: rgba(232, 238, 247, 0.92); font-size: 12px; letter-spacing: 0.02em; text-transform: none; }
  .selected-info li::before { content: "— "; color: rgba(216,222,233,0.4); }
  .selected-info .hint { margin-top: 12px; color: rgba(216,222,233,0.4); font-size: 9px; letter-spacing: 0.14em; }

  /* Zoekbalk */
  .search-wrap {
    position: fixed; top: 58px; left: 50%; transform: translateX(-50%);
    z-index: 10; width: 320px;
  }
  .search-input {
    width: 100%; box-sizing: border-box;
    background: rgba(12,14,18,0.45); border: 1px solid rgba(216,222,233,0.12);
    border-radius: 999px; color: rgba(232,238,247,0.92);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-size: 13px; padding: 9px 18px 9px 38px;
    outline: none; backdrop-filter: blur(20px);
    transition: border-color .15s, background .2s;
  }
  .search-input::placeholder { color: rgba(216,222,233,0.3); }
  .search-input:focus { border-color: rgba(216,222,233,0.35); background: rgba(12,14,18,0.82); }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: rgba(216,222,233,0.4); pointer-events: none; font-size: 14px;
  }
  .search-clear {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: rgba(216,222,233,0.4);
    cursor: pointer; font-size: 16px; line-height: 1; padding: 2px 4px;
    display: none;
  }
  .search-clear:hover { color: rgba(232,238,247,0.9); }
  .search-results {
    margin-top: 6px; background: rgba(12,14,18,0.92);
    border: 1px solid rgba(216,222,233,0.14); border-radius: 12px;
    backdrop-filter: blur(16px); overflow: hidden;
    display: none; flex-direction: column;
  }
  .search-results.visible { display: flex; }
  .search-result-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 16px; cursor: pointer;
    border-bottom: 1px solid rgba(216,222,233,0.07);
    transition: background .1s;
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: rgba(255,255,255,0.05); }
  .search-result-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .search-result-dot.project { width: 10px; height: 10px; background: #94a3b8; }
  .search-result-dot.person  { background: #e5e7eb; }
  .search-result-name {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-size: 12.5px; color: rgba(232,238,247,0.9);
  }
  .search-result-type {
    margin-left: auto; font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; letter-spacing: .12em; text-transform: uppercase;
    color: rgba(216,222,233,0.35);
  }
  .search-no-results {
    padding: 12px 16px; font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; color: rgba(216,222,233,0.35); letter-spacing: .08em;
  }

  /* ── Filter panel ────────────────────────────────────────────── */
  .filter-panel {
    position: fixed; bottom: 70px; right: 16px; z-index: 6;
    background: rgba(10,12,16,0.88); backdrop-filter: blur(16px);
    border: 1px solid rgba(216,222,233,0.12); border-radius: 12px;
    padding: 14px 16px; min-width: 180px;
    font-family: 'JetBrains Mono', monospace;
  }
  .filter-title {
    font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(216,222,233,0.4); margin-bottom: 10px;
  }
  .filter-item {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 0; cursor: pointer; user-select: none;
  }
  .filter-item:hover .filter-label { color: rgba(232,238,247,1); }
  .filter-swatch {
    width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0;
    border: 2px solid transparent; transition: opacity .15s;
  }
  .filter-item.off .filter-swatch { opacity: 0.25; }
  .filter-label {
    font-size: 11px; color: rgba(216,222,233,0.75);
    letter-spacing: 0.04em; transition: color .15s;
  }
  .filter-item.off .filter-label { color: rgba(216,222,233,0.35); }

  /* ── View mode toggle ─────────────────────────────────────────── */
  .view-mode-btn {
    position: fixed; bottom: 22px; right: 16px; z-index: 6;
    display: flex; gap: 4px;
    background: rgba(10,12,16,0.82); backdrop-filter: blur(16px);
    border: 1px solid rgba(216,222,233,0.12); border-radius: 999px;
    padding: 5px;
  }
  .vmbtn {
    padding: 6px 14px; border-radius: 999px; border: none; cursor: pointer;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    background: transparent; color: rgba(216,222,233,0.5);
    transition: all .15s;
  }
  .vmbtn.active { background: rgba(232,238,247,0.15); color: rgba(232,238,247,0.95); }
  .vmbtn:hover:not(.active) { color: rgba(232,238,247,0.75); }
</style>

  <div class="readout">

  <div class="filter-panel" id="filter-panel">
    <div class="filter-title">Zichtbaarheid</div>
    <div class="filter-item" data-filter="bedrijf">
      <div class="filter-swatch" style="background:#e8a87c;border-color:#e8a87c"></div>
      <span class="filter-label">Bedrijven</span>
    </div>
    <div class="filter-item" data-filter="contact">
      <div class="filter-swatch" style="background:#7ec8c8;border-color:#7ec8c8"></div>
      <span class="filter-label">Contacten</span>

    <div class="filter-item" data-filter="software">

      <div class="filter-swatch" style="background:#6ee7b7;border-color:#6ee7b7"></div>
      <span class="filter-label">Labels</span>
    </div>
  </div>

  <div class="selected-info" id="filter-dot-card" style="top: 112px; left: 28px;"></div>
  <div class="selected-info" id="selected-info"></div>

  <div id="tweaks-root" style="display:none"></div>

  <script>
    const PROJECT_POOL = [
      'Zuidplein Tower', 'Atrium West', 'Kade 12', 'Pavilion Noord',
      'Helix Office', 'Riverside Lofts', 'Station Plaza', 'Lumen House',
      'The Greenway', 'Mercato Hall', 'Solis Campus', 'Nieuw Park',
      'Belvedere', 'Maashaven', 'Oosterdok', 'Vondel Studio',
      'Polder House', 'Stadshart', 'Brouwerij 8', 'Kraanspoor',
      'Westergas Lab', 'De Kade', 'Noord-Zuid Hub', 'Veerkracht',
      'Amstel Loft', 'Bijlmer Gate', 'De Beurs', 'Entrepot West',
      'Ferradura', 'Gooiland Tower', 'Haven Zuid', 'IJ-oever',
      'Java Eiland', 'Kazernestraat', 'Lijnbaan Noord', 'Marineterrein',
      'Nieuw Sloten', 'Oost Campus', 'Plantage Hub', 'Quay House',
      'Rembrandtplein 12', 'Schinkelhaven', 'Transformatorhuis', 'Uilenburg',
      'Verbindingskanaal', 'Westpoort Lab', 'X-Factory', 'Ysselsteyn',
      'Zeeburgereiland', 'Apollolaan 4', 'Borneo Wharf', 'Cruquius',
      'Docklands', 'Elzenhagen', 'Forum Zuid', 'Gaasperdam Hub',
      'Houtmankade', 'IJburg Tower', 'Jan Schaefer', 'Keizerspoort',
      'Landlust', 'Mercuriusplein', 'Negen Straatjes', 'Overhoeks',
      'Peperklip', 'Quincyhaven', 'Rode Kruisstraat', 'Sportpark Zuid',
      'Tasmanstraat', 'Uitdam Loft', 'Vogelbuurt', 'Wibautstraat 150',
      'Xantippe', 'Ypenburg Gate', 'Zuidas Oost', 'Amstelveen Centrum',
      'Baarsjes Complex', 'Citroëngebouw', 'Dijkgraaf', 'Europapoort',
      'Flevopolder', 'Groenhof', 'Hembrugterrein', 'Ijdoorn',
      'Jordaanblok', 'Kleiburg', 'Leeuwenhoek', 'Molenwijk',
      'Nesciobrug', 'Oud-West Studio', 'Parkstad', 'Quattro',
      'Rivierenbuurt', 'Sarphatikade', 'Tafelbergweg', 'Uithof',
      'Valeriusplein', 'Westergasfabriek', 'X2 Tower', 'Yokohama',
      'Zomerhuisje', 'Alfapoort', 'Bos en Lommer', 'Centrumeiland',
    ];
    const PERSON_POOL = [
      'Mila', 'Joris', 'Sanne', 'Bram', 'Anouk', 'Tijn', 'Eva', 'Daan',
      'Lotte', 'Sem', 'Fenna', 'Lars', 'Iris', 'Pim', 'Noor', 'Bas',
      'Loes', 'Thijs', 'Romy', 'Jens', 'Femke', 'Stijn', 'Lieke', 'Niels',
      'Sara', 'Mees', 'Floor', 'Koen', 'Yara', 'Ruben',
    ];


    // Dummy tags per project
    const DUMMY_TAGS = {
      bedrijf:  ['Arcadis','Royal HaskoningDHV','Witteveen+Bos','Arup','Goudappel','Movares','Sweco','Atelier PRO','OMA','MVRDV','UNStudio','Mecanoo'],
      contact:  ['Jan de Vries','Petra Smit','Mark Bakker','Lisa van den Berg','Tom Jansen','Emma Visser','Bas Mulder','Sophie Hendriks','Rick Bosman','Anne Dekker','Daan Kok','Miriam Prins'],
      software: ['Revit','AutoCAD','SketchUp','Rhino','ArchiCAD','BIM 360','Grasshopper','Lumion','Enscape','Adobe CC','Bluebeam','Navisworks'],
      award:    ['ARC Award 2023','BNA Beste Gebouw','Green Building Award','BREEAM Excellent','Rietveld Prijs','Architectuur Lokaal','Dutch Design Award','Gouden Piramide'],
      label:    ['Woningbouw','Kantoor','Publiek','Herbestemming','Duurzaam','BIM','Flagship','In uitvoering','Concept','Internationaal'],
    };

    // Wijs willekeurig tags toe aan projecten (bij buildGraph)
    let projectTags = {}; // { projectName: { bedrijf, contact, software, award, label } }

    function assignDummyTags(projNames) {
      projectTags = {};
      projNames.forEach(name => {
        projectTags[name] = {
          bedrijf:  rand01() > 0.3 ? [pick(DUMMY_TAGS.bedrijf)]  : [],
          contact:  rand01() > 0.2 ? [pick(DUMMY_TAGS.contact), rand01()>0.5 ? pick(DUMMY_TAGS.contact) : null].filter(Boolean) : [],
          software: rand01() > 0.25 ? shuffle([...DUMMY_TAGS.software]).slice(0, Math.floor(rand(1,4))) : [],
          award:    rand01() > 0.6  ? [pick(DUMMY_TAGS.award)]   : [],
          label:    shuffle([...DUMMY_TAGS.label]).slice(0, Math.floor(rand(1,3))),
        };
      });
    }
    function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
    function rand01() { return Math.random(); }

    // Filter state
    const activeFilters = new Set(['bedrijf','contact','software','award','label']);

    // Filter colors
    const FILTER_COLORS = {
      bedrijf:  '#e8a87c',
      contact:  '#7ec8c8',
      software: '#a78bfa',
      award:    '#fbbf24',
      label:    '#6ee7b7',
    };

    function getProjectRings(name) {
      const tags = projectTags[name];
      if (!tags) return [];
      return Object.keys(FILTER_COLORS).filter(k => activeFilters.has(k) && tags[k] && tags[k].length > 0);
    }

    const CONFIG = /*EDITMODE-BEGIN*/{
      "projects": 100,
      "people": 30,
      "avgPerPerson": 2.5,
      "palette": [
        "#e5e7eb",
        "#94a3b8",
        "#cbd5e1"
      ],
      "background": "#07080b",
      "speed": 0.1,
      "lineOpacity": 0.35,
      "glow": true,
      "showLabels": true,
      "cursorPull": true,
      "pulses": true,
      "spring": 0.012,
      "repel": 0.7
    }/*EDITMODE-END*/;

    const canvas = document.getElementById('net');
    const ctx = canvas.getContext('2d');
    let W = 0, H = 0, DPR = 1;
    let nodes = [];
    let edges = [];
    let pulses = [];
    const mouse = { x: -9999, y: -9999, active: false, hover: -1 };
    let selectedIndex = -1; // persistent selection (click)

    // Zoom & pan state
    let zoom = 1.4; // start ingezoomd op hub-niveau
    let viewMode = '2d';
    // 3D sphere rotation state
    let rotY = 0;          // auto-rotatie om Y-as
    let rotX3 = 0.3;       // tilt om X-as
    let isDragging3D = false;
    let drag3DStart = { mx:0, my:0, rx:0, ry:0 };
    let autoRotate = true;
    // Sferische node posities (alleen in 3D)
    let spherePositions = []; // { theta, phi } per node index
    const MIN_ZOOM = 0.15;
    const MAX_ZOOM = 3.0;
    let targetZoom = 1.4;
    let panX = 0, panY = 120; // logo omhoog, dichter bij zoekbalk

    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = canvas.clientWidth = window.innerWidth;
      H = canvas.clientHeight = window.innerHeight;
      canvas.width = W * DPR;
      canvas.height = H * DPR;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    function rand(a, b) { return a + Math.random() * (b - a); }
    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // Hub node is altijd index 0, vast in het midden
    const HUB_IDX = 0;
    const HUB_R   = 52;

    function buildGraph() {
      nodes = []; edges = []; pulses = [];
      const projN = Math.min(CONFIG.projects, PROJECT_POOL.length);
      const peopleN = Math.min(CONFIG.people, PERSON_POOL.length);
      const projNames = shuffle(PROJECT_POOL).slice(0, projN);
      assignDummyTags(projNames);
      const peopleNames = shuffle(PERSON_POOL).slice(0, peopleN);
      const cx = W / 2, cy = H / 2;

      // Hub (index 0) — altijd vastgepind
      nodes.push({ type:'hub', name:'MVSA', x:cx, y:cy, vx:0, vy:0, r:HUB_R,
        phase:0, edges:[], z:0.5, tz:0.5, vz:0, pinned:true });

      // Projecten in ring
      const ringR = HUB_R + Math.min(W,H) * 0.14;
      for (let i = 0; i < projN; i++) {
        const a = (i / projN) * Math.PI * 2;
        const r = ringR * rand(0.88, 1.12);
        nodes.push({ type:'project', name:projNames[i],
          x:cx+Math.cos(a)*r, y:cy+Math.sin(a)*r,
          vx:0, vy:0, r:rand(5,6.5), c:i%3,
          phase:Math.random()*Math.PI*2, edges:[],
          z:rand(-0.2,0.15), tz:rand(-0.2,0.15), vz:0 });
      }
      // Hub ↔ project spokes
      for (let p = 1; p <= projN; p++) {
        const ei = edges.length;
        edges.push([HUB_IDX, p]);
        nodes[HUB_IDX].edges.push(ei);
        nodes[p].edges.push(ei);
      }
      // Personen
      for (let i = 0; i < peopleN; i++) {
        nodes.push({ type:'person', name:peopleNames[i],
          x:cx+rand(-W*0.25,W*0.25), y:cy+rand(-H*0.25,H*0.25),
          vx:0, vy:0, r:rand(3.8,5.2), c:i%6,
          phase:Math.random()*Math.PI*2, edges:[],
          z:rand(-0.6,-0.1), tz:rand(-0.6,-0.1), vz:0 });
        const personIdx = nodes.length - 1;
        const avg = CONFIG.avgPerPerson;
        let count = 1;
        while (count < projN && Math.random() < (avg-1)/Math.max(1,count)) count++;
        count = Math.min(count, Math.max(1, projN));
        const used = new Set();
        for (let k = 0; k < count; k++) {
          let pool = [];
          for (let p = 1; p <= projN; p++) {
            if (used.has(p)) continue;
            pool.push({ p, w: 1/(1+nodes[p].edges.length*0.4) });
          }
          if (!pool.length) break;
          let total = pool.reduce((s,x)=>s+x.w, 0);
          let pick = Math.random()*total, chosen = pool[0].p;
          for (const x of pool) { pick -= x.w; if (pick<=0){chosen=x.p;break;} }
          used.add(chosen);
          const ei = edges.length;
          edges.push([personIdx, chosen]);
          nodes[personIdx].edges.push(ei);
          nodes[chosen].edges.push(ei);
        }
      }
      // Elk project minstens één persoon
      for (let p = 1; p <= projN; p++) {
        if (nodes[p].edges.length <= 1) {
          const pi = 1 + projN + Math.floor(Math.random()*peopleN);
          const ei = edges.length;
          edges.push([pi, p]);
          nodes[pi].edges.push(ei); nodes[p].edges.push(ei);
        }
      }
    }
    buildGraph();
    initSpherePositions();

    function initSpherePositions() {
      spherePositions = [];
      const projN = nodes.filter(n => n.type === 'project').length;
      let projIdx = 0, personIdx = 0;
      for (let i = 1; i < nodes.length; i++) {
        const n = nodes[i];
        if (n.type === 'project') {
          // Gouden spiraal verdeling op bol
          const phi = Math.acos(1 - 2 * (projIdx + 0.5) / Math.max(projN, 1));
          const theta = Math.PI * (1 + Math.sqrt(5)) * projIdx;
          spherePositions[i] = { theta, phi };
          projIdx++;
        } else {
          // Personen iets verder naar buiten verspreid
          const phi = Math.acos(1 - 2 * (personIdx + 0.5) / Math.max(nodes.length - projN - 1, 1));
          const theta = Math.PI * (1 + Math.sqrt(5)) * personIdx * 1.3;
          spherePositions[i] = { theta: theta + 0.5, phi: phi * 0.85 + 0.1 };
          personIdx++;
        }
      }
    }

    // Helpers: screen → world
    function screenToWorld(sx, sy) {
      return {
        x: (sx - W / 2) / zoom + W / 2 - panX,
        y: (sy - H / 2) / zoom + H / 2 - panY,
      };
    }

    // Drag-to-pan state
    let isPanning = false;
    let panStart = { mx: 0, my: 0, px: 0, py: 0 };
    let panMoved = 0;

    // Node drag state
    let dragNodeIdx = -1;
    let groupedIndex = -1; // project waarop gegroepeerd is
    let filterDots = []; // { projIdx, key, x, y, r } — bijgewerkt elke frame
    let selectedFilterDot = null; // { projIdx, key }

    window.addEventListener('mousemove', (e) => {
      if (dragNodeIdx >= 0) {
        // Sleep de node mee in world-coords

        nodes[dragNodeIdx].y = w.y;
        nodes[dragNodeIdx].vx = 0;

        const dx = e.clientX - panStart.mx;

    });

    // Overwrite with regular mousedown below

    canvas.addEventListener('mousedown', (e) => {
      const w = screenToWorld(e.clientX, e.clientY);
      // Hub blokkeren
      const hubDist = Math.hypot(w.x - nodes[HUB_IDX].x, w.y - nodes[HUB_IDX].y);
      if (hubDist < HUB_R + 8) return;

      // Check of we een node raken → drag (projecten én personen)
      // Geselecteerde node eerst checken
      if (selectedIndex >= 0) {
        const n = nodes[selectedIndex];
        const reach = (n.type === 'project' ? n.r + 18 : n.r + 14);
        const d2 = (n.x - w.x)**2 + (n.y - w.y)**2;
        if (d2 < reach**2) {
          dragNodeIdx = selectedIndex;

      for (let i = 1; i < nodes.length; i++) {

        const d2 = (n.x - w.x)**2 + (n.y - w.y)**2;
        if (d2 < reach**2) {
          dragNodeIdx = i;
          panMoved = 0;

      // Anders: pan

        if (nodes[i].type !== 'project') continue;
        const n = nodes[i];
        const d2 = (n.x - wx)**2 + (n.y - wy)**2;
        if (d2 < (n.r + 22)**2 && d2 < bestD) { bestD = d2; best = i; }
      }
      if (best < 0) return;

      if (groupedIndex === best) {
        // Al gegroepeerd op dit project → degroeperen
        groupedIndex = -1;

      groupedIndex = best;
      const proj = nodes[best];

      // Verzamel verbonden personen
      const people = [];
      for (const ei of proj.edges) {
        const [a, b] = edges[ei];
        if (a === HUB_IDX || b === HUB_IDX) continue;
        const pi = a === best ? b : a;
        if (nodes[pi].type === 'person') people.push(pi);
      }

      // Verdeel ze in een strak kransje rondom het project
      const orbitR = proj.r * 5 + people.length * 6;
      people.forEach((pi, k) => {
        const angle = (k / people.length) * Math.PI * 2;
        nodes[pi].x = proj.x + Math.cos(angle) * orbitR;
        nodes[pi].y = proj.y + Math.sin(angle) * orbitR;
        nodes[pi].vx = 0; nodes[pi].vy = 0;
        nodes[pi].pinned = true;

    // Scroll to zoom
    canvas.addEventListener('wheel', (e) => {

    canvas.addEventListener('click', (e) => {
      if (panMoved > 5) return; // was een sleep, geen click

      // Check filter bolletjes
      { const wc = screenToWorld(e.clientX, e.clientY);
        for (const dot of filterDots) {

          if (dx*dx + dy*dy < dot.r * dot.r) {
            if (selectedFilterDot && selectedFilterDot.projIdx === dot.projIdx && selectedFilterDot.key === dot.key) {
              selectedFilterDot = null;
              updateFilterDotCard(null);
            } else {
              selectedFilterDot = { projIdx: dot.projIdx, key: dot.key };
              updateFilterDotCard(dot);

            return;

        }
      }

      // Check of de hub geklikt is
      const wHub = screenToWorld(e.clientX, e.clientY);
      const hubDx = wHub.x - nodes[HUB_IDX].x;
      const hubDy = wHub.y - nodes[HUB_IDX].y;
      if (Math.hypot(hubDx, hubDy) < HUB_R + 8) {
        // Toggle: uitgezoomd → inzoomen, ingezoomd → uitzoomen
        if (targetZoom > 0.9) {

          selectedIndex = -1;
          resetDepth();
          updateInfoCard();
        } else {
          targetZoom = 1.4;
          panX = 0; panY = 0;
        }
        return;
      }

      // Convert screen → world coords
      const { x: wx, y: wy } = screenToWorld(e.clientX, e.clientY);
      // find hit
      let best = -1, bestD = Infinity;
      for (let i = 1; i < nodes.length; i++) {
        const n = nodes[i];
        const d2 = (n.x - wx) ** 2 + (n.y - wy) ** 2;
        const reach = (n.type === 'project' ? 22 : 14) ** 2;
        if (d2 < reach && d2 < bestD) { bestD = d2; best = i; }
      }
      if (best < 0) {
        selectedIndex = -1; updateInfoCard(); resetDepth();
        selectedFilterDot = null; updateFilterDotCard(null);
        // Maak eventueel gegroepeerde nodes los
        if (groupedIndex >= 0) {
          const proj = nodes[groupedIndex];
          for (const ei of proj.edges) {
            const [a, b] = edges[ei];
            if (a === HUB_IDX || b === HUB_IDX) continue;
            const pi = a === groupedIndex ? b : a;
            if (nodes[pi].type === 'person') nodes[pi].pinned = false;
          }
          groupedIndex = -1;
        }
        return;
      }
      const n = nodes[best];
      if (n.type === 'project') {
        n.pinned = !n.pinned;
        if (n.pinned) { n.vx = 0; n.vy = 0; }
        selectedIndex = best;
        pushDepth(best);
      } else {
        selectedIndex = (selectedIndex === best) ? -1 : best;
        if (selectedIndex >= 0) pushDepth(best);
        else resetDepth();
      }
      // Breng camera naar de node
      if (selectedIndex >= 0) {
        const newZoom = n.type === 'person' ? 1.8 : 1.5;

        panY = H / 2 - n.y;

    });

    // 2.5D diepte-animatie
    function pushDepth(focusIdx) {
      const neighbors = new Set();
      neighbors.add(focusIdx);
      for (const ei of nodes[focusIdx].edges) {
        const [a, b] = edges[ei];
        neighbors.add(a); neighbors.add(b);
      }
      for (let i = 0; i < nodes.length; i++) {
        if (i === HUB_IDX) { nodes[i].tz = 0.5; continue; }
        if (i === focusIdx) nodes[i].tz = 1.0;
        else if (neighbors.has(i)) nodes[i].tz = 0.35;
        else nodes[i].tz = -0.75;
      }
    }
    function resetDepth() {
      for (let i = 0; i < nodes.length; i++) {
        if (i === HUB_IDX) { nodes[i].tz = 0.5; continue; }
        nodes[i].tz = nodes[i].type === 'project' ? rand(-0.2, 0.1) : rand(-0.6, -0.1);
      }
    }

    function updateInfoCard() {

          `<div style="margin-top:8px;"><span style="font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:${FILTER_COLORS[k]};opacity:.9;">${k}</span><div style="color:rgba(232,238,247,.75);font-size:11px;margin-top:2px;">${v.join(', ')}</div></div>`
        ).join('');
        el.innerHTML = `<div class="kind">project ${n.pinned ? '· pinned' : ''}</div>
          <div class="who">${n.name}</div>

    function hexToRgb(hex) {
      const h = hex.replace('#', '');
      const v = parseInt(h.length === 3 ? h.split('').map(c => c + c).join('') : h, 16);
      return [(v >> 16) & 255, (v >> 8) & 255, v & 255];
    }
    function rgba(hex, a) {
      const [r, g, b] = hexToRgb(hex);
      return `rgba(${r},${g},${b},${a})`;
    }
    // 6 subtiele kleuren voor personen — passen bij het donkere ontwerp
    const PERSON_COLORS = [
      '#7eb8c9', // stofig blauw
      '#9fa8c0', // lavende grijs
      '#b8a89a', // warm zand
      '#8fbfa8', // salie groen

    ];
    // Projecten blijven neutraal wit/grijs
    const PROJECT_COLOR = '#d8dde8';

    function colorFor(node) {
      if (node.type === 'project' || node.type === 'hub') return PROJECT_COLOR;
      return PERSON_COLORS[node.c % PERSON_COLORS.length];
    }

    function updateFilterDotCard(dot) {
      const el = document.getElementById('filter-dot-card');
      if (!dot || !selectedFilterDot) { if (el) el.classList.remove('visible'); return; }
      const proj = nodes[dot.projIdx];

    function updateHover() {
      if (isPanning || panMoved > 5) return;
      if (!mouse.active) { mouse.hover = -1; canvas.style.cursor = 'default'; return; }

      // Check hub hover
      const hubDx = mouse.x - nodes[HUB_IDX].x;
      const hubDy = mouse.y - nodes[HUB_IDX].y;
      if (Math.hypot(hubDx, hubDy) < HUB_R + 8) {
        canvas.style.cursor = 'pointer';
        mouse.hover = -1;
        return;
      }

      let best = -1, bestD = Infinity;
      for (let i = 1; i < nodes.length; i++) {
        const n = nodes[i];
        const d2 = (n.x - mouse.x) ** 2 + (n.y - mouse.y) ** 2;
        const reach = (n.type === 'project' ? 20 : 18) ** 2; // personen groter hitgebied
        if (d2 < reach && d2 < bestD) { bestD = d2; best = i; }
      }
      mouse.hover = best;
      if (best >= 0 && nodes[best].type === 'project') {
        canvas.style.cursor = 'grab';
      } else {
        canvas.style.cursor = best >= 0 ? 'pointer' : 'grab';
      }
    }
    function addNeighbors(out, idx) {
      if (idx < 0) return;
      out.add(idx);
      const n = nodes[idx];
      for (const ei of n.edges) {
        const [a, b] = edges[ei];
        out.add(a); out.add(b);
      }
    }
    function highlightSet() {
      const out = new Set();
      if (selectedIndex >= 0) {
        // Selectie actief: alleen geselecteerde + directe buren
        addNeighbors(out, selectedIndex);
        // Hover alleen toevoegen als het een directe buur is
        if (mouse.hover >= 0) {
          const selEdges = nodes[selectedIndex].edges;
          for (const ei of selEdges) {
            const [a, b] = edges[ei];
            const neighbor = a === selectedIndex ? b : a;
            if (neighbor === mouse.hover) {
              out.add(mouse.hover);
              break;
            }
          }
        }
      } else {
        // Geen selectie: hover licht buren op
        addNeighbors(out, mouse.hover);
      }
      return out;
    }
    function pinnedSet() {
      const out = new Set();
      for (let i = 0; i < nodes.length; i++) if (nodes[i].pinned) out.add(i);
      return out;
    }

    let lastFrame = performance.now();
    let fpsSmoothed = 60;

    function step(now) {
      const dt = Math.min(40, now - lastFrame);
      lastFrame = now;
      fpsSmoothed = fpsSmoothed * 0.9 + (1000 / Math.max(1, dt)) * 0.1;
      const sp = CONFIG.speed;

      // Vloeiande zoom-animatie
      zoom += (targetZoom - zoom) * 0.1;
      // 3D auto-rotatie
      if (viewMode === '3d' && autoRotate) {
        rotY += 0.002;
      }

      updateHover();

      // Physics — alleen als niets geselecteerd is
      if (selectedIndex < 0) {

      const SPRING = CONFIG.spring;
      const REST = 65;
      const REPEL_PROJ = 2800 * CONFIG.repel;
      const REPEL_PERS = 400 * CONFIG.repel;
      const CENTER_PULL = 0.0006;

      // Hub altijd vast in midden
      nodes[HUB_IDX].x = W / 2; nodes[HUB_IDX].y = H / 2;
      nodes[HUB_IDX].vx = 0;    nodes[HUB_IDX].vy = 0;

      for (let i = 1; i < nodes.length; i++) {
        const A = nodes[i];
        for (let j = i + 1; j < nodes.length; j++) {
          const B = nodes[j];
          const dx = A.x - B.x, dy = A.y - B.y;
          let d2 = dx*dx + dy*dy; if (d2<4) d2=4;
          const d = Math.sqrt(d2);
          let strength;
          if (A.type==='project'&&B.type==='project') strength=REPEL_PROJ;
          else if (A.type==='person'&&B.type==='person') strength=REPEL_PERS;
          else strength=2200;
          const f=strength/d2, fx=(dx/d)*f, fy=(dy/d)*f;
          A.vx+=fx; A.vy+=fy; B.vx-=fx; B.vy-=fy;
        }
      }

      // Duw nodes hard buiten hub-cirkel — sterke kracht + positie-clamp
      for (let i = 1; i < nodes.length; i++) {
        const n = nodes[i];
        const dx = n.x - nodes[HUB_IDX].x, dy = n.y - nodes[HUB_IDX].y;
        const d = Math.hypot(dx, dy) || 1;
        const minD = HUB_R + n.r + 22;
        if (d < minD) {
          // Sterke veer-kracht
          const push = (minD - d) * 0.35;
          n.vx += (dx / d) * push;
          n.vy += (dy / d) * push;
          // Hard clamp: zet de node direct buiten de cirkel
          n.x = nodes[HUB_IDX].x + (dx / d) * minD;
          n.y = nodes[HUB_IDX].y + (dy / d) * minD;
          // Damp inwaartse snelheid
          const dot = n.vx * (dx / d) + n.vy * (dy / d);
          if (dot < 0) { n.vx -= (dx / d) * dot; n.vy -= (dy / d) * dot; }
        }
      }

      for (const [a, b] of edges) {
        if (a === HUB_IDX || b === HUB_IDX) continue;
        const A = nodes[a], B = nodes[b];
        const dx = B.x - A.x;
        const dy = B.y - A.y;
        const d = Math.hypot(dx, dy) || 1;
        const diff = d - REST;
        const f = diff * SPRING;
        const fx = (dx / d) * f;
        const fy = (dy / d) * f;
        const wA = A.type === 'project' ? 0.35 : 1;
        const wB = B.type === 'project' ? 0.35 : 1;
        A.vx += fx * wA; A.vy += fy * wA;
        B.vx -= fx * wB; B.vy -= fy * wB;
      }

      const cx = W / 2, cy = H / 2;
      for (const n of nodes) {
        if (n.pinned) { n.vx = 0; n.vy = 0; n.phase += dt * 0.002; }
        else {
          n.vx += (cx - n.x) * CENTER_PULL;
          n.vy += (cy - n.y) * CENTER_PULL;

          if (CONFIG.cursorPull && mouse.active) {
            const dx = mouse.x - n.x;
            const dy = mouse.y - n.y;
            const d2 = dx * dx + dy * dy;
            const R = 180;
            if (d2 < R * R && d2 > 1) {
              const d = Math.sqrt(d2);
              const f = (1 - d / R) * 0.35;
              n.vx -= (dx / d) * f;
              n.vy -= (dy / d) * f;
            }
          }

          n.vx *= 0.74; n.vy *= 0.74;
          const vmax = 5;
          const v = Math.hypot(n.vx, n.vy);

          og.addColorStop(0,'rgba(255,255,255,0.07)'); og.addColorStop(1,'rgba(255,255,255,0)');
          ctx.fillStyle=og; ctx.beginPath(); ctx.arc(h.x,h.y,r*1.7,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='rgba(7,8,11,0.88)'; ctx.beginPath(); ctx.arc(h.x,h.y,r,0,Math.PI*2); ctx.fill();
          ctx.strokeStyle='rgba(232,238,247,0.9)'; ctx.lineWidth=1.5;
          ctx.beginPath(); ctx.arc(h.x,h.y,r,0,Math.PI*2); ctx.stroke();
          ctx.save(); ctx.strokeStyle='rgba(232,238,247,0.16)'; ctx.lineWidth=0.7;
          ctx.setLineDash([4,8]); ctx.lineDashOffset=-t*12;
          ctx.beginPath(); ctx.arc(h.x,h.y,r+11,0,Math.PI*2); ctx.stroke();
          ctx.setLineDash([]); ctx.restore();
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillStyle='rgba(232,238,247,0.92)';
          ctx.font="600 18px 'Space Grotesk', system-ui, sans-serif";
          ctx.fillText('MVSA',h.x,h.y-7);
          ctx.fillStyle='rgba(216,222,233,0.45)';
          ctx.font="400 9px 'JetBrains Mono', monospace";
          ctx.fillText('ARCHITECTS',h.x,h.y+9);
        }
      }

      if (CONFIG.showLabels) {
        ctx.textBaseline = 'middle';
        for (const i of sortedIdx) {
          const n = nodes[i];
          if (n.type !== 'project' && !(hasSel && hl.has(i))) continue;
          const lit = !hasSel || hl.has(i);
          const isProj = n.type === 'project';
          const sc = zScale(n.z);
          const fog = zAlpha(n.z);
          const alpha = (lit ? (isProj ? 0.92 : 0.85) : 0.22) * fog;
          const text = n.name;
          const padX = 6, padY = 2;
          const fsize = isProj ? Math.round(11.5 * sc) : Math.round(10.5 * sc);
          ctx.font = isProj
            ? `500 ${fsize}px 'Space Grotesk', system-ui, sans-serif`
            : `400 ${fsize}px 'JetBrains Mono', monospace`;
          const tw = ctx.measureText(text).width;

          // Label links of rechts op basis van positie t.o.v. canvas-midden
          const nodeScreenX = n.x + panX; // world x + pan
          const toRight = nodeScreenX >= W / 2;
          const offset = (isProj ? n.r + 10 : n.r + 7) * sc;

          let tx, ty = n.y;
          if (toRight) {
            ctx.textAlign = 'left';
            tx = n.x + offset;
          } else {
            ctx.textAlign = 'right';
            tx = n.x - offset;
          }

          // Achtergrond
          const bgX = toRight ? tx - padX / 2 : tx - tw - padX / 2;
          ctx.fillStyle = `rgba(7,8,11,${0.55 * alpha})`;
          ctx.fillRect(bgX, ty - 8 * sc - padY, tw + padX, 16 * sc + padY * 2);
          ctx.fillStyle = isProj
            ? `rgba(232,238,247,${alpha})`
            : `rgba(216,222,233,${alpha * 0.85})`;
          ctx.fillText(text, tx, ty);
        }
      }

      // Restore node positions after 3D draw
      if (viewMode === '3d') {
        for (const n of nodes) {
          if (typeof n._ox === 'number') { n.x = n._ox; n.y = n._oy; }
        }
      }
      ctx.restore(); // end zoom transform

      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);

    // ── Zoekbalk ────────────────────────────────────────────────────────────
    const searchInput   = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');
    const searchClear   = document.getElementById('search-clear');

    function focusNode(idx) {
      selectedIndex = idx;
      pushDepth(idx);
      updateInfoCard();
      const n = nodes[idx];
      const newZoom = nodes[idx].type === 'person' ? 1.8 : 1.5;
      targetZoom = newZoom;
      // screenX van node = (n.x + panX - W/2) * zoom + W/2
      // we willen screenX = W/2 → panX = W/2 - n.x
      // maar infokaart staat links (±300px breed) dus verschuif node iets naar rechts
      const infoOffset = 180; // pixels, helft van kaartbreedte
      panX = W / 2 - n.x + infoOffset / newZoom;
      panY = H / 2 - n.y;
    }

    function renderResults(q) {
      if (!q) { searchResults.classList.remove('visible'); searchResults.innerHTML = ''; return; }
      const lower = q.toLowerCase();
      const hits = [];
      for (let i = 0; i < nodes.length; i++) {
        if (nodes[i].name.toLowerCase().includes(lower)) hits.push(i);
        if (hits.length >= 8) break;
      }
      searchResults.classList.add('visible');
      if (!hits.length) {
        searchResults.innerHTML = '<div class="search-no-results">Geen resultaten gevonden</div>';
        return;
      }
      searchResults.innerHTML = hits.map(i => {
        const n = nodes[i];
        const isP = n.type === 'project';
        return `<div class="search-result-item" data-idx="${i}">
          <span class="search-result-dot ${n.type}"></span>
          <span class="search-result-name">${n.name}</span>
          <span class="search-result-type">${isP ? 'project' : 'persoon'}</span>
        </div>`;
      }).join('');
      searchResults.querySelectorAll('.search-result-item').forEach(el => {
        el.addEventListener('click', () => {
          focusNode(+el.dataset.idx);
          searchInput.value = nodes[+el.dataset.idx].name;
          searchResults.classList.remove('visible');
          searchClear.style.display = 'block';
          searchInput.blur(); // geef focus terug aan canvas
        });
      });
    }

    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim();
      searchClear.style.display = q ? 'block' : 'none';
      renderResults(q);
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { searchInput.value = ''; renderResults(''); searchClear.style.display = 'none'; }
      // Enter → selecteer eerste resultaat
      if (e.key === 'Enter') {
        const first = searchResults.querySelector('.search-result-item');
        if (first) first.click();
      }
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      renderResults('');
      searchClear.style.display = 'none';
      searchInput.focus();
    });

    // ── View mode toggle ─────────────────────────────────────────────────
    document.getElementById('btn-2d').addEventListener('click', () => {
      viewMode = '2d'; autoRotate = false;
      document.getElementById('btn-2d').classList.add('active');
      document.getElementById('btn-3d').classList.remove('active');
    });
    document.getElementById('btn-3d').addEventListener('click', () => {
      viewMode = '3d'; autoRotate = true;
      initSpherePositions();
      document.getElementById('btn-3d').classList.add('active');
      document.getElementById('btn-2d').classList.remove('active');
    });

    // ── Filter panel ────────────────────────────────────────────────────
    document.querySelectorAll('.filter-item').forEach(el => {
      const key = el.dataset.filter;
      el.addEventListener('click', () => {
        if (activeFilters.has(key)) activeFilters.delete(key);
        else activeFilters.add(key);
        el.classList.toggle('off', !activeFilters.has(key));
      });
    });

    // Klik buiten zoekresultaten → sluit
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-wrap')) {
        searchResults.classList.remove('visible');
      }
    });

    setInterval(() => {
      const projN = nodes.filter(n => n.type === 'project').length;
      const persN = nodes.length - projN;
      document.getElementById('r-projects').textContent = String(projN).padStart(2, '0');
      document.getElementById('r-people').textContent = String(persN).padStart(2, '0');
      document.getElementById('r-links').textContent = String(edges.length).padStart(3, '0');
      document.getElementById('r-fps').textContent = Math.round(fpsSmoothed);
    }, 300);

    window.__NET = {
      get config() { return CONFIG; },
      apply(patch) {
        const rebuild = ('projects' in patch) || ('people' in patch) || ('avgPerPerson' in patch);
        Object.assign(CONFIG, patch);
        if (rebuild) buildGraph();
      },
      rebuild: buildGraph,
    };
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel">
    const PALETTES = [
      ['#e5e7eb', '#94a3b8', '#cbd5e1'],
      ['#7dd3fc', '#a5b4fc', '#f0abfc'],
      ['#fb923c', '#f472b6', '#fbbf24'],
      ['#34d399', '#22d3ee', '#a3e635'],
      ['#f87171', '#fb7185', '#fda4af'],
    ];

    function App() {
      const [t, setTweak] = useTweaks(window.__NET.config);
      React.useEffect(() => { window.__NET.apply(t); }, [t]);
      const set = (k) => (v) => setTweak(k, v);

      return (
        <TweaksPanel title="Network">
          <TweakSection label="Graph" />
          <TweakSlider label="Projects" value={t.projects} min={4} max={100} step={1}
            onChange={set('projects')} />
          <TweakSlider label="People" value={t.people} min={6} max={60} step={1}
            onChange={set('people')} />
          <TweakSlider label="Avg / person"
            value={Math.round(t.avgPerPerson * 10) / 10}
            min={1} max={5} step={0.1}
            onChange={set('avgPerPerson')} />
          <TweakButton onClick={() => window.__NET.rebuild()}>Re-roll graph</TweakButton>

          <TweakSection label="Motion" />
          <TweakSlider label="Speed" value={Math.round(t.speed * 100)} min={10} max={200} step={5} unit="%"
            onChange={(v) => setTweak('speed', v / 100)} />
          <TweakSlider label="Repulsion" value={Math.round(t.repel * 100)} min={20} max={250} step={5} unit="%"
            onChange={(v) => setTweak('repel', v / 100)} />
          <TweakSlider label="Spring" value={Math.round(t.spring * 1000)} min={5} max={60} step={1}
            onChange={(v) => setTweak('spring', v / 1000)} />

          <TweakSection label="Appearance" />
          <TweakColor label="Palette" value={t.palette} options={PALETTES}
            onChange={set('palette')} />
          <TweakSlider label="Lines" value={Math.round(t.lineOpacity * 100)} min={0} max={100} unit="%"
            onChange={(v) => setTweak('lineOpacity', v / 100)} />
          <TweakToggle label="Glow" value={t.glow} onChange={set('glow')} />
          <TweakToggle label="Labels" value={t.showLabels} onChange={set('showLabels')} />

          <TweakSection label="Signals" />
          <TweakToggle label="Pulses" value={t.pulses} onChange={set('pulses')} />
          <TweakToggle label="Cursor pull" value={t.cursorPull} onChange={set('cursorPull')} />
        </TweaksPanel>
      );
    }

    ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<App />);
  </script>
</body>
