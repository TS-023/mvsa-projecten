<style>
  :root{
    --bg: #f4f1ec;
    --card: #ffffff;
    --ink: #111418;
    --muted: #8a8d93;
    --line: #e8e4dd;
    --accent: #3d6e8a;
    --shadow: 0 1px 0 rgba(20,30,45,.04), 0 8px 24px -12px rgba(20,30,45,.18);
  }
  [data-theme="dark"]{
    --bg:#0f1114; --card:#1a1d22; --ink:#e8ecf0;
    --muted:#8a929c; --line:#2a2e35; --accent:#5a9ab8;
    --shadow:0 1px 0 rgba(0,0,0,.2),0 8px 24px -12px rgba(0,0,0,.4);
  }
  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; height:100%; background: var(--bg); color: var(--ink); font-family: 'Inter', Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }

  .layout{ display: grid; grid-template-columns: 360px 1fr; height: 100vh; }

  /* Sidebar */
  .side{
    background: var(--bg); padding: 62px 20px 20px; overflow-y: auto;
    border-right: 1px solid rgba(17,20,24,.06);
  }
  .side h1{ font-size: 28px; font-weight: 800; letter-spacing: -.025em; margin: 0 0 4px; }
  .side .sub{ font-size: 12px; color: var(--muted); margin-bottom: 18px; }

  .search-input{
    width: 100%; font-family: inherit; font-size: 13px;
    background: #fff; border: 1px solid rgba(17,20,24,.08); border-radius: 999px;
    padding: 10px 16px; box-shadow: var(--shadow); margin-bottom: 14px;
  }
  .search-input:focus{ outline: 2px solid var(--accent); outline-offset: -1px; }

  /* Legend zwevend rechtsonder */
  .legend-float {
    position: fixed; bottom: 20px; right: 20px; z-index: 500;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
    border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 16px; min-width: 160px;
    box-shadow: 0 4px 20px rgba(0,0,0,.10);
  }
  .legend-float .legend-title {
    font-size: 9px; font-weight: 700; letter-spacing: .18em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }
  .legend-float .item { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--ink-2); padding:2px 0; }
  .legend-float .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

  .proj-list{ display: flex; flex-direction: column; gap: 8px; }

  /* ── Detail paneel (bij klik op pin) ── */
  .detail-panel{
    display: none; flex-direction: column; gap: 0;
    animation: slideDetail .25s cubic-bezier(.22,1,.36,1);
  }
  @keyframes slideDetail{ from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
  .detail-panel.visible{ display: flex; }
  .detail-hero{
    width: 100%; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden;
    background: linear-gradient(135deg, #1a2030, #2a3548);
    margin-bottom: 14px; position: relative; flex: none;
  }
  .detail-hero img{ width:100%; height:100%; object-fit:cover; display:block; }
  .detail-hero .no-img{
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.4);
  }
  .detail-tag{
    font-size: 9px; letter-spacing: .16em; text-transform: uppercase; font-weight: 700;
    color: var(--accent); margin-bottom: 6px;
  }
  .detail-name{
    font-size: 20px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 4px; line-height: 1.1;
  }
  .detail-loc{ font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .detail-stats{
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px;
  }
  .detail-stat{
    background: var(--card); border-radius: 10px; padding: 10px 12px;
    box-shadow: var(--shadow);
  }
  .detail-stat .lbl{ font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 3px; }
  .detail-stat .val{ font-size: 14px; font-weight: 800; letter-spacing: -.01em; }
  .detail-open{
    display: block; text-align: center; background: var(--ink); color: #fff;
    text-decoration: none; padding: 12px; border-radius: 999px;
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase; font-weight: 700;
    transition: background .15s, transform .15s; margin-bottom: 12px;
  }
  .detail-open:hover{ background: var(--accent); transform: translateY(-1px); }
  .detail-section-title{
    font-size:9px; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
    color:var(--muted); margin-bottom:8px;
  }
  .team-chips{ display:flex; flex-wrap:wrap; gap:6px; }
  .team-chip{
    display:flex; align-items:center; gap:6px; padding:5px 10px;
    border-radius:999px; background:#fff; border:1px solid var(--line);
    font-size:11px; font-weight:600; color:var(--ink);
  }
  .team-avatar{
    width:20px; height:20px; border-radius:50%;
    background:linear-gradient(135deg,#3d6e8a,#2a4f6a);
    display:flex; align-items:center; justify-content:center;
    font-size:8px; font-weight:800; color:#fff; flex-shrink:0;
  }
  .partner-chip{
    display:inline-block; padding:4px 10px; border-radius:999px;
    font-size:10px; font-weight:600; border:1px solid var(--line);
    background:var(--bg); color:var(--muted); margin:2px;
  }
  .detail-back{
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; letter-spacing: .08em; text-transform: uppercase; font-weight: 700;
    color: var(--ink); cursor: pointer;
    background: #fff; border: 1.5px solid var(--line);
    border-radius: 999px; font-family: inherit;
    padding: 8px 16px; margin-bottom: 4px;
    transition: background .12s, border-color .12s;
    width: 100%; justify-content: center;
  }
  .detail-back:hover{ background: var(--bg); border-color: var(--ink); }
  .proj-card{
    background: var(--card); border-radius: 12px; padding: 12px 14px; cursor: pointer;
    box-shadow: var(--shadow);
    border: 1px solid transparent;
    transition: border-color .15s ease, transform .15s ease;
  }
  .proj-card:hover{ border-color: var(--accent); transform: translateX(2px); }
  .proj-card.active{ border-color: var(--accent); background: #f3f7fa; }
  .proj-card .row{ display:flex; justify-content: space-between; align-items: center; gap: 8px; }
  .proj-card .nm{ font-weight: 700; font-size: 11px; letter-spacing: .04em; text-transform: uppercase; }
  .proj-card .badge{
    font-size: 9px; letter-spacing: .12em; text-transform: uppercase; font-weight: 700;
    padding: 3px 8px; border-radius: 999px; background: rgba(61,110,138,.1); color: var(--accent);
  }
  .proj-card .badge.user{ background: rgba(17,20,24,.08); color: var(--ink); }
  .proj-card .addr{ font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* Map */
  .map-wrap{ position: relative; }
  #map{ position: absolute; inset: 0; }

  /* Floating back */
  .back{
    position: fixed; top: 24px; left: 24px; z-index: 1000;
    display:inline-flex; align-items:center; gap:8px; color: var(--ink); text-decoration:none;
    font-size: 12px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600;
    padding: 10px 16px; border-radius: 999px;
    background: rgba(255,255,255,.85); backdrop-filter: blur(10px);
    border:1px solid rgba(17,20,24,.08);
    box-shadow: 0 4px 16px -4px rgba(20,30,45,.18);
    transition: background .15s ease, transform .15s ease;
  }
  .back:hover{ background: #fff; transform: translateY(-1px); }

  /* Custom marker */
  .marker-pin{
    width: 36px; height: 36px; border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    border: 2.5px solid rgba(255,255,255,0.9);
    box-shadow: 0 4px 14px rgba(0,0,0,.28);
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s, box-shadow .15s;
  }
  .leaflet-div-icon, .custom-div-icon {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    padding: 0 !important;
    margin: 0 !important;
  }
  .leaflet-div-icon div {
    box-sizing: border-box;
  }
  .marker-pin:hover{
    transform: rotate(-45deg) scale(1.12);
    box-shadow: 0 6px 20px rgba(0,0,0,.38);
  }
  .marker-pin.user{ background: var(--ink) !important; }
  .pin-icon{
    transform: rotate(45deg);
    font-size: 15px; line-height: 1;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.3));
  }

  /* Popup */
  .leaflet-popup-content-wrapper{
    border-radius: 12px;
    font-family: 'Inter', Helvetica, Arial, sans-serif;
  }
  .pop-title{ font-weight: 700; font-size: 14px; letter-spacing: .03em; text-transform: uppercase; margin-bottom: 4px; }
  .pop-meta{ font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .pop-link{
    display: inline-block; background: var(--ink); color: #fff !important; text-decoration: none;
    padding: 6px 12px; border-radius: 999px;
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase; font-weight: 600;
  }
  .pop-link:hover{ background: var(--accent); }
  .pop-thumb{ width:100%; height:140px; border-radius:8px; overflow:hidden; margin-bottom:10px; background:#e6ecf2; }
  .pop-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .pop-thumb .no-img{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; background:linear-gradient(135deg,#e6ecf2 0%,#d4dde8 100%); }
  .leaflet-popup-content{ min-width:200px; }
  .proj-tooltip-simple {
    background: #fff !important;
    border: 1px solid rgba(17,20,24,.12) !important;
    border-radius: 8px !important;
    padding: 6px 12px !important;
    box-shadow: 0 4px 16px rgba(0,0,0,.12) !important;
    font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: .04em; text-transform: uppercase;
    color: var(--ink); white-space: nowrap;
  }
  .proj-tooltip-simple::before { display: none !important; }
  .leaflet-tooltip.proj-tooltip-simple { border: 1px solid rgba(17,20,24,.12) !important; }
  .tt-addr{ font-size: 11px; color: var(--muted); margin-top: 3px; }

  .prov-banner{
    position:fixed; top:80px; left:50%; transform:translateX(-50%); z-index:1000;
    background:rgba(255,255,255,.92); backdrop-filter:blur(10px);
    border:1px solid rgba(17,20,24,.08); border-radius:999px;
    padding:10px 20px; font-size:12px; font-weight:700; letter-spacing:.08em;
    text-transform:uppercase; color:#111418; box-shadow:0 4px 16px -4px rgba(20,30,45,.18);
    display:flex; align-items:center; gap:12px;
  }
  .prov-banner button{ background:none; border:none; cursor:pointer; font-size:14px; color:#6b7480; padding:0; }
  .prov-banner button:hover{ color:#111418; }
  @media (max-width: 820px){
    .layout{ grid-template-columns: 1fr; grid-template-rows: 320px 1fr; }
    .side{ padding-top: 72px; max-height: 320px; }
  }
</style>

<script>
/* ----------------------------------------------------------------------------
   MOCK projects with hand-set NL coordinates.
   User projects come from localStorage (saved via New Project.html).
---------------------------------------------------------------------------- */

/* Load user-entered projects from Supabase */
/* ── loadUserProjects: haalt projecten op uit Supabase
   - resolveert adressen via Nominatim geocoder
   - laadt thumbnails uit Supabase Storage ── */
async function loadUserProjects(){
  try {
    const all = await Projects.getAll();
    const withThumbs = await Promise.all(all.map(async p => {
      let thumbUrl = null;
      if (p.projectnummer) {
        try { const imgs = await Images.getForProject(p.projectnummer); thumbUrl = imgs[0] || null; } catch(e) {}
      }
      return {
        name: p.projectnaam || p.projectnummer || 'Naamloos',
        city: p.stad || '',
        address: [p.straat, p.huisnummer, p.postcode, p.stad].filter(Boolean).join(' '),
        raw: p, isUser: true, thumbUrl,
        opgave: p.opgave || '',
        project_type: p.project_type || '',
      };
    }));
    return withThumbs;
  } catch(e) {
    console.error('Kon projecten niet laden:', e);
    return [];
  }
}

/* Geocode using Nominatim (OSM) — free, no key, but rate-limited */
async function geocode(query){
  if (!query) return null;
  const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`;
  try {
    const res = await fetch(url, { headers: { 'Accept-Language': 'nl' } });
    const data = await res.json();
    if (data && data[0]) return { lat: +data[0].lat, lng: +data[0].lon };
  } catch (e) { console.warn('geocode failed', e); }
  return null;
}

/* Cache geocode results in localStorage to avoid hammering Nominatim */
function cacheGet(key){
  try { return JSON.parse(localStorage.getItem('mvsa.geocache') || '{}')[key] || null; }
  catch { return null; }
}
function cacheSet(key, val){
  try {
    const all = JSON.parse(localStorage.getItem('mvsa.geocache') || '{}');
    all[key] = val;
    localStorage.setItem('mvsa.geocache', JSON.stringify(all));
  } catch {}
}

/* Resolve coords for user projects */
async function resolveUserCoords(userProjects){
  const out = [];
  for (const p of userProjects){
    // Direct lat/lng beschikbaar → geen geocoding nodig
    if (p.raw?.lat && p.raw?.lng) {
      out.push({ ...p, lat: +p.raw.lat, lng: +p.raw.lng });
      continue;
    }
    if (!p.address){ continue; }
    let coords = cacheGet(p.address);
    if (!coords){
      coords = await geocode(p.address);
      if (coords) cacheSet(p.address, coords);
      await new Promise(r => setTimeout(r, 1100));
    }
    if (coords) out.push({ ...p, lat: coords.lat, lng: coords.lng });
  }
  return out;
}

/* ----------------------------------------------------------------------------
   Build map
---------------------------------------------------------------------------- */
const map = L.map('map', { zoomControl: false }).setView([52.2, 5.3], 7);
L.control.zoom({ position: 'bottomright' }).addTo(map);
// Schaal markers op basis van zoom
map.on('zoomend', () => {
  // Vaste iconSize — geen update nodig bij zoom
  // Alleen active marker herstellen als nodig
});

map.on('click', function(e) {
  // Klik buiten marker → sluit detail en zoom terug naar begin
  const target = e.originalEvent.target;
  const onPin = target.closest('svg') || target.closest('.leaflet-marker-icon') || target.tagName === 'text' || target.tagName === 'path';
  if (!onPin) {
    if (activeMarker) {
      closeDetail();
      map.setView([52.2, 5.3], 7, { animate: true });
    }
  }
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  subdomains: 'abcd', maxZoom: 19,
}).addTo(map);

const allProjects = [];
const markers = {};
let activeMarker = null; // huidig geselecteerde marker

/* ═══════════════════════════════════════
   KAART — projects_map.html
   ═══════════════════════════════════════ */

/* ── TYPE_MAP: icoon + kleur per project_type ── */
const TYPE_MAP = {
  'Architectuur':               { icon: '🏛', color: '#4f7cac' },
  'Stedenbouw':                 { icon: '🏙', color: '#6b8f71' },
  'Interieur':                  { icon: '🛋', color: '#c4956a' },
  'Renovatie':                  { icon: '🔧', color: '#8b7355' },
  'Onderzoek':                  { icon: '🔬', color: '#7b68ee' },
  'Mixed Use':                  { icon: '◈',  color: '#5f9ea0' },
  'Residential':                { icon: '🏠', color: '#e07b54' },
  'Woningbouw':                 { icon: '🏠', color: '#e07b54' },
  'Offices':                    { icon: '🏢', color: '#4a7c8f' },
  'Kantoor':                    { icon: '🏢', color: '#4a7c8f' },
  'Education':                  { icon: '🎓', color: '#d4a843' },
  'Onderwijs':                  { icon: '🎓', color: '#d4a843' },
  'Public & Healthcare':        { icon: '🏥', color: '#5aaa7e' },
  'Publiek':                    { icon: '🏛', color: '#5aaa7e' },
  'Zorg':                       { icon: '🏥', color: '#5aaa7e' },
  'Retail & Hospitality':       { icon: '🛍', color: '#c47a9e' },
  'Horeca':                     { icon: '☕', color: '#c47a9e' },

function getTypeData(project) {
  const type = (project?.project_type || project?.raw?.project_type || 
    project?.raw?.opgave || project?.opgave || '').trim();
  if (!type) return TYPE_MAP['default'];
  const key = Object.keys(TYPE_MAP).find(k => k.toLowerCase() === type.toLowerCase()) || 'default';
  return TYPE_MAP[key];
}

/* ── getIcon: backwards compat ── */
function getIcon(project) {
  return getTypeData(project).icon;
}

// Vaste container — anchor klopt altijd, SVG schaalt intern
const ICON_W = 36, ICON_H = 42, ICON_AX = 18, ICON_AY = 42;

function makeIconZoom(isUser, project, active, zoom) {
  const { icon, color } = isUser ? { icon: '★', color: '#111418' } : getTypeData(project);
  const border = active ? '#111418' : '#ffffff';
  const scale  = active ? 1.2 : 1;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg"
    width="${ICON_W}" height="${ICON_H}"
    viewBox="0 0 36 42"
    style="transform:scale(${scale});transform-origin:50% 100%;display:block;">
    <defs><filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="rgba(0,0,0,.32)"/></filter></defs>
    <path d="M18 40 C18 40 2 22 2 14 a16 16 0 1 1 32 0 C34 22 18 40 18 40z"
      fill="${color}" stroke="${border}" stroke-width="2" filter="url(#sh)"/>
    <text x="18" y="15" text-anchor="middle" dominant-baseline="middle"
      font-size="14" style="user-select:none;">${icon}</text>
  </svg>`;
  return L.divIcon({
    className: '',
    html: svg,
    iconSize:    [ICON_W, ICON_H],
    iconAnchor:  [ICON_AX, ICON_AY],
    popupAnchor: [0, -ICON_H],
  });
}

function makeIconYear(year, active) {
  const color  = yearColor(year);
  const border = active ? '#111418' : '#ffffff';
  const scale  = active ? 1.2 : 1;
  // Geen label — alleen kleur
  const svg = `<svg xmlns="http://www.w3.org/2000/svg"
    width="${ICON_W}" height="${ICON_H}"
    viewBox="0 0 36 42"
    style="transform:scale(${scale});transform-origin:50% 100%;display:block;">
    <defs><filter id="shy"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="rgba(0,0,0,.32)"/></filter></defs>
    <path d="M18 40 C18 40 2 22 2 14 a16 16 0 1 1 32 0 C34 22 18 40 18 40z"
      fill="${color}" stroke="${border}" stroke-width="2" filter="url(#shy)"/>
  </svg>`;
  return L.divIcon({
    className: '',
    html: svg,
    iconSize:    [ICON_W, ICON_H],
    iconAnchor:  [ICON_AX, ICON_AY],
    popupAnchor: [0, -ICON_H],
  });
}
function addProject(p){
  // Mock jaar als geen opleverdatum beschikbaar
  if (!p.year) {
    const y = p.raw?.opleverdatum?.slice(0,4) || p.raw?.startdatum?.slice(0,4);
    p.year = y ? +y : (YEAR_MIN + Math.floor(Math.random() * (YEAR_MAX - YEAR_MIN + 1)));
  }
  const m = L.marker([p.lat, p.lng], { icon: makeIconZoom(p.isUser, p.raw, false, map.getZoom()) }).addTo(map);
  const link = `project_page.html?p=${encodeURIComponent(p.name)}`;

  // Popup (bij klik)
  m.on('click', () => {
    // Reset vorige actieve marker
    if (activeMarker && activeMarker !== m) {
      const prevP = allProjects.find(x => markers[x.name] === activeMarker);
      if (prevP) activeMarker.setIcon(makeIconZoom(prevP.isUser, prevP.raw, false, map.getZoom()));
    }
    activeMarker = m;
    m.setIcon(makeIconZoom(p.isUser, p.raw, true, map.getZoom()));
    m.unbindTooltip();
    m.bindTooltip(`<div class="tt-name">${p.name}</div>`, {
      className: 'proj-tooltip-simple proj-tooltip-active', direction: 'top',
      offset: [0, -46], permanent: true, sticky: false,
    });
    m.openTooltip();
    map.setView([p.lat, p.lng], Math.max(map.getZoom(), 11), { animate: true });
    showDetail(p);
  });
  m.on('mouseover', () => {
    // Hover: alleen tooltip tonen, detail alleen bij klik
    if (activeMarker !== m) {
      // Highlight in lijst maar open NIET detail
      document.querySelectorAll('.proj-card').forEach(el => el.classList.remove('active'));
      const card = document.querySelector(`.proj-card[data-name="${p.name}"]`);
      if (card) card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  });
  m.on('mouseout', () => {
    // Niets — detail blijft open als geklikt
  });

  // Tooltip (bij hover)
  m.bindTooltip(`<div class="tt-name">${p.name}</div>`, {
    className: 'proj-tooltip-simple', direction: 'top', offset: [0, -46],
    permanent: false, sticky: false,
  });

markers[p.name] = m;
  allProjects.push(p);
}

async function showDetail(p) {
  // Verberg lijst, toon detail
  document.getElementById('proj-list').style.display = 'none';
  document.getElementById('search').style.display = 'none';
  document.querySelector('.legend') && (document.querySelector('.legend').style.display = 'none');

  const panel = document.getElementById('detail-panel');
  panel.classList.add('visible');

  // Hero afbeelding
  const hero = document.getElementById('detail-hero');
  if (p.thumbUrl) {
    hero.innerHTML = `<img src="${p.thumbUrl}" alt="${p.name}">`;
  } else {
    hero.innerHTML = '<div class="no-img">Geen afbeelding</div>';
  }

  // Info
  const typeData = getTypeData(p.raw || p);
  const tagEl = document.getElementById('detail-tag');
  tagEl.textContent = p.project_type || p.opgave || 'Project';
  tagEl.style.cssText = `background:${typeData.color}22;color:${typeData.color};border:1px solid ${typeData.color}44;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;`;
  document.getElementById('detail-name').textContent = p.name;
  document.getElementById('detail-loc').textContent = [p.city, p.raw?.provincie, p.raw?.land].filter(Boolean).join(' · ') || '—';

  // Stats
  const stats = [];
  if (p.raw?.fase)        stats.push({ lbl: 'Fase',      val: p.raw.fase });
  if (p.raw?.totaal_bvo)  stats.push({ lbl: 'Totaal BVO', val: Number(p.raw.totaal_bvo).toLocaleString('nl-NL') + ' m²' });
  if (p.raw?.opdrachtgever) stats.push({ lbl: 'Opdrachtgever', val: p.raw.opdrachtgever });
  if (p.raw?.project_type)  stats.push({ lbl: 'Type', val: p.raw.project_type });
  if (p.raw?.projectnummer)  stats.push({ lbl: 'Nummer', val: p.raw.projectnummer });
  if (p.raw?.opleverdatum)   stats.push({ lbl: 'Oplevering', val: p.raw.opleverdatum.slice(0,4) });

  document.getElementById('detail-stats').innerHTML = stats.slice(0,4).map(s =>
    `<div class="detail-stat"><div class="lbl">${s.lbl}</div><div class="val">${s.val}</div></div>`
  ).join('');

  // Open link
  const nr = p.raw?.projectnummer || '';
  document.getElementById('detail-open').href =
    `project_page.html?nr=${encodeURIComponent(nr)}&p=${encodeURIComponent(p.name)}`;

  // Laad team + partners
  const teamEl = document.getElementById('detail-team');
  const partnersEl = document.getElementById('detail-partners');
  teamEl.style.display = 'none';
  partnersEl.style.display = 'none';

  if (p.raw?.id) {
    // Werknemers via employees tabel (projecten veld)
    try {
      const { data: emps } = await db.from('employees')
        .select('naam, rol')
        .ilike('projecten', `%${p.name}%`)
        .limit(8);
      if (emps && emps.length) {
        teamEl.innerHTML = `<div class="detail-section-title">Team (${emps.length})</div>
          <div class="team-chips">${emps.map(e =>
            `<div class="team-chip">
              <div class="team-avatar">${(e.naam||'?').split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase()}</div>
              ${e.naam}
            </div>`).join('')}</div>`;
        teamEl.style.display = 'block';
      }
    } catch(e) {}

    // Partners via project_contacts
    try {
      const { data: pcs } = await db.from('project_contacts')
        .select('contacts(naam, bedrijf, rol)')
        .eq('project_id', p.raw.id)
        .limit(8);
      if (pcs && pcs.length) {
        const contacts = pcs.map(pc => pc.contacts).filter(Boolean);
        if (contacts.length) {
          partnersEl.innerHTML = `<div class="detail-section-title">Samenwerkingen</div>
            <div class="team-chips">${contacts.map(ct =>
              `<div class="team-chip">
                <div class="team-avatar" style="background:linear-gradient(135deg,#6b5a8a,#4a3d6a);">${(ct.naam||'?').split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase()}</div>
                <div>
                  <div style="font-size:11px;font-weight:700;">${ct.naam}</div>
                  ${ct.bedrijf ? `<div style="font-size:9px;color:var(--muted);font-weight:400;">${ct.bedrijf}</div>` : ''}
                </div>
              </div>`).join('')}</div>`;
          partnersEl.style.display = 'block';
        }
      }
    } catch(e) {}
  }
}

function closeDetail() {
  document.getElementById('proj-list').style.display = 'flex';
  document.getElementById('search').style.display = '';
  document.querySelector('.legend') && (document.querySelector('.legend').style.display = '');
  document.getElementById('detail-panel').classList.remove('visible');
  // Reset actieve marker icon
  if (activeMarker) {
    const prevP = allProjects.find(x => markers[x.name] === activeMarker);
    if (prevP) {
      activeMarker.setIcon(makeIconZoom(prevP.isUser, prevP.raw, false, map.getZoom()));
      activeMarker.unbindTooltip();
      activeMarker.bindTooltip(`<div class="tt-name">${prevP.name}</div>`, {
        className: 'proj-tooltip-simple', direction: 'top', offset: [0,-46], permanent: false,
      });
    }
    activeMarker = null;
  }
  document.querySelectorAll('.proj-card.active').forEach(c => c.classList.remove('active'));
  map.closePopup();
}

function renderList(filter = ''){
  const list = document.getElementById('proj-list');
  const q = filter.toLowerCase();
  const visible = allProjects.filter(p => {
    const matchQ = !q || p.name.toLowerCase().includes(q) || (p.city || '').toLowerCase().includes(q);
    const type = (p.project_type || p.raw?.project_type || '').trim();
    const fase = (p.raw?.fase || '').trim();
    const stad = (p.city || p.raw?.stad || '').trim();
    const matchType = activeFilters.type.size === 0 || activeFilters.type.has(type);
    const matchFase = activeFilters.fase.size === 0 || activeFilters.fase.has(fase);
    const matchStad = !activeFilters.stad || stad.toLowerCase().includes(activeFilters.stad.toLowerCase());
    return matchQ && matchType && matchFase && matchStad;
  });
  list.innerHTML = visible.map(p => {
    const td = getTypeData(p.raw || p);
    return `<div class="proj-card" data-name="${p.name}">
      <div class="row">
        <span style="display:inline-flex;align-items:center;gap:6px;">
          <span style="width:8px;height:8px;border-radius:50%;background:${td.color};flex-shrink:0;display:inline-block;"></span>
          <span class="nm">${p.name}</span>
        </span>
        <span class="badge user" style="font-size:9px;">${td.icon}</span>
      </div>
      <div class="addr">${p.city || '—'}</div>
    </div>`;
  }).join('');
  list.querySelectorAll('.proj-card').forEach(card => {
    card.addEventListener('click', () => {
      const n = card.dataset.name;
      const m = markers[n];
      const p = allProjects.find(x => x.name === n);
      if (m && p){
        map.setView([p.lat, p.lng], 14, { animate: true });
        document.querySelectorAll('.proj-card.active').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        showDetail(p);
      }
    });
  });
}

/* ── highlightProvincie: zoomt in en tekent provinciegrenzen via Nominatim ── */
async function highlightProvincie(naam) {
  if (provLayer) { map.removeLayer(provLayer); provLayer = null; }
  if (!naam) return;

  // Toon banner
  const banner = document.getElementById('prov-banner');
  const bannerTxt = document.getElementById('prov-banner-txt');
  if (banner) { banner.style.display = 'flex'; bannerTxt.textContent = naam; }

  // Zoom naar provincie
  const bounds = PROVINCIE_BOUNDS[naam];
  if (bounds) {
    map.fitBounds(bounds[0].slice(0,2).concat(bounds[0].slice(2,4)).reduce(
      (acc, _, i, arr) => i % 2 === 0 ? [...acc, [arr[i], arr[i+1]]] : acc, []
    ), { padding: [40, 40] });
  }

  // Haal GeoJSON op van Nederlandse provinciegrenzen via PDOK
  try {
    const encoded = encodeURIComponent(naam.charAt(0) + naam.slice(1).toLowerCase());
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(naam + ', Nederland')}&polygon_geojson=1&format=json&limit=1`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'nl' } });
    const data = await res.json();
    if (data && data[0] && data[0].geojson) {
      provLayer = L.geoJSON(data[0].geojson, {
        style: {
          color: '#3d6e8a',
          weight: 2.5,
          opacity: 0.9,
          fillColor: '#3d6e8a',
          fillOpacity: 0.08,
          dashArray: null,
        }
      }).addTo(map);
      map.fitBounds(provLayer.getBounds(), { padding: [40, 40] });
    }
  } catch(e) { console.warn('GeoJSON laden mislukt:', e); }
}

/* ── zoomToStad: zoomt in op een stad via Nominatim geocoder ── */
async function zoomToStad(stad) {
  try {
    const banner = document.getElementById('prov-banner');
    const bannerTxt = document.getElementById('prov-banner-txt');
    if (banner) { banner.style.display = 'flex'; bannerTxt.textContent = '📍 ' + stad; }

    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(stad + ', Nederland')}&format=json&limit=1`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'nl' } });
    const data = await res.json();
    if (data && data[0]) {
      map.setView([+data[0].lat, +data[0].lon], 13, { animate: true });
    }
  } catch(e) { console.warn('Stad zoeken mislukt:', e); }
}

<script>
// ── Mode switcher ─────────────────────────────────────────────────────────────
let currentMode = 'normal';
let heatLayer   = null;

// MVSA kantoor Amsterdam

function setMode(mode) {
  clearAllLayers();
  currentMode = mode;

  // Update buttons
  document.querySelectorAll('.mode-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === mode)
  );

  // Hide timeline panel unless timeline mode
  document.getElementById('timeline-panel').classList.toggle('visible', mode === 'timeline');
  document.getElementById('year-legend').style.display  = mode === 'timeline' ? 'block' : 'none';
  document.getElementById('type-legend').style.display  = mode === 'timeline' ? 'none'  : 'block';
  if (mode !== 'timeline' && tlPlaying) stopPlay();

  // Show/hide regular markers
  const showMarkers = (mode === 'normal' || mode === 'timeline');
  Object.values(markers).forEach(m => {
    if (showMarkers) { if (!map.hasLayer(m)) map.addLayer(m); }
    else             { if (map.hasLayer(m))  map.removeLayer(m); }
  });

  // Restore normal icons when leaving timeline
  if (mode !== 'timeline') {
    allProjects.forEach(p => {
      const m = markers[p.name];
      if (m) {
        const el = m.getElement();
        if (el) { el.style.opacity = '1'; el.style.transform = ''; }
        m.setIcon(makeIconZoom(p.isUser, p.raw, false, map.getZoom()));
      }
    });
  }

  if (mode === 'heat')     buildHeatmap();
  if (mode === 'bubble')   buildBubbles();
  if (mode === 'network')  buildNetwork();
  if (mode === 'timeline') buildTimeline();
}

function clearAllLayers() {
  if (heatLayer)    { map.removeLayer(heatLayer); heatLayer = null; }
  bubbleLayers.forEach(l => map.removeLayer(l)); bubbleLayers = [];
  networkLayers.forEach(l => map.removeLayer(l)); networkLayers = [];
}

// ── Heatmap ───────────────────────────────────────────────────────────────────
function buildHeatmap() {
  const pts = allProjects.map(p => [p.lat, p.lng, 1]);
  heatLayer = L.heatLayer(pts, {
    radius: 80,
    blur: 60,
    maxZoom: 10,
    max: 3,
    gradient: { 0.2: '#3b82f6', 0.4: '#8b5cf6', 0.6: '#f59e0b', 0.8: '#ef4444', 1.0: '#cc0000' },
  }).addTo(map);
}

// ── Bubbles ───────────────────────────────────────────────────────────────────
function buildBubbles() {
  const byCity = {};
  allProjects.forEach(p => {
    const city = (p.city || 'Onbekend').trim();
    if (!byCity[city]) byCity[city] = { count: 0, lat: p.lat, lng: p.lng };
    byCity[city].count++;
  });

  const max = Math.max(...Object.values(byCity).map(c => c.count));

  Object.entries(byCity).forEach(([city, data]) => {
    const t = data.count / max; // 0–1

    // Grote zachte aura
    const aura = L.circleMarker([data.lat, data.lng], {
      radius: 18 + t * 48,
      fillColor: '#111418',
      fillOpacity: 0.04 + t * 0.07,
      color: '#111418',
      weight: 0,
    }).addTo(map);

    // Middel ring
    const ring = L.circleMarker([data.lat, data.lng], {
      radius: 7 + t * 18,
      fillColor: '#111418',
      fillOpacity: 0.08 + t * 0.1,
      color: '#111418',
      weight: 0.5,
      opacity: 0.15,
    }).addTo(map);

    // Kleine kern stip
    const dot = L.circleMarker([data.lat, data.lng], {
      radius: 3.5,
      fillColor: '#111418',
      fillOpacity: 0.75,
      color: '#fff',
      weight: 1.5,
    }).addTo(map);

    dot.bindTooltip(
      `<strong>${city}</strong><br>${data.count} project${data.count !== 1 ? 'en' : ''}`,
      { className: 'proj-tooltip-simple', direction: 'top' }
    );

    bubbleLayers.push(aura, ring, dot);
  });
}

// ── Netwerk ───────────────────────────────────────────────────────────────────
function buildNetwork() {
  const officeIcon = L.divIcon({
    className: '',
    html: `<div style="
      width:16px;height:16px;border-radius:50%;
      background:#111418;border:3px solid #fff;
      box-shadow:0 0 0 3px #111418,0 4px 14px rgba(0,0,0,.4);
    "></div>`,
    iconSize: [16, 16],
    iconAnchor: [8, 8],
  });
  const om = L.marker([OFFICE.lat, OFFICE.lng], { icon: officeIcon, zIndexOffset: 1000 })
    .bindTooltip('<strong>MVSA Kantoor</strong><br>Amsterdam', { className: 'proj-tooltip-simple', direction: 'top' })
    .addTo(map);
  networkLayers.push(om);

  function lineWeight() {
    const z = map.getZoom();
    return Math.max(1, (z - 5) * 0.6);
  }

  allProjects.forEach(p => {
    const dist = getDistKm(OFFICE.lat, OFFICE.lng, p.lat, p.lng);
    const opacity = Math.max(0.25, 0.75 - dist / 400);
    const line = L.polyline([[OFFICE.lat, OFFICE.lng], [p.lat, p.lng]], {
      color: '#111418',
      weight: lineWeight(),
      opacity,
      dashArray: '5 7',
    }).addTo(map);
    line.bindTooltip(
      `${p.name}<br><span style="color:var(--muted)">${Math.round(dist)} km van kantoor</span>`,
      { className: 'proj-tooltip-simple', direction: 'top', sticky: true }
    );
    networkLayers.push(line);
  });

  // Schaal lijnen mee bij zoomen
  map.on('zoomend.network', () => {
    const w = lineWeight();
    networkLayers.forEach(l => { if (l.setStyle) l.setStyle({ weight: w }); });
  });
}

// Verwijder zoom listener bij clearen
const _clearAllLayers = clearAllLayers;
clearAllLayers = function() {
  map.off('zoomend.network');
  _clearAllLayers();
};

function getDistKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── Tijdlijn ──────────────────────────────────────────────────────────────────
function buildTimeline() {
  const slider = document.getElementById('tl-slider');
  const years = allProjects.map(p => p.year).filter(Boolean);
  const minY = years.length ? Math.min(...years) : YEAR_MIN;
  const maxY = years.length ? Math.max(...years) : YEAR_MAX;
  slider.min = minY;
  slider.max = maxY;
  slider.value = minY;

  // Switch all markers to year-colored icons
  allProjects.forEach(p => {
    const m = markers[p.name];
    if (m) {
      m.setIcon(makeIconYear(p.year, false));
      // Add fade transition via DOM
      const el = m.getElement();
      if (el) el.style.transition = 'opacity 400ms ease, transform 400ms ease';
    }
  });

  updateTimeline(minY);
  slider.addEventListener('input', () => updateTimeline(+slider.value));
}

function updateTimeline(year) {
  const slider = document.getElementById('tl-slider');
  document.getElementById('tl-year').textContent = year;

  const minY = +slider.min, maxY = +slider.max;
  const pct = maxY > minY ? ((year - minY) / (maxY - minY)) * 100 : 0;
  document.getElementById('tl-fill').style.width = pct + '%';

  let count = 0;
  allProjects.forEach(p => {
    const visible = !p.year || p.year <= year;
    const m = markers[p.name];
    if (!m) return;
    const el = m.getElement();

    if (visible) {
      if (!map.hasLayer(m)) {
        map.addLayer(m);
        // Fade in + pop up
        requestAnimationFrame(() => {
          const e = m.getElement();
          if (e) {
            e.style.opacity = '0';
            e.style.transform = 'scale(0.5)';
            e.style.transition = 'opacity 400ms ease, transform 400ms ease';
            requestAnimationFrame(() => { e.style.opacity = '1'; e.style.transform = 'scale(1)'; });
          }
        });
      }
      // Kleur recente projecten feller
      const isNew = p.year === year;
      if (el) el.style.opacity = isNew ? '1' : '0.65';
      count++;
    } else {
      if (map.hasLayer(m)) {
        // Fade out
        if (el) {
          el.style.opacity = '0';
          el.style.transform = 'scale(0.5)';
          setTimeout(() => { if (map.hasLayer(m)) map.removeLayer(m); }, 380);
        } else {
          map.removeLayer(m);
        }
      }
    }
  });

  document.getElementById('tl-count').textContent = `${count} project${count !== 1 ? 'en' : ''}`;
}

function togglePlay() {
  tlPlaying ? stopPlay() : startPlay();
}
function startPlay() {
  tlPlaying = true;
  document.getElementById('tl-play').textContent = '⏸';
  const slider = document.getElementById('tl-slider');
  if (+slider.value >= +slider.max) slider.value = slider.min;

  tlInterval = setInterval(() => {
    const next = +slider.value + 1;
    if (next > +slider.max) { stopPlay(); return; }
    slider.value = next;
    updateTimeline(next);
  }, 600);
}
function stopPlay() {
  tlPlaying = false;
  clearInterval(tlInterval);
  document.getElementById('tl-play').textContent = '▶';
}
</script>
