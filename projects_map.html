<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kaart · Alle projecten</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  :root{
    --bg: #f4f1ec;
    --card: #ffffff;
    --ink: #111418;
    --muted: #8a8d93;
    --line: #e8e4dd;
    --accent: #3d6e8a;
    --shadow: 0 1px 0 rgba(20,30,45,.04), 0 8px 24px -12px rgba(20,30,45,.18);
  }
  [data-theme="dark"]{
    --bg:#0f1114; --card:#1a1d22; --ink:#e8ecf0;
    --muted:#8a929c; --line:#2a2e35; --accent:#5a9ab8;
    --shadow:0 1px 0 rgba(0,0,0,.2),0 8px 24px -12px rgba(0,0,0,.4);
  }
  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; height:100%; background: var(--bg); color: var(--ink); font-family: 'Inter', Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }

  .layout{ display: grid; grid-template-columns: 360px 1fr; height: 100vh; }

  /* Sidebar */
  .side{
    background: var(--bg); padding: 88px 20px 20px; overflow-y: auto;
    border-right: 1px solid rgba(17,20,24,.06);
  }
  .side h1{ font-size: 28px; font-weight: 800; letter-spacing: -.025em; margin: 0 0 4px; }
  .side .sub{ font-size: 12px; color: var(--muted); margin-bottom: 18px; }

  .search-input{
    width: 100%; font-family: inherit; font-size: 13px;
    background: #fff; border: 1px solid rgba(17,20,24,.08); border-radius: 999px;
    padding: 10px 16px; box-shadow: var(--shadow); margin-bottom: 14px;
  }
  .search-input:focus{ outline: 2px solid var(--accent); outline-offset: -1px; }

  .legend{ display:flex; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
  .legend .item{ display:inline-flex; align-items:center; gap:6px; font-size: 11px; color: var(--muted); letter-spacing: .04em; }
  .legend .dot{ width: 10px; height: 10px; border-radius: 50%; background: var(--accent); display:inline-block; }
  .legend .dot.user{ background: var(--ink); }

  .proj-list{ display: flex; flex-direction: column; gap: 8px; }

  /* ── Detail paneel (bij klik op pin) ── */
  .detail-panel{
    display: none; flex-direction: column; gap: 0;
    animation: slideDetail .25s cubic-bezier(.22,1,.36,1);
  }
  @keyframes slideDetail{ from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
  .detail-panel.visible{ display: flex; }
  .detail-hero{
    width: 100%; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden;
    background: linear-gradient(135deg, #1a2030, #2a3548);
    margin-bottom: 14px; position: relative; flex: none;
  }
  .detail-hero img{ width:100%; height:100%; object-fit:cover; display:block; }
  .detail-hero .no-img{
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.4);
  }
  .detail-tag{
    font-size: 9px; letter-spacing: .16em; text-transform: uppercase; font-weight: 700;
    color: var(--accent); margin-bottom: 6px;
  }
  .detail-name{
    font-size: 20px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 4px; line-height: 1.1;
  }
  .detail-loc{ font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .detail-stats{
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px;
  }
  .detail-stat{
    background: var(--card); border-radius: 10px; padding: 10px 12px;
    box-shadow: var(--shadow);
  }
  .detail-stat .lbl{ font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 3px; }
  .detail-stat .val{ font-size: 14px; font-weight: 800; letter-spacing: -.01em; }
  .detail-open{
    display: block; text-align: center; background: var(--ink); color: #fff;
    text-decoration: none; padding: 12px; border-radius: 999px;
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase; font-weight: 700;
    transition: background .15s, transform .15s; margin-bottom: 12px;
  }
  .detail-open:hover{ background: var(--accent); transform: translateY(-1px); }
  .detail-back{
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600;
    color: var(--muted); cursor: pointer; background: none; border: none;
    font-family: inherit; padding: 6px 0; transition: color .15s;
  }
  .detail-back:hover{ color: var(--ink); }
  .proj-card{
    background: var(--card); border-radius: 12px; padding: 12px 14px; cursor: pointer;
    box-shadow: var(--shadow);
    border: 1px solid transparent;
    transition: border-color .15s ease, transform .15s ease;
  }
  .proj-card:hover{ border-color: var(--accent); transform: translateX(2px); }
  .proj-card.active{ border-color: var(--accent); background: #f3f7fa; }
  .proj-card .row{ display:flex; justify-content: space-between; align-items: center; gap: 8px; }
  .proj-card .nm{ font-weight: 700; font-size: 13px; letter-spacing: .02em; text-transform: uppercase; }
  .proj-card .badge{
    font-size: 9px; letter-spacing: .12em; text-transform: uppercase; font-weight: 700;
    padding: 3px 8px; border-radius: 999px; background: rgba(61,110,138,.1); color: var(--accent);
  }
  .proj-card .badge.user{ background: rgba(17,20,24,.08); color: var(--ink); }
  .proj-card .addr{ font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* Map */
  .map-wrap{ position: relative; }
  #map{ position: absolute; inset: 0; }

  /* Floating back */
  .back{
    position: fixed; top: 24px; left: 24px; z-index: 1000;
    display:inline-flex; align-items:center; gap:8px; color: var(--ink); text-decoration:none;
    font-size: 12px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600;
    padding: 10px 16px; border-radius: 999px;
    background: rgba(255,255,255,.85); backdrop-filter: blur(10px);
    border:1px solid rgba(17,20,24,.08);
    box-shadow: 0 4px 16px -4px rgba(20,30,45,.18);
    transition: background .15s ease, transform .15s ease;
  }
  .back:hover{ background: #fff; transform: translateY(-1px); }

  /* Custom marker */
  .marker-pin{
    width: 36px; height: 36px; border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    border: 2.5px solid rgba(255,255,255,0.9);
    box-shadow: 0 4px 14px rgba(0,0,0,.28);
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s, box-shadow .15s;
  }
  .marker-pin:hover{
    transform: rotate(-45deg) scale(1.12);
    box-shadow: 0 6px 20px rgba(0,0,0,.38);
  }
  .marker-pin.user{ background: var(--ink) !important; }
  .pin-icon{
    transform: rotate(45deg);
    font-size: 15px; line-height: 1;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.3));
  }

  /* Popup */
  .leaflet-popup-content-wrapper{
    border-radius: 12px;
    font-family: 'Inter', Helvetica, Arial, sans-serif;
  }
  .pop-title{ font-weight: 700; font-size: 14px; letter-spacing: .03em; text-transform: uppercase; margin-bottom: 4px; }
  .pop-meta{ font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .pop-link{
    display: inline-block; background: var(--ink); color: #fff !important; text-decoration: none;
    padding: 6px 12px; border-radius: 999px;
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase; font-weight: 600;
  }
  .pop-link:hover{ background: var(--accent); }
  .pop-thumb{ width:100%; height:140px; border-radius:8px; overflow:hidden; margin-bottom:10px; background:#e6ecf2; }
  .pop-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .pop-thumb .no-img{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; background:linear-gradient(135deg,#e6ecf2 0%,#d4dde8 100%); }
  .leaflet-popup-content{ min-width:200px; }
  .proj-tooltip{
    background: #fff; border: none; border-radius: 12px; padding: 0;
    box-shadow: 0 8px 28px -8px rgba(20,30,45,.3);
    overflow: hidden; width: 200px;
    font-family: 'Inter', Helvetica, Arial, sans-serif;
    pointer-events: none;
  }
  .proj-tooltip::before{ display: none; }
  .leaflet-tooltip.proj-tooltip{ border: none; }
  .tt-img{ width: 200px; height: 120px; object-fit: cover; display: block; background: #e6ecf2; }
  .tt-no-img{ width: 200px; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; background: linear-gradient(135deg,#e6ecf2,#d4dde8); }
  .tt-body{ padding: 10px 12px; }
  .tt-name{ font-weight: 700; font-size: 12px; letter-spacing: .04em; text-transform: uppercase; color: var(--ink); }
  .tt-addr{ font-size: 11px; color: var(--muted); margin-top: 3px; }

  .prov-banner{
    position:fixed; top:80px; left:50%; transform:translateX(-50%); z-index:1000;
    background:rgba(255,255,255,.92); backdrop-filter:blur(10px);
    border:1px solid rgba(17,20,24,.08); border-radius:999px;
    padding:10px 20px; font-size:12px; font-weight:700; letter-spacing:.08em;
    text-transform:uppercase; color:#111418; box-shadow:0 4px 16px -4px rgba(20,30,45,.18);
    display:flex; align-items:center; gap:12px;
  }
  .prov-banner button{ background:none; border:none; cursor:pointer; font-size:14px; color:#6b7480; padding:0; }
  .prov-banner button:hover{ color:#111418; }
  @media (max-width: 820px){
    .layout{ grid-template-columns: 1fr; grid-template-rows: 320px 1fr; }
    .side{ padding-top: 72px; max-height: 320px; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="nav.js" defer></script>
</head>
<body>

<div class="layout">
  <aside class="side">
    <h1>Projecten op kaart</h1>
    <div class="sub">Alle projecten met een ingevuld adres.</div>
    <input id="search" class="search-input" type="search" placeholder="Zoek project of stad…" />
    <div class="legend" id="type-legend" style="display:flex;flex-direction:column;gap:5px;margin:10px 0;">
    </div>
    <div id="proj-list" class="proj-list"></div>
    <div id="detail-panel" class="detail-panel">
      <button class="detail-back" onclick="closeDetail()">← Alle projecten</button>
      <div class="detail-hero" id="detail-hero">
        <div class="no-img">Geen afbeelding</div>
      </div>
      <div class="detail-tag" id="detail-tag"></div>
      <div class="detail-name" id="detail-name"></div>
      <div class="detail-loc" id="detail-loc"></div>
      <div class="detail-stats" id="detail-stats"></div>
      <a class="detail-open" id="detail-open" href="#">Open project →</a>
    </div>
  </aside>
  <div class="map-wrap"><div id="map"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
/* ----------------------------------------------------------------------------
   MOCK projects with hand-set NL coordinates.
   User projects come from localStorage (saved via New Project.html).
---------------------------------------------------------------------------- */

/* Load user-entered projects from Supabase */
/* ── loadUserProjects: haalt projecten op uit Supabase
   - resolveert adressen via Nominatim geocoder
   - laadt thumbnails uit Supabase Storage ── */
async function loadUserProjects(){
  try {
    const all = await Projects.getAll();
    const withThumbs = await Promise.all(all.map(async p => {
      let thumbUrl = null;
      if (p.projectnummer) {
        try { const imgs = await Images.getForProject(p.projectnummer); thumbUrl = imgs[0] || null; } catch(e) {}
      }
      return {
        name: p.projectnaam || p.projectnummer || 'Naamloos',
        city: p.stad || '',
        address: [p.straat, p.huisnummer, p.postcode, p.stad].filter(Boolean).join(' '),
        raw: p, isUser: true, thumbUrl,
        opgave: p.opgave || '',
        project_type: p.project_type || '',
      };
    }));
    return withThumbs;
  } catch(e) {
    console.error('Kon projecten niet laden:', e);
    return [];
  }
}

/* Geocode using Nominatim (OSM) — free, no key, but rate-limited */
async function geocode(query){
  if (!query) return null;
  const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`;
  try {
    const res = await fetch(url, { headers: { 'Accept-Language': 'nl' } });
    const data = await res.json();
    if (data && data[0]) return { lat: +data[0].lat, lng: +data[0].lon };
  } catch (e) { console.warn('geocode failed', e); }
  return null;
}

/* Cache geocode results in localStorage to avoid hammering Nominatim */
function cacheGet(key){
  try { return JSON.parse(localStorage.getItem('mvsa.geocache') || '{}')[key] || null; }
  catch { return null; }
}
function cacheSet(key, val){
  try {
    const all = JSON.parse(localStorage.getItem('mvsa.geocache') || '{}');
    all[key] = val;
    localStorage.setItem('mvsa.geocache', JSON.stringify(all));
  } catch {}
}

/* Resolve coords for user projects */
async function resolveUserCoords(userProjects){
  const out = [];
  for (const p of userProjects){
    // Direct lat/lng beschikbaar → geen geocoding nodig
    if (p.raw?.lat && p.raw?.lng) {
      out.push({ ...p, lat: +p.raw.lat, lng: +p.raw.lng });
      continue;
    }
    if (!p.address){ continue; }
    let coords = cacheGet(p.address);
    if (!coords){
      coords = await geocode(p.address);
      if (coords) cacheSet(p.address, coords);
      await new Promise(r => setTimeout(r, 1100));
    }
    if (coords) out.push({ ...p, lat: coords.lat, lng: coords.lng });
  }
  return out;
}

/* ----------------------------------------------------------------------------
   Build map
---------------------------------------------------------------------------- */
const map = L.map('map', { zoomControl: true }).setView([52.2, 5.3], 7);
map.on('click', function(e) {
  // Sluit detail als er op de kaart geklikt wordt (niet op een pin)
  if (!e.originalEvent.target.closest('.marker-pin')) {
    closeDetail();
  }
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  subdomains: 'abcd', maxZoom: 19,
}).addTo(map);

const allProjects = [];
const markers = {};

/* ═══════════════════════════════════════
   KAART — projects_map.html
   ═══════════════════════════════════════ */

/* ── TYPE_MAP: icoon + kleur per project_type ── */
const TYPE_MAP = {
  'Architectuur':               { icon: '🏛', color: '#4f7cac' },
  'Stedenbouw':                 { icon: '🏙', color: '#6b8f71' },
  'Interieur':                  { icon: '🛋', color: '#c4956a' },
  'Renovatie':                  { icon: '🔧', color: '#8b7355' },
  'Onderzoek':                  { icon: '🔬', color: '#7b68ee' },
  'Mixed Use':                  { icon: '◈',  color: '#5f9ea0' },
  'Residential':                { icon: '🏠', color: '#e07b54' },
  'Woningbouw':                 { icon: '🏠', color: '#e07b54' },
  'Offices':                    { icon: '🏢', color: '#4a7c8f' },
  'Kantoor':                    { icon: '🏢', color: '#4a7c8f' },
  'Education':                  { icon: '🎓', color: '#d4a843' },
  'Onderwijs':                  { icon: '🎓', color: '#d4a843' },
  'Public & Healthcare':        { icon: '🏥', color: '#5aaa7e' },
  'Publiek':                    { icon: '🏛', color: '#5aaa7e' },
  'Zorg':                       { icon: '🏥', color: '#5aaa7e' },
  'Retail & Hospitality':       { icon: '🛍', color: '#c47a9e' },
  'Horeca':                     { icon: '☕', color: '#c47a9e' },
  'Transport & Infrastructure': { icon: '🚉', color: '#6a8aad' },
  'Infrastructuur':             { icon: '🌉', color: '#6a8aad' },
  'Master planning':            { icon: '📐', color: '#8e7bb5' },
  'Herbestemming':              { icon: '♻', color: '#7aaa6a' },
  'Cultureel':                  { icon: '🎭', color: '#c46a6a' },
  'Sport':                      { icon: '⚽', color: '#5a9a5a' },
  'default':                    { icon: '●',  color: '#888ea0' },
};

function getTypeData(project) {
  const type = project?.project_type || project?.raw?.project_type || project?.raw?.opgave || project?.opgave || '';
  // Case-insensitive match
  const key = Object.keys(TYPE_MAP).find(k => k.toLowerCase() === type.toLowerCase()) || 'default';
  return TYPE_MAP[key];
}

/* ── getIcon: backwards compat ── */
function getIcon(project) {
  return getTypeData(project).icon;
}

/* ── makeIcon: maakt een Leaflet DivIcon met emoji en kleur per type ── */
function makeIcon(isUser, project){
  const { icon, color } = isUser ? { icon: '★', color: 'var(--ink)' } : getTypeData(project);
  // Kleur iets donkerder voor de rand
  return L.divIcon({
    className: '',
    html: `<div class="marker-pin" style="background:${color};">
      <span class="pin-icon">${icon}</span>
    </div>`,
    iconSize: [36, 36], iconAnchor: [18, 36], popupAnchor: [0, -40],
  });
}

/* ── addProject: voegt een marker toe aan de kaart
   - bindt een popup (klik) en tooltip (hover) met thumbnail
   - laadt thumbnail lazy bij eerste hover ── */
function addProject(p){
  const m = L.marker([p.lat, p.lng], { icon: makeIcon(p.isUser, p.raw) }).addTo(map);
  const link = `project_page.html?p=${encodeURIComponent(p.name)}`;

  // Popup (bij klik)
  m.bindPopup(`<div style="font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:4px 2px;white-space:nowrap;">${p.name}</div>`, {
    closeButton: false, className: 'minimal-popup', maxWidth: 200,
  });
  m.on('click', () => showDetail(p));

  // Tooltip (bij hover)
  const makeTooltip = (imgUrl) => {
    const img = imgUrl
      ? `<img class="tt-img" src="${imgUrl}" alt="${p.name}" />`
      : `<div class="tt-no-img">${'Geen afbeelding'}</div>`;
    return `${img}<div class="tt-body"><div class="tt-name">${p.name}</div><div class="tt-addr">${p.address || p.city || ''}</div></div>`;
  };
  m.bindTooltip(makeTooltip(p.thumbUrl || null), {
    className: 'proj-tooltip', direction: 'top', offset: [0, -30], sticky: false,
  });

  // Lazy load thumbnail bij eerste hover
  if (p.isUser && p.raw && p.raw.projectnummer && !p.thumbUrl) {
    let loaded = false;
    m.on('mouseover', async () => {
      if (loaded) return;
      loaded = true;
      try {
        const imgs = await Images.getForProject(p.raw.projectnummer);
        if (imgs[0]) {
          p.thumbUrl = imgs[0];
          m.setTooltipContent(makeTooltip(imgs[0]));
          m.setPopupContent(makePopup(imgs[0]));
          renderList(document.getElementById('search').value);
        }
      } catch(e) {}
    });
  }

  markers[p.name] = m;
  allProjects.push(p);
}

function showDetail(p) {
  // Verberg lijst, toon detail
  document.getElementById('proj-list').style.display = 'none';
  document.getElementById('search').style.display = 'none';
  document.querySelector('.legend') && (document.querySelector('.legend').style.display = 'none');

  const panel = document.getElementById('detail-panel');
  panel.classList.add('visible');

  // Hero afbeelding
  const hero = document.getElementById('detail-hero');
  if (p.thumbUrl) {
    hero.innerHTML = `<img src="${p.thumbUrl}" alt="${p.name}">`;
  } else {
    hero.innerHTML = '<div class="no-img">Geen afbeelding</div>';
  }

  // Info
  const typeData = getTypeData(p.raw || p);
  const tagEl = document.getElementById('detail-tag');
  tagEl.textContent = p.project_type || p.opgave || 'Project';
  tagEl.style.cssText = `background:${typeData.color}22;color:${typeData.color};border:1px solid ${typeData.color}44;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;`;
  document.getElementById('detail-name').textContent = p.name;
  document.getElementById('detail-loc').textContent = [p.city, p.raw?.provincie, p.raw?.land].filter(Boolean).join(' · ') || '—';

  // Stats
  const stats = [];
  if (p.raw?.fase)        stats.push({ lbl: 'Fase',      val: p.raw.fase });
  if (p.raw?.totaal_bvo)  stats.push({ lbl: 'Totaal BVO', val: Number(p.raw.totaal_bvo).toLocaleString('nl-NL') + ' m²' });
  if (p.raw?.opdrachtgever) stats.push({ lbl: 'Opdrachtgever', val: p.raw.opdrachtgever });
  if (p.raw?.project_type)  stats.push({ lbl: 'Type', val: p.raw.project_type });
  if (p.raw?.projectnummer)  stats.push({ lbl: 'Nummer', val: p.raw.projectnummer });
  if (p.raw?.opleverdatum)   stats.push({ lbl: 'Oplevering', val: p.raw.opleverdatum.slice(0,4) });

  document.getElementById('detail-stats').innerHTML = stats.slice(0,4).map(s =>
    `<div class="detail-stat"><div class="lbl">${s.lbl}</div><div class="val">${s.val}</div></div>`
  ).join('');

  // Open link
  const nr = p.raw?.projectnummer || '';
  document.getElementById('detail-open').href =
    `project_page.html?nr=${encodeURIComponent(nr)}&p=${encodeURIComponent(p.name)}`;
}

function closeDetail() {
  document.getElementById('proj-list').style.display = '';
  document.getElementById('search').style.display = '';
  document.querySelector('.legend') && (document.querySelector('.legend').style.display = '');
  document.getElementById('detail-panel').classList.remove('visible');
  // Deactiveer actieve kaart
  document.querySelectorAll('.proj-card.active').forEach(c => c.classList.remove('active'));
  map.closePopup();
}

function renderList(filter = ''){
  const list = document.getElementById('proj-list');
  const q = filter.toLowerCase();
  const visible = allProjects.filter(p =>
    !q || p.name.toLowerCase().includes(q) || (p.city || '').toLowerCase().includes(q)
  );
  list.innerHTML = visible.map(p => `
    <div class="proj-card" data-name="${p.name}">
      ${p.thumbUrl ? `<img src="${p.thumbUrl}" alt="${p.name}" style="width:100%;height:80px;object-fit:cover;border-radius:8px;margin-bottom:8px;display:block;">` : ''}
      <div class="row">
        <span class="nm">${p.name}</span>
        <span class="badge user">Project</span>
      </div>
      <div class="addr">${p.address || p.city || '—'}</div>
    </div>
  `).join('');
  list.querySelectorAll('.proj-card').forEach(card => {
    card.addEventListener('click', () => {
      const n = card.dataset.name;
      const m = markers[n];
      const p = allProjects.find(x => x.name === n);
      if (m && p){
        map.setView([p.lat, p.lng], 14, { animate: true });
        m.openPopup();
        document.querySelectorAll('.proj-card.active').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        showDetail(p);
      }
    });
  });
}

const PROVINCIE_BOUNDS = {

};

let provLayer = null;

/* ── highlightProvincie: zoomt in en tekent provinciegrenzen via Nominatim ── */
async function highlightProvincie(naam) {
  if (provLayer) { map.removeLayer(provLayer); provLayer = null; }
  if (!naam) return;

  // Toon banner
  const banner = document.getElementById('prov-banner');
  const bannerTxt = document.getElementById('prov-banner-txt');
  if (banner) { banner.style.display = 'flex'; bannerTxt.textContent = naam; }

  // Zoom naar provincie
  const bounds = PROVINCIE_BOUNDS[naam];
  if (bounds) {
    map.fitBounds(bounds[0].slice(0,2).concat(bounds[0].slice(2,4)).reduce(
      (acc, _, i, arr) => i % 2 === 0 ? [...acc, [arr[i], arr[i+1]]] : acc, []
    ), { padding: [40, 40] });
  }

  // Haal GeoJSON op van Nederlandse provinciegrenzen via PDOK
  try {
    const encoded = encodeURIComponent(naam.charAt(0) + naam.slice(1).toLowerCase());
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(naam + ', Nederland')}&polygon_geojson=1&format=json&limit=1`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'nl' } });
    const data = await res.json();
    if (data && data[0] && data[0].geojson) {
      provLayer = L.geoJSON(data[0].geojson, {
        style: {
          color: '#3d6e8a',
          weight: 2.5,
          opacity: 0.9,
          fillColor: '#3d6e8a',
          fillOpacity: 0.08,
          dashArray: null,
        }
      }).addTo(map);
      map.fitBounds(provLayer.getBounds(), { padding: [40, 40] });
    }
  } catch(e) { console.warn('GeoJSON laden mislukt:', e); }
}

/* ── zoomToStad: zoomt in op een stad via Nominatim geocoder ── */
async function zoomToStad(stad) {
  try {
    const banner = document.getElementById('prov-banner');
    const bannerTxt = document.getElementById('prov-banner-txt');
    if (banner) { banner.style.display = 'flex'; bannerTxt.textContent = '📍 ' + stad; }

    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(stad + ', Nederland')}&format=json&limit=1`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'nl' } });
    const data = await res.json();
    if (data && data[0]) {
      map.setView([+data[0].lat, +data[0].lon], 13, { animate: true });
    }
  } catch(e) { console.warn('Stad zoeken mislukt:', e); }
}

(async () => {
  // Laad projecten uit Supabase
  const user = await loadUserProjects();
  if (user.length === 0){
    renderList();
    return;
  }
  const resolved = await resolveUserCoords(user);
  resolved.forEach(addProject);
  renderList(document.getElementById('search').value);

  // Vul type-legenda op basis van aanwezige types
  const usedTypes = new Set(allProjects.map(p => p.project_type || p.raw?.project_type || '').filter(Boolean));
  const legendEl = document.getElementById('type-legend');
  if (legendEl) {
    const entries = [...usedTypes].map(t => {
      const key = Object.keys(TYPE_MAP).find(k => k.toLowerCase() === t.toLowerCase()) || 'default';
      return { label: t, ...TYPE_MAP[key] };
    });
    if (!entries.length) entries.push({ label: 'Projecten', ...TYPE_MAP['default'] });
    legendEl.innerHTML = entries.map(e =>
      `<span style="display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);">
        <span style="width:10px;height:10px;border-radius:50%;background:${e.color};flex-shrink:0;"></span>
        ${e.icon} ${e.label}
      </span>`
    ).join('');
  }

  // 3) Fit bounds to all once user projects loaded
  if (allProjects.length){
    const bounds = L.latLngBounds(allProjects.map(p => [p.lat, p.lng]));
    map.fitBounds(bounds, { padding: [60, 60] });
  }
})();

document.getElementById('search').addEventListener('input', (e) => renderList(e.target.value));
