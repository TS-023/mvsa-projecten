<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Project · Toorop</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  :root{
    --bg: #DEE7EF;
    --card: #ffffff;
    --ink: #111418;
    --ink-2: #2a2f36;
    --muted: #6b7480;
    --line: #e6ecf2;
    --shadow: 0 1px 0 rgba(20,30,45,.04), 0 8px 24px -12px rgba(20,30,45,.18);
    --radius: 16px;
  }
  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; background: var(--bg); color: var(--ink); font-family: 'Inter', Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }

  .page{ max-width: 1280px; margin: 0 auto; padding: 24px 32px 80px; }

  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 20px; }
  .crumbs{ font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }
  .crumbs a{ color: var(--muted); text-decoration: none; }
  .crumbs a:hover{ color: var(--ink); }
  .crumbs strong{ color: var(--ink); font-weight:600; }
  .topbar .meta{ font-size:12px; color:var(--muted); }

  .back{
    position: fixed; top: 24px; left: 24px; z-index: 100;
    display:inline-flex; align-items:center; gap:8px; color: var(--ink); text-decoration:none;
    font-size: 12px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600;
    padding: 10px 16px; border-radius: 999px;
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border:1px solid rgba(17,20,24,.08);
    box-shadow: 0 4px 16px -4px rgba(20,30,45,.18);
    transition: background .15s ease, transform .15s ease, box-shadow .15s ease;
  }
  .back:hover{ background: #fff; transform: translateY(-1px); box-shadow: 0 8px 20px -4px rgba(20,30,45,.24); }

  .edit-btn{
    display:inline-flex; align-items:center; gap:8px; color: var(--ink); text-decoration:none;
    font-size: 12px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600;
    padding: 10px 16px; border-radius: 999px;
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border:1px solid rgba(17,20,24,.08);
    box-shadow: 0 4px 16px -4px rgba(20,30,45,.18);
    transition: background .15s ease, transform .15s ease, box-shadow .15s ease;
    cursor: pointer;
  }
  .edit-btn:hover{ background: #fff; transform: translateY(-1px); box-shadow: 0 8px 20px -4px rgba(20,30,45,.24); }
  .edit-btn.disabled{
    opacity: .5; cursor: not-allowed;
  }
  .edit-btn.disabled:hover{ background: rgba(255,255,255,.85); transform: none; box-shadow: 0 4px 16px -4px rgba(20,30,45,.18); }
  .edit-btn svg{ width:14px; height:14px; }

  /* HERO ----------------------------------------------------- */
  .hero{
    border-radius: 22px; overflow: hidden; position: relative;
    aspect-ratio: 16/7;
    background: #2a2f36;
    box-shadow: var(--shadow);
  }
  .hero .bg{
    position:absolute; inset:0;
    background:
      radial-gradient(140% 100% at 30% 20%, #4a5060 0%, #1a1d22 60%, #0c0e11 100%);
  }
  .hero .bg::after{
    content:""; position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(180deg, rgba(255,255,255,.04) 0 1px, transparent 1px 14px),
      repeating-linear-gradient(90deg, rgba(255,255,255,.03) 0 1px, transparent 1px 26px);
    mix-blend-mode: overlay;
  }
  .hero .nav{
    position:relative; display:flex; justify-content:space-between; align-items:center;
    padding: 22px 32px; color:#fff; font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
    z-index: 2;
  }
  .hero .nav .logo{ font-weight:800; letter-spacing: .18em; font-size: 14px; }
  .hero .nav ul{ list-style:none; padding:0; margin:0; display:flex; gap: 22px; opacity:.85; }
  .hero .title-wrap{
    position: absolute; left: 0; right: 0; bottom: 0;
    display:flex; flex-direction:column; justify-content:flex-end;
    padding: 0 56px 36px; color:#fff;
  }
  .hero h1{
    margin:0; font-size: clamp(32px, 4.5vw, 64px); line-height: .95;
    font-weight: 800; letter-spacing: -0.03em;
  }
  .hero .tagline{
    margin-top: 10px; max-width: 540px; font-size: 13px; line-height: 1.6; opacity: .85;
    letter-spacing: .02em;
  }
  .hero .footer-meta{
    position: absolute; right: 40px; bottom: 32px; text-align: right;
    color:#fff; display:flex; flex-direction: column; gap: 4px; align-items: flex-end;
  }
  .hero .footer-meta .bvo-num{
    font-size: 36px; font-weight: 800; letter-spacing: -.02em; line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .hero .footer-meta .bvo-lbl{
    font-size: 10px; letter-spacing: .18em; text-transform: uppercase; opacity: .7; margin-top: 2px;
  }
  .hero .footer-meta .loc{
    margin-top: 12px; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; opacity: .85;
  }

  /* FOUR-UP --------------------------------------------------- */
  .section-shell{
    margin-top: 18px; background: var(--card); border-radius: 22px; padding: 28px 28px 30px;
    box-shadow: var(--shadow);
  }
  .section-shell.dark{
    background: #1a1d22; color: #fff;
  }
  .shell-title{
    font-size: clamp(28px, 4vw, 44px); font-weight: 800; letter-spacing: -.03em; margin: 0 0 22px;
  }
  .four-up{ display:grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .four-card{
    display:flex; flex-direction:column; gap: 12px;
    transition: transform .15s ease;
  }
  a.four-card:hover{ transform: translateY(-2px); }
  a.four-card:hover .num{ color: #3d6e8a; }
  .four-card .img{
    aspect-ratio: 1/1; border-radius: 12px; background: #cbb59a; position:relative; overflow:hidden;
  }
  .four-card .img::before{
    content:""; position:absolute; inset:0;
    background-image: repeating-linear-gradient(180deg, rgba(0,0,0,.18) 0 1px, transparent 1px 8px);
  }
  .four-card .img::after{
    content:""; position:absolute; inset:0;
    background-image: repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0 1px, transparent 1px 24px);
  }
  .four-card .img.alt{ background:#9aa3ad; }
  .four-card .img.alt-2{ background:#a99a82; }
  .four-card .img.alt-3{ background:#7b8896; }
  .four-card .img .ph{
    position:absolute; left:14px; top:14px; font-family:'JetBrains Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing:.12em; text-transform:uppercase; color:#fff; mix-blend-mode: difference;
  }
  .four-card .num{ font-size: 32px; font-weight: 700; letter-spacing: -.02em; }
  .four-card .lbl{ font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); margin-top: -6px; }
  .four-card .desc{ font-size: 12px; line-height: 1.5; color: var(--ink-2); }

  /* INFO GRID ------------------------------------------------- */
  .info-grid{
    display:grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 18px;
  }
  .info-card{
    background: var(--card); border-radius: 16px; box-shadow: var(--shadow);
    padding: 20px 22px;
    border: 1px solid rgba(255,255,255,.6);
  }
  .info-card h3{
    margin: 0 0 14px; font-size: 11px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: var(--ink);
  }
  .info-card dl{ margin: 0; display: grid; grid-template-columns: 1fr auto; row-gap: 10px; column-gap: 14px; }
  .info-card dt{ font-size: 12px; color: var(--muted); }
  .info-card dd{ margin: 0; font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; }

  .info-card .key-stat{
    display:flex; align-items: baseline; justify-content: space-between;
    border-top: 1px solid var(--line); margin-top: 14px; padding-top: 12px;
  }
  .info-card .key-stat .lbl{ font-size: 11px; letter-spacing:.16em; text-transform:uppercase; color: var(--muted); }
  .info-card .key-stat .num{ font-size: 28px; font-weight: 700; letter-spacing: -.02em; }

  /* HOUSE-PLAN style row ------------------------------------- */
  .plan-card{
    margin-top: 14px;
    background: var(--card); border-radius: 22px; box-shadow: var(--shadow);
    display: grid; grid-template-columns: 1fr 1fr; gap: 32px; padding: 32px;
  }
  .plan-card h2{
    margin: 0 0 6px; font-size: clamp(28px, 4vw, 44px); font-weight: 800; letter-spacing: -.03em;
  }
  .plan-card .sub{
    font-size: 12px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px;
  }
  .plan-card table{ width: 100%; border-collapse: collapse; font-size: 13px; }
  .plan-card td{ padding: 12px 0; border-bottom: 1px solid var(--line); }
  .plan-card td:last-child{ text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
  .plan-card tr:last-child td{ border-bottom: 0; }
  .plan-card .floorplan{
    border-radius: 14px; overflow:hidden; background: #c8b89a;
    aspect-ratio: 4/5; position: relative;
  }
  .plan-card .floorplan::before{
    content:""; position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(180deg, rgba(0,0,0,.2) 0 1px, transparent 1px 12px),
      repeating-linear-gradient(90deg, rgba(0,0,0,.12) 0 1px, transparent 1px 18px);
  }
  .plan-card .floorplan .ph{
    position:absolute; left:18px; top:18px; font-family:'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px; letter-spacing:.12em; text-transform:uppercase; color:#fff; mix-blend-mode: difference;
  }

  @media (max-width: 980px){
    .four-up{ grid-template-columns: 1fr 1fr; }
    .info-grid{ grid-template-columns: 1fr 1fr; }
    .plan-card{ grid-template-columns: 1fr; }
    .hero .nav ul{ display:none; }
  }
  @media (max-width: 620px){
    .four-up{ grid-template-columns: 1fr; }
    .info-grid{ grid-template-columns: 1fr; }
    .page{ padding: 16px 16px 64px; }
  }

  /* ═══════════════════════════════════════════════
     VERGELIJK FEATURE
     ═══════════════════════════════════════════════ */

  /* Vergelijk knop */
  .compare-btn{
    display:inline-flex; align-items:center; gap:8px; color: var(--ink); text-decoration:none;
    font-size: 12px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600;
    padding: 10px 16px; border-radius: 999px;
    background: rgba(255,255,255,.85); backdrop-filter: blur(10px);
    border:1px solid rgba(17,20,24,.08);
    box-shadow: 0 4px 16px -4px rgba(20,30,45,.18);
    transition: background .15s ease, transform .15s ease;
    cursor:pointer; font-family:inherit; position:relative;
  }
  .compare-btn:hover{ background: #fff; transform: translateY(-1px); }
  .compare-btn.active{ background: var(--ink); color:#fff; border-color:var(--ink); }

  /* Dropdown zoekpaneel */
  .compare-dropdown{
    position:fixed; top:80px; left:50%; transform:translateX(-50%);
    width:min(500px,95vw); background:#fff; border-radius:16px; z-index:500;
    box-shadow:0 24px 64px -12px rgba(20,30,45,.3);
    border:1px solid rgba(17,20,24,.08);
    animation:dropIn .2s cubic-bezier(.22,1,.36,1);
    overflow:hidden;
  }
  @keyframes dropIn{ from{opacity:0;transform:translateX(-50%) translateY(-8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  .compare-backdrop{ position:fixed; inset:0; z-index:499; }
  .cd-header{ padding:20px 20px 0; }
  .cd-title{ font-size:13px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; margin-bottom:12px; color:var(--ink); }
  .cd-search{
    width:100%; font-family:inherit; font-size:13px; padding:11px 16px;
    border:1.5px solid var(--line); border-radius:10px; background:var(--bg);
    color:var(--ink); outline:none; transition:border-color .15s;
  }
  .cd-search:focus{ border-color:var(--accent); }
  .cd-results{ max-height:280px; overflow-y:auto; padding:8px 0; }
  .cd-result{
    display:flex; align-items:center; gap:12px; padding:10px 20px;
    cursor:pointer; transition:background .1s; border:none; width:100%;
    background:none; font-family:inherit; text-align:left;
  }
  .cd-result:hover{ background:#f5f8fa; }
  .cd-thumb{ width:36px; height:36px; border-radius:8px; object-fit:cover; flex:none; background:var(--line); }
  .cd-thumb-ph{ width:36px; height:36px; border-radius:8px; background:var(--line); flex:none; display:flex; align-items:center; justify-content:center; font-size:14px; }
  .cd-info{ flex:1; min-width:0; }
  .cd-name{ font-weight:700; font-size:12px; letter-spacing:.03em; text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cd-meta{ font-size:11px; color:var(--muted); margin-top:2px; }
  .cd-fase{ font-size:9px; letter-spacing:.12em; text-transform:uppercase; font-weight:700; padding:2px 7px; border-radius:999px; background:rgba(61,110,138,.1); color:var(--accent); flex:none; }
  .cd-empty{ padding:32px; text-align:center; color:var(--muted); font-size:13px; }

  /* Vergelijk overlay — twee pagina's naast elkaar + resultaten */
  .compare-overlay{
    position:fixed; inset:0; z-index:600; background:var(--bg);
    display:flex; flex-direction:column;
    animation:fadeIn .3s ease;
  }
  @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
  .compare-topbar{
    display:flex; align-items:center; gap:12px; padding:14px 24px;
    background:rgba(222,231,239,.95); backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(17,20,24,.06); flex:none;
  }
  .compare-topbar h2{ font-size:14px; font-weight:800; letter-spacing:.02em; flex:1; }
  .compare-close{
    background:var(--ink); color:#fff; border:none; padding:8px 16px;
    border-radius:999px; font-family:inherit; font-size:11px; letter-spacing:.14em;
    text-transform:uppercase; font-weight:700; cursor:pointer; transition:background .15s;
  }
  .compare-close:hover{ background:var(--accent); }
  .compare-body{ display:flex; flex:1; overflow:hidden; gap:0; }

  /* De twee project kolommen */
  .compare-col{
    flex:1; overflow-y:auto; border-right:1px solid var(--line); padding:20px;
    display:flex; flex-direction:column; gap:12px;
  }
  .compare-col:last-child{ border-right:none; }
  .compare-col-header{
    position:sticky; top:0; background:var(--bg); padding:0 0 12px;
    border-bottom:1px solid var(--line); margin-bottom:4px; z-index:2;
  }
  .compare-col-name{ font-size:16px; font-weight:800; letter-spacing:.03em; text-transform:uppercase; }
  .compare-col-sub{ font-size:11px; color:var(--muted); margin-top:2px; }
  .compare-hero-img{
    width:100%; aspect-ratio:16/9; border-radius:12px; overflow:hidden;
    background:linear-gradient(135deg,#1a2030,#2a3548);
  }
  .compare-hero-img img{ width:100%; height:100%; object-fit:cover; display:block; }

  /* Resultaten kolom */
  .compare-results{
    width:320px; flex:none; overflow-y:auto; padding:20px;
    background:var(--card); border-left:2px solid var(--accent);
    display:flex; flex-direction:column; gap:16px;
  }
  .cr-title{ font-size:11px; letter-spacing:.2em; text-transform:uppercase; font-weight:700; color:var(--accent); margin-bottom:4px; }
  .cr-winner{ font-size:22px; font-weight:800; letter-spacing:-.02em; color:var(--ink); margin-bottom:2px; }
  .cr-sub{ font-size:11px; color:var(--muted); }

  /* Vergelijk rij */
  .compare-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 0; border-bottom:1px solid var(--line); font-size:12px;
  }
  .compare-row:last-child{ border-bottom:0; }
  .cr-lbl{ color:var(--muted); font-size:10px; letter-spacing:.1em; text-transform:uppercase; font-weight:600; }
  .cr-vals{ display:flex; gap:6px; align-items:center; }
  .cr-val{ font-weight:700; }
  .cr-val.winner{ color:var(--accent); }
  .cr-val.loser{ color:var(--muted); font-weight:400; }
  .cr-vs{ font-size:9px; color:var(--muted); }

  /* Score balk */
  .score-bar{ display:flex; height:6px; border-radius:999px; overflow:hidden; margin-top:8px; }
  .score-bar .a{ background:var(--accent); transition:width .5s ease; }
  .score-bar .b{ background:var(--line); transition:width .5s ease; }

  /* Winnaar badge */
  .winner-badge{
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(61,110,138,.1); color:var(--accent);
    padding:4px 10px; border-radius:999px; font-size:10px;
    letter-spacing:.1em; text-transform:uppercase; font-weight:700; margin-top:6px;
  }

  /* PDF EXPORT — in topbar */
  .pdf-btn{
    display:inline-flex; align-items:center; gap:8px; color: var(--ink); text-decoration:none;
    font-size: 12px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600;
    padding: 10px 16px; border-radius: 999px;
    background: rgba(255,255,255,.85); backdrop-filter: blur(10px);
    border:1px solid rgba(17,20,24,.08);
    box-shadow: 0 4px 16px -4px rgba(20,30,45,.18);
    transition: background .15s ease, transform .15s ease;
    cursor:pointer; font-family:inherit;
  }
  .pdf-btn:hover{ background: #fff; transform: translateY(-1px); }

  /* ═══════════════════════════════════════════════
     PRINT / PDF STYLESHEET
     Staand A4 — grafisch opgemaakt
     ═══════════════════════════════════════════════ */
  @media print {

    /* Pagina instelling */
    @page {
      size: A4 portrait;
      margin: 0;
    }
    @page :first { margin: 0; }

    /* Reset */
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    html, body { margin:0; padding:0; background:#fff !important; font-family:'Inter',sans-serif; }

    /* Verberg navigatie */
    .topbar, .pdf-btn, .edit-btn, .back, nav.nav,
    .gallerij-section, .section-shell { display:none !important; }

    /* HERO — volle breedte, donker blok bovenaan */
    .hero {
      position: relative !important;
      height: 260px !important;
      width: 100% !important;
      margin: 0 !important;
      border-radius: 0 !important;
      page-break-after: avoid;
    }
    .hero .bg {
      background: linear-gradient(135deg, #111418 0%, #2a3040 100%) !important;
    }
    .hero .nav { display: flex !important; }
    .hero .logo {
      font-size: 10px !important;
      letter-spacing: .3em !important;
    }
    .hero .title-wrap h1 {
      font-size: 52px !important;
    }

    /* INFO GRID — 3 kolommen naast elkaar */
    .info-grid {
      display: grid !important;
      grid-template-columns: 1fr 1fr 1fr !important;
      gap: 0 !important;
      margin: 0 !important;
      padding: 0 20mm !important;
      page-break-inside: avoid;
    }
    .info-card {
      box-shadow: none !important;
      border: none !important;
      border-right: 1px solid #e6ecf2 !important;
      border-radius: 0 !important;
      padding: 16px 20px !important;
      margin: 0 !important;
      background: #fff !important;
    }
    .info-card:last-child { border-right: none !important; }
    .info-card h3 {
      font-size: 8px !important;
      letter-spacing: .2em !important;
      color: #3d6e8a !important;
      margin-bottom: 10px !important;
    }
    .info-card dl dt { font-size: 10px !important; color: #6b7480 !important; }
    .info-card dl dd { font-size: 11px !important; font-weight: 700 !important; }
    .key-stat .ks-val { font-size: 28px !important; }

    /* PLAN CARD */
    .plan-card {
      display: grid !important;
      grid-template-columns: 1fr 1fr !important;
      gap: 20px !important;
      margin: 0 !important;
      padding: 16px 20mm !important;
      box-shadow: none !important;
      border-radius: 0 !important;
      border-top: 1px solid #e6ecf2 !important;
      page-break-inside: avoid;
    }
    .plan-card h2 { font-size: 18px !important; }
    .plan-card table { font-size: 11px !important; }

    /* FOOTER BAND — onderaan de pagina */
    .page::after {
      content: 'MVSA Architects  ·  mvsa-architects.com  ·  Vertrouwelijk';
      display: block;
      text-align: center;
      font-size: 8px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: #aab2bc;
      padding: 12px 0 8px;
      border-top: 1px solid #e6ecf2;
      margin: 0 20mm;
    }

    /* ACCENTLIJN onder hero */
    .hero::after {
      content: '';
      display: block;
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #3d6e8a 0%, #5a9ab8 50%, #3d6e8a 100%);
    }
  }
</style>
</head>
<body>
<div class="page" id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script type="text/babel" data-presets="env,react">
/* Read project name from URL: ?p=Toorop */
const params = new URLSearchParams(window.location.search);
const PROJECT_NAME = (params.get('p') || '').trim();
const PROJECT_NR   = (params.get('nr') || '').trim();

// Data wordt geladen vanuit Supabase in App()
function fmt(val, unit) {
  if (val === null || val === undefined || val === '') return '—';
  return unit ? val.toLocaleString('nl-NL') + ' ' + unit : String(val);
}

/* ── InfoCard: toont een blok met label-waarde rijen (algemeen, locatie etc.) ── */
function InfoCard({ title, items, keyStat }){
  const safeItems = items && typeof items === 'object' ? items : {};
  if (!Object.keys(safeItems).length && !keyStat) return null;
  return (
    <div className="info-card">
      <h3>{title}</h3>
      <dl>
        {Object.entries(safeItems).map(([k, v]) => (
          <React.Fragment key={k}>
            <dt>{k}</dt>
            <dd>{v}</dd>
          </React.Fragment>
        ))}
      </dl>
      {keyStat && (
        <div className="key-stat">
          <span className="lbl">{keyStat.label}</span>
          <span className="num">{keyStat.value}</span>
        </div>
      )}
    </div>
  );
}

/* ── CompareView: toont twee projecten naast elkaar met vergelijkingsresultaten ── */
function CompareView({ projectA, projectB, projectBImages, thumbCache, allProjectsList, setCompareProject, setCompareImages, onClose }) {
  const [showSwitcher, setShowSwitcher] = React.useState(false);
  const [switcherSearch, setSwitcherSearch] = React.useState('');
  const a = projectA;
  const b = projectB;

  // Als geen project B → toon picker
  if (!b) {
    return (
      <div className="compare-overlay">
        <div className="compare-topbar">
          <h2>⚖ Vergelijken</h2>
          <span style={{fontSize:'12px',color:'var(--muted)'}}>Kies een project om te vergelijken met {a?.projectnaam||'dit project'}</span>
          <button className="compare-close" onClick={onClose}>× Sluiten</button>
        </div>
        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'40px'}}>
          <div style={{width:'min(480px,100%)',background:'var(--card)',borderRadius:20,overflow:'hidden',boxShadow:'var(--shadow)'}}>
            <div style={{background:'var(--ink)',padding:'28px 28px 20px'}}>
              <div style={{fontSize:'10px',letterSpacing:'.2em',textTransform:'uppercase',color:'rgba(255,255,255,.5)',marginBottom:8}}>Project A — vast</div>
              <div style={{fontSize:'20px',fontWeight:800,color:'#fff',letterSpacing:'-.02em'}}>{a?.projectnaam||'—'}</div>
              <div style={{fontSize:'12px',color:'rgba(255,255,255,.5)',marginTop:4}}>{[a?.stad, a?.land].filter(Boolean).join(' · ')||'—'}</div>
            </div>
            <div style={{padding:'20px 28px 28px'}}>
              <div style={{fontSize:'10px',letterSpacing:'.2em',textTransform:'uppercase',color:'var(--muted)',fontWeight:700,marginBottom:12}}>Kies Project B</div>
              <input autoFocus type="search"
                placeholder="Zoek op naam, stad of fase…"
                value={switcherSearch}
                onChange={e=>setSwitcherSearch(e.target.value)}
                style={{width:'100%',fontFamily:'inherit',fontSize:'13px',padding:'11px 14px',
                  border:'1.5px solid var(--line)',borderRadius:10,background:'var(--bg)',
                  color:'var(--ink)',outline:'none',marginBottom:10}}
                onFocus={e=>e.target.style.borderColor='var(--accent)'}
                onBlur={e=>e.target.style.borderColor='var(--line)'}
              />
              <div style={{maxHeight:'300px',overflowY:'auto',display:'flex',flexDirection:'column',gap:4}}>
                {allProjectsList
                  .filter(p => p.projectnaam !== a?.projectnaam)
                  .filter(p => {
                    const q = switcherSearch.toLowerCase();
                    return !q || (p.projectnaam||'').toLowerCase().includes(q) || (p.stad||'').toLowerCase().includes(q) || (p.fase||'').toLowerCase().includes(q);
                  })
                  .slice(0,10)
                  .map(p => (
                    <button key={p.id}
                      onClick={async () => {
                        setSwitcherSearch('');
                        if (p.projectnummer) {
                          try { const imgs = await Images.getForProject(p.projectnummer); setCompareImages(imgs); } catch(e) { setCompareImages([]); }
                        } else { setCompareImages([]); }
                        setCompareProject(p);
                      }}
                      style={{display:'flex',alignItems:'center',gap:12,padding:'10px 12px',
                        background:'var(--bg)',border:'1px solid var(--line)',borderRadius:10,
                        cursor:'pointer',textAlign:'left',fontFamily:'inherit',transition:'all .15s'}}
                      onMouseOver={e=>{e.currentTarget.style.borderColor='var(--accent)';e.currentTarget.style.transform='translateX(4px)'}}
                      onMouseOut={e=>{e.currentTarget.style.borderColor='var(--line)';e.currentTarget.style.transform=''}}
                    >
                      {thumbCache[p.projectnummer]
                        ? <img src={thumbCache[p.projectnummer]} alt="" style={{width:40,height:40,borderRadius:8,objectFit:'cover',flex:'none'}} />
                        : <div style={{width:40,height:40,borderRadius:8,background:'var(--line)',flex:'none',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🏗</div>}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:800,fontSize:13,letterSpacing:'.02em',textTransform:'uppercase',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.projectnaam}</div>
                        <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{[p.stad,p.fase].filter(Boolean).join(' · ')||'—'}</div>
                      </div>
                      <span style={{color:'var(--muted)',fontSize:16}}>→</span>
                    </button>
                  ))
                }
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }
  const da = projectA.data || {};

  // Bouw vergelijkdata op
  const comparisons = [
    { lbl: 'Totaal BVO', va: a.totaal_bvo, vb: b.totaal_bvo, unit: 'm²', numeric: true },
    { lbl: 'Fase', va: da.fase, vb: b.fase, numeric: false },
    { lbl: 'Stad', va: b.stad ? da.provincie || '' : '', vb: b.stad, numeric: false },
    { lbl: 'Wonen', va: a.m_wonen, vb: b.m_wonen, unit: 'm²', numeric: true },
    { lbl: 'Kantoor', va: a.m_kantoor, vb: b.m_kantoor, unit: 'm²', numeric: true },
    { lbl: 'Commercieel', va: a.m_commercieel, vb: b.m_commercieel, unit: 'm²', numeric: true },
    { lbl: 'Autoparkeren', va: a.autoparkeren, vb: b.autoparkeren, unit: 'plekken', numeric: true },
    { lbl: 'NPG Score', va: a.npg_score, vb: b.npg_score, numeric: false },
    { lbl: 'Bouwhoogte', va: a.bouwhoogte, vb: b.bouwhoogte, unit: 'm', numeric: true },
    { lbl: 'Awards', va: a.awards, vb: b.awards, numeric: true },
  ].filter(c => (c.va || c.vb));

  // Score: tel hoeveel velden project A wint
  const scoreA = comparisons.filter(c => c.numeric && parseFloat(c.va) > parseFloat(c.vb)).length;
  const scoreB = comparisons.filter(c => c.numeric && parseFloat(c.vb) > parseFloat(c.va)).length;
  const totalNumeric = comparisons.filter(c => c.numeric).length || 1;
  const pctA = Math.round(scoreA / totalNumeric * 100);
  const pctB = Math.round(scoreB / totalNumeric * 100);
  const winner = scoreA > scoreB ? (da.title || 'Project A') : scoreB > scoreA ? (b.projectnaam || 'Project B') : null;

  return (
    <div className="compare-overlay">
      {/* Topbar */}
      <div className="compare-topbar">
        <h2>⚖ Vergelijken</h2>
        <span style={{fontSize:'12px',color:'var(--muted)'}}>
          {da.title || '—'} vs {b.projectnaam || '—'}
        </span>
        <button className="compare-close" onClick={onClose}>× Sluiten</button>
      </div>

      <div className="compare-body">
        {/* ── KOLOM A ── */}
        <div className="compare-col">
          <div className="compare-col-header">
            <div className="compare-col-name">{da.title || '—'}</div>
            <div className="compare-col-sub">{[a.stad, a.land].filter(Boolean).join(' · ') || '—'}</div>
          </div>
          <div className="compare-hero-img">
            {projectA.images && projectA.images[0]
              ? <img src={projectA.images[0]} alt="" />
              : <div style={{width:'100%',height:'100%',background:'linear-gradient(135deg,#1a2030,#2a3548)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'32px'}}>🏗</div>}
          </div>
          {Object.keys(da.algemeen||{}).length > 0 && (
            <div style={{background:'var(--card)',borderRadius:12,padding:'16px 18px',boxShadow:'var(--shadow)'}}>
              <div style={{fontSize:'10px',letterSpacing:'.18em',textTransform:'uppercase',color:'var(--muted)',fontWeight:700,marginBottom:10}}>Algemeen</div>
              {Object.entries(da.algemeen||{}).map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--line)',fontSize:'12px'}}>
                  <span style={{color:'var(--muted)'}}>{k}</span><span style={{fontWeight:700}}>{v}</span>
                </div>
              ))}
            </div>
          )}
          {Object.keys(da.metrage||{}).length > 0 && (
            <div style={{background:'var(--card)',borderRadius:12,padding:'16px 18px',boxShadow:'var(--shadow)'}}>
              <div style={{fontSize:'10px',letterSpacing:'.18em',textTransform:'uppercase',color:'var(--muted)',fontWeight:700,marginBottom:10}}>Metrage</div>
              {Object.entries(da.metrage||{}).map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--line)',fontSize:'12px'}}>
                  <span style={{color:'var(--muted)'}}>{k}</span><span style={{fontWeight:700}}>{v}</span>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* ── KOLOM B ── */}
        <div className="compare-col">
          <div className="compare-col-header">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
              <div>
                <div className="compare-col-name">{b.projectnaam || '—'}</div>
                <div className="compare-col-sub">{[b.stad, b.land].filter(Boolean).join(' · ') || '—'}</div>
              </div>
              <div style={{position:'relative'}}>
                <button
                  onClick={() => setShowSwitcher(s => !s)}
                  style={{
                    display:'flex',alignItems:'center',gap:6,
                    background:'var(--card)',border:'1px solid var(--line)',
                    borderRadius:'999px',padding:'7px 14px',cursor:'pointer',
                    fontFamily:'inherit',fontSize:'11px',fontWeight:700,
                    letterSpacing:'.1em',textTransform:'uppercase',color:'var(--ink)',
                    transition:'all .15s',boxShadow:'var(--shadow)',
                  }}
                  onMouseOver={e=>{e.currentTarget.style.borderColor='var(--accent)';e.currentTarget.style.color='var(--accent)'}}
                  onMouseOut={e=>{e.currentTarget.style.borderColor='var(--line)';e.currentTarget.style.color='var(--ink)'}}
                >
                  ⇄ Wissel project
                </button>

                {showSwitcher && (
                  <>
                    <div style={{position:'fixed',inset:0,zIndex:10}} onClick={()=>setShowSwitcher(false)} />
                    <div style={{
                      position:'absolute',top:'calc(100% + 8px)',right:0,
                      width:'320px',background:'var(--card)',borderRadius:14,
                      boxShadow:'0 16px 40px -8px rgba(20,30,45,.25)',
                      border:'1px solid var(--line)',overflow:'hidden',zIndex:11,
                      animation:'dropIn .2s cubic-bezier(.22,1,.36,1)',
                    }}>
                      <div style={{padding:'12px 14px 8px'}}>
                        <input
                          autoFocus
                          type="search"
                          placeholder="Zoek project…"
                          value={switcherSearch}
                          onChange={e=>setSwitcherSearch(e.target.value)}
                          style={{
                            width:'100%',fontFamily:'inherit',fontSize:'13px',
                            padding:'9px 12px',border:'1.5px solid var(--line)',
                            borderRadius:8,background:'var(--bg)',color:'var(--ink)',outline:'none',
                          }}
                          onFocus={e=>e.target.style.borderColor='var(--accent)'}
                          onBlur={e=>e.target.style.borderColor='var(--line)'}
                        />
                      </div>
                      <div style={{maxHeight:'260px',overflowY:'auto',padding:'4px 0'}}>
                        {allProjectsList
                          .filter(p => p.projectnaam !== (projectA?.projectnaam))
                          .filter(p => {
                            const q = switcherSearch.toLowerCase();
                            return !q || (p.projectnaam||'').toLowerCase().includes(q)
                              || (p.stad||'').toLowerCase().includes(q);
                          })
                          .slice(0,10)
                          .map(p => (
                            <button key={p.id}
                              onClick={async () => {
                                setShowSwitcher(false);
                                setSwitcherSearch('');
                                // Laad afbeeldingen voor nieuw project
                                if (p.projectnummer) {
                                  try {
                                    const imgs = await Images.getForProject(p.projectnummer);
                                    setCompareImages(imgs);
                                  } catch(e) {}
                                } else {
                                  setCompareImages([]);
                                }
                                setCompareProject(p);
                              }}
                              style={{
                                display:'flex',alignItems:'center',gap:10,
                                width:'100%',padding:'10px 14px',background:'none',
                                border:'none',cursor:'pointer',textAlign:'left',
                                fontFamily:'inherit',transition:'background .1s',
                              }}
                              onMouseOver={e=>e.currentTarget.style.background='var(--bg)'}
                              onMouseOut={e=>e.currentTarget.style.background='none'}
                            >
                              {thumbCache[p.projectnummer]
                                ? <img src={thumbCache[p.projectnummer]} alt=""
                                    style={{width:36,height:36,borderRadius:8,objectFit:'cover',flex:'none'}} />
                                : <div style={{width:36,height:36,borderRadius:8,background:'var(--line)',flex:'none',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🏗</div>}
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{fontWeight:700,fontSize:12,letterSpacing:'.03em',textTransform:'uppercase',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.projectnaam}</div>
                                <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{p.stad||'—'} {p.fase ? `· ${p.fase}`:''}</div>
                              </div>
                            </button>
                          ))
                        }
                      </div>
                    </div>
                  </>
                )}
              </div>
            </div>
          </div>
          <div className="compare-hero-img">
            {projectBImages && projectBImages[0]
              ? <img src={projectBImages[0]} alt="" />
              : <div style={{width:'100%',height:'100%',background:'linear-gradient(135deg,#2a3040,#1a2535)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'32px'}}>🏗</div>}
          </div>
          {(b.project_type || b.fase || b.functie || b.opdrachtgever) && (
            <div style={{background:'var(--card)',borderRadius:12,padding:'16px 18px',boxShadow:'var(--shadow)'}}>
              <div style={{fontSize:'10px',letterSpacing:'.18em',textTransform:'uppercase',color:'var(--muted)',fontWeight:700,marginBottom:10}}>Algemeen</div>
              {[['Projecttype',b.project_type],['Fase',b.fase],['Functie',b.functie],['Opdrachtgever',b.opdrachtgever]].filter(([,v])=>v).map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--line)',fontSize:'12px'}}>
                  <span style={{color:'var(--muted)'}}>{k}</span><span style={{fontWeight:700}}>{v}</span>
                </div>
              ))}
            </div>
          )}
          {(b.totaal_bvo||b.m_wonen||b.m_kantoor) && (
            <div style={{background:'var(--card)',borderRadius:12,padding:'16px 18px',boxShadow:'var(--shadow)'}}>
              <div style={{fontSize:'10px',letterSpacing:'.18em',textTransform:'uppercase',color:'var(--muted)',fontWeight:700,marginBottom:10}}>Metrage</div>
              {[['Totaal BVO',b.totaal_bvo,'m²'],['Wonen',b.m_wonen,'m²'],['Kantoor',b.m_kantoor,'m²'],['Commercieel',b.m_commercieel,'m²']].filter(([,v])=>v).map(([k,v,u])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--line)',fontSize:'12px'}}>
                  <span style={{color:'var(--muted)'}}>{k}</span><span style={{fontWeight:700}}>{Number(v).toLocaleString('nl-NL')} {u}</span>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* ── RESULTATEN KOLOM ── */}
        <div className="compare-results">
          <div>
            <div className="cr-title">Vergelijkingsresultaat</div>
            {winner
              ? <>
                  <div className="cr-winner">🏆 {winner}</div>
                  <div className="cr-sub">wint op de meeste meetbare criteria</div>
                  <div className="winner-badge">⭐ Winnaar</div>
                </>
              : <>
                  <div className="cr-winner" style={{fontSize:16}}>Gelijkspel</div>
                  <div className="cr-sub">Beide projecten scoren gelijk</div>
                </>
            }
          </div>

          {/* Score balk */}
          <div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'11px',fontWeight:700,marginBottom:6}}>
              <span style={{color:'var(--accent)'}}>{da.title?.split(' ')[0] || 'A'}</span>
              <span style={{color:'var(--muted)'}}>{b.projectnaam?.split(' ')[0] || 'B'}</span>
            </div>
            <div className="score-bar" style={{background:'rgba(180,60,60,.15)',borderRadius:'999px',height:8,overflow:'hidden',display:'flex'}}>
              <div style={{width:`${Math.max(pctA*0.9+5,10)}%`,background:'#1c8c50',borderRadius:'999px',transition:'width .6s ease'}}></div>
              <div style={{flex:1,background:'transparent'}}></div>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'10px',marginTop:4}}>
              <span style={{color:'#1c8c50',fontWeight:700}}>{scoreA} gewonnen</span>
              <span style={{color:'#b43c3c',fontWeight:700}}>{scoreB} gewonnen</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'10px',color:'var(--muted)',marginTop:4}}>
              <span>{scoreA} criteria</span>
              <span>{scoreB} criteria</span>
            </div>
          </div>

          {/* Vergelijkrijen */}
          <div>
            <div style={{fontSize:'10px',letterSpacing:'.18em',textTransform:'uppercase',color:'var(--muted)',fontWeight:700,marginBottom:8,paddingBottom:8,borderBottom:'1px solid var(--line)'}}>Per criterium</div>
            {comparisons.map((c,i) => {
              const na = parseFloat(c.va) || 0;
              const nb = parseFloat(c.vb) || 0;
              const aWins = c.numeric && na > nb;
              const bWins = c.numeric && nb > na;
              const equal = c.numeric && na === nb && na !== 0;

              const colorA = aWins ? '#1c8c50' : bWins ? '#b43c3c' : equal ? '#c8900a' : 'var(--ink)';
              const colorB = bWins ? '#1c8c50' : aWins ? '#b43c3c' : equal ? '#c8900a' : 'var(--ink)';
              const bgA = aWins ? 'rgba(28,140,80,.08)' : bWins ? 'rgba(180,60,60,.06)' : equal ? 'rgba(200,144,10,.08)' : 'transparent';
              const bgB = bWins ? 'rgba(28,140,80,.08)' : aWins ? 'rgba(180,60,60,.06)' : equal ? 'rgba(200,144,10,.08)' : 'transparent';

              const fmtVal = (v, numeric, unit) =>
                v ? (numeric ? Number(v).toLocaleString('nl-NL')+(unit?' '+unit:'') : v) : '—';

              return (
                <div key={i} style={{marginBottom:8}}>
                  <div style={{fontSize:'9px',letterSpacing:'.16em',textTransform:'uppercase',color:'var(--muted)',fontWeight:700,marginBottom:6}}>{c.lbl}</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:6,alignItems:'center'}}>
                    {/* Waarde A */}
                    <div style={{
                      background:bgA, borderRadius:8, padding:'8px 12px',
                      border:`1px solid ${aWins?'rgba(28,140,80,.2)':bWins?'rgba(180,60,60,.15)':equal?'rgba(200,144,10,.2)':'var(--line)'}`,
                      textAlign:'center',
                    }}>
                      <div style={{fontSize:'14px',fontWeight:800,color:colorA,letterSpacing:'-.01em'}}>
                        {fmtVal(c.va, c.numeric, c.unit)}
                      </div>
                      {aWins && <div style={{fontSize:'9px',color:'#1c8c50',fontWeight:700,marginTop:2,letterSpacing:'.1em'}}>▲ MEER</div>}
                      {bWins && <div style={{fontSize:'9px',color:'#b43c3c',fontWeight:700,marginTop:2,letterSpacing:'.1em'}}>▼ MINDER</div>}
                      {equal && <div style={{fontSize:'9px',color:'#c8900a',fontWeight:700,marginTop:2,letterSpacing:'.1em'}}>● GELIJK</div>}
                    </div>

                    {/* VS */}
                    <div style={{fontSize:'9px',color:'var(--muted)',fontWeight:700,letterSpacing:'.1em',textAlign:'center'}}>VS</div>

                    {/* Waarde B */}
                    <div style={{
                      background:bgB, borderRadius:8, padding:'8px 12px',
                      border:`1px solid ${bWins?'rgba(28,140,80,.2)':aWins?'rgba(180,60,60,.15)':equal?'rgba(200,144,10,.2)':'var(--line)'}`,
                      textAlign:'center',
                    }}>
                      <div style={{fontSize:'14px',fontWeight:800,color:colorB,letterSpacing:'-.01em'}}>
                        {fmtVal(c.vb, c.numeric, c.unit)}
                      </div>
                      {bWins && <div style={{fontSize:'9px',color:'#1c8c50',fontWeight:700,marginTop:2,letterSpacing:'.1em'}}>▲ MEER</div>}
                      {aWins && <div style={{fontSize:'9px',color:'#b43c3c',fontWeight:700,marginTop:2,letterSpacing:'.1em'}}>▼ MINDER</div>}
                      {equal && <div style={{fontSize:'9px',color:'#c8900a',fontWeight:700,marginTop:2,letterSpacing:'.1em'}}>● GELIJK</div>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Links naar beide projecten */}
          <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:'auto',paddingTop:16}}>
            <a href={`project_page.html?p=${encodeURIComponent(a.projectnaam||'')}`}
              style={{display:'block',textAlign:'center',background:'var(--ink)',color:'#fff',textDecoration:'none',padding:'10px',borderRadius:'999px',fontSize:'11px',letterSpacing:'.12em',textTransform:'uppercase',fontWeight:700}}>
              Open {da.title?.split(' ')[0] || 'Project A'} →
            </a>
            <a href={`project_page.html?nr=${encodeURIComponent(b.projectnummer||'')}&p=${encodeURIComponent(b.projectnaam||'')}`}
              style={{display:'block',textAlign:'center',background:'rgba(17,20,24,.08)',color:'var(--ink)',textDecoration:'none',padding:'10px',borderRadius:'999px',fontSize:'11px',letterSpacing:'.12em',textTransform:'uppercase',fontWeight:700}}>
              Open {b.projectnaam?.split(' ')[0] || 'Project B'} →
            </a>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── App: laadt projectdata uit Supabase en rendert de pagina ── */
function App(){
  const [editHref, setEditHref] = React.useState(null);
  const [isLoggedIn, setIsLoggedIn] = React.useState(false);

  // Check login status
  React.useEffect(() => {
    (async () => {
      try {
        const { data: { user } } = await db.auth.getUser();
        if (!user) return;
        const { data: profile } = await db.from('profiles').select('status').eq('id', user.id).maybeSingle();
        if (profile?.status === 'approved') setIsLoggedIn(true);
      } catch(e) {}
    })();
  }, []);
  const [allProjectsList, setAllProjectsList] = React.useState([]);
  const [compareProject, setCompareProject] = React.useState(null); // het tweede project
  const [compareSearch, setCompareSearch] = React.useState('');
  const [showCompareView, setShowCompareView] = React.useState(false);
  const [compareImages, setCompareImages] = React.useState([]);
  const [thumbCache, setThumbCache] = React.useState({});

  // Laad alle projecten voor de zoekdropdown
  React.useEffect(() => {
    Projects.getAll().then(all => {
      setAllProjectsList(all || []);
      // Pre-load thumbnails
      const cache = {};
      all.forEach(async p => {
        if (p.projectnummer) {
          try {
            const imgs = await Images.getForProject(p.projectnummer);
            if (imgs[0]) {
              cache[p.projectnummer] = imgs[0];
              setThumbCache(c => ({...c, [p.projectnummer]: imgs[0]}));
            }
          } catch(e) {}
        }
      });
    }).catch(()=>{});
  }, []);

  // Filter projecten voor dropdown (verwijder huidig project)
  const compareResults = React.useMemo(() => {
    const q = compareSearch.toLowerCase().trim();
    return allProjectsList
      .filter(p => p.projectnaam !== (project?.projectnaam))
      .filter(p => !q || (p.projectnaam||'').toLowerCase().includes(q)
        || (p.stad||'').toLowerCase().includes(q)
        || (p.fase||'').toLowerCase().includes(q))
      .slice(0, 8);
  }, [compareSearch, allProjectsList, project]);

  const selectCompareProject = async (p) => {
    setCompareProject(p);
    setShowCompareDropdown(false);
    setCompareSearch('');
    // Laad afbeeldingen voor vergelijkproject
    if (p.projectnummer) {
      try {
        const imgs = await Images.getForProject(p.projectnummer);
        setCompareImages(imgs);
      } catch(e) {}
    }
    setShowCompareView(true);
  };
  const [projectImages, setProjectImages] = React.useState([]);
  const [project, setProject] = React.useState(null);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    // Laad eerst op projectnummer (uniek), daarna op naam als fallback
    const loadProject = async () => {
      let found = null;
      if (PROJECT_NR) {
        found = await Projects.getByNumber(PROJECT_NR);
      }
      if (!found && PROJECT_NAME) {
        found = await Projects.getByName(PROJECT_NAME);
      }
      if (found) {
        setProject(found);
        if (found.projectnummer) {
          setEditHref(`new_project.html?edit=${encodeURIComponent(found.projectnummer)}`);
        } else if (found.id) {
          setEditHref(`new_project.html?editid=${encodeURIComponent(found.id)}`);
        }
        const imgKey = found.projectnummer || found.id;
        if (imgKey) {
          Images.getForProject(imgKey).then(setProjectImages).catch(() => {});
        }
      } else {
        console.warn('Project niet gevonden. NR:', PROJECT_NR, 'NAAM:', PROJECT_NAME, 'URL:', window.location.href);
      }
      setLoading(false);
    };
    loadProject().catch((e) => { console.error('Laad fout:', e); setLoading(false); });
  }, []);

  // Bouw data-object op uit Supabase velden
  const data = project ? {
    title: (project.projectnaam || PROJECT_NAME).toUpperCase(),
    subtitle: project.opgave || '',
    algemeen: {
      ...(project.project_type  ? { Projecttype:       project.project_type }           : {}),
      ...(project.functie        ? { Functie:           project.functie }                : {}),
      ...(project.verkregen_dmv  ? { 'Verkregen d.m.v.': project.verkregen_dmv }        : {}),
      ...(project.fase           ? { Fase:              project.fase }                   : {}),
    },
    locatie: {
      ...(project.land     ? { Land:     project.land }     : {}),
      ...(project.provincie? { Provincie:project.provincie } : {}),
      ...(project.stad     ? { Stad:     project.stad }     : {}),
      ...((project.straat || project.huisnummer) ? { Adres: [project.straat, project.huisnummer].filter(Boolean).join(' ') } : {}),
      ...(project.postcode ? { Postcode: project.postcode } : {}),
    },
    metrage: {
      ...(project.totaal_bvo   ? { 'Totaal BVO':  fmt(project.totaal_bvo,  'm²') } : {}),
      ...(project.m_wonen      ? { Wonen:         fmt(project.m_wonen,     'm²') } : {}),
      ...(project.m_kantoor    ? { Kantoor:       fmt(project.m_kantoor,   'm²') } : {}),
      ...(project.m_commercieel? { Commercieel:   fmt(project.m_commercieel,'m²') } : {}),
      ...(project.m_shortstay  ? { Shortstay:     fmt(project.m_shortstay, 'm²') } : {}),
      ...(project.m_publiek    ? { Publiek:       fmt(project.m_publiek,   'm²') } : {}),
      ...(project.m_onderwijs  ? { Onderwijs:     fmt(project.m_onderwijs, 'm²') } : {}),
    },
    mobiliteit: {
      ...(project.autoparkeren  ? { Autoparkeren:   fmt(project.autoparkeren,  'plekken') } : {}),
      ...(project.fietsparkeren ? { Fietsparkeren:  fmt(project.fietsparkeren, 'plekken') } : {}),
      ...(project.ratio_wonen   ? { 'Ratio wonen':  project.ratio_wonen } : {}),
    },
    duurzaamheid: {
      ...(project.npg_score          ? { 'NPG score':   project.npg_score } : {}),
      ...(project.daktuin            ? { Daktuin:       fmt(project.daktuin,      'm²')   } : {}),
      ...(project.zonnepanelen       ? { Zonnepanelen:  fmt(project.zonnepanelen, 'stuks') } : {}),
      ...(project.duurzaamheidslabel ? { Label:         project.duurzaamheidslabel } : {}),
    },
    overig: {
      ...(project.bouwhoogte   ? { Bouwhoogte:  fmt(project.bouwhoogte, 'm') } : {}),
      ...(project.tevredenheid ? { Tevredenheid: project.tevredenheid + ' / 50' } : {}),
      ...(project.awards       ? { Awards:       project.awards } : {}),
    },
    totaalBvo: project.totaal_bvo ? fmt(project.totaal_bvo, 'm²') : '—',
    provincie: project.provincie || '',
    land: project.land || '',
    fase: project.fase || '—',
  } : {
    title: PROJECT_NAME.toUpperCase(),
    subtitle: '', algemeen: {}, locatie: {}, metrage: {},
    mobiliteit: {}, duurzaamheid: {}, overig: {},
    totaalBvo: '—', provincie: '', land: '', fase: '—',
  };

  if (loading) return (
    <div style={{padding:'60px', textAlign:'center', color:'#6b7480', fontFamily:'Inter,sans-serif'}}>
      <div style={{fontSize:'32px', marginBottom:'12px'}}>⏳</div>
      Project laden…
    </div>
  );
  if (!project && !loading) return (
    <div style={{padding:'60px', textAlign:'center', color:'#6b7480', fontFamily:'Inter,sans-serif'}}>
      <div style={{fontSize:'32px', marginBottom:'12px'}}>📭</div>
      <div style={{fontWeight:700, fontSize:'18px', color:'#111418', marginBottom:'8px'}}>Project niet gevonden</div>
      <div style={{fontSize:'13px', marginBottom:'24px'}}>"{PROJECT_NAME}" staat nog niet in de database.</div>
      <a href="new_project.html" style={{background:'#111418', color:'#fff', textDecoration:'none',
        padding:'10px 20px', borderRadius:'999px', fontSize:'11px', letterSpacing:'.14em',
        textTransform:'uppercase', fontWeight:700}}>+ Project toevoegen</a>
    </div>
  );

  return (
    <>
      <header className="topbar">
        <a className="back" href="projects_dashboard.html">← Dashboard</a>
        <div className="crumbs">
          <a href="projects_dashboard.html">Projecten</a> · <strong>{data.title}</strong>
        </div>
        <div style={{display:'flex', gap:'8px', alignItems:'center', position:'relative', zIndex:250}}>
          <button className="pdf-btn" onClick={() => {
            document.title = data.title || 'MVSA Project';
            window.print();
          }}>⬇ PDF</button>
          <button className="compare-btn"
            onClick={() => {
              setCompareProject(null);
              setCompareImages([]);
              setShowCompareView(true);
            }}>
            ⚖ Vergelijk
          </button>
          {isLoggedIn && editHref && (
            <a className="edit-btn" href={editHref} title="Project bewerken">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
              Bewerk
            </a>
          )}
        </div>
      </header>

      {/* VERGELIJK OVERLAY */}
      {showCompareView && (
        <CompareView
          projectA={{...project, images: projectImages, data}}
          projectB={compareProject}
          projectBImages={compareImages}
          thumbCache={thumbCache}
          setCompareProject={setCompareProject}
          setCompareImages={setCompareImages}
          onClose={() => setShowCompareView(false)}
        />
      )}

      {/* HERO */}
      <section className="hero" style={projectImages[0] ? {background: `url(${projectImages[0]}) center/cover no-repeat`} : {}}>
        {!projectImages[0] && <div className="bg"></div>}
        <nav className="nav">
          <span className="logo">MVSA</span>
        </nav>
        <div className="title-wrap">
          <h1>{data.title}</h1>
          <div className="tagline">{data.subtitle}</div>
        </div>
        <div className="footer-meta">
          <div className="bvo-num">{data.totaalBvo}</div>
          <div className="bvo-lbl">Totaal BVO</div>
          <div className="loc">{data.provincie}{data.provincie && data.land ? ' · ' : ''}{data.land}</div>
        </div>
      </section>

      {/* GALERIJ */}
      {projectImages.length > 1 && (
        <section className="section-shell">
          <h2 className="shell-title">Galerij</h2>
          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))', gap:'14px'}}>
            {projectImages.slice(1).map((url, i) => (
              <div key={i} style={{borderRadius:'12px', overflow:'hidden', aspectRatio:'4/3', background:'#e6ecf2'}}>
                <img src={url} alt="" style={{width:'100%', height:'100%', objectFit:'cover', display:'block',
                  transition:'transform .3s ease', cursor:'pointer'}}
                  onClick={() => window.open(url, '_blank')}
                  onMouseOver={e => e.target.style.transform='scale(1.03)'}
                  onMouseOut={e => e.target.style.transform='scale(1)'}
                />
              </div>
            ))}
          </div>
        </section>
      )}

      {/* TEAM */}
      {data.team && data.team.length > 0 && (
      <section className="section-shell">
        <h2 className="shell-title">Medewerkers</h2>
        <div className="four-up">
          {data.team.map((m, i) => (
            <a key={i} className="four-card" href={`employees.html?e=${encodeURIComponent(m.name)}`} style={{textDecoration:'none', color:'inherit'}}>
              <div className={`img ${['','alt','alt-2','alt-3'][i] || ''}`}>
                <span className="ph">PLACE PHOTO HERE</span>
              </div>
              <div className="num" style={{fontSize:'20px', letterSpacing:'.02em', textTransform:'uppercase'}}>{m.name}</div>
              <div className="lbl">{m.role}</div>
              <div className="desc">{m.desc}</div>
            </a>
          ))}
        </div>
      </section>
      )}

      {/* INFO GRID */}
      <section className="info-grid">
        <InfoCard title="Algemeen"     items={data.algemeen || {}}     keyStat={data.fase ? { label:'Fase', value: data.fase } : null} />
        <InfoCard title="Locatie"      items={data.locatie || {}} />
        <InfoCard title="Metrage"      items={data.metrage || {}}      keyStat={data.totaalBvo && data.totaalBvo !== '' ? { label:'Totaal BVO', value: data.totaalBvo } : null} />
        <InfoCard title="Mobiliteit"   items={data.mobiliteit || {}} />
        <InfoCard title="Duurzaamheid" items={data.duurzaamheid || {}} />
        <InfoCard title="Overig"       items={data.overig || {}} />
      </section>

      {/* PLAN ROW — alleen tonen als er metrage data is */}
      {Object.keys(data.metrage || {}).length > 0 && (
        <section className="plan-card">
          <div>
            <h2>Project plan</h2>
            <div className="sub">Het oppervlak per ruimte</div>
            <table>
              <tbody>
                {Object.entries(data.metrage).map(([k, v]) => (
                  <tr key={k}><td>{k}</td><td>{v}</td></tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="floorplan">
            {projectImages[1]
              ? <img src={projectImages[1]} alt="Plattegrond" style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:'12px'}} />
              : <span className="ph">PLACE FLOORPLAN HERE</span>}
          </div>
        </section>
      )}

    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
(async function(){
  const bar = document.getElementById('auth-bar');
  if (!bar || typeof db === 'undefined') return;
  try {
    const { data: { user } } = await db.auth.getUser();
    if (!user) {
      bar.innerHTML = '<a class="ab-login" href="login.html">Inloggen →</a>';
      bar.style.display = 'flex';
      return;
    }
    const { data: profile } = await db.from('profiles').select('naam,status,employee_id').eq('id', user.id).maybeSingle();
    if (!profile || profile.status !== 'approved') {
      bar.innerHTML = '<a class="ab-login" href="login.html">Inloggen →</a>';
      bar.style.display = 'flex';
      return;
    }
    const initials = (profile.naam||'?').split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();
    // Probeer foto te laden
    let photoHtml = initials;
    if (profile.employee_id) {
      try {
        const url = await EmployeeImages.getForEmployee(profile.employee_id);
        if (url) photoHtml = '<img src="' + url + '" alt="">';
      } catch(e) {}
    }
    bar.innerHTML = '<a href="profile.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;" title="Mijn profiel"><div class="ab-avatar">' + photoHtml + '</div>'
      + '<span class="ab-name">' + profile.naam + '</span></a>'
      + '<button class="ab-logout" onclick="Auth.logout().then(()=>location.reload())">Uitloggen</button>';
    bar.style.display = 'flex';
  } catch(e) {
    bar.style.display = 'flex';
  }
})();
</script>
