<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Project · Toorop</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg: #DEE7EF;
    --card: #ffffff;
    --ink: #111418;
    --ink-2: #2a2f36;
    --muted: #6b7480;
    --line: #e6ecf2;
    --shadow: 0 1px 0 rgba(20,30,45,.04), 0 8px 24px -12px rgba(20,30,45,.18);
    --radius: 16px;
  }
  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; background: var(--bg); color: var(--ink); font-family: 'Inter', Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }

  .page{ max-width: 1280px; margin: 0 auto; padding: 24px 32px 80px; }

  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 20px; }
  .crumbs{ font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }
  .crumbs a{ color: var(--muted); text-decoration: none; }
  .crumbs a:hover{ color: var(--ink); }
  .crumbs strong{ color: var(--ink); font-weight:600; }
  .topbar .meta{ font-size:12px; color:var(--muted); }

  .back{
    position: fixed; top: 24px; left: 24px; z-index: 100;
    display:inline-flex; align-items:center; gap:8px; color: var(--ink); text-decoration:none;
    font-size: 12px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600;
    padding: 10px 16px; border-radius: 999px;
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border:1px solid rgba(17,20,24,.08);
    box-shadow: 0 4px 16px -4px rgba(20,30,45,.18);
    transition: background .15s ease, transform .15s ease, box-shadow .15s ease;
  }
  .back:hover{ background: #fff; transform: translateY(-1px); box-shadow: 0 8px 20px -4px rgba(20,30,45,.24); }

  .edit-btn{
    position: fixed; top: 24px; right: 24px; z-index: 100;
    display:inline-flex; align-items:center; gap:8px; color: var(--ink); text-decoration:none;
    font-size: 12px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600;
    padding: 10px 16px; border-radius: 999px;
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border:1px solid rgba(17,20,24,.08);
    box-shadow: 0 4px 16px -4px rgba(20,30,45,.18);
    transition: background .15s ease, transform .15s ease, box-shadow .15s ease;
    cursor: pointer;
  }
  .edit-btn:hover{ background: #fff; transform: translateY(-1px); box-shadow: 0 8px 20px -4px rgba(20,30,45,.24); }
  .edit-btn.disabled{
    opacity: .5; cursor: not-allowed;
  }
  .edit-btn.disabled:hover{ background: rgba(255,255,255,.85); transform: none; box-shadow: 0 4px 16px -4px rgba(20,30,45,.18); }
  .edit-btn svg{ width:14px; height:14px; }

  /* HERO ----------------------------------------------------- */
  .hero{
    border-radius: 22px; overflow: hidden; position: relative;
    aspect-ratio: 16/7;
    background: #2a2f36;
    box-shadow: var(--shadow);
  }
  .hero .bg{
    position:absolute; inset:0;
    background:
      radial-gradient(140% 100% at 30% 20%, #4a5060 0%, #1a1d22 60%, #0c0e11 100%);
  }
  .hero .bg::after{
    content:""; position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(180deg, rgba(255,255,255,.04) 0 1px, transparent 1px 14px),
      repeating-linear-gradient(90deg, rgba(255,255,255,.03) 0 1px, transparent 1px 26px);
    mix-blend-mode: overlay;
  }
  .hero .nav{
    position:relative; display:flex; justify-content:space-between; align-items:center;
    padding: 22px 32px; color:#fff; font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
    z-index: 2;
  }
  .hero .nav .logo{ font-weight:800; letter-spacing: .18em; font-size: 14px; }
  .hero .nav ul{ list-style:none; padding:0; margin:0; display:flex; gap: 22px; opacity:.85; }
  .hero .title-wrap{
    position: absolute; left: 0; right: 0; bottom: 0;
    display:flex; flex-direction:column; justify-content:flex-end;
    padding: 0 56px 36px; color:#fff;
  }
  .hero h1{
    margin:0; font-size: clamp(32px, 4.5vw, 64px); line-height: .95;
    font-weight: 800; letter-spacing: -0.03em;
  }
  .hero .tagline{
    margin-top: 10px; max-width: 540px; font-size: 13px; line-height: 1.6; opacity: .85;
    letter-spacing: .02em;
  }
  .hero .footer-meta{
    position: absolute; right: 40px; bottom: 32px; text-align: right;
    color:#fff; display:flex; flex-direction: column; gap: 4px; align-items: flex-end;
  }
  .hero .footer-meta .bvo-num{
    font-size: 36px; font-weight: 800; letter-spacing: -.02em; line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .hero .footer-meta .bvo-lbl{
    font-size: 10px; letter-spacing: .18em; text-transform: uppercase; opacity: .7; margin-top: 2px;
  }
  .hero .footer-meta .loc{
    margin-top: 12px; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; opacity: .85;
  }

  /* FOUR-UP --------------------------------------------------- */
  .section-shell{
    margin-top: 18px; background: var(--card); border-radius: 22px; padding: 28px 28px 30px;
    box-shadow: var(--shadow);
  }
  .section-shell.dark{
    background: #1a1d22; color: #fff;
  }
  .shell-title{
    font-size: clamp(28px, 4vw, 44px); font-weight: 800; letter-spacing: -.03em; margin: 0 0 22px;
  }
  .four-up{ display:grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .four-card{
    display:flex; flex-direction:column; gap: 12px;
    transition: transform .15s ease;
  }
  a.four-card:hover{ transform: translateY(-2px); }
  a.four-card:hover .num{ color: #3d6e8a; }
  .four-card .img{
    aspect-ratio: 1/1; border-radius: 12px; background: #cbb59a; position:relative; overflow:hidden;
  }
  .four-card .img::before{
    content:""; position:absolute; inset:0;
    background-image: repeating-linear-gradient(180deg, rgba(0,0,0,.18) 0 1px, transparent 1px 8px);
  }
  .four-card .img::after{
    content:""; position:absolute; inset:0;
    background-image: repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0 1px, transparent 1px 24px);
  }
  .four-card .img.alt{ background:#9aa3ad; }
  .four-card .img.alt-2{ background:#a99a82; }
  .four-card .img.alt-3{ background:#7b8896; }
  .four-card .img .ph{
    position:absolute; left:14px; top:14px; font-family:'JetBrains Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing:.12em; text-transform:uppercase; color:#fff; mix-blend-mode: difference;
  }
  .four-card .num{ font-size: 32px; font-weight: 700; letter-spacing: -.02em; }
  .four-card .lbl{ font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); margin-top: -6px; }
  .four-card .desc{ font-size: 12px; line-height: 1.5; color: var(--ink-2); }

  /* INFO GRID ------------------------------------------------- */
  .info-grid{
    display:grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 18px;
  }
  .info-card{
    background: var(--card); border-radius: 16px; box-shadow: var(--shadow);
    padding: 20px 22px;
    border: 1px solid rgba(255,255,255,.6);
  }
  .info-card h3{
    margin: 0 0 14px; font-size: 11px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: var(--ink);
  }
  .info-card dl{ margin: 0; display: grid; grid-template-columns: 1fr auto; row-gap: 10px; column-gap: 14px; }
  .info-card dt{ font-size: 12px; color: var(--muted); }
  .info-card dd{ margin: 0; font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; }

  .info-card .key-stat{
    display:flex; align-items: baseline; justify-content: space-between;
    border-top: 1px solid var(--line); margin-top: 14px; padding-top: 12px;
  }
  .info-card .key-stat .lbl{ font-size: 11px; letter-spacing:.16em; text-transform:uppercase; color: var(--muted); }
  .info-card .key-stat .num{ font-size: 28px; font-weight: 700; letter-spacing: -.02em; }

  /* HOUSE-PLAN style row ------------------------------------- */
  .plan-card{
    margin-top: 14px;
    background: var(--card); border-radius: 22px; box-shadow: var(--shadow);
    display: grid; grid-template-columns: 1fr 1fr; gap: 32px; padding: 32px;
  }
  .plan-card h2{
    margin: 0 0 6px; font-size: clamp(28px, 4vw, 44px); font-weight: 800; letter-spacing: -.03em;
  }
  .plan-card .sub{
    font-size: 12px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px;
  }
  .plan-card table{ width: 100%; border-collapse: collapse; font-size: 13px; }
  .plan-card td{ padding: 12px 0; border-bottom: 1px solid var(--line); }
  .plan-card td:last-child{ text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
  .plan-card tr:last-child td{ border-bottom: 0; }
  .plan-card .floorplan{
    border-radius: 14px; overflow:hidden; background: #c8b89a;
    aspect-ratio: 4/5; position: relative;
  }
  .plan-card .floorplan::before{
    content:""; position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(180deg, rgba(0,0,0,.2) 0 1px, transparent 1px 12px),
      repeating-linear-gradient(90deg, rgba(0,0,0,.12) 0 1px, transparent 1px 18px);
  }
  .plan-card .floorplan .ph{
    position:absolute; left:18px; top:18px; font-family:'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px; letter-spacing:.12em; text-transform:uppercase; color:#fff; mix-blend-mode: difference;
  }

  @media (max-width: 980px){
    .four-up{ grid-template-columns: 1fr 1fr; }
    .info-grid{ grid-template-columns: 1fr 1fr; }
    .plan-card{ grid-template-columns: 1fr; }
    .hero .nav ul{ display:none; }
  }
  @media (max-width: 620px){
    .four-up{ grid-template-columns: 1fr; }
    .info-grid{ grid-template-columns: 1fr; }
    .page{ padding: 16px 16px 64px; }
  }

  /* PDF EXPORT — in topbar */
  .pdf-btn{
    display:inline-flex; align-items:center; gap:8px; color: var(--ink); text-decoration:none;
    font-size: 12px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600;
    padding: 10px 16px; border-radius: 999px;
    background: rgba(255,255,255,.85); backdrop-filter: blur(10px);
    border:1px solid rgba(17,20,24,.08);
    box-shadow: 0 4px 16px -4px rgba(20,30,45,.18);
    transition: background .15s ease, transform .15s ease;
    cursor:pointer; font-family:inherit;
  }
  .pdf-btn:hover{ background: #fff; transform: translateY(-1px); }

  /* ═══════════════════════════════════════════════
     PRINT / PDF STYLESHEET
     Staand A4 — grafisch opgemaakt
     ═══════════════════════════════════════════════ */
  @media print {

    /* Pagina instelling */
    @page {
      size: A4 portrait;
      margin: 0;
    }
    @page :first { margin: 0; }

    /* Reset */
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    html, body { margin:0; padding:0; background:#fff !important; font-family:'Inter',sans-serif; }

    /* Verberg navigatie */
    .topbar, .pdf-btn, .edit-btn, .back, nav.nav,
    .gallerij-section, .section-shell { display:none !important; }

    /* HERO — volle breedte, donker blok bovenaan */
    .hero {
      position: relative !important;
      height: 260px !important;
      width: 100% !important;
      margin: 0 !important;
      border-radius: 0 !important;
      page-break-after: avoid;
    }
    .hero .bg {
      background: linear-gradient(135deg, #111418 0%, #2a3040 100%) !important;
    }
    .hero .nav { display: flex !important; }
    .hero .logo {
      font-size: 10px !important;
      letter-spacing: .3em !important;
    }
    .hero .title-wrap h1 {
      font-size: 52px !important;
    }

    /* INFO GRID — 3 kolommen naast elkaar */
    .info-grid {
      display: grid !important;
      grid-template-columns: 1fr 1fr 1fr !important;
      gap: 0 !important;
      margin: 0 !important;
      padding: 0 20mm !important;
      page-break-inside: avoid;
    }
    .info-card {
      box-shadow: none !important;
      border: none !important;
      border-right: 1px solid #e6ecf2 !important;
      border-radius: 0 !important;
      padding: 16px 20px !important;
      margin: 0 !important;
      background: #fff !important;
    }
    .info-card:last-child { border-right: none !important; }
    .info-card h3 {
      font-size: 8px !important;
      letter-spacing: .2em !important;
      color: #3d6e8a !important;
      margin-bottom: 10px !important;
    }
    .info-card dl dt { font-size: 10px !important; color: #6b7480 !important; }
    .info-card dl dd { font-size: 11px !important; font-weight: 700 !important; }
    .key-stat .ks-val { font-size: 28px !important; }

    /* PLAN CARD */
    .plan-card {
      display: grid !important;
      grid-template-columns: 1fr 1fr !important;
      gap: 20px !important;
      margin: 0 !important;
      padding: 16px 20mm !important;
      box-shadow: none !important;
      border-radius: 0 !important;
      border-top: 1px solid #e6ecf2 !important;
      page-break-inside: avoid;
    }
    .plan-card h2 { font-size: 18px !important; }
    .plan-card table { font-size: 11px !important; }

    /* FOOTER BAND — onderaan de pagina */
    .page::after {
      content: 'MVSA Architects  ·  mvsa-architects.com  ·  Vertrouwelijk';
      display: block;
      text-align: center;
      font-size: 8px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: #aab2bc;
      padding: 12px 0 8px;
      border-top: 1px solid #e6ecf2;
      margin: 0 20mm;
    }

    /* ACCENTLIJN onder hero */
    .hero::after {
      content: '';
      display: block;
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #3d6e8a 0%, #5a9ab8 50%, #3d6e8a 100%);
    }
  }
</style>
</head>
<body>
<div class="page" id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script type="text/babel" data-presets="env,react">
/* Read project name from URL: ?p=Toorop */
const params = new URLSearchParams(window.location.search);
const PROJECT_NAME = (params.get('p') || '').trim();
const PROJECT_NR   = (params.get('nr') || '').trim();

// Data wordt geladen vanuit Supabase in App()
function fmt(val, unit) {
  if (val === null || val === undefined || val === '') return '—';
  return unit ? val.toLocaleString('nl-NL') + ' ' + unit : String(val);
}

/* ── InfoCard: toont een blok met label-waarde rijen (algemeen, locatie etc.) ── */
function InfoCard({ title, items, keyStat }){
  const safeItems = items && typeof items === 'object' ? items : {};
  if (!Object.keys(safeItems).length && !keyStat) return null;
  return (
    <div className="info-card">
      <h3>{title}</h3>
      <dl>
        {Object.entries(safeItems).map(([k, v]) => (
          <React.Fragment key={k}>
            <dt>{k}</dt>
            <dd>{v}</dd>
          </React.Fragment>
        ))}
      </dl>
      {keyStat && (
        <div className="key-stat">
          <span className="lbl">{keyStat.label}</span>
          <span className="num">{keyStat.value}</span>
        </div>
      )}
    </div>
  );
}

/* ── App: laadt projectdata uit Supabase en rendert de pagina ── */
function App(){
  const [editHref, setEditHref] = React.useState(null);
  const [projectImages, setProjectImages] = React.useState([]);
  const [project, setProject] = React.useState(null);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    // Laad eerst op projectnummer (uniek), daarna op naam als fallback
    const loadProject = async () => {
      let found = null;
      if (PROJECT_NR) {
        found = await Projects.getByNumber(PROJECT_NR);
      }
      if (!found && PROJECT_NAME) {
        found = await Projects.getByName(PROJECT_NAME);
      }
      if (found) {
        setProject(found);
        if (found.projectnummer) {
          setEditHref(`new_project.html?edit=${encodeURIComponent(found.projectnummer)}`);
        } else if (found.id) {
          setEditHref(`new_project.html?editid=${encodeURIComponent(found.id)}`);
        }
        const imgKey = found.projectnummer || found.id;
        if (imgKey) {
          Images.getForProject(imgKey).then(setProjectImages).catch(() => {});
        }
      } else {
        console.warn('Project niet gevonden. NR:', PROJECT_NR, 'NAAM:', PROJECT_NAME, 'URL:', window.location.href);
      }
      setLoading(false);
    };
    loadProject().catch((e) => { console.error('Laad fout:', e); setLoading(false); });
  }, []);

  // Bouw data-object op uit Supabase velden
  const data = project ? {
    title: (project.projectnaam || PROJECT_NAME).toUpperCase(),
    subtitle: project.opgave || '',
    algemeen: {
      ...(project.project_type  ? { Projecttype:       project.project_type }           : {}),
      ...(project.functie        ? { Functie:           project.functie }                : {}),
      ...(project.verkregen_dmv  ? { 'Verkregen d.m.v.': project.verkregen_dmv }        : {}),
      ...(project.fase           ? { Fase:              project.fase }                   : {}),
    },
    locatie: {
      ...(project.land     ? { Land:     project.land }     : {}),
      ...(project.provincie? { Provincie:project.provincie } : {}),
      ...(project.stad     ? { Stad:     project.stad }     : {}),
      ...((project.straat || project.huisnummer) ? { Adres: [project.straat, project.huisnummer].filter(Boolean).join(' ') } : {}),
      ...(project.postcode ? { Postcode: project.postcode } : {}),
    },
    metrage: {
      ...(project.totaal_bvo   ? { 'Totaal BVO':  fmt(project.totaal_bvo,  'm²') } : {}),
      ...(project.m_wonen      ? { Wonen:         fmt(project.m_wonen,     'm²') } : {}),
      ...(project.m_kantoor    ? { Kantoor:       fmt(project.m_kantoor,   'm²') } : {}),
      ...(project.m_commercieel? { Commercieel:   fmt(project.m_commercieel,'m²') } : {}),
      ...(project.m_shortstay  ? { Shortstay:     fmt(project.m_shortstay, 'm²') } : {}),
      ...(project.m_publiek    ? { Publiek:       fmt(project.m_publiek,   'm²') } : {}),
      ...(project.m_onderwijs  ? { Onderwijs:     fmt(project.m_onderwijs, 'm²') } : {}),
    },
    mobiliteit: {
      ...(project.autoparkeren  ? { Autoparkeren:   fmt(project.autoparkeren,  'plekken') } : {}),
      ...(project.fietsparkeren ? { Fietsparkeren:  fmt(project.fietsparkeren, 'plekken') } : {}),
      ...(project.ratio_wonen   ? { 'Ratio wonen':  project.ratio_wonen } : {}),
    },
    duurzaamheid: {
      ...(project.npg_score          ? { 'NPG score':   project.npg_score } : {}),
      ...(project.daktuin            ? { Daktuin:       fmt(project.daktuin,      'm²')   } : {}),
      ...(project.zonnepanelen       ? { Zonnepanelen:  fmt(project.zonnepanelen, 'stuks') } : {}),
      ...(project.duurzaamheidslabel ? { Label:         project.duurzaamheidslabel } : {}),
    },
    overig: {
      ...(project.bouwhoogte   ? { Bouwhoogte:  fmt(project.bouwhoogte, 'm') } : {}),
      ...(project.tevredenheid ? { Tevredenheid: project.tevredenheid + ' / 50' } : {}),
      ...(project.awards       ? { Awards:       project.awards } : {}),
    },
    totaalBvo: project.totaal_bvo ? fmt(project.totaal_bvo, 'm²') : '—',
    provincie: project.provincie || '',
    land: project.land || '',
    fase: project.fase || '—',
  } : {
    title: PROJECT_NAME.toUpperCase(),
    subtitle: '', algemeen: {}, locatie: {}, metrage: {},
    mobiliteit: {}, duurzaamheid: {}, overig: {},
    totaalBvo: '—', provincie: '', land: '', fase: '—',
  };

  if (loading) return (
    <div style={{padding:'60px', textAlign:'center', color:'#6b7480', fontFamily:'Inter,sans-serif'}}>
      <div style={{fontSize:'32px', marginBottom:'12px'}}>⏳</div>
      Project laden…
    </div>
  );
  if (!project && !loading) return (
    <div style={{padding:'60px', textAlign:'center', color:'#6b7480', fontFamily:'Inter,sans-serif'}}>
      <div style={{fontSize:'32px', marginBottom:'12px'}}>📭</div>
      <div style={{fontWeight:700, fontSize:'18px', color:'#111418', marginBottom:'8px'}}>Project niet gevonden</div>
      <div style={{fontSize:'13px', marginBottom:'24px'}}>"{PROJECT_NAME}" staat nog niet in de database.</div>
      <a href="new_project.html" style={{background:'#111418', color:'#fff', textDecoration:'none',
        padding:'10px 20px', borderRadius:'999px', fontSize:'11px', letterSpacing:'.14em',
        textTransform:'uppercase', fontWeight:700}}>+ Project toevoegen</a>
    </div>
  );

  return (
    <>
      <header className="topbar">
        <a className="back" href="projects_dashboard.html">← Dashboard</a>
        <div className="crumbs">
          <a href="projects_dashboard.html">Projecten</a> · <strong>{data.title}</strong>
        </div>
        <div style={{display:'flex', gap:'8px', alignItems:'center'}}>
          <button className="pdf-btn" onClick={() => {
            document.title = data.title || 'MVSA Project';
            window.print();
          }}>⬇ PDF</button>
          {editHref ? (
            <a className="edit-btn" href={editHref} title="Project bewerken">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
              Bewerk
            </a>
          ) : (
            <span className="edit-btn disabled" title="Dit project staat nog niet in je eigen lijst.">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
              Bewerk
            </span>
          )}
        </div>
      </header>

      {/* HERO */}
      <section className="hero" style={projectImages[0] ? {background: `url(${projectImages[0]}) center/cover no-repeat`} : {}}>
        {!projectImages[0] && <div className="bg"></div>}
        <nav className="nav">
          <span className="logo">MVSA</span>
        </nav>
        <div className="title-wrap">
          <h1>{data.title}</h1>
          <div className="tagline">{data.subtitle}</div>
        </div>
        <div className="footer-meta">
          <div className="bvo-num">{data.totaalBvo}</div>
          <div className="bvo-lbl">Totaal BVO</div>
          <div className="loc">{data.provincie}{data.provincie && data.land ? ' · ' : ''}{data.land}</div>
        </div>
      </section>

      {/* GALERIJ */}
      {projectImages.length > 1 && (
        <section className="section-shell">
          <h2 className="shell-title">Galerij</h2>
          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))', gap:'14px'}}>
            {projectImages.slice(1).map((url, i) => (
              <div key={i} style={{borderRadius:'12px', overflow:'hidden', aspectRatio:'4/3', background:'#e6ecf2'}}>
                <img src={url} alt="" style={{width:'100%', height:'100%', objectFit:'cover', display:'block',
                  transition:'transform .3s ease', cursor:'pointer'}}
                  onClick={() => window.open(url, '_blank')}
                  onMouseOver={e => e.target.style.transform='scale(1.03)'}
                  onMouseOut={e => e.target.style.transform='scale(1)'}
                />
              </div>
            ))}
          </div>
        </section>
      )}

      {/* TEAM */}
      {data.team && data.team.length > 0 && (
      <section className="section-shell">
        <h2 className="shell-title">Medewerkers</h2>
        <div className="four-up">
          {data.team.map((m, i) => (
            <a key={i} className="four-card" href={`employees.html?e=${encodeURIComponent(m.name)}`} style={{textDecoration:'none', color:'inherit'}}>
              <div className={`img ${['','alt','alt-2','alt-3'][i] || ''}`}>
                <span className="ph">PLACE PHOTO HERE</span>
              </div>
              <div className="num" style={{fontSize:'20px', letterSpacing:'.02em', textTransform:'uppercase'}}>{m.name}</div>
              <div className="lbl">{m.role}</div>
              <div className="desc">{m.desc}</div>
            </a>
          ))}
        </div>
      </section>
      )}

      {/* INFO GRID */}
      <section className="info-grid">
        <InfoCard title="Algemeen"     items={data.algemeen || {}}     keyStat={data.fase ? { label:'Fase', value: data.fase } : null} />
        <InfoCard title="Locatie"      items={data.locatie || {}} />
        <InfoCard title="Metrage"      items={data.metrage || {}}      keyStat={data.totaalBvo && data.totaalBvo !== '' ? { label:'Totaal BVO', value: data.totaalBvo } : null} />
        <InfoCard title="Mobiliteit"   items={data.mobiliteit || {}} />
        <InfoCard title="Duurzaamheid" items={data.duurzaamheid || {}} />
        <InfoCard title="Overig"       items={data.overig || {}} />
      </section>

      {/* PLAN ROW — alleen tonen als er metrage data is */}
      {Object.keys(data.metrage || {}).length > 0 && (
        <section className="plan-card">
          <div>
            <h2>Project plan</h2>
            <div className="sub">Het oppervlak per ruimte</div>
            <table>
              <tbody>
                {Object.entries(data.metrage).map(([k, v]) => (
                  <tr key={k}><td>{k}</td><td>{v}</td></tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="floorplan">
            {projectImages[1]
              ? <img src={projectImages[1]} alt="Plattegrond" style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:'12px'}} />
              : <span className="ph">PLACE FLOORPLAN HERE</span>}
          </div>
        </section>
      )}

    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
(function(){
  if(localStorage.getItem('mvsa.dark')==='1')
    document.documentElement.setAttribute('data-theme','dark');
})();
</script>
<script src="transitions.js"></script>
<script>
(async function() {
  try {
    const { data: { user } } = await db.auth.getUser();
    const bar = document.getElementById('auth-bar');
    if (!bar) return;
    if (!user) {
      bar.innerHTML = '<a href="login.html" style="background:var(--ink);color:#fff;text-decoration:none;padding:8px 16px;border-radius:999px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;">Inloggen →</a>';
      return;
    }
    const { data: profile } = await db.from('profiles').select('naam,status').eq('id', user.id).maybeSingle();
    if (profile && profile.status === 'approved') {
      bar.innerHTML = '<span style="font-weight:700;font-size:12px;">' + profile.naam + '</span><span style="color:var(--line)">|</span><button onclick="Auth.logout().then(()=>location.reload())" style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--muted);">Uitloggen</button>';
    } else {
      bar.innerHTML = '<a href="login.html" style="background:var(--ink);color:#fff;text-decoration:none;padding:8px 16px;border-radius:999px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;">Inloggen →</a>';
    }
  } catch(e) {}
})();
</script>
<div id="auth-bar" style="position:fixed;top:24px;right:24px;z-index:200;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border:1px solid rgba(17,20,24,.08);border-radius:999px;padding:8px 14px;box-shadow:0 4px 16px -4px rgba(20,30,45,.18);font-size:11px;font-family:inherit;"></div>
</body>
</html>
