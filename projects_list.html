<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Projecten · Lijst</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  :root{ --bg:#f4f1ec; --card:#fff; --ink:#111418; --muted:#8a8d93; --line:#e8e4dd; --accent:#3d6e8a; --shadow: 0 1px 0 rgba(20,30,45,.04), 0 8px 24px -12px rgba(20,30,45,.18); }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  .page{ max-width:1100px; margin:0 auto; padding:32px 32px 80px; }
  .back{ position:fixed; top:24px; left:24px; z-index:100; display:inline-flex; align-items:center; gap:8px; color:var(--ink); text-decoration:none; font-size:12px; letter-spacing:.1em; text-transform:uppercase; font-weight:600; padding:10px 16px; border-radius:999px; background:rgba(255,255,255,.85); backdrop-filter:blur(10px); border:1px solid rgba(17,20,24,.08); box-shadow:0 4px 16px -4px rgba(20,30,45,.18); transition:background .15s,transform .15s; }
  .back:hover{ background:#fff; transform:translateY(-1px); }
  .header{ display:flex; justify-content:space-between; align-items:end; margin-bottom:22px; padding-top:4px; }
  .header h1{ margin:0; font-size:clamp(36px,5vw,56px); font-weight:800; letter-spacing:-.035em; line-height:1; }
  .header .sub{ font-size:13px; color:var(--muted); margin-top:8px; }
  .header a.cta{ background:var(--ink); color:#fff; text-decoration:none; padding:10px 18px; border-radius:999px; font-size:11px; letter-spacing:.14em; text-transform:uppercase; font-weight:700; }
  .header a.cta:hover{ background:var(--accent); }
  /* ── Grid kaartweergave ── */
  .proj-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:16px;
  }
  .proj-card{
    background:var(--card); border-radius:14px; overflow:hidden;
    box-shadow:0 1px 0 rgba(20,30,45,.04), 0 4px 16px -4px rgba(20,30,45,.12);
    text-decoration:none; color:inherit;
    transition:transform .15s, box-shadow .15s;
  }
  .proj-card:hover{
    transform:translateY(-3px);
    box-shadow:0 1px 0 rgba(20,30,45,.04), 0 12px 28px -6px rgba(20,30,45,.2);
  }
  .pc-img{
    width:100%; aspect-ratio:16/10; overflow:hidden;
    background:linear-gradient(135deg, #1a2030, #2a3548);
  }
  .pc-placeholder{
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    font-size:28px;
  }
  .pc-body{ padding:14px 16px 16px; }
  .pc-name{
    font-weight:800; font-size:14px; letter-spacing:.02em; text-transform:uppercase;
    margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .pc-meta{ font-size:12px; color:var(--muted); margin-bottom:10px; }
  .pc-tags{ display:flex; flex-wrap:wrap; gap:6px; }
  .pc-tag{
    font-size:9px; letter-spacing:.12em; text-transform:uppercase; font-weight:700;
    padding:3px 8px; border-radius:999px;
    background:rgba(61,110,138,.08); color:var(--accent);
  }

  .card{ background:var(--card); border-radius:16px; box-shadow:var(--shadow); overflow:hidden; }
  table{ width:100%; border-collapse:collapse; }
  thead th{ text-align:left; font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); padding:16px 22px; font-weight:600; border-bottom:1px solid var(--line); background:#fafbfc; }
  thead th.right, tbody td.right{ text-align:right; }
  tbody td{ padding:14px 22px; font-size:13px; border-bottom:1px solid var(--line); }
  tbody tr:last-child td{ border-bottom:0; }
  tbody tr:hover{ background:#f6f8fa; }
  .num-pill{ display:inline-block; font-variant-numeric:tabular-nums; font-weight:600; background:rgba(17,20,24,.06); padding:3px 10px; border-radius:999px; font-size:12px; }
  .nm a{ color:inherit; text-decoration:none; font-weight:700; letter-spacing:.03em; text-transform:uppercase; }
  .nm a:hover{ color:var(--accent); }
  .actions{ display:flex; gap:6px; justify-content:flex-end; }
  .btn{ background:transparent; border:1px solid rgba(17,20,24,.12); border-radius:999px; padding:6px 12px; font-size:11px; letter-spacing:.08em; text-transform:uppercase; font-weight:600; color:var(--ink); cursor:pointer; text-decoration:none; font-family:inherit; transition:background .15s; }
  .btn:hover{ background:rgba(17,20,24,.04); }
  .btn.del{ color:#b43c3c; border-color:rgba(180,60,60,.3); }
  .btn.del:hover{ background:rgba(180,60,60,.08); }
  .empty{ padding:60px 28px; text-align:center; color:var(--muted); font-size:13px; }

  /* VIEW TOGGLE */
  .view-toggle{ display:flex; gap:4px; background:var(--card); border-radius:999px; padding:4px; box-shadow:var(--shadow); border:1px solid rgba(17,20,24,.06); }
  .vt-btn{ background:transparent; border:none; padding:7px 14px; border-radius:999px; cursor:pointer; font-size:12px; color:var(--muted); transition:all .15s; font-family:inherit; font-weight:600; }
  .vt-btn.active{ background:var(--ink); color:#fff; }

  /* PROJECT CARD GRID */
  .proj-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap:20px;
  }
  .proj-card-wrap{
    border-radius:18px; overflow:hidden; position:relative;
    aspect-ratio:4/3; cursor:pointer;
    box-shadow:0 4px 24px -8px rgba(20,30,45,.22);
    transition:transform .4s cubic-bezier(.22,1,.36,1), box-shadow .4s;
  }
  .proj-card-wrap:hover{
    transform:translateY(-6px) scale(1.01);
    box-shadow:0 24px 48px -12px rgba(20,30,45,.35);
  }
  .proj-card-bg{
    position:absolute; inset:0;
    background:linear-gradient(135deg, #1a2030 0%, #2a3548 50%, #111828 100%);
    transition:transform .6s cubic-bezier(.22,1,.36,1);
  }
  .proj-card-wrap:hover .proj-card-bg{ transform:scale(1.06); }
  .proj-card-img{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; display:block;
    transition:transform .6s cubic-bezier(.22,1,.36,1), opacity .3s;
  }
  .proj-card-wrap:hover .proj-card-img{ transform:scale(1.06); }

  /* Gradient overlays */
  .proj-card-overlay{
    position:absolute; inset:0;
    background:linear-gradient(to top, rgba(10,12,18,.92) 0%, rgba(10,12,18,.3) 50%, transparent 100%);
    transition:opacity .3s;
  }
  .proj-card-overlay-hover{
    position:absolute; inset:0;
    background:rgba(10,12,18,.55);
    opacity:0; transition:opacity .3s;
  }
  .proj-card-wrap:hover .proj-card-overlay-hover{ opacity:1; }

  /* Card content — always visible bottom bar */
  .proj-card-bottom{
    position:absolute; bottom:0; left:0; right:0;
    padding:20px 22px 20px;
    transform:translateY(0);
    transition:transform .35s cubic-bezier(.22,1,.36,1);
  }
  .proj-card-name{
    font-size:16px; font-weight:800; letter-spacing:.04em; text-transform:uppercase;
    color:#fff; line-height:1.2; margin-bottom:4px;
    text-shadow:0 2px 8px rgba(0,0,0,.4);
  }
  .proj-card-sub{
    font-size:11px; color:rgba(255,255,255,.65); letter-spacing:.06em; text-transform:uppercase;
    display:flex; align-items:center; gap:8px;
  }
  .proj-card-fase{
    font-size:9px; letter-spacing:.14em; font-weight:700; text-transform:uppercase;
    padding:3px 8px; border-radius:999px;
    background:rgba(255,255,255,.15); color:#fff;
    border:1px solid rgba(255,255,255,.2);
  }

  /* Hover details — slide up */
  .proj-card-details{
    position:absolute; bottom:0; left:0; right:0;
    padding:18px 22px;
    transform:translateY(100%);
    transition:transform .35s cubic-bezier(.22,1,.36,1);
    display:flex; flex-direction:column; gap:6px;
  }
  .proj-card-wrap:hover .proj-card-bottom{ transform:translateY(-80px); }
  .proj-card-wrap:hover .proj-card-details{ transform:translateY(0); }
  .proj-card-detail-row{
    display:flex; justify-content:space-between; align-items:center;
    font-size:11px; color:rgba(255,255,255,.8);
  }
  .proj-card-detail-row .lbl{ color:rgba(255,255,255,.5); letter-spacing:.06em; text-transform:uppercase; }
  .proj-card-detail-row .val{ font-weight:700; color:#fff; }
  .proj-card-actions{
    display:flex; gap:8px; margin-top:8px;
  }
  .proj-card-action{
    flex:1; padding:8px; border-radius:8px; text-align:center; text-decoration:none;
    font-size:10px; letter-spacing:.12em; text-transform:uppercase; font-weight:700;
    transition:background .15s; border:none; cursor:pointer; font-family:inherit;
  }
  .proj-card-action.primary{ background:rgba(255,255,255,.95); color:#111418; }
  .proj-card-action.primary:hover{ background:#fff; }
  .proj-card-action.secondary{ background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.2); }
  .proj-card-action.secondary:hover{ background:rgba(255,255,255,.25); }
  .proj-card-action.danger{ background:rgba(180,60,60,.8); color:#fff; }
  .proj-card-action.danger:hover{ background:rgba(180,60,60,1); }

  /* Nummer badge top-left */
  .proj-card-num{
    position:absolute; top:14px; left:16px;
    background:rgba(255,255,255,.12); backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.18); border-radius:999px;
    font-size:9px; letter-spacing:.14em; text-transform:uppercase; font-weight:700;
    color:#fff; padding:4px 10px;
  }
  /* Select checkbox top-right */
  .proj-card-check{
    position:absolute; top:14px; right:14px; z-index:2;
    width:22px; height:22px; accent-color:#3d6e8a; cursor:pointer;
    opacity:0; transition:opacity .2s;
  }
  .proj-card-wrap:hover .proj-card-check,
  .proj-card-check:checked{ opacity:1; }
  .empty a{ color:var(--accent); font-weight:600; }
  .loading{ padding:40px; text-align:center; color:var(--muted); font-size:13px; }
  .bulk-bar{
    display:flex; align-items:center; gap:10px; padding:12px 22px;
    background:#111418; border-radius:12px; margin-bottom:12px;
    font-size:12px; color:#fff; font-family:'Inter',sans-serif;
  }
  .bulk-bar .count{ font-weight:700; letter-spacing:.04em; }
  .bulk-select{ display:flex; gap:8px; margin-left:auto; align-items:center; }
  .bulk-select select{
    font-family:inherit; font-size:11px; padding:6px 10px; border-radius:8px;
    border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.1);
    color:#fff; cursor:pointer; outline:none;
  }
  .bulk-select select option{ background:#111418; }
  .bulk-apply{
    background:#3d6e8a; color:#fff; border:none; padding:7px 14px; border-radius:8px;
    font-size:11px; letter-spacing:.1em; text-transform:uppercase; font-weight:700;
    cursor:pointer; font-family:inherit; transition:background .15s;
  }
  .bulk-apply:hover{ background:#2d5a72; }
  .bulk-cancel{ background:transparent; color:rgba(255,255,255,.6); border:none;
    font-size:11px; cursor:pointer; font-family:inherit; padding:4px 8px; }
  .bulk-cancel:hover{ color:#fff; }
  .row-check{ width:18px; height:18px; cursor:pointer; accent-color:#3d6e8a; }
  .select-all-th{ width:44px; }
</style>
</head>
<body>
<a class="back" href="projects_dashboard.html">← Dashboard</a>
<a class="back" href="admin.html" style="left:160px;">🛠 Beheer</a>
<div class="page">
  <header class="header">
    <div>
      <h1>Mijn projecten</h1>
      <div class="sub">Alle projecten — bewerken of verwijderen.</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <div class="view-toggle">
        <button class="vt-btn" id="vt-grid" onclick="setView('grid')">⊞ Kaarten</button>
        <button class="vt-btn active" id="vt-list" onclick="setView('list')">☰ Lijst</button>
      </div>
      <a class="cta" href="new_project.html">+ Nieuw project</a>
    </div>
  </header>
  <div id="bulk-bar" class="bulk-bar" style="display:none;">
  <span class="count" id="bulk-count"></span>
  <div class="bulk-select">
    <span style="opacity:.7">Fase wijzigen naar:</span>
    <select id="bulk-fase">
      <option value="">Kies fase…</option>
      <option value="AQ">AQ — Acquisitie</option>
      <option value="SO">SO — Schets Ontwerp</option>
      <option value="VO">VO — Voorlopig Ontwerp</option>
      <option value="DO">DO — Definitief Ontwerp</option>
      <option value="TO">TO — Technisch Ontwerp</option>
      <option value="UO">UO — Uitvoerings Ontwerp</option>
      <option value="UV">UV — Uitvoering</option>
      <option value="OP">OP — Opgeleverd</option>
    </select>
    <button class="bulk-apply" id="bulk-apply">Toepassen</button>
    <button class="bulk-cancel" id="bulk-cancel">Annuleer</button>
  </div>
</div>
<div id="root"><div class="loading">Projecten laden…</div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script>
/* ── render: herlaadt alle projecten uit Supabase en toont ze ── */
let isApproved = false;
let currentView = localStorage.getItem('mvsa.listview') || 'list';

function setView(v) {
  currentView = v;
  localStorage.setItem('mvsa.listview', v);
  document.getElementById('vt-grid')?.classList.toggle('active', v === 'grid');
  document.getElementById('vt-list')?.classList.toggle('active', v === 'list');
  render();
}

setTimeout(() => {
  document.getElementById('vt-grid')?.classList.toggle('active', currentView === 'grid');
  document.getElementById('vt-list')?.classList.toggle('active', currentView === 'list');
}, 100);

async function render() {
  const root = document.getElementById('root');
  let projects = [];
  try { projects = await Projects.getAll(); }
  catch(e) { root.innerHTML = '<div class="card empty">Database niet bereikbaar. Controleer supabase.js.</div>'; return; }
  if (!projects.length) { root.innerHTML = '<div class="card empty">Nog geen projecten. <a href="new_project.html">Voeg je eerste toe →</a></div>'; return; }
  if (currentView === 'list') {
    root.innerHTML = '<div class="card"><table><thead><tr><th>Projectnaam</th><th>Projectnummer</th><th>Stad</th><th>Fase</th><th class="right">Acties</th></tr></thead><tbody>' +
      projects.map(p => `<tr>
        <td class="nm"><a href="project_page.html?nr=${encodeURIComponent(p.projectnummer||'')}&p=${encodeURIComponent(p.projectnaam||'')}">${p.projectnaam||'—'}</a></td>
        <td><span class="num-pill">${p.projectnummer||'—'}</span></td>
        <td>${p.stad||'—'}</td><td>${p.fase||'—'}</td>
        <td class="right"><div class="actions">
          <a class="btn" href="project_page.html?nr=${encodeURIComponent(p.projectnummer||'')}&p=${encodeURIComponent(p.projectnaam||'')}">Bekijk</a>
          ${isApproved ? `<a class="btn" href="new_project.html?edit=${encodeURIComponent(p.projectnummer||'')}">Bewerk</a>` : ''}
          ${isApproved ? `<button class="btn del" data-id="${p.id}" data-naam="${p.projectnaam||p.projectnummer}">Verwijder</button>` : ''}
        </div></td></tr>`).join('') + '</tbody></table></div>';
  } else {
    root.innerHTML = '<div class="proj-grid">' +
      projects.map(p => `<a class="proj-card" href="project_page.html?nr=${encodeURIComponent(p.projectnummer||'')}&p=${encodeURIComponent(p.projectnaam||'')}">
        <div class="pc-img" id="pc-img-${p.projectnummer||''}">
          <div class="pc-placeholder">🏗</div>
        </div>
        <div class="pc-body">
          <div class="pc-name">${p.projectnaam||'—'}</div>
          <div class="pc-meta">${[p.stad, p.land].filter(Boolean).join(' · ')||'—'}</div>
          <div class="pc-tags">
            ${p.fase ? `<span class="pc-tag">${p.fase}</span>` : ''}
            ${p.project_type ? `<span class="pc-tag">${p.project_type}</span>` : ''}
            ${p.totaal_bvo ? `<span class="pc-tag">${Number(p.totaal_bvo).toLocaleString('nl-NL')} m²</span>` : ''}
          </div>
        </div>
      </a>`).join('') + '</div>';
    // Laad thumbnails voor grid cards
    projects.forEach(async p => {
      if (!p.projectnummer) return;
      try {
        const imgs = await Images.getForProject(p.projectnummer);
        if (imgs[0]) {
          const el = document.getElementById('pc-img-' + p.projectnummer);
          if (el) el.innerHTML = `<img src="${imgs[0]}" alt="" style="width:100%;height:100%;object-fit:cover;display:block;">`;
        }
      } catch(e) {}
    });
  }
  root.querySelectorAll('.btn.del').forEach(b => {
    b.addEventListener('click', async () => {
      if (!confirm(`Project "${b.dataset.naam}" verwijderen?`)) return;
      b.disabled = true; b.textContent = '…';
      try { await Projects.remove(b.dataset.id); render();
      } catch(e) { alert('Verwijderen mislukt: ' + e.message); b.disabled = false; b.textContent = 'Verwijder'; }
    });
  });
}
</script>
<script src="dark-mode.js"></script>
<script src="transitions.js"></script>


<style>

[data-theme="dark"] 

</style>
<div class="auth-bar" id="auth-bar" style="display:none;"></div>
<script>
// Startup: check auth en laad projecten
(async function(){
  try {
    const { data: { user } } = await db.auth.getUser();
    if (user) {
      const { data: profile } = await db.from('profiles').select('status').eq('id', user.id).maybeSingle();
      isApproved = profile?.status === 'approved';
    }
  } catch(e) {}
  // Toon nieuw project knop voor goedgekeurde gebruikers
  const btn = document.getElementById('nieuw-btn');
  if (btn && isApproved) {
    btn.innerHTML = '<a href="new_project.html" class="btn-primary">+ Nieuw project</a>';
  }
  render();
})();
</script>

<div class="auth-bar" id="auth-bar"></div>
<script src="auth-bar.js"></script>
</body>
</html>
