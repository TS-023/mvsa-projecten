<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wachtwoord instellen · MVSA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{ --bg:#f4f1ec; --card:#fff; --ink:#111418; --muted:#8a8d93; --line:#e8e4dd; --accent:#3d6e8a; --danger:#b43c3c; }
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.card{ background:var(--card); border-radius:20px; padding:52px 44px; box-shadow:0 24px 64px -12px rgba(20,30,45,.2); width:min(420px,95vw); text-align:center; animation:popIn .35s cubic-bezier(.22,1,.36,1); }
@keyframes popIn{ from{opacity:0;transform:scale(.95) translateY(12px)} to{opacity:1;transform:scale(1) translateY(0)} }
.logo{ font-size:13px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); margin-bottom:24px; display:block; }
h1{ font-size:26px; font-weight:800; letter-spacing:-.03em; margin-bottom:8px; }
.sub{ font-size:13px; color:var(--muted); margin-bottom:32px; line-height:1.6; }
.field{ margin-bottom:14px; text-align:left; }
.field label{ font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:6px; }
input{ width:100%; font-family:inherit; font-size:15px; padding:12px 16px; border:1.5px solid var(--line); border-radius:10px; background:var(--bg); color:var(--ink); outline:none; transition:border-color .2s; }
input:focus{ border-color:var(--accent); }
.btn{ width:100%; margin-top:8px; background:var(--accent); color:#fff; border:none; border-radius:10px; padding:14px; font-family:inherit; font-size:14px; font-weight:700; cursor:pointer; transition:opacity .2s; }
.btn:hover{ opacity:.88; }
.btn:disabled{ opacity:.5; cursor:not-allowed; }
.msg{ margin-top:14px; font-size:13px; padding:10px 14px; border-radius:8px; display:none; }
.msg.error{ background:rgba(180,60,60,.08); color:var(--danger); display:block; }
.msg.success{ background:rgba(26,122,74,.08); color:#1a7a4a; display:block; }
.strength{ height:3px; border-radius:2px; margin-top:6px; background:var(--line); overflow:hidden; }
.strength-bar{ height:100%; border-radius:2px; transition:width .3s, background .3s; }
</style>
</head>
<body>
<div class="card">
  <span class="logo">MVSA Projecten</span>
  <h1>Welkom!</h1>
  <p class="sub" id="sub-text">Stel je wachtwoord in om toegang te krijgen tot het platform.</p>

  <div id="form-wrap">
    <div class="field">
      <label>Wachtwoord</label>
      <input type="password" id="pw1" placeholder="Minimaal 8 tekens" oninput="checkStrength()" autocomplete="new-password">
      <div class="strength"><div class="strength-bar" id="strength-bar" style="width:0%"></div></div>
    </div>
    <div class="field">
      <label>Herhaal wachtwoord</label>
      <input type="password" id="pw2" placeholder="Zelfde wachtwoord" autocomplete="new-password">
    </div>
    <button class="btn" id="save-btn" onclick="savePassword()">Wachtwoord instellen →</button>
    <div class="msg" id="msg"></div>
  </div>

  <div id="success-wrap" style="display:none;">
    <div style="font-size:48px;margin-bottom:16px;">✅</div>
    <p style="font-size:14px;color:var(--muted);line-height:1.7;">Je wachtwoord is ingesteld. Je wordt doorgestuurd naar de loginpagina.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script>
function checkStrength() {
  const pw = document.getElementById('pw1').value;
  const bar = document.getElementById('strength-bar');
  let score = 0;
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const colors = ['#b43c3c','#e07b39','#e0c039','#1a7a4a','#1a7a4a'];
  const widths = ['20%','40%','60%','80%','100%'];
  bar.style.width = pw ? widths[Math.min(score-1,4)] : '0%';
  bar.style.background = pw ? colors[Math.min(score-1,4)] : 'transparent';
}

// Haal de invite token op uit de URL hash zonder de huidige sessie te overschrijven
function getTokenFromHash() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  return {
    accessToken:  params.get('access_token'),
    refreshToken: params.get('refresh_token'),
    type:         params.get('type'),
  };
}

async function savePassword() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const msg = document.getElementById('msg');
  msg.className = 'msg';

  if (pw1.length < 8) { msg.textContent = 'Wachtwoord moet minimaal 8 tekens zijn.'; msg.className='msg error'; return; }
  if (pw1 !== pw2) { msg.textContent = 'Wachtwoorden komen niet overeen.'; msg.className='msg error'; return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Opslaan…';

  try {
    const { accessToken, refreshToken, type } = getTokenFromHash();

    if (!accessToken) throw new Error('Ongeldige of verlopen uitnodigingslink.');

    // Sla de huidige admin sessie op zodat we die achteraf kunnen herstellen
    const { data: { session: currentSession } } = await db.auth.getSession();

    // Wissel tijdelijk naar de uitgenodigde gebruiker via de invite token
    const { error: sessionError } = await db.auth.setSession({
      access_token: accessToken,
      refresh_token: refreshToken,
    });
    if (sessionError) throw sessionError;

    // Stel het wachtwoord in voor de uitgenodigde gebruiker
    const { error: updateError } = await db.auth.updateUser({ password: pw1 });
    if (updateError) throw updateError;

    // Log de uitgenodigde gebruiker direct weer uit
    await db.auth.signOut();

    // Herstel de admin sessie als die er was
    if (currentSession) {
      await db.auth.setSession({
        access_token: currentSession.access_token,
        refresh_token: currentSession.refresh_token,
      });
    }

    document.getElementById('form-wrap').style.display = 'none';
    document.getElementById('success-wrap').style.display = 'block';
    setTimeout(() => { window.location.href = 'login.html'; }, 2500);

  } catch(e) {
    msg.textContent = e.message || 'Er is iets misgegaan. Probeer opnieuw.';
    msg.className = 'msg error';
    btn.disabled = false; btn.textContent = 'Wachtwoord instellen →';
  }
}
</script>
</body>
</html>
